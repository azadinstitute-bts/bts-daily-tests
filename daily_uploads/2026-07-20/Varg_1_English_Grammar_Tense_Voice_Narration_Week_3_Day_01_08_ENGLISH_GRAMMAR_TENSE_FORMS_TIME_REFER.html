to work until late night.", "explanation": "The sentence 'Although he was tired, he continued to work until late night' is grammatically correct. It uses consistent past tense for sequential actions. Option A should be 'By the time he arrived, all the guests had already left' (Past Perfect for the earlier action). Option B should be 'She has been working on this project for two months' (use 'for' with duration, not 'since'). Option D is an incorrect conditional; it should be 'If I had known, I would have told you' (Type 3 conditional)."}, {"id": 67, "section": "English Grammar", "question": "Which of the following transformations from active to passive voice is grammatically correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Active: The committee will discuss the proposal tomorrow. Passive: The proposal will be discussed by the committee tomorrow.", "Active: The committee will discuss the proposal tomorrow. Passive: The proposal is discussed by the committee tomorrow.", "Active: The committee will discuss the proposal tomorrow. Passive: The proposal would be discussed by the committee tomorrow.", "Active: The committee will discuss the proposal tomorrow. Passive: The proposal will discussed by the committee tomorrow."], "answer": "Active: The committee will discuss the proposal tomorrow. Passive: The proposal will be discussed by the committee tomorrow.", "explanation": "The correct passive transformation for 'The committee will discuss the proposal tomorrow' is 'The proposal will be discussed by the committee tomorrow.' This correctly uses the future simple passive structure (will + be + past participle). Option A incorrectly changes 'will' to 'would'. Option B incorrectly changes the tense from future to present. Option C omits the auxiliary verb 'be' before the past participle."}, {"id": 68, "section": "English Grammar", "question": "Consider the following statements regarding the reporting of imperative sentences in indirect speech:\nJ: Imperative sentences are typically reported using an infinitive phrase (to + verb).\nK: The reporting verb for imperative sentences is often 'asked', 'ordered', 'advised', or 'requested'.\nL: Negative imperatives are reported using 'not to + verb'.\nM: The tense of the reporting verb must always be in the past when reporting an imperative.\nWhich of the statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and L only", "J, K and L only", "J and K only", "All J, K, L, M"], "answer": "J, K and L only", "explanation": "Statements J, K, and L are correct. Imperative sentences are indeed reported using an infinitive phrase (e.g., 'He told me to go'), and suitable reporting verbs like 'ordered', 'requested', 'advised' are used. Negative imperatives follow the structure 'not to + verb' (e.g., 'He told me not to go'). Statement M is incorrect because the reporting verb does not always have to be in the past tense; it can be in the present if the command is still relevant or being reported immediately."}, {"id": 69, "section": "English Grammar", "question": "Consider the following statements about direct and indirect speech transformations:\nJ: In reported interrogative sentences, the conjunction 'that' is always used.\nK: In reported declarative sentences, the conjunction 'that' is optional but commonly used.\nL: Reported exclamatory sentences often use reporting verbs like 'exclaimed' or 'cried out', and convert the exclamation into a statement.\nM: The word order in reported questions changes from interrogative to assertive.\nWhich of the statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K and L only", "K and L only", "All J, K, L, M", "K, L and M only"], "answer": "K, L and M only", "explanation": "Statements K, L, and M are correct. In reported declarative sentences, 'that' is optional. Reported exclamatory sentences are indeed converted into statements using appropriate reporting verbs. The word order in reported questions changes from question form (interrogative) to statement form (assertive). Statement J is incorrect because in reported interrogative sentences, 'if' or 'whether' is used for yes/no questions, and the 'wh-word' itself acts as the conjunction for wh-questions; 'that' is not used."}, {"id": 70, "section": "English Grammar", "question": "Assertion (A): When the reporting verb is in the past tense, the tense of the verb in the reported speech usually shifts to a corresponding past tense.\nReason (R):: This shift maintains the logical sequence of events and reflects that the reported action occurred prior to the act of reporting.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is not the correct explanation of A.", "(A) is false, but R is true.", "Both A and R are true, and R is the correct explanation of A.", "(A) is true, but R is false."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Both the assertion and the reason are true, and the reason correctly explains the assertion. The backshift of tenses in reported speech (when the reporting verb is in the past) is a grammatical rule that ensures the reported event's time frame is consistent with the time of reporting. It logically places the reported action in the past relative to the act of reporting."}, {"id": 71, "section": "English Grammar", "question": "Assertion (A): In a passive voice construction, the grammatical subject performs the action of the verb.\nReason (R):: The passive voice is primarily used to emphasize the agent of the action.", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) is true, but R is false.", "Both A and R are true, and R is the correct explanation of A.", "Both A and R are true, but R is not the correct explanation of A.", "(A) is false, but R is false."], "answer": "(A) is false, but R is false.", "explanation": "Both the assertion and the reason are false. In a passive voice construction, the grammatical subject receives the action of the verb, it does not perform it (e.g., 'The ball was hit by John' - 'ball' is the subject, but 'John' performs the action). The passive voice is primarily used to emphasize the action or the recipient of the action, not the agent. The agent is often unknown, unimportant, or deliberately deemphasized in passive constructions."}, {"id": 72, "section": "English Grammar", "question": "Read the following paragraph and identify the sentence segments that contain grammatical errors related to tense or voice:\n\"The old house (J) stood empty for decades. Recently, it (K) has bought by a young couple. They (L) are planning to renovate it, and the work (M) expects to begin next month.\"\nWhich of the segments contain errors?", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K and M", "K and M only", "M only", "K only"], "answer": "K and M only", "explanation": "Segment K has an error in voice and tense: 'it has bought' should be 'it was bought' (passive voice, simple past tense) because the house is the recipient of the action. Segment M has an error in voice: 'the work expects to begin' should be 'the work is expected to begin' (passive voice) because the work cannot 'expect' on its own; it is expected by others. Segment J and L are grammatically correct."}, {"id": 73, "section": "English Grammar", "question": "Evaluate the correctness of the following statements regarding advanced narration rules:\nJ: When reporting a universal truth, the tense in the reported speech remains unchanged, regardless of the reporting verb's tense.\nK: In reported questions, if the direct speech begins with a 'wh-word', no conjunction like 'if' or 'whether' is used.\nL: Commands and requests in direct speech are typically reported using an infinitive phrase (to + verb) and a suitable reporting verb.\nM: If the direct speech contains a time expression like 'today', it always changes to 'that day' in reported speech, even if the reporting verb is in the present tense.\nWhich of the statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and L only", "All J, K, L, M", "J, K and L only", "J, K, M only"], "answer": "J, K and L only", "explanation": "Statements J, K, and L are correct. Universal truths do not undergo tense change in reported speech. For 'wh-questions' in reported speech, the 'wh-word' itself acts as the conjunction, so 'if' or 'whether' is not used. Commands and requests are indeed reported using an infinitive phrase. Statement M is incorrect because if the reporting verb is in the present tense, or if the reported action is still relevant at the time of reporting, time expressions like 'today' might not change to 'that day'."}, {"id": 74, "section": "English Grammar", "question": "Select the correct transformations involving exceptions or specific rules in voice and narration:\nJ: Direct: He said, \"I must go.\" Indirect: He said that he had to go.\nK: Active: It is time to close the shop. Passive: It is time for the shop to be closed.\nL: Direct: She said, \"May God bless you!\" Indirect: She prayed that God might bless him.\nM: Active: People say that he is a genius. Passive: He is said to be a genius.\nWhich of the transformations are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["All J, K, L, M", "J and K only", "J, K and L only", "K and L only"], "answer": "All J, K, L, M", "explanation": "All the transformations provided are grammatically correct and follow specific rules or exceptions in voice and narration. J correctly transforms 'must' (for obligation) to 'had to' in indirect speech. K correctly transforms an active infinitive construction into its passive equivalent. L correctly reports an optative sentence (wish/prayer). M correctly uses the impersonal passive construction for reporting general opinions."}, {"id": 75, "section": "English Grammar", "question": "Classify the following sentences based on their tense, voice, and narration characteristics:\nJ: The report had been submitted before the deadline.\nK: She asked me if I was feeling better.\nL: They will have completed the construction by next month.\nM: Let the door be opened.\nChoose the option with the correct classification.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J: Past Perfect Passive, K: Indirect Speech, L: Future Perfect Active, M: Imperative Passive", "J: Simple Past Passive, K: Direct Speech, L: Future Perfect Active, M: Imperative Active", "J: Past Continuous Passive, K: Indirect Speech, L: Future Perfect Passive, M: Declarative Passive", "J: Past Perfect Active, K: Direct Speech, L: Future Continuous Active, M: Imperative Active"], "answer": "J: Past Perfect Passive, K: Indirect Speech, L: Future Perfect Active, M: Imperative Passive", "explanation": "J. 'had been submitted' is Past Perfect Tense and Passive Voice. K. 'She asked me if I was feeling better' is an example of Indirect Speech (specifically, a reported yes/no question). L. 'will have completed' is Future Perfect Tense and Active Voice. M. 'Let the door be opened' is an Imperative sentence in the Passive Voice. Option A correctly identifies all these characteristics."}, {"id": 76, "section": "English Grammar", "question": "Match the direct speech sentences in List-I with their correct indirect speech transformations in List-II.\nसूची-I\nJ: He said, \"I am reading a book.\"\nK: She asked, \"Are you coming tomorrow?\"\nL: The teacher said, \"Honesty is the best policy.\"\nM: He exclaimed, \"What a beautiful flower!\"\nसूची-II\n1. He exclaimed that it was a very beautiful flower.\n2. He said that he was reading a book.\n3. The teacher said that honesty is the best policy.\n4. She asked if I was coming the next day. Choose the correct matching:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-4, L-3, M-1", "J-4, K-1, L-2, M-3", "J-2, K-3, L-4, M-1", "J-1, K-2, L-3, M-4"], "answer": "J-2, K-4, L-3, M-1", "explanation": "J. \"I am reading a book.\" (Present Continuous) becomes \"He said that he was reading a book.\" (Past Continuous). K. \"Are you coming tomorrow?\" (Yes/No question) becomes \"She asked if I was coming the next day.\" (Tense shift, time expression change, 'if' conjunction). L. \"Honesty is the best policy.\" (Universal truth) remains unchanged in tense: \"The teacher said that honesty is the best policy.\" M. \"What a beautiful flower!\" (Exclamatory) becomes \"He exclaimed that it was a very beautiful flower.\" (Converted to a statement). Therefore, the correct matching is J-2, K-4, L-3, M-1."}, {"id": 77, "section": "English Grammar", "question": "Arrange the following steps in the correct chronological order for converting an active voice sentence to a passive voice sentence:\nJ: Change the main verb into its past participle form.\nK: Identify the subject, verb, and object of the active sentence.\nL: Place the original object as the new subject of the passive sentence.\nM: Use an appropriate form of the auxiliary verb 'to be' before the main verb, and optionally add 'by' + original subject.\nChoose the correct sequence:", "brand": "bilaspurtestseries.com 9669946966", "options": ["K-L-M-J", "K-M-L-J", "L-M-K-J", "L-K-M-J"], "answer": "K-L-M-J", "explanation": "The correct sequence for converting active to passive voice is: First, identify the subject, verb, and object (K). Second, make the object of the active sentence the subject of the passive sentence (L). Third, use the appropriate form of the auxiliary verb 'to be' according to the tense, and optionally add 'by' + the original subject (M). Finally, change the main verb into its past participle form (J). Thus, the order is K-L-M-J."}, {"id": 78, "section": "English Grammar", "question": "Which of the following best defines a 'gerund phrase' and its primary function?", "brand": "bilaspurtestseries.com 9669946966", "options": ["A phrase beginning with a past participle acting as a verb.", "A phrase beginning with an infinitive verb acting as an adverb.", "A phrase beginning with a verb ending in -ing that functions as a noun.", "A phrase beginning with a present participle acting as an adjective."], "answer": "A phrase beginning with a verb ending in -ing that functions as a noun.", "explanation": "A gerund phrase consists of a gerund (a verb ending in -ing that functions as a noun) and any modifiers or complements associated with it. Its primary function is to act as a noun in a sentence, serving as a subject, object, or complement. Option A describes a participial phrase, while C and D describe infinitive and participial phrases respectively, not gerunds."}, {"id": 79, "section": "English Grammar", "question": "In the sentence, \"Running quickly, the boy caught the bus,\" what is the grammatical function of \"Running quickly\"?", "brand": "bilaspurtestseries.com 9669946966", "options": ["It is an adverbial phrase modifying \"caught.\"", "It is a participial phrase modifying \"the boy.\"", "It is a prepositional phrase indicating manner.", "It is a gerund phrase acting as the subject."], "answer": "It is a participial phrase modifying \"the boy.\"", "explanation": "\"Running quickly\" is a participial phrase because \"running\" is a present participle that modifies the noun \"boy,\" describing how he was acting. It functions adjectivally. It is not a gerund phrase because it does not function as a noun, nor is it an adverbial or prepositional phrase."}, {"id": 80, "section": "English Grammar", "question": "Which of the following statements about the use of articles is grammatically correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["We use 'an' before words beginning with a vowel sound.", "The indefinite article 'a' is used before words beginning with a vowel sound.", "The definite article 'the' is used before most proper nouns.", "We use 'an' before words beginning with a consonant sound."], "answer": "We use 'an' before words beginning with a vowel sound.", "explanation": "The choice between 'a' and 'an' depends on the initial sound of the word that follows, not just the letter. 'An' is used before words starting with a vowel sound (e.g., an apple, an hour), while 'a' is used before words starting with a consonant sound (e.g., a cat, a university). Options A and C are incorrect as they misstate or reverse this rule. Option B is generally incorrect; 'the' is typically not used before most proper nouns unless they are part of a specific title or group (e.g., The United States)."}, {"id": 81, "section": "English Grammar", "question": "Identify the sentence where the subject-verb agreement rule is correctly applied despite an apparent exception.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Neither of the students have completed their assignment.", "Mathematics are my favorite subject.", "The news are always depressing.", "The committee has decided to postpone the meeting."], "answer": "The committee has decided to postpone the meeting.", "explanation": "In option D, 'committee' is a collective noun treated as a singular unit, hence 'has decided' is correct. Options A and B are incorrect because 'news' and 'mathematics' are singular nouns, requiring 'is' (The news is, Mathematics is). Option C is incorrect because 'Neither of the students' requires a singular verb 'has' (Neither of the students has completed)."}, {"id": 82, "section": "English Grammar", "question": "Which of the following sentence structures typically features a subject, a transitive verb, and a direct object?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Subject-Verb-Indirect Object", "Subject-Verb-Complement", "Subject-Verb-Adverbial", "Subject-Verb-Object"], "answer": "Subject-Verb-Object", "explanation": "The Subject-Verb-Object (SVO) structure is characterized by a subject performing an action, a transitive verb, and a direct object receiving the action. Subject-Verb-Complement involves a linking verb and a subject complement. Subject-Verb-Adverbial includes an adverbial modifier, and Subject-Verb-Indirect Object would also require a direct object to be complete."}, {"id": 83, "section": "English Grammar", "question": "Why is the passive voice often preferred in scientific writing?", "brand": "bilaspurtestseries.com 9669946966", "options": ["To reduce sentence length and improve readability.", "To maintain objectivity and focus on the action or result.", "To make the writing more personal and engaging.", "To emphasize the actor of the action."], "answer": "To maintain objectivity and focus on the action or result.", "explanation": "The passive voice is commonly used in scientific writing to maintain objectivity by de-emphasizing the doer of the action and focusing instead on the action itself or its result. This makes the writing seem more impartial and factual. Options A and B describe reasons for using the active voice, and option D is not a primary reason for choosing passive voice in scientific contexts."}, {"id": 84, "section": "English Grammar", "question": "Consider the sentence: \"Having finished her work, she decided to take a break.\" Identify the precise grammatical role of \"Having finished her work.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["It is a perfect participial phrase acting as an adjective.", "It is an absolute phrase modifying the entire sentence.", "It is a subordinate clause indicating time.", "It is a gerund phrase acting as an adverb."], "answer": "It is a perfect participial phrase acting as an adjective.", "explanation": "\"Having finished her work\" is a perfect participial phrase. It modifies the subject \"she,\" describing a completed action that occurred before the main verb's action, thus functioning adjectivally. It is not a gerund phrase as it doesn't function as a noun. It's not an absolute phrase because it shares a subject with the main clause. It's not a subordinate clause as it lacks a subject and finite verb."}, {"id": 85, "section": "English Grammar", "question": "Which of the following sentences is grammatically correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Neither the manager nor the employees are aware of the new policy.", "If I would have known about the problem, I would have intervened sooner.", "Despite of the adverse weather conditions, the event proceeded as planned.", "The reason why he resigned was because of the heavy workload."], "answer": "Neither the manager nor the employees are aware of the new policy.", "explanation": "Let's analyze each option:\nA. \"If I would have known about the problem, I would have intervened sooner.\" This is an incorrect conditional structure. For a past unreal conditional (Type 3), the 'if' clause should use the past perfect tense ('had known'), not 'would have known'. The correct sentence would be: \"If I had known about the problem, I would have intervened sooner.\"\nB. \"The reason why he resigned was because of the heavy workload.\" This sentence contains redundancy. \"The reason why... was because\" is grammatically incorrect. One should use either \"The reason... was that\" or simply \"He resigned because of...\". The correct sentence would be: \"The reason he resigned was that of the heavy workload\" or \"He resigned because of the heavy workload.\"\nC. \"Despite of the adverse weather conditions, the event proceeded as planned.\" The preposition \"despite\" does not take \"of\". The correct phrase is simply \"despite\" or \"in spite of\". The correct sentence would be: \"Despite the adverse weather conditions, the event proceeded as planned.\"\nD. \"Neither the manager nor the employees are aware of the new policy.\" This sentence is grammatically correct. When \"neither...nor\" connects two subjects, the verb agrees with the subject closer to it. In this case, \"employees\" is plural, so the plural verb \"are\" is correctly used. The sentence demonstrates correct subject-verb agreement and correlative conjunction usage."}, {"id": 86, "section": "English Grammar", "question": "Evaluate the grammatical correctness of the following statement: \"Despite of the challenges, the team managed to complete the project on time, which was an impressive feat considering the limited resources they had.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["The statement is grammatically correct as written.", "The phrase \"Despite of\" should be corrected to \"Despite\" or \"In spite of.\"", "The comma before \"which\" is unnecessary.", "\"They had\" should be replaced with \"they have.\""], "answer": "The phrase \"Despite of\" should be corrected to \"Despite\" or \"In spite of.\"", "explanation": "The phrase \"Despite of\" is grammatically incorrect. The correct forms are either \"Despite\" (without 'of') or \"In spite of\" (with 'of'). Option A is incorrect because of this error. Option C is incorrect; the comma before \"which\" is necessary because \"which was an impressive feat...\" is a non-restrictive clause providing additional information. Option D is incorrect; \"they had\" is correct as the context refers to past limited resources."}, {"id": 87, "section": "English Grammar", "question": "Consider the following statements regarding English grammar:\nI. The word \"phenomena\" is always plural.\nII. Collective nouns always take a singular verb.\nIII. The phrase \"one of the\" is always followed by a plural noun and a singular verb.\nIV. Adjectives can sometimes function as nouns.\nWhich of the statements are grammatically correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["II and III only", "I and II only", "I, III, and IV only", "I, II, and IV only"], "answer": "I, III, and IV only", "explanation": "Statement I is correct; \"phenomena\" is the plural form of \"phenomenon.\" Statement II is incorrect; collective nouns can take either a singular or plural verb depending on whether the group is acting as a unit or as individuals. Statement III is correct; \"one of the\" is followed by a plural noun (e.g., \"one of the books\") and a singular verb (e.g., \"one of the books is missing\"). Statement IV is correct; adjectives can function as nouns when referring to a group (e.g., \"the rich,\" \"the poor,\" \"the brave\")."}, {"id": 88, "section": "English Grammar", "question": "Which of the following statements accurately distinguishes between a phrase and a clause?\nI. A phrase contains a subject and a predicate, while a clause does not.\nII. A clause contains a subject and a predicate, while a phrase does not.\nIII. Both phrases and clauses can function as complete sentences.\nIV. Only independent clauses can function as complete sentences.", "brand": "bilaspurtestseries.com 9669946966", "options": ["II and III only", "I and III only", "II and IV only", "I and IV only"], "answer": "II and IV only", "explanation": "Statement II is correct: a clause contains a subject and a predicate, whereas a phrase is a group of words without both. Statement I is incorrect as it reverses this definition. Statement IV is correct: only independent clauses (which are a type of clause) can stand alone as complete sentences. Dependent clauses, while having a subject and predicate, cannot stand alone. Statement III is incorrect because phrases cannot function as complete sentences."}, {"id": 89, "section": "English Grammar", "question": "Assertion (A): The sentence \"He is more taller than his brother\" is grammatically incorrect.\nReason (R):: Double comparatives are generally avoided in standard English grammar.", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) is true, but R is false.", "Both A and R are true, but R is not the correct explanation of A.", "(A) is false, but R is true.", "Both A and R are true, and R is the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "The assertion is true; \"more taller\" is incorrect because \"taller\" is already a comparative form. The reason is also true; using both \"more\" and the -er suffix for comparison (double comparatives) is redundant and grammatically incorrect in standard English. Therefore, R correctly explains why A is incorrect."}, {"id": 90, "section": "English Grammar", "question": "Assertion (A): A dangling modifier is a word or phrase that modifies a word not clearly stated in the sentence.\nReason (R):: Dangling modifiers often occur when the subject of the main clause is different from the implied subject of the modifying phrase.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, and R is the correct explanation of A.", "(A) is true, but R is false.", "Both A and R are true, but R is not the correct explanation of A.", "(A) is false, but R is true."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "The assertion accurately defines a dangling modifier as one that lacks a clear word to modify. The reason correctly identifies the common cause of dangling modifiers: a mismatch between the implied subject of the modifying phrase and the actual subject of the main clause. Thus, R provides a direct and accurate explanation for A."}, {"id": 91, "section": "English Grammar", "question": "Which of the following sentences demonstrate correct use of parallelism?\nJ: She enjoys hiking, swimming, and to cycle.\nK: He was praised for his dedication, his hard work, and for being punctual.\nL: The new policy aims to increase efficiency, reduce costs, and improve customer satisfaction.\nM: They decided to travel by train, to stay in a hostel, and to explore the city on foot.", "brand": "bilaspurtestseries.com 9669946966", "options": ["L and M only", "K, L, and M only", "J, K, and L only", "J and K only"], "answer": "L and M only", "explanation": "Parallelism requires that items in a series or list have the same grammatical form. In sentence J, 'hiking' (gerund), 'swimming' (gerund), and 'to cycle' (infinitive) are not parallel. It should be 'hiking, swimming, and cycling.' In sentence K, 'dedication' (noun), 'hard work' (noun), and 'for being punctual' (prepositional phrase with gerund) are not parallel. It should be 'his dedication, his hard work, and his punctuality.' Sentences L and M correctly use parallelism: L uses three infinitive phrases ('to increase,' 'reduce,' 'improve' - 'to' is implied for the latter two), and M uses three infinitive phrases ('to travel,' 'to stay,' 'to explore')."}, {"id": 92, "section": "English Grammar", "question": "Evaluate the grammatical correctness of the following sentences:\nJ: The reason why he left was because he was ill.\nK: Neither of the proposals were accepted by the committee.\nL: If I had known, I would have told you.\nM: Everyone, including the teachers, were surprised by the results.", "brand": "bilaspurtestseries.com 9669946966", "options": ["L only", "K, L, and M only", "J, K, and M only", "J and K only"], "answer": "L only", "explanation": "Sentence J is incorrect due to redundancy; \"The reason why... was because\" should be \"The reason why he left was that he was ill\" or \"He left because he was ill.\" Sentence K is incorrect; \"Neither of the proposals\" is a singular subject and requires a singular verb (\"was accepted\"). Sentence L is a correct third conditional sentence, expressing a hypothetical past condition and its past consequence. Sentence M is incorrect; \"Everyone\" is singular, so the verb should be singular (\"was surprised\"), regardless of the intervening phrase \"including the teachers.\""}, {"id": 93, "section": "English Grammar", "question": "Which of the following sentences correctly use the subjunctive mood or an idiomatic expression that appears to defy standard rules?\nJ: I wish I was taller.\nK: It is imperative that he submit his report by Friday.\nL: If I were you, I would accept the offer.\nM: The manager demanded that the project is completed immediately.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and M only", "J, K, and L only", "K, L, and M only", "K and L only"], "answer": "K and L only", "explanation": "Sentence J is incorrect; for wishes or contrary-to-fact statements, the subjunctive 'I wish I were' is required. Sentence K correctly uses the subjunctive mood after an imperative expression ('It is imperative that he submit'). The base form of the verb 'submit' is used. Sentence L correctly uses the subjunctive 'If I were you' for a hypothetical situation. Sentence M is incorrect; after a verb expressing demand, the subjunctive mood requires the base form of the verb, so it should be 'The manager demanded that the project be completed immediately.'"}, {"id": 94, "section": "English Grammar", "question": "Identify the statements that correctly classify the underlined grammatical elements in the given sentences:\nJ: She gave <u>him</u> a book. (<u>him</u>: indirect object)\nK: The news <u>is</u> alarming. (<u>is</u>: linking verb)\nL: They elected <u>her president</u>. (<u>president</u>: object complement)\nM: He ran <u>quickly</u>. (<u>quickly</u>: adjective)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and K only", "J, K, and L only", "J, K, L, and M", "K and L only"], "answer": "J, K, and L only", "explanation": "Statement J is correct: 'him' is the indirect object, receiving the book. Statement K is correct: 'is' connects the subject 'news' to the subject complement 'alarming,' making it a linking verb. Statement L is correct: 'president' describes or renames the direct object 'her,' functioning as an object complement. Statement M is incorrect: 'quickly' modifies the verb 'ran,' describing how he ran, making it an adverb, not an adjective."}, {"id": 95, "section": "English Grammar", "question": "Match the grammatical term in List-I with its appropriate description or function in List-II.\nसूची-I\nJ: Gerund\nK: Infinitive\nL: Participle\nM: Absolute Phrase\nसूची-II\n1. A verb form that functions as an adjective.\n2. A verb form that functions as a noun.\n3. A verb form that functions as a noun, adjective, or adverb, usually preceded by 'to'.\n4. A phrase consisting of a noun/pronoun and a participle, modifying the entire sentence. Choose the correct matching:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-2, L-3, M-4", "J-2, K-3, L-1, M-4", "J-2, K-1, L-3, M-4", "J-3, K-2, L-1, M-4"], "answer": "J-2, K-3, L-1, M-4", "explanation": "A gerund (J) is a verb form ending in -ing that functions as a noun (2). An infinitive (K) is the base form of a verb, usually preceded by 'to', that can function as a noun, adjective, or adverb (3). A participle (L) is a verb form (present or past) that functions as an adjective (1). An absolute phrase (M) is a phrase consisting of a noun or pronoun and a participle, along with any modifiers, that modifies the entire sentence (4)."}, {"id": 96, "section": "English Grammar", "question": "Arrange the following steps in the correct chronological order for transforming an active voice sentence into a passive voice sentence:\nJ: The original subject becomes the object of the preposition 'by' (or is omitted).\nK: The object of the active sentence becomes the subject of the passive sentence.\nL: The main verb is changed to its past participle form.\nM: An appropriate form of the auxiliary verb 'to be' is added before the main verb.", "brand": "bilaspurtestseries.com 9669946966", "options": ["M, L, K, J", "J, K, L, M", "K, M, L, J", "K, L, M, J"], "answer": "K, M, L, J", "explanation": "The correct sequence for transforming an active sentence to passive is: First, the object of the active sentence becomes the new subject (K). Second, an appropriate form of the auxiliary verb 'to be' is added (M). Third, the main verb is converted to its past participle form (L). Finally, the original subject is moved to become the object of 'by' or is omitted (J)."}, {"id": 97, "section": "English Grammar", "question": "Identify the sentence that contains a grammatical error.", "brand": "bilaspurtestseries.com 9669946966", "options": ["If he would have arrived earlier, he could have caught the last train.", "Despite the adverse weather conditions, the team managed to complete the project on schedule.", "The principal, along with the faculty members, has decided to implement the new curriculum.", "Neither the students nor the teacher was prepared for the sudden announcement."], "answer": "If he would have arrived earlier, he could have caught the last train.", "explanation": "Let's analyze each option:\nA. \"Despite the adverse weather conditions, the team managed to complete the project on schedule.\" This sentence is grammatically correct. 'Team' is a collective noun, and in this context, it acts as a single unit, so 'managed' (singular verb form in past tense) is appropriate.\nB. \"Neither the students nor the teacher was prepared for the sudden announcement.\" This sentence is grammatically correct. In a 'neither...nor' construction, the verb agrees with the noun or pronoun closest to it. Here, 'teacher' is singular, so 'was' is the correct verb form.\nC. \"If he would have arrived earlier, he could have caught the last train.\" This sentence contains a grammatical error. It is a Type 3 conditional sentence, which refers to an unreal past condition and its hypothetical past result. The 'if' clause should use the Past Perfect tense ('had arrived'), not 'would have arrived'. The correct sentence should be: \"If he had arrived earlier, he could have caught the last train.\"\nD. \"The principal, along with the faculty members, has decided to implement the new curriculum.\" This sentence is grammatically correct. When a subject is followed by phrases like 'along with', 'as well as', 'in addition to', etc., the verb agrees with the main subject ('The principal'), which is singular, hence 'has decided' is correct."}, {"id": 98, "section": "English Grammar", "question": "Arrange the following steps in the correct chronological order for transforming a direct speech sentence into an indirect speech sentence:\nJ: Adjust pronouns and possessive adjectives to reflect the new context.\nK: Change the tense of the verb in the reported clause, usually shifting it one step back.\nL: Replace the direct speech reporting verb with an appropriate indirect speech verb (e.g., 'said to' with 'told').\nM: Remove quotation marks and introduce a suitable conjunction (e.g., 'that', 'if', 'whether').\nChoose the correct chronological order:", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, M, J, K", "M, L, K, J", "J, K, L, M", "L, J, M, K"], "answer": "L, M, J, K", "explanation": "The standard sequence for converting direct speech to indirect speech involves several grammatical adjustments. First, the reporting verb is changed (L). Then, quotation marks are removed, and an appropriate conjunction is introduced to connect the reporting clause with the reported clause (M). Following this, pronouns and possessive adjectives are adjusted to match the new speaker and listener (J). Finally, the tense of the verb in the reported clause is shifted back, if the reporting verb is in the past (K)."}, {"id": 99, "section": "English Grammar", "question": "Arrange the following steps in the most logical and comprehensive order for a thorough grammatical analysis of a complex sentence:\nJ: Identify the main clause and all subordinate clauses.\nK: Determine the specific type of each subordinate clause (e.g., noun clause, adjective clause, adverb clause).\nL: Analyze the grammatical function of each subordinate clause within the overall sentence structure.\nM: Pinpoint the subject and predicate of the main clause.\nChoose the correct chronological order:", "brand": "bilaspurtestseries.com 9669946966", "options": ["M, J, K, L", "M, K, J, L", "J, M, K, L", "J, K, M, L"], "answer": "M, J, K, L", "explanation": "A comprehensive grammatical analysis of a complex sentence logically begins by identifying its core. First, one must pinpoint the subject and predicate of the main clause (M) to establish the sentence's primary idea. Following this, all clauses, both main and subordinate, are identified (J). Once the subordinate clauses are recognized, their specific types (noun, adjective, adverb) are determined (K). Finally, understanding the function of these subordinate clauses within the larger sentence structure completes the analysis (L). Therefore, the sequence M, J, K, L represents the most systematic approach."}, {"id": 100, "section": "English Grammar", "question": "Consider the following statements. Identify which of them are grammatically correct.\nJ: The committee has decided to postpone its meeting until next week.\nK: Neither the students nor the professor are aware of the sudden change in the schedule.\nL: Having finished the assignment, the teacher collected the papers from the students.\nM: He is one of the few scientists who believes in the existence of extraterrestrial life.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J only", "J, K, and M only", "J and K only", "K and L only"], "answer": "J only", "explanation": "Statement J is grammatically correct. 'Committee' is treated as a singular collective noun here, and 'its' correctly refers to it. Statement K is incorrect because in 'neither...nor' constructions, the verb agrees with the noun or pronoun closest to it. Here, 'professor' is singular, so the verb should be 'is' instead of 'are'. Statement L contains a dangling participle; 'Having finished the assignment' implies that the teacher finished the assignment, not the students. The sentence should be restructured to clarify who finished the assignment (e.g., 'Having finished their assignments, the students handed the papers to the teacher' or 'After the students finished the assignment, the teacher collected the papers'). Statement M is incorrect. In the phrase 'one of the few scientists who...', 'who' refers to 'scientists' (plural), so the verb should be 'believe' (plural) instead of 'believes' (singular)."}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="VARG_1_ENGLISH_GRAMMAR_TENSE_ENGLISH_GRAMMAR_APPLIED_GRAMMAR_OB_7206FA14";const TEST_TITLE="Varg_1_English_Grammar_Tense_Voice_Narration_Week_3_Day_01_08_ENGLISH_GRAMMAR_TENSE_FORMS_TIME_REFER";const CONTACT_WHATSAPP="9669946966";const PRINT_QR_TEXT="";const PRINT_QR_MESSAGE="";const LOGO_SRC="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDABsSFBcUERsXFhceHBsgKEIrKCUlKFE6PTBCYFVlZF9VXVtqeJmBanGQc1tdhbWGkJ6jq62rZ4C8ybqmx5moq6T/2wBDARweHigjKE4rK06kbl1upKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKT/wAARCANtA20DASIAAhEBAxEB/8QAGwABAQADAQEBAAAAAAAAAAAAAAEDBAUCBgf/xABLEAACAQIDBwEEBwUGBQMDBAMAAQIDEQQhMQUSQVFhcYGREyKh8BQyQlKxwdEVI2Jy4QYzU4KS8SQ0Q1STRFWDZHOiFiU1Y6Oy0v/EABkBAQADAQEAAAAAAAAAAAAAAAABAgMEBf/EACcRAQEBAAIDAAIDAAIDAQEAAAABAgMREiExIkETMlEEYSMzQnGB/9oADAMBAAIRAxEAPwD5wAF0A7AMIPQAuvACAFAnkoHcAAPAAAAABboABc+hHoAsBYvjMB6ACwDiOIHCwD4gDxmAIerdCW7gQvnMZgB5QGfEdQAzC6LMvwAmnD1HzkLdA1bW6YD5zA9RbhqAzL5Ix6+AF32BddBZkiAW6AgBmXImXEB+HUeRlqAAHQtvXqSJ85jXoX5yJlYCpdCacS214jtkQIM+ZchlfgBPPxDLbj8Q+YEBVcZcCRPnUqD5aktnZkCi7Fh3JDyLEL4AZ9GT5sLC2RAeR8BkAC7XALdWAl2Bl0HkB6AZAAAAHQeQLABmPI8gAC8AIQrXD8BbMCF function azadShowNotice(kind,ident,data,proceed){try{var old=document.getElementById('azadStartNotice');if(old)old.remove();var title='Test start karne se pehle';var body='<ul><li>Mobile par left swipe = Next, right swipe = Previous.</li><li>Answers aur Mark for Review local device par auto-save honge.</li><li>Reload/browser close ke baad same details se resume hoga.</li><li>Timer wahi se continue hoga, restart nahi hoga.</li></ul>';var primary='Start Test',secondary='';if(kind==='resume'){title='Saved test mila hai';body='<p>Same details se pehle start kiya hua test mila hai. Answers, marked questions aur timer resume honge.</p>';primary='Resume Test'}else if(kind==='submitted'){title='Result already submitted';body='<p>Is name/mobile se final submit is device par already ho chuka hai. Dobara test dena ho to dusra valid mobile number use karein.</p>';primary='Go to Result';secondary='<button class="gray" type="button" onclick="document.getElementById(\'azadStartNotice\').remove()">Back</button>'}var html='<div id="azadStartNotice" class="azad-start-modal"><div class="azad-start-card"><h2>'+title+'</h2>'+body+'<div class="azad-start-actions">'+secondary+'<button class="green" type="button" id="azadStartProceed">'+primary+'</button></div></div></div>';document.body.insertAdjacentHTML('beforeend',html);document.getElementById('azadStartProceed').onclick=function(){var el=document.getElementById('azadStartNotice');if(el)el.remove();proceed()};}catch(e){proceed()}}
function azadProceedFresh(){if(!azadPendingStart)return;var old=azadPendingStart.oldStartQuiz,args=azadPendingStart.args;azadPendingStart=null;var r=old.apply(window,args||[]);azadStartSaveTimer();azadSaveDraft();return r}
function azadProceedResume(ident,data){azadApplySavedState(data,ident);azadStartSaveTimer();render()}
function azadProceedResult(ident,data){azadApplySavedState(data,ident);lastSummary=data.summary;showResult(lastSummary,data.note||'Final submission already completed on this device.')}
function azadMarkedList(){try{return markedIndexes()}catch(e){var a=[];for(var i=0;i<marked.length;i++){if(marked[i])a.push(i)}return a}}
function azadEnterMarkedMode(){var list=azadMarkedList();if(!list.length){alert('Marked for Review questions abhi nahi hain.');return}azadMarkedMode=true;azadMarkedEntryCur=azadClampIndex(cur);if(list.indexOf(cur)<0)cur=list[0];azadSaveDraft();render()}
function azadExitMarkedMode(){azadMarkedMode=false;cur=azadClampIndex(azadMarkedEntryCur);azadSaveDraft();render()}
function azadStepMarked(dir){var list=azadMarkedList();if(!list.length){azadExitMarkedMode();return true}var pos=list.indexOf(cur);if(pos<0)pos=dir>0?-1:0;pos=pos+dir;if(pos<0)pos=0;if(pos>=list.length)pos=list.length-1;cur=list[pos];azadSaveDraft();render();return true}
window.azadEnterMarkedMode=azadEnterMarkedMode;window.azadExitMarkedMode=azadExitMarkedMode;
function azadHideOldToolButtons(){try{var tools=document.getElementById('ownToolsBody');if(!tools)return;var buttons=tools.querySelectorAll('button');for(var i=0;i<buttons.length;i++){var t=(buttons[i].textContent||'').toLowerCase();if(t.indexOf('review')>=0||t.indexOf('marked')>=0||t.indexOf('chihnit')>=0){buttons[i].style.display='none'}}}catch(e){}}
function azadReviewButtonHtml(){var isMarked=!!marked[cur];if(azadMarkedMode){return '<button type="button" class="azad-all-questions-btn" onclick="azadExitMarkedMode()">All Questions</button>'}if(cur===0){return '<button type="button" class="azad-review-full '+(isMarked?'mark-on':'')+'" onclick="toggleMark()">'+(isMarked?'Marked for Review':'Mark for Review')+'</button>'}var icon='&#128278;';if(cur>=1&&cur<=4){return '<button type="button" title="Mark for Review" class="azad-review-morph '+(isMarked?'mark-on':'')+'" onclick="toggleMark()"><span class="azad-mark-text">Review</span> '+icon+'</button>'}var mark='<button type="button" title="Mark for Review" aria-label="Mark for Review" class="azad-bookmark-btn '+(isMarked?'mark-on':'')+'" onclick="toggleMark()">'+icon+'</button>';if(cur>=Q.length-1){return mark+'<button type="button" class="azad-marked-nav-btn" onclick="azadEnterMarkedMode()">View Marked</button>'}return mark}
function azadApplyReviewUi(){try{if(!document.body.classList.contains('own-test-active'))return;azadHideOldToolButtons();var nav=document.querySelector('.own-bottom-nav');if(nav){nav.classList.toggle('azad-last-q',cur>=Q.length-1&&!azadMarkedMode);nav.classList.toggle('azad-not-last-q',cur<Q.length-1&&!azadMarkedMode);nav.classList.toggle('azad-marked-mode',azadMarkedMode);var next=nav.querySelector('.own-next');if(next)next.textContent=azadMarkedMode?'Next Marked':'अगला →';var prev=nav.querySelector('.own-prev');if(prev)prev.textContent=azadMarkedMode?'Previous Marked':'← पिछला';var submit=nav.querySelector('.own-submit');if(submit)submit.textContent='✓ Final Submit'}var old=document.getElementById('azadReviewBar');if(old)old.remove();if(nav&&nav.parentNode){var bar=document.createElement('div');bar.id='azadReviewBar';bar.className='azad-reviewbar';bar.innerHTML=azadReviewButtonHtml();nav.parentNode.insertBefore(bar,nav)}}catch(e){}}
function azadStartSaveTimer(){try{if(azadResumeSaveTimer)clearInterval(azadResumeSaveTimer);azadResumeSaveTimer=setInterval(azadSaveDraft,1500)}catch(e){}}
function azadBindSwipe(){try{if(window.__azadSwipeBound)return;window.__azadSwipeBound=true;document.addEventListener('touchstart',function(ev){try{if(!document.body.classList.contains('own-test-active'))return;var t=ev.target;if(t&&String(t.tagName||'').match(/input|button|select|textarea|a/i))return;var p=ev.changedTouches&&ev.changedTouches[0];if(!p)return;azadTouchStartX=p.clientX;azadTouchStartY=p.clientY}catch(e){}},{passive:true});document.addEventListener('touchend',function(ev){try{if(!document.body.classList.contains('own-test-active'))return;var t=ev.target;if(t&&String(t.tagName||'').match(/input|button|select|textarea|a/i))return;var p=ev.changedTouches&&ev.changedTouches[0];if(!p)return;var dx=p.clientX-azadTouchStartX,dy=p.clientY-azadTouchStartY;if(Math.abs(dx)<45||Math.abs(dx)<Math.abs(dy)*1.05)return;if(dx<0){next()}else{prev()}}catch(e){}},{passive:true})}catch(e){}}
if(typeof startQuiz==='function'){var oldStartQuiz=startQuiz;startQuiz=function(){var ident=azadIdentityFromInputs();if(ident.name&&ident.mobile){var res=azadResultData(ident);if(res&&res.summary){return azadShowNotice('submitted',ident,res,function(){azadProceedResult(ident,res)})}var draft=azadDraftData(ident);if(draft&&draft.student){return azadShowNotice('resume',ident,draft,function(){azadProceedResume(ident,draft)})}}azadPendingStart={oldStartQuiz:oldStartQuiz,args:arguments};return azadShowNotice('fresh',ident,null,azadProceedFresh)}}
if(typeof render==='function'){var oldRender=render;render=function(){var r=oldRender.apply(this,arguments);azadApplyReviewUi();azadBindSwipe();azadSaveDraft();return r}}
if(typeof next==='function'){var oldNext=next;next=function(){if(azadMarkedMode)return azadStepMarked(1);var r=oldNext.apply(this,arguments);azadSaveDraft();return r}}
if(typeof prev==='function'){var oldPrev=prev;prev=function(){if(azadMarkedMode)return azadStepMarked(-1);var r=oldPrev.apply(this,arguments);azadSaveDraft();return r}}
if(typeof toggleMark==='function'){var oldToggleMark=toggleMark;toggleMark=function(){var r=oldToggleMark.apply(this,arguments);if(azadMarkedMode&&azadMarkedList().indexOf(cur)<0){var list=azadMarkedList();if(list.length){cur=list[0]}else{azadMarkedMode=false;cur=azadClampIndex(azadMarkedEntryCur)}}azadSaveDraft();return r}}
if(typeof gotoQ==='function'){var oldGotoQ=gotoQ;gotoQ=function(i){azadMarkedMode=false;var r=oldGotoQ.apply(this,arguments);azadSaveDraft();return r}}
if(typeof showResult==='function'){var oldShowResult=showResult;showResult=function(sd,note){lastSummary=sd||lastSummary;azadSaveResult(lastSummary,note);return oldShowResult.apply(this,arguments)}}
if(typeof submitQuiz==='function'){var oldSubmitQuiz=submitQuiz;submitQuiz=function(skipReview){try{if(student){var res=azadResultData(student);if(res&&res.summary){azadApplySavedState(res,student);lastSummary=res.summary;showResult(lastSummary,res.note||'Final submission already completed on this device.');return}}}catch(e){}return oldSubmitQuiz.apply(this,arguments)}}
window.addEventListener('beforeunload',azadSaveDraft);if(document&&document.addEventListener)document.addEventListener('change',function(ev){try{if(ev&&ev.target&&ev.target.name==='o')setTimeout(azadSaveDraft,0)}catch(e){}},true);
})();
