bject (J). Finally, construct the tag by applying the rule of opposite polarity and using the correct pronoun (L). Therefore, the order K, M, J, L is the most appropriate. The sentence 'He has rarely visited his family since he moved abroad' is negative due to 'rarely', so the tag would be 'has he?'."}, {"id": 67, "section": "English Grammar", "question": "Which of the following sentences uses inversion for emphasis most effectively and grammatically correctly?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Only when the bell rang, the students left the classroom.", "Not a single word he spoke during the entire meeting.", "Never in my life I have seen such a beautiful sight.", "Seldom does one encounter such honesty in politics."], "answer": "Seldom does one encounter such honesty in politics.", "explanation": "The sentence 'Seldom does one encounter such honesty in politics' is grammatically correct and effectively uses inversion for emphasis. When 'Seldom' (a negative adverb) begins a sentence, the auxiliary verb ('does') is inverted with the subject ('one'). In 'Not a single word he spoke...', it should be 'Not a single word did he speak...'. In 'Only when the bell rang, the students left...', inversion should occur in the main clause if 'Only when' introduces it, e.g., 'Only when the bell rang did the students leave the classroom.' In 'Never in my life I have seen...', it should be 'Never in my life have I seen...' with the auxiliary 'have' preceding the subject 'I'."}, {"id": 68, "section": "English Grammar", "question": "What is the primary function of a coordinating conjunction?", "brand": "bilaspurtestseries.com 9669946966", "options": ["To introduce a subordinate clause that depends on the main clause.", "To modify a verb, adjective, or another adverb within a sentence.", "To show a cause-and-effect relationship between two unequal clauses.", "To connect words, phrases, or independent clauses of equal grammatical rank."], "answer": "To connect words, phrases, or independent clauses of equal grammatical rank.", "explanation": "Coordinating conjunctions, such as 'and', 'but', 'or', 'nor', 'for', 'so', and 'yet', serve to join elements that are grammatically equivalent. These elements can be words, phrases, or independent clauses. Options describing subordinate clauses or modification refer to subordinating conjunctions or adverbs, respectively."}, {"id": 69, "section": "English Grammar", "question": "Which type of connector is best suited to introduce a clause that expresses a condition?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Conjunctive adverb", "Correlative conjunction", "Coordinating conjunction", "Subordinating conjunction"], "answer": "Subordinating conjunction", "explanation": "Subordinating conjunctions (e.g., 'if', 'unless', 'provided that') are used to introduce dependent clauses that express conditions, reasons, time, or contrast, making them subordinate to the main clause. Coordinating conjunctions connect elements of equal rank, conjunctive adverbs link independent clauses with a semicolon, and correlative conjunctions work in pairs."}, {"id": 70, "section": "English Grammar", "question": "Which statement accurately describes the role of coherence in academic writing?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Coherence dictates the specific length and structure of paragraphs in an essay.", "Coherence is achieved solely by using a wide range of sophisticated vocabulary.", "Coherence refers to the logical and clear connection of ideas, making the text easy to follow.", "Coherence primarily ensures that all sentences are grammatically correct and free of spelling errors."], "answer": "Coherence refers to the logical and clear connection of ideas, making the text easy to follow.", "explanation": "Coherence in writing means that all parts of the text, from sentences to paragraphs, flow together smoothly and logically, presenting a unified message. While grammar and vocabulary contribute to good writing, they are not the primary definition of coherence. Coherence focuses on the logical progression and connection of thoughts."}, {"id": 71, "section": "English Grammar", "question": "Which of the following words is NOT typically classified as a coordinating conjunction?", "brand": "bilaspurtestseries.com 9669946966", "options": ["For", "Although", "So", "Yet"], "answer": "Although", "explanation": "Coordinating conjunctions are 'for, and, nor, but, or, yet, so' (FANBOYS). 'For', 'yet', and 'so' are all coordinating conjunctions. 'Although' is a subordinating conjunction, used to introduce a subordinate clause that expresses a concession or contrast."}, {"id": 72, "section": "English Grammar", "question": "Identify the pair of words that functions as a correlative conjunction.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Therefore", "However", "Either...or", "As a result"], "answer": "Either...or", "explanation": "Correlative conjunctions are pairs of conjunctions that work together to connect grammatically equal elements in a sentence. 'Either...or' is a classic example. 'However' and 'Therefore' are conjunctive adverbs, and 'As a result' is a transitional phrase."}, {"id": 73, "section": "English Grammar", "question": "Choose the most appropriate connector to complete the sentence, maintaining logical coherence: \"The team worked tirelessly on the project; ______, they managed to meet the tight deadline.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["consequently", "meanwhile", "otherwise", "however"], "answer": "consequently", "explanation": "The sentence implies a cause-and-effect relationship: their tireless work led to meeting the deadline. 'Consequently' (meaning 'as a result') perfectly conveys this logical link. 'However' would imply contrast, 'meanwhile' indicates simultaneous action, and 'otherwise' suggests an alternative outcome if something hadn't happened."}, {"id": 74, "section": "English Grammar", "question": "In the sentence, \"She had a severe headache; ______, she decided to stay home from work,\" which conjunctive adverb best expresses the intended cause-and-effect relationship?", "brand": "bilaspurtestseries.com 9669946966", "options": ["therefore", "however", "furthermore", "meanwhile"], "answer": "therefore", "explanation": "The sentence clearly indicates that the headache was the reason for staying home. 'Therefore' is a conjunctive adverb that means 'for that reason' or 'consequently', establishing a direct cause-and-effect link. 'However' indicates contrast, 'furthermore' adds information, and 'meanwhile' denotes simultaneous action, none of which fit the logical connection here."}, {"id": 75, "section": "English Grammar", "question": "Consider the sentence: \"The new policy was unpopular; nevertheless, the management decided to implement it.\" Which statement about the connector 'nevertheless' is accurate?", "brand": "bilaspurtestseries.com 9669946966", "options": ["It functions as a coordinating conjunction, joining two independent clauses.", "It serves to add more information, similar to 'and'.", "It introduces a dependent clause, indicating a condition.", "It is a conjunctive adverb that shows contrast between two independent clauses."], "answer": "It is a conjunctive adverb that shows contrast between two independent clauses.", "explanation": "'Nevertheless' is a conjunctive adverb. It connects two independent clauses, showing a contrasting relationship between them, and is typically preceded by a semicolon and followed by a comma (though the comma is sometimes optional). It does not function as a coordinating conjunction, introduce a dependent clause, or merely add information."}, {"id": 76, "section": "English Grammar", "question": "Which of the following statements regarding the punctuation of conjunctive adverbs is correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["A conjunctive adverb connecting two independent clauses is always preceded by a comma.", "A conjunctive adverb connecting two independent clauses is always preceded by a semicolon and followed by a comma.", "A conjunctive adverb can be used without any punctuation when connecting two independent clauses.", "A conjunctive adverb is always followed by a period when it begins a new sentence."], "answer": "A conjunctive adverb connecting two independent clauses is always preceded by a semicolon and followed by a comma.", "explanation": "When a conjunctive adverb (like 'however', 'therefore', 'moreover') connects two independent clauses, it is standard practice to place a semicolon before it and a comma after it. For example: 'The weather was bad; however, we still went out.' While a conjunctive adverb can begin a new sentence (followed by a comma), the question specifically asks about connecting two independent clauses."}, {"id": 77, "section": "English Grammar", "question": "Assertion (A): Correlative conjunctions always appear in pairs and connect grammatically equal elements.\nReason (R):: 'Neither...nor' is an example of a correlative conjunction that connects two nouns, demonstrating this principle.", "brand": "bilaspurtestseries.com 9669946966", "options": ["A is false, but R is true.", "Both A and R are true, and R is the correct explanation of A.", "Both A and R are true, but R is not the correct explanation of A.", "A is true, but R is false."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Assertion (A) is true: Correlative conjunctions (e.g., 'both...and', 'either...or', 'neither...nor', 'not only...but also') are indeed used in pairs to connect elements of equal grammatical rank (nouns, verbs, adjectives, phrases, clauses). Reason (R) is also true and provides a specific example ('Neither...nor' connecting two nouns) that illustrates the principle stated in Assertion (A). Therefore, R correctly explains A."}, {"id": 78, "section": "English Grammar", "question": "Which of the following statements about connectors are correct?\nJ: Coordinating conjunctions join words, phrases, or clauses of equal grammatical rank.\nK: Subordinating conjunctions introduce dependent clauses that cannot stand alone as a complete sentence.\nL: Conjunctive adverbs always require a comma before them when connecting two independent clauses.\nM: Correlative conjunctions must always connect two verbs.", "brand": "bilaspurtestseries.com 9669946966", "options": ["All of the above", "J and K only", "J, K and M only", "J, K and L only"], "answer": "J and K only", "explanation": "Statement J is correct: Coordinating conjunctions (FANBOYS) connect grammatically equivalent elements. Statement K is correct: Subordinating conjunctions introduce dependent clauses, which rely on an independent clause for complete meaning. Statement L is incorrect: Conjunctive adverbs connecting two independent clauses are preceded by a semicolon, not a comma (e.g., 'He studied hard; therefore, he passed.'). Statement M is incorrect: Correlative conjunctions connect grammatically equal elements, which can be nouns, adjectives, phrases, or clauses, not exclusively verbs."}, {"id": 79, "section": "English Grammar", "question": "Identify the sentences that demonstrate correct usage of connectors for logical coherence and grammatical accuracy.\nJ: He was tired; therefore, he went to bed early.\nK: Although it was raining, but we still went for a walk.\nL: Not only did she sing beautifully, but she also played the piano.\nM: She likes coffee, nor does she like tea.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K and L only", "All of the above", "J and L only", "J, L and M only"], "answer": "J and L only", "explanation": "Sentence J is correct: 'Therefore' is a conjunctive adverb correctly used with a semicolon before it and a comma after it to show cause and effect between two independent clauses. Sentence L is correct: 'Not only...but also' is a correlative conjunction correctly used to connect two parallel clauses, with inversion ('did she sing') after 'not only'. Sentence K is incorrect: 'Although' and 'but' are both used to express contrast, creating redundancy (a double conjunction). One should be removed. Sentence M is incorrect: 'Nor' is a coordinating conjunction that should be used with a negative statement, and it typically requires inversion when connecting two independent clauses (e.g., 'She does not like coffee, nor does she like tea.'). The comma before 'nor' is correct, but the structure 'She likes coffee, nor does she like tea' is grammatically awkward and illogical; 'nor' implies 'and not', which contradicts 'likes coffee'. A better option would be 'She does not like coffee, nor does she like tea' or 'She likes neither coffee nor tea'."}, {"id": 80, "section": "English Grammar", "question": "Which statements correctly differentiate between 'because' and 'since' when used as subordinating conjunctions?\nJ: 'Because' always introduces a reason that is the main focus or new information in the sentence.\nK: 'Since' can introduce a reason, but it often implies a reason already known or less emphasized.\nL: 'Because' can also function as a preposition, while 'since' cannot.\nM: 'Since' can refer to time, whereas 'because' cannot.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K and M only", "All of the above", "K and M only", "J and K only"], "answer": "J, K and M only", "explanation": "Statement J is correct: 'Because' typically introduces a direct, often new, reason that is central to the main clause. Statement K is correct: 'Since' can introduce a reason, but it often implies a reason that is already understood or less crucial, sometimes acting as a weaker 'because'. Statement L is incorrect: 'Since' can also function as a preposition (e.g., 'since last year'), while 'because' does not. Statement M is correct: 'Since' can function as a subordinating conjunction of time (e.g., 'Since he left, I haven't seen him'), a function 'because' does not have."}, {"id": 81, "section": "English Grammar", "question": "Evaluate the following statements regarding the usage and function of connectors and conjunctions in English grammar:\nJ: The conjunction \"while\" can introduce both a temporal relationship (simultaneity) and a contrasting relationship between two clauses.\nK: A sentence beginning with a subordinating conjunction, such as \"Although it rained heavily,\" must always be followed by an independent clause to form a grammatically complete sentence.\nL: The phrase \"in addition to\" functions exclusively as a coordinating conjunction, linking two grammatically equal elements.\nM: Achieving coherence in a paragraph often involves the strategic use of transitional words and phrases, which can include conjunctive adverbs and certain prepositions.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and L only", "J, K, and M only", "All of the above", "K and M only"], "answer": "J, K, and M only", "explanation": "Statement J is correct. The conjunction \"while\" can indeed indicate simultaneity (e.g., \"While I was reading, he was writing\") or a contrast (e.g., \"She prefers tea, while he prefers coffee\"). Statement K is correct because a clause introduced by a subordinating conjunction is a dependent clause, which cannot stand alone as a complete sentence and requires an independent clause to complete its meaning. Statement L is incorrect; \"in addition to\" is a complex preposition or a prepositional phrase, not a coordinating conjunction. Coordinating conjunctions (like 'and', 'but', 'or') link grammatically equal elements, whereas \"in addition to\" takes a noun, pronoun, or gerund phrase as its object. Statement M is correct. Transitional words and phrases, including conjunctive adverbs (e.g., \"however,\" \"therefore\") and certain prepositions (e.g., \"in addition to,\" \"despite\"), are crucial for creating logical flow and coherence between sentences and paragraphs."}, {"id": 82, "section": "English Grammar", "question": "Arrange the following steps in a logical order to effectively achieve coherence within a paragraph.\nJ: Use transition words and phrases to link ideas between sentences.\nK: Ensure all sentences relate directly to the main topic or controlling idea of the paragraph.\nL: Organize ideas in a logical sequence (e.g., chronological, spatial, cause-effect, order of importance).\nM: Conclude the paragraph with a summary or transition to the next idea.", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, K, J, M", "K, J, L, M", "K, L, J, M", "J, K, L, M"], "answer": "K, L, J, M", "explanation": "Achieving coherence begins with ensuring all content is relevant to the main topic (K). Once relevance is established, the ideas must be organized in a logical sequence (L). After structuring the ideas, transition words and phrases (J) are used to create smooth connections between sentences and ideas. Finally, a paragraph should conclude with a summary or a transition (M) to maintain flow to the next paragraph. This sequence ensures a well-structured and coherent paragraph."}, {"id": 83, "section": "English Grammar", "question": "The weather was terrible; ______, we decided to go hiking. Which of the following connectors would be grammatically incorrect if placed in the blank, assuming the semicolon is maintained?", "brand": "bilaspurtestseries.com 9669946966", "options": ["however", "nevertheless", "consequently", "yet"], "answer": "yet", "explanation": "When connecting two independent clauses with a semicolon, a conjunctive adverb (like 'however', 'nevertheless', 'consequently') is typically used, followed by a comma. 'Yet' is a coordinating conjunction. Coordinating conjunctions are usually preceded by a comma (not a semicolon) when joining two independent clauses (e.g., 'The weather was terrible, yet we decided to go hiking.'). Therefore, using 'yet' directly after a semicolon to connect two independent clauses is grammatically incorrect in standard English."}, {"id": 84, "section": "English Grammar", "question": "Which of the following best defines an 'advanced' error in English grammar, as opposed to a basic one?", "brand": "bilaspurtestseries.com 9669946966", "options": ["An error that can only be identified by a professional linguist or grammar expert.", "An error that is commonly made by native speakers and often goes unnoticed in casual conversation.", "An error involving subtle distinctions in syntax, semantics, or idiomatic usage, often requiring contextual understanding.", "An error that violates a fundamental rule of subject-verb agreement or tense."], "answer": "An error involving subtle distinctions in syntax, semantics, or idiomatic usage, often requiring contextual understanding.", "explanation": "Advanced errors go beyond basic grammatical violations like simple subject-verb agreement or tense issues. They typically involve nuanced understanding of syntax (sentence structure), semantics (meaning), or idiomatic expressions, where the error might not be immediately obvious without careful analysis of the context. While some advanced errors might be made by native speakers, the defining characteristic is their subtlety and complexity, not just their commonality. Professional linguists can identify them, but the definition isn't limited to their exclusive detection."}, {"id": 85, "section": "English Grammar", "question": "Consider the sentence: 'Having finished the report, the manager reviewed it thoroughly.' What kind of grammatical construction is 'Having finished the report,' and what common error might it prevent if used correctly?", "brand": "bilaspurtestseries.com 9669946966", "options": ["It's a gerund phrase; it prevents errors in parallel structure.", "It's an infinitive phrase; it prevents misplaced modifiers.", "It's an absolute phrase; it prevents errors in pronoun reference.", "It's a participial phrase; it prevents dangling modifiers."], "answer": "It's a participial phrase; it prevents dangling modifiers.", "explanation": "The phrase 'Having finished the report' is a perfect participial phrase. When such a phrase begins a sentence, its implied subject must be the same as the subject of the main clause. In this case, 'the manager' is the one who finished the report, so the construction is correct. This construction is crucial for preventing dangling modifiers, where the participial phrase doesn't logically modify the subject of the main clause, leading to ambiguity or absurdity."}, {"id": 86, "section": "English Grammar", "question": "Which of the following statements about identifying grammatical errors is most accurate?", "brand": "bilaspurtestseries.com 9669946966", "options": ["A sentence can be grammatically correct but still semantically ambiguous or illogical.", "The primary goal of error finding is to ensure strict adherence to prescriptive grammar rules, regardless of context.", "Errors in punctuation are always less significant than errors in syntax.", "Errors in verb tense are typically the most challenging to identify for advanced learners."], "answer": "A sentence can be grammatically correct but still semantically ambiguous or illogical.", "explanation": "This statement is accurate because grammar (syntax) and meaning (semantics) are distinct. A sentence can follow all grammatical rules perfectly but still convey an unclear, nonsensical, or ambiguous message. For example, 'Colorless green ideas sleep furiously' is grammatically correct but semantically illogical. Punctuation errors can significantly alter meaning and are not always less significant. While prescriptive grammar is important, effective communication often requires considering context and clarity beyond rigid rules. Errors in verb tense can be challenging, but their difficulty varies and they are not universally the most challenging for advanced learners."}, {"id": 87, "section": "English Grammar", "question": "Which of the following sentences correctly uses the subjunctive mood?", "brand": "bilaspurtestseries.com 9669946966", "options": ["It is essential that every student submit their assignment on time.", "The committee recommended that he is appointed immediately.", "If I was a bird, I would fly to you.", "I wish she was here to see this."], "answer": "It is essential that every student submit their assignment on time.", "explanation": "The subjunctive mood is used for wishes, demands, recommendations, or hypothetical situations. In option C, 'It is essential that every student submit' correctly uses the base form of the verb 'submit' after 'essential that,' indicating a requirement. Options A and D incorrectly use 'was' instead of 'were' for hypothetical situations or wishes ('If I were,' 'I wish she were'). Option B incorrectly uses 'is appointed' instead of 'be appointed' after 'recommended that'."}, {"id": 88, "section": "English Grammar", "question": "What is the primary distinction between a 'restrictive clause' and a 'non-restrictive clause' in terms of grammatical function and punctuation?", "brand": "bilaspurtestseries.com 9669946966", "options": ["A restrictive clause can be omitted without changing the sentence's meaning, while a non-restrictive clause cannot.", "A restrictive clause provides essential information and is not set off by commas, while a non-restrictive clause provides non-essential information and is set off by commas.", "A restrictive clause modifies a noun, whereas a non-restrictive clause modifies an entire sentence.", "A restrictive clause uses 'which' and is set off by commas, while a non-restrictive clause uses 'that' and is not."], "answer": "A restrictive clause provides essential information and is not set off by commas, while a non-restrictive clause provides non-essential information and is set off by commas.", "explanation": "This option correctly identifies the key differences. A restrictive clause is crucial for identifying the noun it modifies; removing it changes the meaning of the sentence, and it is not separated by commas. A non-restrictive clause, conversely, adds extra, non-essential information; it can be removed without altering the core meaning of the sentence and is always set off by commas. The choice between 'which' and 'that' is often related to this distinction, but the essential/non-essential nature and punctuation are the primary defining factors. Option D incorrectly swaps the characteristics."}, {"id": 89, "section": "English Grammar", "question": "Identify the error in the following sentence: 'Neither the students nor the professor were aware of the new policy, which had been announced just yesterday.'", "brand": "bilaspurtestseries.com 9669946966", "options": ["Incorrect use of 'neither...nor'.", "Incorrect pronoun reference for 'which'.", "Misplaced modifier 'just yesterday'.", "Subject-verb agreement error with 'were'."], "answer": "Subject-verb agreement error with 'were'.", "explanation": "When 'neither...nor' connects two subjects, the verb should agree with the subject closest to it. In this sentence, 'professor' is singular and is closest to the verb. Therefore, the verb should be 'was' (singular) instead of 'were' (plural). The sentence should read: 'Neither the students nor the professor was aware of the new policy...' The other options do not represent errors in this sentence."}, {"id": 90, "section": "English Grammar", "question": "Which sentence demonstrates a subtle error in parallelism?", "brand": "bilaspurtestseries.com 9669946966", "options": ["He decided to study hard, to get good grades, and to apply for scholarships.", "The committee discussed the budget, the timeline, and the potential risks.", "They were advised to eat healthy, exercise regularly, and get enough sleep.", "She enjoys hiking, swimming, and to cycle in the mountains."], "answer": "She enjoys hiking, swimming, and to cycle in the mountains.", "explanation": "Parallelism requires that elements in a series or comparison have the same grammatical form. In the incorrect sentence, 'hiking' and 'swimming' are gerunds, but 'to cycle' is an infinitive. To maintain parallelism, 'to cycle' should be changed to 'cycling'. The other sentences correctly maintain parallel structure, using consistent grammatical forms (infinitives, nouns, or base verbs) within their respective series."}, {"id": 91, "section": "English Grammar", "question": "Consider the following statements regarding the use of articles (a, an, the): I. 'The' is always used before unique nouns, such as 'the sun' or 'the moon'. II. 'A' or 'an' is used when referring to a general or unspecified item. III. 'The' can be omitted before plural nouns when referring to them in a general sense. IV. 'An' is used before words beginning with a vowel sound, not necessarily a vowel letter. Which of the statements are grammatically correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["All of the above", "I, II, and III only", "I, II, and IV only", "II, III, and IV only"], "answer": "II, III, and IV only", "explanation": "Statement I is incorrect because 'the' is not always used before unique nouns; for example, we say 'God' not 'the God'. While 'the sun' and 'the moon' are correct, this rule has exceptions. Statement II is correct; 'a' or 'an' denotes indefiniteness. Statement III is correct; for example, 'Dogs are loyal animals' (general sense) versus 'The dogs in the park are barking' (specific). Statement IV is correct; the choice between 'a' and 'an' depends on the initial sound, not just the letter (e.g., 'an hour' vs. 'a university'). Therefore, II, III, and IV are correct."}, {"id": 92, "section": "English Grammar", "question": "Evaluate the correctness of the following statements about common grammatical pitfalls:\n1. Using 'less' for countable nouns and 'fewer' for uncountable nouns is a common error.\n2. The phrase 'different than' is always grammatically incorrect; 'different from' is the only acceptable form.\n3. A split infinitive (e.g., 'to boldly go') is always considered a serious grammatical error and should be avoided.\n4. The passive voice should be avoided in all forms of academic and professional writing. Which of these statements correctly identifies a grammatical pitfall or provides accurate advice?", "brand": "bilaspurtestseries.com 9669946966", "options": ["1 only", "1 and 3 only", "None of the above", "2 and 4 only"], "answer": "1 only", "explanation": "Statement 1 is correct: 'less' is for uncountable nouns (e.g., less water), and 'fewer' is for countable nouns (e.g., fewer students). Misusing them is a common error. Statement 2 is incorrect: while 'different from' is generally preferred, 'different than' is widely accepted, especially in American English, when followed by a clause. Statement 3 is incorrect: split infinitives are often stylistically awkward but are not always considered a 'serious' grammatical error, and sometimes they improve clarity. Statement 4 is incorrect: while overuse of the passive voice can be problematic, it is appropriate and even necessary in certain contexts, such as when the actor is unknown or when emphasizing the action/recipient."}, {"id": 93, "section": "English Grammar", "question": "Assertion (A): The use of 'whom' is always preferred over 'who' when referring to the object of a verb or preposition.\nReason (R):: 'Whom' functions as an objective pronoun, similar to 'him' or 'them', and should be used in objective cases. Select the correct option:", "brand": "bilaspurtestseries.com 9669946966", "options": ["A is true, but R is false.", "Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true.", "Both A and R are true, but R is not the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Assertion (A) is true: 'whom' is indeed the objective form of 'who' and is used when it functions as the object of a verb or preposition. Reason (R) is also true and provides the correct grammatical explanation for Assertion (A). Just as 'him' and 'them' are objective pronouns, 'whom' serves the same function, indicating that the person referred to is receiving the action or is the object of a preposition. Therefore, R correctly explains why A is true."}, {"id": 94, "section": "English Grammar", "question": "Which of the following sentences contain a grammatical error?\nJ: The data suggests that the economy is improving, despite recent setbacks.\nK: Each of the participants were asked to submit their feedback by Friday.\nL: Hardly had he entered the room when the phone began to ring.\nM: Between you and I, this project requires more resources than initially estimated.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and M only", "J, K, and M only", "K, L, and M only", "J and K only"], "answer": "K and M only", "explanation": "Sentence J is grammatically correct. 'Data' can be treated as a singular or plural noun; 'data suggests' (singular) is acceptable, especially in common usage. Sentence K has a subject-verb agreement error: 'Each' is singular, so the verb should be 'was' instead of 'were'. It should be 'Each of the participants was asked...'. Sentence L is correct; it uses inversion correctly with 'Hardly had...when'. Sentence M has a pronoun case error: 'Between' is a preposition, and prepositions take objective pronouns. Therefore, it should be 'Between you and me', not 'Between you and I'. Thus, K and M contain errors."}, {"id": 95, "section": "English Grammar", "question": "Identify the grammatically correct sentences among the following:\nJ: The committee, which comprises ten members, have decided to postpone the meeting.\nK: Not only did she excel in academics, but she also demonstrated exceptional leadership skills.\nL: If I would have known about the traffic, I would have left earlier.\nM: The reason why he resigned was because of personal differences with the management.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and L only", "J and K only", "K only", "J, K, and M only"], "answer": "K only", "explanation": "Sentence J has a subject-verb agreement error. 'Committee' is a collective noun, and when acting as a single unit (as implied by 'decided'), it takes a singular verb. So, 'have decided' should be 'has decided'. Sentence K is grammatically correct, demonstrating proper inversion with 'Not only did...' and parallel structure. Sentence L has an incorrect conditional structure; 'If I would have known' should be 'If I had known' (third conditional). Sentence M contains a redundancy: 'The reason why... was because' is incorrect. It should be either 'The reason he resigned was that...' or 'He resigned because of...'. Therefore, only K is correct."}, {"id": 96, "section": "English Grammar", "question": "Which of the following statements correctly describe the usage of specific grammatical elements?\nJ: 'Further' refers to additional or more abstract distance, while 'farther' refers to physical distance.\nK: The word 'unique' is an absolute adjective and therefore cannot be modified by adverbs like 'very' or 'most'.\nL: It is always incorrect to end a sentence with a preposition.\nM: The use of 'whom' is mandatory after a preposition, regardless of whether it refers to the subject or object of the clause.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and M only", "J, K, and M only", "J and K only", "K and L only"], "answer": "J and K only", "explanation": "Statement J is correct: 'farther' is for measurable physical distance (e.g., 'walk farther'), and 'further' is for abstract distance or additional extent (e.g., 'further discussion'). Statement K is correct: 'unique' means 'one of a kind' and is an absolute adjective, so it cannot be graded (e.g., 'more unique' is illogical). Statement L is incorrect: while often advised against in formal writing, ending a sentence with a preposition is grammatically acceptable and sometimes more natural (e.g., 'What are you looking at?'). Statement M is incorrect: 'whom' is mandatory after a preposition, but it always refers to the object of the preposition, not the subject of the clause. For example, 'To whom did you speak?' (whom is object of 'to'). Therefore, only J and K are correct."}, {"id": 97, "section": "English Grammar", "question": "Match the sentences in List-I with the type of grammatical error they contain in List-II: List-I (Sentence):\n(J) The manager, along with his team, are responsible for the project's success.\n(K) Having studied diligently, the exam was passed with flying colors.\n(L) She is one of the few students who has consistently achieved top grades.\n(M) I could care less about what he thinks of my decision. List-II (Type of Error):\n(1) Subject-Verb Agreement\n(2) Dangling Modifier\n(3) Idiomatic Expression\n(4) Pronoun-Antecedent Agreement\nChoose the correct matching pair:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-1, L-4, M-3", "J-1, K-2, L-4, M-3", "J-1, K-2, L-1, M-3", "J-1, K-3, L-2, M-4"], "answer": "J-1, K-2, L-1, M-3", "explanation": "J. 'The manager, along with his team, are responsible...' - 'Along with' is a prepositional phrase and does not affect the subject 'manager', which is singular. The verb should be 'is', not 'are'. This is a Subject-Verb Agreement error (J-1). K. 'Having studied diligently, the exam was passed...' - The participial phrase 'Having studied diligently' implies its subject is the one who studied. Here, it illogically modifies 'the exam'. This is a Dangling Modifier (K-2). L. 'She is one of the few students who has consistently achieved...' - In 'one of the few students who...', 'who' refers to 'students' (plural), so the verb should be 'have', not 'has'. This is a Subject-Verb Agreement error (L-1). M. 'I could care less...' - The correct idiom is 'I couldn't care less', meaning 'I care so little that I could not possibly care less'. 'I could care less' implies that one could care less, meaning they still care to some extent. This is an Idiomatic Expression error (M-3). Therefore, the correct matching is J-1, K-2, L-1, M-3."}, {"id": 98, "section": "English Grammar", "question": "Arrange the following steps in the most logical order for systematically identifying and correcting advanced grammatical errors in a complex sentence:\nJ: Check for subtle issues like parallelism, misplaced modifiers, and pronoun case.\nK: Read the sentence aloud to identify awkward phrasing or unclear meaning.\nL: Verify subject-verb agreement and correct tense usage for all clauses.\nM: Analyze the sentence structure, identifying main clauses, subordinate clauses, and phrases.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, M, J", "K, M, L, J", "M, L, K, J", "M, J, L, K"], "answer": "K, M, L, J", "explanation": "The most logical sequence for error identification starts with a holistic understanding and then moves to specific grammatical checks. 1. K. Read the sentence aloud to identify awkward phrasing or unclear meaning. This initial step helps catch general flow issues and semantic ambiguities before diving into technical grammar. It provides a 'gut feeling' for where problems might lie. 2. M. Analyze the sentence structure, identifying main clauses, subordinate clauses, and phrases. Understanding the sentence's structural components is foundational for applying specific grammatical rules. You need to know what's modifying what, and what the core subject and verb are. 3. L. Verify subject-verb agreement and correct tense usage for all clauses. These are fundamental structural checks that depend on understanding the clauses identified in step M. They are often less subtle than other advanced errors but crucial. 4. J. Check for subtle issues like parallelism, misplaced modifiers, and pronoun case. These are often more advanced and nuanced errors that require a solid understanding of the sentence's structure and basic agreement rules. They are best addressed after the more foundational checks. Therefore, K, M, L, J represents the most systematic and effective approach."}, {"id": 99, "section": "English Grammar", "question": "Analyze the following statements concerning the precise application and impact of various connectors and conjunctions on sentence structure and coherence:\nJ: The conjunction \"as long as\" can correctly express both a condition and a duration, depending on the context of the sentence.\nK: When connecting two independent clauses, a semicolon must always precede a conjunctive adverb (e.g., \"therefore,\" \"however\"), and a comma must follow it.\nL: The choice between \"although\" and \"in spite of\" is purely stylistic, as both introduce a concession without affecting grammatical structure or meaning.\nM: A common error in maintaining coherence is the overuse of coordinating conjunctions, which can lead to a series of loosely connected ideas rather than a logically flowing argument.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and M only", "K, L, and M only", "All of the above", "J and K only"], "answer": "J, K, and M only", "explanation": "Statement J is correct. The conjunction \"as long as\" functions as a subordinating conjunction that can express a condition (e.g., \"You can borrow the car as long as you fill the tank\") or duration (e.g., \"He stayed in the library as long as it was open\"). Statement K is correct. This is a fundamental rule of punctuation for conjunctive adverbs when they connect two independent clauses; a semicolon is used before the adverb, and a comma after it. Statement L is incorrect. While \"although\" and \"in spite of\" convey similar concessive meanings, their grammatical structures are distinct. \"Although\" is a subordinating conjunction followed by a clause (subject + verb), whereas \"in spite of\" is a prepositional phrase followed by a noun, pronoun, or gerund. They are not interchangeable without structural modification. Statement M is correct. Over-reliance on simple coordinating conjunctions like \"and,\" \"but,\" or \"so\" can result in a series of simple sentences that lack sophisticated logical connections, thereby diminishing the overall coherence and flow of the writing."}, {"id": 100, "section": "English Grammar", "question": "Identify the part of the following sentence that contains a grammatical error:\nEach of the participants, along with their respective team leaders, are required to submit their proposals by Friday.", "brand": "bilaspurtestseries.com 9669946966", "options": ["along with their respective team leaders, are required", "by Friday.", "to submit their proposals", "Each of the participants,"], "answer": "along with their respective team leaders, are required", "explanation": "The grammatical error is found in part B. The subject of the sentence is the indefinite pronoun 'Each', which is always singular. Therefore, the verb must agree with the singular subject. The phrase 'along with their respective team leaders' is an intervening phrase and does not change the number of the subject. Consequently, 'are required' should be corrected to 'is required'. Options A, C, and D are grammatically correct. While 'their proposals' in option C might seem to conflict with the singular 'Each', it is widely accepted in modern English for generic singular subjects to avoid awkward 'his or her', but the subject-verb agreement with 'Each' remains a strict rule."}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="VARG_1_ENGLISH_GRAMMAR_PHRAS_ENGLISH_GRAMMAR_ADVANCED_ERROR_FIN_F0C59151";const TEST_TITLE="Varg_1_English_Grammar_Phrases_Sentences_Conditionals_Connectors_Week_2_Day_04_39_ENGLISH_GRAMMAR_PHRASE_CLAUS";const CONTACT_WHATSAPP="9669946966";const PRINT_QR_TEXT="";const PRINT_QR_MESSAGE="";const LOGO_SRC="data:image/png;base64,iVBORw
