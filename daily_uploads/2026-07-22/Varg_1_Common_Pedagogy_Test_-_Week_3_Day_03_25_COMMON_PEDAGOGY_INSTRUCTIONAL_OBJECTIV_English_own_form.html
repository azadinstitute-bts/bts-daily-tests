function azadIdentityFromInputs(){var n=document.getElementById('stName'),m=document.getElementById('stMobile'),b=document.getElementById('stBatch');var name=n?n.value.trim():'';var raw=m?m.value.trim():'';var mobile=azadNormMobile(raw);var batch=b?b.value.trim():'';return {name:name,mobile:mobile,batch:batch,display_mobile:raw}}
function azadIdentityKey(st){return 'azad_own_v2_'+String(TEST_CODE||'test')+'_'+azadNormName(st&&st.name)+'_'+azadNormMobile(st&&st.mobile)}
function azadDraftKey(st){return azadIdentityKey(st)+'_draft'}function azadResultKey(st){return azadIdentityKey(st)+'_result'}
function azadClampIndex(i){i=Number(i)||0;return Math.max(0,Math.min((Array.isArray(Q)?Q.length:1)-1,i))}
function azadSafeArray(v,n,fill){if(!Array.isArray(v))return Array(n).fill(fill);var out=Array(n).fill(fill);for(var i=0;i<n;i++){if(i<v.length)out[i]=v[i]}return out}
function azadLoadJson(key){try{var raw=localStorage.getItem(key);return raw?JSON.parse(raw):null}catch(e){return null}}
function azadApplySavedState(data,ident){try{student=Object.assign({},data.student||{},ident||{});ans=azadSafeArray(data.ans,Q.length,null);marked=azadSafeArray(data.marked,Q.length,false).map(Boolean);cur=azadClampIndex(data.cur);startedAt=Number(data.startedAt)||Date.now();return true}catch(e){return false}}
function azadSaveDraft(){try{if(!azadStoreOk()||!student||lastSummary)return;localStorage.setItem(azadDraftKey(student),JSON.stringify({version:3,test_code:TEST_CODE,student:student,cur:azadClampIndex(cur),ans:ans,marked:marked,startedAt:startedAt||Date.now(),savedAt:Date.now()}))}catch(e){}}
function azadSaveResult(summary,note){try{if(!azadStoreOk()||!student||!summary)return;localStorage.setItem(azadResultKey(student),JSON.stringify({version:3,test_code:TEST_CODE,student:student,cur:azadClampIndex(cur),ans:ans,marked:marked,startedAt:startedAt||Date.now(),summary:summary,note:String(note||'Final submission already completed on this device.'),savedAt:Date.now()}));localStorage.setItem('azad_submitted_'+TEST_CODE+'_'+azadNormMobile(student.mobile),'1');localStorage.removeItem(azadDraftKey(student))}catch(e){}}
function azadResultData(ident){return azadLoadJson(azadResultKey(ident))}function azadDraftData(ident){return azadLoadJson(azadDraftKey(ident))}
function azadShowNotice(kind,ident,data,proceed){try{var old=document.getElementById('azadStartNotice');if(old)old.remove();var title='Test start karne se pehle';var body='<ul><li>Mobile par left swipe = Next, right swipe = Previous.</li><li>Answers aur Mark for Review local device par auto-save honge.</li><li>Reload/browser close ke baad same details se resume hoga.</li><li>Timer wahi se continue hoga, restart nahi hoga.</li></ul>';var primary='Start Test',secondary='';if(kind==='resume'){title='Saved test mila hai';body='<p>Same details se pehle start kiya hua test mila hai. Answers, marked questions aur timer resume honge.</p>';primary='Resume Test'}else if(kind==='submitted'){title='Result already submitted';body='<p>Is name/mobile se final submit is device par already ho chuka hai. Dobara test dena ho to dusra valid mobile number use karein.</p>';primary='Go to Result';secondary='<button class="gray" type="button" onclick="document.getElementById(\'azadStartNotice\').remove()">Back</button>'}var html='<div id="azadStartNotice" class="azad-start-modal"><div class="azad-start-card"><h2>'+title+'</h2>'+body+'<div class="azad-start-actions">'+secondary+'<button class="green" type="button" id="azadStartProceed">'+primary+'</button></div></div></div>';document.body.insertAdjacentHTML('beforeend',html);document.getElementById('azadStartProceed').onclick=function(){var el=document.getElementById('azadStartNotice');if(el)el.remove();proceed()};}catch(e){proceed()}}
function azadProceedFresh(){if(!azadPendingStart)return;var old=azadPendingStart.oldStartQuiz,args=azadPendingStart.args;azadPendingStart=null;var r=old.apply(window,args||[]);azadStartSaveTimer();azadSaveDraft();return r}
function azadProceedResume(ident,data){azadApplySavedState(data,ident);azadStartSaveTimer();render()}
function azadProceedResult(ident,data){azadApplySavedState(data,ident);lastSummary=data.summary;showResult(lastSummary,data.note||'Final submission already completed on this device.')}
function azadMarkedList(){try{return markedIndexes()}catch(e){var a=[];for(var i=0;i<marked.length;i++){if(marked[i])a.push(i)}return a}}
function azadEnterMarkedMode(){var list=azadMarkedList();if(!list.length){alert('Marked for Review questions abhi nahi hain.');return}azadMarkedMode=true;azadMarkedEntryCur=azadClampIndex(cur);if(list.indexOf(cur)<0)cur=list[0];azadSaveDraft();render()}
function azadExitMarkedMode(){azadMarkedMode=false;cur=azadClampIndex(azadMarkedEntryCur);azadSaveDraft();render()}
function azadStepMarked(dir){var list=azadMarkedList();if(!list.length){azadExitMarkedMode();return true}var pos=list.indexOf(cur);if(pos<0)pos=dir>0?-1:0;pos=pos+dir;if(pos<0)pos=0;if(pos>=list.length)pos=list.length-1;cur=list[pos];azadSaveDraft();render();return true}
window.azadEnterMarkedMode=azadEnterMarkedMode;window.azadExitMarkedMode=azadExitMarkedMode;
function azadHideOldToolButtons(){try{var tools=document.getElementById('ownToolsBody');if(!tools)return;var buttons=tools.querySelectorAll('button');for(var i=0;i<buttons.length;i++){var t=(buttons[i].textContent||'').toLowerCase();if(t.indexOf('review')>=0||t.indexOf('marked')>=0||t.indexOf('chihnit')>=0){buttons[i].style.display='none'}}}catch(e){}}
function azadReviewButtonHtml(){var isMarked=!!marked[cur];if(azadMarkedMode){return '<button type="button" class="azad-all-questions-btn" onclick="azadExitMarkedMode()">All Questions</button>'}if(cur===0){return '<button type="button" class="azad-review-full '+(isMarked?'mark-on':'')+'" onclick="toggleMark()">'+(isMarked?'Marked for Review':'Mark for Review')+'</button>'}var icon='&#128278;';if(cur>=1&&cur<=4){return '<button type="button" title="Mark for Review" class="azad-review-morph '+(isMarked?'mark-on':'')+'" onclick="toggleMark()"><span class="azad-mark-text">Review</span> '+icon+'</button>'}var mark='<button type="button" title="Mark for Review" aria-label="Mark for Review" class="azad-bookmark-btn '+(isMarked?'mark-on':'')+'" onclick="toggleMark()">'+icon+'</button>';if(cur>=Q.length-1){return mark+'<button type="button" class="azad-marked-nav-btn" onclick="azadEnterMarkedMode()">View Marked</button>'}return mark}
function azadApplyReviewUi(){try{if(!document.body.classList.contains('own-test-active'))return;azadHideOldToolButtons();var nav=document.querySelector('.own-bottom-nav');if(nav){nav.classList.toggle('azad-last-q',cur>=Q.length-1&&!azadMarkedMode);nav.classList.toggle('azad-not-last-q',cur<Q.length-1&&!azadMarkedMode);nav.classList.toggle('azad-marked-mode',azadMarkedMode);var next=nav.querySelector('.own-next');if(next)next.textContent=azadMarkedMode?'Next Marked':'अगला →';var prev=nav.querySelector('.own-prev');if(prev)prev.textContent=azadMarkedMode?'Previous Marked':'← पिछला';var submit=nav.querySelector('.own-submit');if(submit)submit.textContent='✓ Final Submit'}var old=document.getElementById('azadReviewBar');if(old)old.remove();if(nav&&nav.parentNode){var bar=document.createElement('div');bar.id='azadReviewBar';bar.className='azad-reviewbar';bar.innerHTML=azadReviewButtonHtml();nav.parentNode.insertBefore(bar,nav)}}catch(e){}}
function azadStartSaveTimer(){try{if(azadResumeSaveTimer)clearInterval(azadResumeSaveTimer);azadResumeSaveTimer=setInterval(azadSaveDraft,1500)}catch(e){}}
function azadBindSwipe(){try{if(window.__azadSwipeBound)return;window.__azadSwipeBound=true;document.addEventListener('touchstart',function(ev){try{if(!document.body.classList.contains('own-test-active'))return;var t=ev.target;if(t&&String(t.tagName||'').match(/input|button|select|textarea|a/i))return;var p=ev.changedTouches&&ev.changedTouches[0];if(!p)return;azadTouchStartX=p.clientX;azadTouchStartY=p.clientY}catch(e){}},{passive:true});document.addEventListener('touchend',function(ev){try{if(!document.body.classList.contains('own-test-active'))return;var t=ev.target;if(t&&String(t.tagName||'').match(/input|button|select|textarea|a/i))return;var p=ev.changedTouches&&ev.changedTouches[0];if(!p)return;var dx=p.clientX-azadTouchStartX,dy=p.clientY-azadTouchStartY;if(Math.abs(dx)<45||Math.abs(dx)<Math.abs(dy)*1.05)return;if(dx<0){next()}else{prev()}}catch(e){}},{passive:true})}catch(e){}}
if(typeof startQuiz==='function'){var oldStartQuiz=startQuiz;startQuiz=function(){var ident=azadIdentityFromInputs();if(ident.name&&ident.mobile){var res=azadResultData(ident);if(res&&res.summary){return azadShowNotice('submitted',ident,res,function(){azadProceedResult(ident,res)})}var draft=azadDraftData(ident);if(draft&&draft.student){return azadShowNotice('resume',ident,draft,function(){azadProceedResume(ident,draft)})}}azadPendingStart={oldStartQuiz:oldStartQuiz,args:arguments};return azadShowNotice('fresh',ident,null,azadProceedFresh)}}
if(typeof render==='function'){var oldRender=render;render=function(){var r=oldRender.apply(this,arguments);azadApplyReviewUi();azadBindSwipe();azadSaveDraft();return r}}
if(typeof next==='function'){var oldNext=next;next=function(){if(azadMarkedMode)return azadStepMarked(1);var r=oldNext.apply(this,arguments);azadSaveDraft();return r}}
if(typeof prev==='function'){var oldPrev=prev;prev=function(){if(azadMarkedMode)return azadStepMarked(-1);var r=oldPrev.apply(this,arguments);azadSaveDraft();return r}}
if(typeof toggleMark==='function'){var oldToggleMark=toggleMark;toggleMark=function(){var r=oldToggleMark.apply(this,arguments);if(azadMarkedMode&&azadMarkedList().indexOf(cur)<0){var list=azadMarkedList();if(list.length){cur=list[0]}else{azadMarkedMode=false;cur=azadClampIndex(azadMarkedEntryCur)}}azadSaveDraft();return r}}
if(typeof gotoQ==='function'){var oldGotoQ=gotoQ;gotoQ=function(i){azadMarkedMode=false;var r=oldGotoQ.apply(this,arguments);azadSaveDraft();return r}}
if(typeof showResult==='function'){var oldShowResult=showResult;showResult=function(sd,note){lastSummary=sd||lastSummary;azadSaveResult(lastSummary,note);return oldShowResult.apply(this,arguments)}}
if(typeof submitQuiz==='function'){var oldSubmitQuiz=submitQuiz;submitQuiz=function(skipReview){try{if(student){var res=azadResultData(student);if(res&&res.summary){azadApplySavedState(res,student);lastSummary=res.summary;showResult(lastSummary,res.note||'Final submission already completed on this device.');return}}}catch(e){}return oldSubmitQuiz.apply(this,arguments)}}
window.addEventListener('beforeunload',azadSaveDraft);if(document&&document.addEventListener)document.addEventListener('change',function(ev){try{if(ev&&ev.target&&ev.target.name==='o')setTimeout(azadSaveDraft,0)}catch(e){}},true);
})();
