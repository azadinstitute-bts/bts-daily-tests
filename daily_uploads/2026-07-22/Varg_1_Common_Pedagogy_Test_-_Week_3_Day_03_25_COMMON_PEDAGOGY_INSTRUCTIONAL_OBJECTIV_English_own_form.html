सही व्याख्या नहीं है।", "A असत्य है, लेकिन R सत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि अनुदेशात्मक उद्देश्यों (Instructional Objectives) को विशिष्ट, मापने योग्य (measurable), प्राप्त करने योग्य (achievable), प्रासंगिक (relevant) और समय-बद्ध (time-bound) (SMART) होना चाहिए। कारण (R) भी सही है और A की सही व्याख्या करता है, क्योंकि यदि उद्देश्य मापने योग्य नहीं होंगे, तो शिक्षक यह निर्धारित नहीं कर पाएगा कि छात्र ने अपेक्षित ज्ञान या कौशल प्राप्त किया है या नहीं, जिससे सीखने की प्रभावशीलता का मूल्यांकन असंभव हो जाएगा।"}, {"id": 8, "section": "Pedagogy", "question": "अभिकथन (A): शिक्षण-अधिगम प्रक्रिया (teaching-learning process) में अनुदेशात्मक उद्देश्यों (Instructional Objectives) का अनुप्रयोग (application) शिक्षकों को अपनी शिक्षण रणनीतियों (teaching strategies) को प्रभावी ढंग से डिजाइन करने में मदद करता है।\nकारण (R): स्पष्ट उद्देश्य शिक्षकों को यह समझने में मदद करते हैं कि छात्रों को क्या सीखना चाहिए, जिससे वे उपयुक्त शिक्षण गतिविधियों (learning activities) का चयन कर सकें।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A सत्य है, लेकिन R असत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि अनुदेशात्मक उद्देश्य (Instructional Objectives) शिक्षकों को एक रोडमैप प्रदान करते हैं, जिससे वे अपनी शिक्षण रणनीतियों (teaching strategies) को छात्रों के अपेक्षित सीखने के परिणामों (learning outcomes) के अनुरूप बना सकते हैं। कारण (R) भी सही है और A की सही व्याख्या करता है, क्योंकि जब शिक्षकों को पता होता है कि छात्रों को क्या हासिल करना है, तो वे उन गतिविधियों और संसाधनों का चयन कर सकते हैं जो उन उद्देश्यों को प्राप्त करने में सबसे प्रभावी होंगे।"}, {"id": 9, "section": "Pedagogy", "question": "अनुदेशात्मक उद्देश्यों (Instructional Objectives) के निर्माण और उपयोग के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: अनुदेशात्मक उद्देश्य हमेशा केवल संज्ञानात्मक (cognitive) डोमेन तक ही सीमित होने चाहिए।\nK: एक प्रभावी अनुदेशात्मक उद्देश्य विशिष्ट (specific), मापने योग्य (measurable), प्राप्त करने योग्य (achievable), प्रासंगिक (relevant) और समय-बद्ध (time-bound) (SMART) होना चाहिए।\nL: अनुदेशात्मक उद्देश्यों को छात्रों के पूर्व ज्ञान (prior knowledge) और विकासात्मक स्तर (developmental level) को ध्यान में रखे बिना तैयार किया जा सकता है।\nM: वे शिक्षण-अधिगम प्रक्रिया (teaching-learning process) के दौरान छात्रों की प्रगति का मूल्यांकन करने के लिए एक मानदंड (criterion) प्रदान करते हैं।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K, L और M", "केवल K और M", "केवल J, K और M", "केवल J और L"], "answer": "केवल K और M", "explanation": "कथन K और M सही हैं।\nकथन J गलत है क्योंकि अनुदेशात्मक उद्देश्य केवल संज्ञानात्मक डोमेन तक सीमित नहीं होते हैं; वे भावात्मक (affective) और मनोगत्यात्मक (psychomotor) डोमेन को भी शामिल कर सकते हैं।\nकथन K सही है। एक प्रभावी अनुदेशात्मक उद्देश्य को SMART (Specific, Measurable, Achievable, Relevant, Time-bound) मानदंडों को पूरा करना चाहिए।\nकथन L गलत है। अनुदेशात्मक उद्देश्यों को छात्रों के पूर्व ज्ञान और विकासात्मक स्तर को ध्यान में रखकर तैयार किया जाना चाहिए ताकि वे उपयुक्त और प्राप्त करने योग्य हों।\nकथन M सही है। अनुदेशात्मक उद्देश्य शिक्षण-अधिगम प्रक्रिया के दौरान छात्रों की प्रगति का मूल्यांकन करने के लिए स्पष्ट मानदंड प्रदान करते हैं।"}, {"id": 10, "section": "Pedagogy", "question": "शिक्षाशास्त्र (Pedagogy) में अनुदेशात्मक उद्देश्यों (Instructional Objectives) की भूमिका के संदर्भ में, निम्नलिखित कथनों का विश्लेषण करें:\nJ: अनुदेशात्मक उद्देश्य शिक्षकों को केवल पाठ्यक्रम (syllabus) पूरा करने पर ध्यान केंद्रित करने में मदद करते हैं, न कि सीखने के परिणामों पर।\nK: वे छात्रों को यह समझने में सहायता करते हैं कि उनसे क्या सीखने की अपेक्षा की जाती है और क्यों।\nL: अनुदेशात्मक उद्देश्यों का उपयोग शिक्षण विधियों (teaching methods) और मूल्यांकन रणनीतियों (assessment strategies) के चयन को सूचित करने के लिए किया जाता है।\nM: वे छात्रों में उच्च-स्तरीय सोच कौशल (higher-order thinking skills) जैसे विश्लेषण (analysis) और संश्लेषण (synthesis) को बढ़ावा देने में कोई भूमिका नहीं निभाते हैं।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और L", "केवल J, K और L", "केवल J और M", "केवल K, L और M"], "answer": "केवल K और L", "explanation": "कथन K और L सही हैं।\nकथन J गलत है। अनुदेशात्मक उद्देश्यों का मुख्य ध्यान सीखने के परिणामों (learning outcomes) पर होता है, न कि केवल पाठ्यक्रम पूरा करने पर। वे यह सुनिश्चित करते हैं कि शिक्षण सार्थक अधिगम की ओर ले जाए।\nकथन K सही है। अनुदेशात्मक उद्देश्य छात्रों को स्पष्टता प्रदान करते हैं कि उनसे क्या सीखने की अपेक्षा की जाती है और उन कौशलों या ज्ञान का क्या महत्व है।\nकथन L सही है। प्रभावी अनुदेशात्मक उद्देश्य शिक्षकों को उपयुक्त शिक्षण विधियों और मूल्यांकन रणनीतियों का चयन करने में मार्गदर्शन करते हैं जो वांछित सीखने के परिणामों के अनुरूप हों।\nकथन M गलत है। अच्छी तरह से तैयार किए गए अनुदेशात्मक उद्देश्य छात्रों में विश्लेषण, संश्लेषण, मूल्यांकन जैसे उच्च-स्तरीय सोच कौशल को बढ़ावा देने में महत्वपूर्ण भूमिका निभाते हैं, खासकर जब वे ब्लूम के वर्गीकरण (Bloom's Taxonomy) के उच्च स्तरों को लक्षित करते हैं।"}, {"id": 11, "section": "Pedagogy", "question": "अनुदेशात्मक उद्देश्यों (Instructional Objectives) के प्रकार और उनकी तुलना के संदर्भ में, निम्नलिखित कथनों पर विचार करें:\nJ: ब्लूम के वर्गीकरण (Bloom's Taxonomy) के अनुसार, संज्ञानात्मक (cognitive) उद्देश्य ज्ञान (knowledge) और बौद्धिक कौशल (intellectual skills) से संबंधित होते हैं।\nK: भावात्मक (affective) उद्देश्य भावनाओं, दृष्टिकोणों (attitudes) और मूल्यों (values) के विकास पर केंद्रित होते हैं।\nL: मनोगत्यात्मक (psychomotor) उद्देश्य शारीरिक कौशल (physical skills) और समन्वय (coordination) से संबंधित होते हैं।\nM: सभी प्रकार के उद्देश्य हमेशा एक ही शिक्षण गतिविधि (teaching activity) में समान रूप से प्राप्त किए जाते हैं।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K, L और M", "केवल K और L", "केवल J, K और L", "केवल J और K"], "answer": "केवल J, K और L", "explanation": "कथन J, K और L ब्लूम के वर्गीकरण (Bloom's Taxonomy) के अनुसार अनुदेशात्मक उद्देश्यों (Instructional Objectives) के विभिन्न डोमेन (domains) का सही वर्णन करते हैं। संज्ञानात्मक (cognitive) ज्ञान और बौद्धिक कौशल से, भावात्मक (affective) भावनाओं और दृष्टिकोणों से, और मनोगत्यात्मक (psychomotor) शारीरिक कौशल से संबंधित हैं। कथन M गलत है क्योंकि एक ही शिक्षण गतिविधि में सभी प्रकार के उद्देश्यों को समान रूप से प्राप्त करना हमेशा संभव या आवश्यक नहीं होता है; अक्सर एक डोमेन पर अधिक ध्यान केंद्रित किया जाता है।"}, {"id": 12, "section": "Pedagogy", "question": "अनुदेशात्मक उद्देश्यों (Instructional Objectives) की आवश्यकता के पीछे शैक्षिक सिद्धांतों (educational theories) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: व्यवहारवाद (Behaviorism) इस बात पर जोर देता है कि सीखने के परिणामों को मापने योग्य व्यवहार (measurable behaviors) के रूप में परिभाषित किया जाना चाहिए।\nK: रचनावाद (Constructivism) अनुदेशात्मक उद्देश्यों को पूरी तरह से खारिज करता है क्योंकि यह छात्र-केंद्रित (student-centric) है।\nL: संज्ञानात्मकवाद (Cognitivism) सीखने की आंतरिक मानसिक प्रक्रियाओं (internal mental processes) पर ध्यान केंद्रित करता है, जो उद्देश्यों को तैयार करने में महत्वपूर्ण है।\nM: मानवतावाद (Humanism) व्यक्तिगत विकास (personal growth) और आत्म-बोध (self-actualization) पर जोर देता है, जो उद्देश्यों को व्यापक संदर्भ प्रदान करता है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "केवल K और L", "केवल J, K, L और M", "केवल J और K"], "answer": "केवल J, L और M", "explanation": "कथन J, L और M सही हैं। व्यवहारवाद (Behaviorism) मापने योग्य व्यवहारों के रूप में उद्देश्यों को परिभाषित करने का समर्थन करता है (J)। संज्ञानात्मकवाद (Cognitivism) आंतरिक मानसिक प्रक्रियाओं पर ध्यान केंद्रित करता है, जो उद्देश्यों को तैयार करने में मदद करता है (L)। मानवतावाद (Humanism) व्यक्तिगत विकास पर जोर देता है, जो उद्देश्यों को एक व्यापक संदर्भ देता है (M)। कथन K गलत है क्योंकि रचनावाद (Constructivism) अनुदेशात्मक उद्देश्यों को पूरी तरह से खारिज नहीं करता है, बल्कि यह मानता है कि उद्देश्य छात्रों के सक्रिय निर्माण (active construction) और अर्थ-निर्माण (meaning-making) को बढ़ावा देने वाले होने चाहिए, न कि केवल पूर्व-निर्धारित व्यवहारों को प्राप्त करने वाले।"}, {"id": 13, "section": "Pedagogy", "question": "निम्नलिखित सूची-I में अनुदेशात्मक उद्देश्यों से संबंधित अवधारणाएँ (concepts) दी गई हैं और सूची-II में उनके विवरण (descriptions) दिए गए हैं। सही मिलान चुनें:\nसूची-I\nJ: अनुदेशात्मक उद्देश्य (Instructional Objective)\nK: सामान्य उद्देश्य (General Objective)\nL: सीखने का परिणाम (Learning Outcome)\nM: ब्लूम का वर्गीकरण (Bloom's Taxonomy)\nसूची-II\n1. छात्र के व्यवहार में विशिष्ट, मापने योग्य परिवर्तन।\n2. शैक्षिक लक्ष्यों को संज्ञानात्मक, भावात्मक और मनोगत्यात्मक डोमेन में वर्गीकृत करने की प्रणाली।\n3. व्यापक शैक्षिक इरादे या लक्ष्य।\n4. एक शिक्षण गतिविधि के पूरा होने के बाद छात्र क्या जानता है या क्या कर सकता है।\nसही मिलान चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-4, L-1, M-2", "J-2, K-1, L-3, M-4", "J-4, K-2, L-1, M-3", "J-1, K-3, L-4, M-2"], "answer": "J-1, K-3, L-4, M-2", "explanation": "सही मिलान इस प्रकार है: J-1 (अनुदेशात्मक उद्देश्य छात्र के व्यवहार में विशिष्ट, मापने योग्य परिवर्तन हैं), K-3 (सामान्य उद्देश्य व्यापक शैक्षिक इरादे या लक्ष्य हैं), L-4 (सीखने का परिणाम वह है जो एक शिक्षण गतिविधि के बाद छात्र जानता है या कर सकता है), और M-2 (ब्लूम का वर्गीकरण शैक्षिक लक्ष्यों को संज्ञानात्मक, भावात्मक और मनोगत्यात्मक डोमेन में वर्गीकृत करने की प्रणाली है)। यह मिलान इन अवधारणाओं की सटीक परिभाषाओं पर आधारित है।"}, {"id": 14, "section": "Pedagogy", "question": "अनुदेशात्मक उद्देश्यों (Instructional Objectives) के विकास के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: सीखने के परिणामों (learning outcomes) का मूल्यांकन (evaluate) करना।\nK: व्यापक शैक्षिक लक्ष्यों (broad educational goals) की पहचान करना।\nL: विशिष्ट, मापने योग्य उद्देश्यों (specific, measurable objectives) को तैयार करना।\nM: शिक्षण-अधिगम गतिविधियों (teaching-learning activities) का चयन और डिजाइन करना।\nसही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["M, L, K, J", "K, L, M, J", "K, M, L, J", "L, K, M, J"], "answer": "K, L, M, J", "explanation": "अनुदेशात्मक उद्देश्यों (Instructional Objectives) के विकास का सही कालानुक्रमिक क्रम (chronological order) है: सबसे पहले, व्यापक शैक्षिक लक्ष्यों (broad educational goals) की पहचान की जाती है (K)। फिर, इन लक्ष्यों के आधार पर, विशिष्ट, मापने योग्य उद्देश्यों (specific, measurable objectives) को तैयार किया जाता है (L)। इसके बाद, इन उद्देश्यों को प्राप्त करने के लिए शिक्षण-अधिगम गतिविधियों (teaching-learning activities) का चयन और डिजाइन किया जाता है (M)। अंत में, सीखने के परिणामों (learning outcomes) का मूल्यांकन (evaluate) किया जाता है कि उद्देश्य प्राप्त हुए या नहीं (J)।"}, {"id": 15, "section": "Pedagogy", "question": "शिक्षण में अनुदेशात्मक उद्देश्यों (Instructional Objectives) की भूमिका का सबसे अच्छा मूल्यांकन (evaluation) कौन सा कथन करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वे छात्रों को अपनी सीखने की गति (learning pace) निर्धारित करने से रोकते हैं।", "वे शिक्षकों को अपनी शिक्षण विधियों (teaching methods) को बदलने से हतोत्साहित करते हैं।", "वे शिक्षण को एक स्पष्ट दिशा प्रदान करते हैं, सीखने के परिणामों को परिभाषित करते हैं और मूल्यांकन (assessment) को सुसंगत बनाते हैं।", "वे केवल पाठ्यक्रम (syllabus) को पूरा करने के लिए एक चेकलिस्ट (checklist) के रूप में कार्य करते हैं।"], "answer": "वे शिक्षण को एक स्पष्ट दिशा प्रदान करते हैं, सीखने के परिणामों को परिभाषित करते हैं और मूल्यांकन (assessment) को सुसंगत बनाते हैं।", "explanation": "अनुदेशात्मक उद्देश्य (Instructional Objectives) शिक्षण को एक स्पष्ट दिशा प्रदान करके, अपेक्षित सीखने के परिणामों (learning outcomes) को स्पष्ट रूप से परिभाषित करके, और यह सुनिश्चित करके कि मूल्यांकन (assessment) इन परिणामों के साथ संरेखित (align) हो, शिक्षण की प्रभावशीलता को बढ़ाते हैं। वे केवल एक चेकलिस्ट नहीं हैं, बल्कि सीखने की प्रक्रिया के लिए एक मार्गदर्शक हैं। अन्य विकल्प अनुदेशात्मक उद्देश्यों की भूमिका का गलत मूल्यांकन करते हैं।"}, {"id": 16, "section": "Pedagogy", "question": "स्पष्ट अनुदेशात्मक उद्देश्यों (Instructional Objectives) के बिना शिक्षण के निम्नलिखित में से कौन सा एक संभावित परिणाम (consequence) नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["मूल्यांकन (assessment) का सीखने के परिणामों से असंबद्ध होना।", "शिक्षण-अधिगम सामग्री (teaching-learning materials) का अप्रभावी चयन।", "छात्रों के लिए सीखने की दिशा में अस्पष्टता।", "छात्रों में उच्च स्तर की आंतरिक प्रेरणा (intrinsic motivation) का विकास।"], "answer": "छात्रों में उच्च स्तर की आंतरिक प्रेरणा (intrinsic motivation) का विकास।", "explanation": "स्पष्ट अनुदेशात्मक उद्देश्यों (Instructional Objectives) के बिना शिक्षण से छात्रों में सीखने की दिशा में अस्पष्टता (ambiguity), शिक्षण सामग्री का अप्रभावी चयन और मूल्यांकन का सीखने के परिणामों से असंबद्ध होना जैसे नकारात्मक परिणाम हो सकते हैं। हालांकि, छात्रों में उच्च स्तर की आंतरिक प्रेरणा (intrinsic motivation) का विकास आमतौर पर स्पष्ट उद्देश्यों की अनुपस्थिति का परिणाम नहीं होता है; वास्तव में, स्पष्ट उद्देश्य अक्सर छात्रों को प्रेरित करने में मदद करते हैं।"}, {"id": 17, "section": "Pedagogy", "question": "अनुदेशात्मक उद्देश्य (Instructional Objectives) और सीखने के परिणाम (Learning Outcomes) के बीच प्राथमिक अंतर क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["दोनों शब्द एक दूसरे के पर्यायवाची (synonymous) हैं और उनका उपयोग एक दूसरे के स्थान पर किया जा सकता है।", "अनुदेशात्मक उद्देश्य केवल संज्ञानात्मक क्षेत्र (cognitive domain) तक सीमित होते हैं, जबकि सीखने के परिणाम सभी क्षेत्रों को कवर करते हैं।", "सीखने के परिणाम हमेशा अनुदेशात्मक उद्देश्यों से अधिक व्यापक होते हैं।", "अनुदेशात्मक उद्देश्य शिक्षक के इरादे हैं, जबकि सीखने के परिणाम छात्र की उपलब्धि हैं।"], "answer": "अनुदेशात्मक उद्देश्य शिक्षक के इरादे हैं, जबकि सीखने के परिणाम छात्र की उपलब्धि हैं।", "explanation": "अनुदेशात्मक उद्देश्य (Instructional Objectives) वे लक्ष्य हैं जो शिक्षक शिक्षण से पहले निर्धारित करता है, यानी शिक्षक क्या सिखाना चाहता है। जबकि सीखने के परिणाम (Learning Outcomes) वे हैं जो छात्र वास्तव में सीखने की प्रक्रिया के बाद प्राप्त करते हैं या करने में सक्षम होते हैं, यानी छात्र ने क्या सीखा। यद्यपि वे निकटता से संबंधित हैं, अनुदेशात्मक उद्देश्य इरादे को दर्शाते हैं और सीखने के परिणाम वास्तविक उपलब्धि को दर्शाते हैं।"}, {"id": 18, "section": "Pedagogy", "question": "एक प्रभावी अनुदेशात्मक उद्देश्य (Instructional Objective) की आवश्यक विशेषता (characteristic) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह शिक्षक के शिक्षण के इरादों को अस्पष्ट रूप से व्यक्त करता है।", "यह छात्रों को सीखने की प्रक्रिया में कोई भूमिका नहीं देता है।", "यह केवल उच्च-स्तरीय संज्ञानात्मक कौशल (higher-order cognitive skills) को लक्षित करता है।", "यह छात्र के व्यवहार में एक मापने योग्य (measurable) और अवलोकन योग्य (observable) परिवर्तन पर केंद्रित होता है।"], "answer": "यह छात्र के व्यवहार में एक मापने योग्य (measurable) और अवलोकन योग्य (observable) परिवर्तन पर केंद्रित होता है।", "explanation": "एक प्रभावी अनुदेशात्मक उद्देश्य (Instructional Objective) की सबसे आवश्यक विशेषता यह है कि यह छात्र के व्यवहार में एक विशिष्ट, मापने योग्य (measurable) और अवलोकन योग्य (observable) परिवर्तन पर केंद्रित होता है। यह सुनिश्चित करता है कि उद्देश्य स्पष्ट हों और उनकी उपलब्धि का मूल्यांकन किया जा सके। अस्पष्टता, केवल उच्च-स्तरीय कौशल पर ध्यान केंद्रित करना, या छात्रों को भूमिका न देना प्रभावी उद्देश्यों की विशेषताएँ नहीं हैं।"}, {"id": 19, "section": "Pedagogy", "question": "अनुदेशात्मक उद्देश्यों (Instructional Objectives) की आवश्यकता का शैक्षणिक आधार (pedagogical basis) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह छात्रों को सीखने की प्रक्रिया में निष्क्रिय (passive) भूमिका निभाने के लिए प्रोत्साहित करता है।", "यह शिक्षण-अधिगम प्रक्रिया (teaching-learning process) को व्यवस्थित (systematic) और उद्देश्यपूर्ण (purposeful) बनाता है।", "यह छात्रों के बीच प्रतिस्पर्धा (competition) को बढ़ावा देता है।", "यह केवल शिक्षकों के लिए एक कानूनी आवश्यकता (legal requirement) है।"], "answer": "यह शिक्षण-अधिगम प्रक्रिया (teaching-learning process) को व्यवस्थित (systematic) और उद्देश्यपूर्ण (purposeful) बनाता है।", "explanation": "अनुदेशात्मक उद्देश्यों (Instructional Objectives) की आवश्यकता का मुख्य शैक्षणिक आधार (pedagogical basis) यह है कि वे शिक्षण-अधिगम प्रक्रिया (teaching-learning process) को व्यवस्थित (systematic) और उद्देश्यपूर्ण (purposeful) बनाते हैं। वे शिक्षकों को अपनी गतिविधियों की योजना बनाने, छात्रों को सीखने की दिशा प्रदान करने और सीखने की प्रगति का मूल्यांकन करने में मदद करते हैं। यह एक कानूनी आवश्यकता नहीं है और न ही यह छात्रों को निष्क्रिय बनाता है या केवल प्रतिस्पर्धा को बढ़ावा देता है।"}, {"id": 20, "section": "Pedagogy", "question": "शिक्षण (Teaching) में अनुदेशात्मक उद्देश्यों (Instructional Objectives) का एक व्यावहारिक उपयोग (practical use) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों को यह स्पष्ट रूप से बताना कि वे 'वित्तीय विवरणों का विश्लेषण' कैसे करेंगे।", "शिक्षक को बिना किसी पूर्व योजना के कक्षा में प्रवेश करने की अनुमति देना।", "छात्रों को केवल शिक्षण के इतिहास (history of Education) को याद रखने के लिए प्रेरित करना।", "छात्रों को केवल सैद्धांतिक ज्ञान (theoretical knowledge) प्रदान करना, व्यावहारिक अनुप्रयोग (practical application) पर ध्यान दिए बिना।"], "answer": "छात्रों को यह स्पष्ट रूप से बताना कि वे 'वित्तीय विवरणों का विश्लेषण' कैसे करेंगे।", "explanation": "शिक्षण (Teaching) में अनुदेशात्मक उद्देश्यों (Instructional Objectives) का एक व्यावहारिक उपयोग (practical use) यह है कि वे छात्रों को स्पष्ट रूप से बताते हैं कि उनसे क्या अपेक्षित है, जैसे 'वित्तीय विवरणों का विश्लेषण' कैसे करना है। यह छात्रों को सीखने की प्रक्रिया में सक्रिय रूप से शामिल होने और विशिष्ट कौशल विकसित करने में मदद करता है। अन्य विकल्प या तो अनुदेशात्मक उद्देश्यों के दायरे को सीमित करते हैं या उनके उद्देश्य के विपरीत हैं।"}, {"id": 21, "section": "Pedagogy", "question": "व्यवहारिक उद्देश्य (Behavioural Objectives) की सबसे सटीक परिभाषा क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह पाठ्यक्रम के अंत में प्राप्त किए जाने वाले दीर्घकालिक लक्ष्यों का एक समूह है।", "यह छात्र के सीखने के अनुभव का एक व्यापक विवरण है।", "यह एक विशिष्ट, मापने योग्य, प्राप्त करने योग्य, प्रासंगिक और समय-बद्ध (SMART) कथन है जो बताता है कि छात्र सीखने के बाद क्या करने में सक्षम होगा।", "यह शिक्षक के शिक्षण इरादों का एक सामान्य विवरण है।"], "answer": "यह एक विशिष्ट, मापने योग्य, प्राप्त करने योग्य, प्रासंगिक और समय-बद्ध (SMART) कथन है जो बताता है कि छात्र सीखने के बाद क्या करने में सक्षम होगा।", "explanation": "व्यवहारिक उद्देश्य (Behavioural Objectives) छात्र के सीखने के बाद के व्यवहार को विशिष्ट, मापने योग्य शब्दों में परिभाषित करते हैं। यह एक SMART (Specific, Measurable, Achievable, Relevant, Time-bound) कथन होता है जो स्पष्ट रूप से बताता है कि छात्र क्या कर पाएगा। अन्य विकल्प या तो बहुत सामान्य हैं या शिक्षक के इरादों पर केंद्रित हैं, न कि छात्र के मापने योग्य व्यवहार पर।"}, {"id": 22, "section": "Pedagogy", "question": "शिक्षा (Education) के एक शिक्षक ने 'वित्तीय विवरणों का विश्लेषण' (analysis of financial statements) विषय पढ़ाया। इस विषय के लिए एक प्रभावी अधिगम परिणाम (Learning Outcome) क्या हो सकता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्र वित्तीय विवरणों के महत्व को समझेंगे।", "छात्र वित्तीय विवरणों के बारे में जानकारी प्राप्त करेंगे।", "छात्र विभिन्न वित्तीय अनुपातों (financial ratios) का उपयोग करके एक कंपनी के वित्तीय प्रदर्शन का मूल्यांकन करने में सक्षम होंगे।", "छात्र वित्तीय विवरणों के प्रकारों को याद करेंगे।"], "answer": "छात्र विभिन्न वित्तीय अनुपातों (financial ratios) का उपयोग करके एक कंपनी के वित्तीय प्रदर्शन का मूल्यांकन करने में सक्षम होंगे।", "explanation": "एक प्रभावी अधिगम परिणाम (Learning Outcome) यह बताता है कि छात्र सीखने के बाद क्या कर पाएगा, और यह मापने योग्य होना चाहिए। 'मूल्यांकन करने में सक्षम होंगे' एक क्रियात्मक और मापने योग्य परिणाम है जो विशिष्ट कौशल को दर्शाता है। 'समझेंगे' या 'जानकारी प्राप्त करेंगे' जैसे विकल्प बहुत सामान्य और मापने में कठिन हैं, जबकि 'याद करेंगे' केवल निम्न-स्तरीय संज्ञानात्मक कौशल (cognitive skill) को दर्शाता है।"}, {"id": 23, "section": "Pedagogy", "question": "व्यवहारिक उद्देश्यों (Behavioural Objectives) के संबंध में निम्नलिखित में से कौन सा कथन सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वे सीखने की प्रक्रिया के अंत में अपेक्षित व्यवहार का वर्णन करते हैं।", "वे छात्र-केंद्रित (student-centered) होते हैं।", "वे अस्पष्ट और सामान्य (vague and general) होते हैं।", "वे मापने योग्य (measurable) होते हैं।"], "answer": "वे अस्पष्ट और सामान्य (vague and general) होते हैं।", "explanation": "व्यवहारिक उद्देश्य (Behavioural Objectives) की एक प्रमुख विशेषता यह है कि वे विशिष्ट (specific) और मापने योग्य (measurable) होते हैं, न कि अस्पष्ट और सामान्य। वे स्पष्ट रूप से बताते हैं कि छात्र सीखने के बाद क्या कर पाएगा। अन्य सभी कथन व्यवहारिक उद्देश्यों की सही विशेषताओं का वर्णन करते हैं, जैसे छात्र-केंद्रित होना और अपेक्षित व्यवहार का वर्णन करना।"}, {"id": 24, "section": "Pedagogy", "question": "शिक्षा शिक्षा में, निम्नलिखित में से कौन सा एक अच्छी तरह से तैयार किया गया व्यवहारिक उद्देश्य (well-formulated behavioural objective) का उदाहरण नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्र शेयर बाजार (stock market) की जटिलताओं को समझेंगे।", "छात्र 'मांग के नियम' (Law of Demand) को परिभाषित करने में सक्षम होंगे।", "छात्र एक साधारण लाभ और हानि खाते (profit and loss account) को तैयार कर पाएंगे।", "छात्र विभिन्न प्रकार के व्यावसायिक संगठनों (business organizations) के बीच अंतर कर पाएंगे।"], "answer": "छात्र शेयर बाजार (stock market) की जटिलताओं को समझेंगे।", "explanation": "एक अच्छी तरह से तैयार किया गया व्यवहारिक उद्देश्य (Behavioural Objective) मापने योग्य क्रियात्मक क्रिया (observable action verb) का उपयोग करता है। 'समझेंगे' एक आंतरिक मानसिक प्रक्रिया है जिसे सीधे मापा नहीं जा सकता और यह अस्पष्ट है। इसके विपरीत, 'परिभाषित करना', 'अंतर करना' और 'तैयार करना' सभी मापने योग्य क्रियाएं हैं जो स्पष्ट रूप से बताती हैं कि छात्र क्या करने में सक्षम होगा।"}, {"id": 25, "section": "Pedagogy", "question": "व्यवहारिक उद्देश्यों (Behavioural Objectives) और अधिगम परिणामों (Learning Outcomes) के बीच मुख्य अंतर क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["व्यवहारिक उद्देश्य केवल संज्ञानात्मक डोमेन (cognitive domain) से संबंधित होते हैं, जबकि अधिगम परिणाम सभी डोमेन को कवर करते हैं।", "व्यवहारिक उद्देश्य व्यापक होते हैं जबकि अधिगम परिणाम विशिष्ट होते हैं।", "व्यवहारिक उद्देश्य शिक्षक-केंद्रित होते हैं जबकि अधिगम परिणाम छात्र-केंद्रित होते हैं।", "व्यवहारिक उद्देश्य विशिष्ट, मापने योग्य छात्र व्यवहार पर ध्यान केंद्रित करते हैं, जबकि अधिगम परिणाम व्यापक ज्ञान, कौशल और दृष्टिकोण पर केंद्रित होते हैं।"], "answer": "व्यवहारिक उद्देश्य विशिष्ट, मापने योग्य छात्र व्यवहार पर ध्यान केंद्रित करते हैं, जबकि अधिगम परिणाम व्यापक ज्ञान, कौशल और दृष्टिकोण पर केंद्रित होते हैं।", "explanation": "व्यवहारिक उद्देश्य (Behavioural Objectives) बहुत विशिष्ट और मापने योग्य होते हैं, जो सीधे छात्र के अवलोकन योग्य व्यवहार से संबंधित होते हैं। इसके विपरीत, अधिगम परिणाम (Learning Outcomes) थोड़े व्यापक होते हैं और ज्ञान, कौशल और दृष्टिकोण (knowledge, skills, and attitudes) के बड़े सेट का वर्णन करते हैं जो छात्र एक कोर्स या कार्यक्रम के अंत में प्राप्त करेंगे। वे एक-दूसरे के पूरक हैं, लेकिन उनका दायरा अलग है।"}, {"id": 26, "section": "Pedagogy", "question": "व्यवहारिक उद्देश्यों (Behavioural Objectives) का स्पष्ट रूप से उल्लेख करना मूल्यांकन (assessment) प्रक्रिया को कैसे प्रभावित करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह छात्रों को मूल्यांकन से बचने में मदद करता है।", "यह शिक्षक को किसी भी चीज़ का मूल्यांकन करने की अनुमति देता है।", "यह मूल्यांकन को अधिक व्यक्तिपरक (subjective) बनाता है।", "यह मूल्यांकन के लिए स्पष्ट मानदंड (clear criteria) प्रदान करता है।"], "answer": "यह मूल्यांकन के लिए स्पष्ट मानदंड (clear criteria) प्रदान करता है।", "explanation": "व्यवहारिक उद्देश्यों (Behavioural Objectives) को स्पष्ट रूप से परिभाषित करने से मूल्यांकन (assessment) के लिए स्पष्ट मानदंड (clear criteria) स्थापित होते हैं। जब उद्देश्य विशिष्ट और मापने योग्य होते हैं, तो शिक्षक आसानी से यह निर्धारित कर सकते हैं कि छात्र ने अपेक्षित कौशल या ज्ञान प्राप्त किया है या नहीं। यह मूल्यांकन को अधिक वस्तुनिष्ठ (objective) और निष्पक्ष बनाता है, न कि व्यक्तिपरक।"}, {"id": 27, "section": "Pedagogy", "question": "अभिकथन (A): व्यवहारिक उद्देश्य (Behavioural Objectives) हमेशा छात्र के अवलोकन योग्य (observable) और मापने योग्य (measurable) व्यवहार पर केंद्रित होते हैं।\nकारण (R): ये उद्देश्य शिक्षकों को यह निर्धारित करने में मदद करते हैं कि शिक्षण के बाद छात्र क्या करने में सक्षम होगा।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A असत्य है, लेकिन R सत्य है।", "A सत्य है, लेकिन R असत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि व्यवहारिक उद्देश्यों का मूल सिद्धांत छात्र के अवलोकन योग्य और मापने योग्य व्यवहार पर ध्यान केंद्रित करना है। कारण (R) भी सही है क्योंकि इन उद्देश्यों का प्राथमिक कार्य शिक्षकों को यह स्पष्ट रूप से बताना है कि शिक्षण के बाद छात्र से क्या अपेक्षित है, यानी वे क्या करने में सक्षम होंगे। इस प्रकार, कारण अभिकथन की सही व्याख्या करता है।"}, {"id": 28, "section": "Pedagogy", "question": "अभिकथन (A): शिक्षा शिक्षक को अपनी पाठ योजना (lesson plan) में अधिगम परिणामों (Learning Outcomes) को स्पष्ट रूप से शामिल करना चाहिए।\nकारण (R): अधिगम परिणाम छात्रों को यह समझने में मदद करते हैं कि उनसे क्या सीखने की उम्मीद की जाती है और वे अपनी सीखने की प्रक्रिया को निर्देशित कर सकते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A सत्य है, लेकिन R असत्य है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि अधिगम परिणामों को पाठ योजना में शामिल करना एक अच्छी शैक्षणिक प्रथा है। कारण (R) भी सही है क्योंकि अधिगम परिणाम छात्रों को सीखने के लक्ष्यों के बारे में स्पष्टता प्रदान करते हैं, जिससे वे अपनी सीखने की प्रक्रिया को अधिक प्रभावी ढंग से निर्देशित कर पाते हैं। इस प्रकार, कारण अभिकथन की सही व्याख्या करता है, क्योंकि स्पष्ट अधिगम परिणाम छात्रों को सशक्त बनाते हैं।"}, {"id": 29, "section": "Pedagogy", "question": "एक प्रभावी व्यवहारिक उद्देश्य (effective behavioural objective) के लिए निम्नलिखित में से कौन सी विशेषताएँ आवश्यक हैं?\nJ: यह छात्र के प्रदर्शन (performance) का वर्णन करता है।\nK: इसमें प्रदर्शन की स्थिति (conditions of performance) शामिल होती है।\nL: इसमें प्रदर्शन के लिए स्वीकार्य मानदंड (acceptable criteria) शामिल होते हैं।\nM: यह शिक्षक के शिक्षण दृष्टिकोण (teaching approach) पर केंद्रित होता है।\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल J, K और L", "केवल J, L और M", "केवल K, L और M"], "answer": "केवल J, K और L", "explanation": "एक प्रभावी व्यवहारिक उद्देश्य (effective behavioural objective) में तीन मुख्य घटक होते हैं: प्रदर्शन (Performance) - छात्र क्या करेगा (J), स्थिति (Condition) - किन परिस्थितियों में करेगा (K), और मानदंड (Criterion) - कितना अच्छा करेगा (L)। विकल्प M गलत है क्योंकि व्यवहारिक उद्देश्य छात्र-केंद्रित होते हैं, न कि शिक्षक के शिक्षण दृष्टिकोण पर केंद्रित।"}, {"id": 30, "section": "Pedagogy", "question": "निम्नलिखित में से कौन से कथन अधिगम परिणामों (Learning Outcomes) के लेखन में सामान्य त्रुटियों (common errors) को दर्शाते हैं?\nJ: 'छात्रों को पता चलेगा कि...' जैसे अस्पष्ट क्रियापदों (vague verbs) का उपयोग करना।\nK: एक ही अधिगम परिणाम में कई सीखने के पहलुओं (multiple learning aspects) को शामिल करना।\nL: छात्र के बजाय शिक्षक के इरादों (teacher's intentions) पर ध्यान केंद्रित करना।\nM: अधिगम परिणामों को मापने योग्य (measurable) बनाना।\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और L", "केवल J, L और M", "केवल K, L और M", "केवल J और K"], "answer": "केवल J, K और L", "explanation": "अधिगम परिणामों (Learning Outcomes) के लेखन में सामान्य त्रुटियों में अस्पष्ट क्रियापदों (जैसे 'पता चलेगा', 'समझेंगे') का उपयोग करना (J), एक ही परिणाम में बहुत अधिक जानकारी या कई पहलुओं को शामिल करना (K), और छात्र के सीखने के बजाय शिक्षक के इरादों पर ध्यान केंद्रित करना (L) शामिल है। विकल्प M गलत है क्योंकि अधिगम परिणामों को मापने योग्य बनाना एक अच्छी प्रथा है, त्रुटि नहीं।"}, {"id": 31, "section": "Pedagogy", "question": "ब्लूम के वर्गीकरण (Bloom's Taxonomy) के अनुसार, निम्नलिखित में से कौन से अधिगम परिणाम (Learning Outcomes) 'विश्लेषण' (Analysis) स्तर के अंतर्गत आते हैं?\nJ: छात्र विभिन्न प्रकार के निवेश विकल्पों (investment options) की पहचान कर पाएंगे।\nK: छात्र किसी कंपनी के वित्तीय विवरणों (financial statements) में विसंगतियों (discrepancies) का पता लगा पाएंगे।\nL: छात्र एक व्यावसायिक समस्या (business problem) के लिए सबसे उपयुक्त समाधान (solution) का प्रस्ताव कर पाएंगे।\nM: छात्र दो अलग-अलग बाजार संरचनाओं (market structures) के बीच तुलना और अंतर कर पाएंगे।\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और L", "केवल J और K", "केवल K, L और M", "केवल K और M"], "answer": "केवल K और M", "explanation": "ब्लूम के वर्गीकरण (Bloom's Taxonomy) में 'विश्लेषण' (Analysis) स्तर में जानकारी को उसके घटकों में तोड़ना और उनके बीच संबंधों को समझना शामिल है। 'विसंगतियों का पता लगाना' (K) और 'तुलना और अंतर करना' (M) विश्लेषण कौशल के उदाहरण हैं। 'पहचान करना' (J) 'ज्ञान' (Knowledge) या 'समझ' (Comprehension) स्तर पर है, जबकि 'प्रस्ताव करना' (L) 'मूल्यांकन' (Evaluation) या 'निर्माण' (Creation) स्तर पर हो सकता है।"}, {"id": 32, "section": "Pedagogy", "question": "शिक्षा (Education) में प्रभावी अधिगम परिणामों (Effective Learning Outcomes) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: अधिगम परिणामों को छात्रों के लिए स्पष्ट रूप से समझने योग्य (clearly understandable) और मापने योग्य (measurable) होना चाहिए।\nK: वे मुख्य रूप से शिक्षक की शिक्षण विधियों (teaching methods) और सामग्री के कवरेज (content coverage) पर केंद्रित होते हैं।\nL: अधिगम परिणाम छात्रों को यह समझने में मदद करते हैं कि उनसे क्या अपेक्षित है, जिससे उनकी प्रेरणा (motivation) बढ़ती है।\nM: ब्लूम के वर्गीकरण (Bloom's Taxonomy) के उच्च-स्तरीय संज्ञानात्मक कौशल (higher-order cognitive skills) जैसे विश्लेषण (analysis) और मूल्यांकन (evaluation) को अधिगम परिणामों में शामिल किया जाना चाहिए।\nउपरोक्त कथनों में से कौन से सही हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M", "केवल J, L और M", "केवल J, K और L", "केवल K, L और M"], "answer": "केवल J, L और M", "explanation": "कथन J सही है क्योंकि प्रभावी अधिगम परिणाम स्पष्ट और मापने योग्य होने चाहिए ताकि छात्र और शिक्षक दोनों ही अपेक्षाओं को समझ सकें।\nकथन K गलत है क्योंकि अधिगम परिणाम छात्र के प्रदर्शन और सीखने पर केंद्रित होते हैं, न कि मुख्य रूप से शिक्षक की शिक्षण विधियों या सामग्री कवरेज पर।\nकथन L सही है क्योंकि स्पष्ट अधिगम परिणाम छात्रों को सीखने की प्रक्रिया में दिशा प्रदान करते हैं और उनकी प्रेरणा को बढ़ाते हैं।\nकथन M सही है क्योंकि शिक्षा में छात्रों को वास्तविक दुनिया की समस्याओं को हल करने के लिए तैयार करने हेतु ब्लूम के वर्गीकरण के उच्च-स्तरीय संज्ञानात्मक कौशल (जैसे विश्लेषण, मूल्यांकन और सृजन) को अधिगम परिणामों में शामिल करना महत्वपूर्ण है।"}, {"id": 33, "section": "Pedagogy", "question": "निम्नलिखित को सुमेलित करें (Match the following):\nसूची-I\nJ: क्रियात्मक क्रिया (Action Verb)\nK: स्थिति (Condition)\nL: मानदंड (Criterion)\nM: विषय वस्तु (Subject Matter)\nसूची-II\n1. वह ज्ञान या कौशल जिसे सीखा जाना है।\n2. वह मानक जिसके द्वारा प्रदर्शन का मूल्यांकन किया जाएगा।\n3. वह क्रिया जो छात्र द्वारा की जाएगी।\n4. वे परिस्थितियाँ जिनके तहत प्रदर्शन होगा।\nसही मिलान चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-1, L-4, M-2", "J-2, K-4, L-3, M-1", "J-3, K-4, L-2, M-1", "J-4, K-3, L-1, M-2"], "answer": "J-3, K-4, L-2, M-1", "explanation": "व्यवहारिक उद्देश्य (Behavioural Objective) के घटकों का सही मिलान इस प्रकार है: क्रियात्मक क्रिया (Action Verb) वह क्रिया है जो छात्र द्वारा की जाएगी (J-3)। स्थिति (Condition) वे परिस्थितियाँ हैं जिनके तहत प्रदर्शन होगा (K-4)। मानदंड (Criterion) वह मानक है जिसके द्वारा प्रदर्शन का मूल्यांकन किया जाएगा (L-2)। विषय वस्तु (Subject Matter) वह ज्ञान या कौशल है जिसे सीखा जाना है (M-1)।"}, {"id": 34, "section": "Pedagogy", "question": "पाठ्यक्रम (Curriculum) में अधिगम परिणामों (Learning Outcomes) को प्रभावी ढंग से एकीकृत (integrate) करने की प्रक्रिया के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: अधिगम परिणामों को पाठ्यक्रम के व्यापक उद्देश्यों (broader curriculum objectives) और संस्थागत मिशन (institutional mission) के साथ संरेखित करना।\nK: प्रत्येक अधिगम परिणाम के लिए विशिष्ट, मापने योग्य प्रदर्शन संकेतक (performance indicators) विकसित करना।\nL: अधिगम परिणामों की उपलब्धि का आकलन करने के लिए उपयुक्त मूल्यांकन उपकरणों (assessment tools) और विधियों (methods) को डिजाइन करना।\nM: अधिगम परिणामों को प्राप्त करने के लिए उपयुक्त शिक्षण-अधिगम रणनीतियों (teaching-learning strategies) और गतिविधियों का चयन करना।\nसही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "K, J, M, L", "J, K, M, L", "J, M, K, L"], "answer": "J, K, L, M", "explanation": "पाठ्यक्रम में अधिगम परिणामों को प्रभावी ढंग से एकीकृत करने की प्रक्रिया का सही कालानुक्रमिक क्रम इस प्रकार है:\n1. J. अधिगम परिणामों को पाठ्यक्रम के व्यापक उद्देश्यों और संस्थागत मिशन के साथ संरेखित करना: यह पहला और सबसे महत्वपूर्ण कदम है, जहां यह सुनिश्चित किया जाता है कि अधिगम परिणाम बड़े शैक्षिक लक्ष्यों के अनुरूप हों।\n2. K. प्रत्येक अधिगम परिणाम के लिए विशिष्ट, मापने योग्य प्रदर्शन संकेतक विकसित करना: एक बार जब परिणाम संरेखित हो जाते हैं, तो यह परिभाषित करना आवश्यक है कि छात्रों के प्रदर्शन को कैसे मापा जाएगा।\n3. L. अधिगम परिणामों की उपलब्धि का आकलन करने के लिए उपयुक्त मूल्यांकन उपकरणों और विधियों को डिजाइन करना: अधिगम परिणामों और उनके प्रदर्शन संकेतकों को परिभाषित करने के बाद, यह तय किया जाता है कि इन परिणामों को कैसे मापा जाएगा। यह शिक्षण रणनीतियों की योजना बनाने से पहले या उसके समानांतर किया जाता है ताकि मूल्यांकन सीखने के उद्देश्यों के साथ संरेखित हो।\n4. M. अधिगम परिणामों को प्राप्त करने के लिए उपयुक्त शिक्षण-अधिगम रणनीतियों और गतिविधियों का चयन करना: अंत में, उन शिक्षण-अधिगम रणनीतियों और गतिविधियों का चयन किया जाता है जो छात्रों को अपेक्षित अधिगम परिणामों को प्राप्त करने में मदद करेंगी, मूल्यांकन योजना को ध्यान में रखते हुए। यह क्रम 'पिछड़े डिजाइन' (Backward Design) सिद्धांत के अनुरूप है।"}, {"id": 35, "section": "Pedagogy", "question": "शिक्षा शिक्षा में व्यवहारिक उद्देश्यों (Behavioural Objectives) का उपयोग करने का प्राथमिक शैक्षणिक लाभ (pedagogical advantage) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह छात्रों को परीक्षा में नकल करने में मदद करता है।", "यह शिक्षक को कम तैयारी करने की अनुमति देता है।", "यह शिक्षण-अधिगम प्रक्रिया को अधिक केंद्रित और उद्देश्यपूर्ण बनाता है।", "यह पाठ्यक्रम को अधिक लचीला (flexible) बनाता है।"], "answer": "यह शिक्षण-अधिगम प्रक्रिया को अधिक केंद्रित और उद्देश्यपूर्ण बनाता है।", "explanation": "व्यवहारिक उद्देश्यों (Behavioural Objectives) का प्राथमिक शैक्षणिक लाभ यह है कि वे शिक्षण-अधिगम प्रक्रिया को स्पष्ट दिशा और उद्देश्य प्रदान करते हैं। जब उद्देश्य स्पष्ट होते हैं, तो शिक्षक और छात्र दोनों जानते हैं कि क्या हासिल करना है, जिससे शिक्षण अधिक केंद्रित और प्रभावी होता है। यह शिक्षक की तैयारी को कम नहीं करता और न ही नकल को बढ़ावा देता है, और यह पाठ्यक्रम को लचीला बनाने के बजाय उसे संरचित करता है।"}, {"id": 36, "section": "Pedagogy", "question": "एक शिक्षा शिक्षक ने एक अधिगम परिणाम (Learning Outcome) लिखा: 'छात्रों को पता चलेगा कि व्यवसाय कैसे काम करता है।' इस अधिगम परिणाम में क्या कमी है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह छात्र-केंद्रित (student-centered) नहीं है।", "यह मापने योग्य (measurable) नहीं है।", "यह बहुत चुनौतीपूर्ण (challenging) है।", "यह बहुत विशिष्ट (specific) है।"], "answer": "यह मापने योग्य (measurable) नहीं है।", "explanation": "अधिगम परिणाम (Learning Outcome) को मापने योग्य होना चाहिए। 'पता चलेगा' एक अस्पष्ट क्रियापद (vague verb) है जिसे सीधे मापा नहीं जा सकता। यह स्पष्ट नहीं करता कि छात्र 'जानने' के बाद क्या करने में सक्षम होगा। एक बेहतर अधिगम परिणाम 'छात्र विभिन्न व्यावसायिक कार्यों (business functions) की व्याख्या कर पाएंगे' जैसा कुछ हो सकता है, जो मापने योग्य है।"}, {"id": 37, "section": "Pedagogy", "question": "ब्लूम के वर्गीकरण (Bloom's Taxonomy) के किस स्तर पर 'छात्र एक कंपनी के वित्तीय प्रदर्शन (financial performance) का मूल्यांकन करने के लिए विभिन्न अनुपातों (ratios) का उपयोग कर पाएंगे' जैसा अधिगम परिणाम (Learning Outcome) आता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["मूल्यांकन (Evaluation)", "समझ (Comprehension)", "ज्ञान (Knowledge)", "अनुप्रयोग (Application)"], "answer": "मूल्यांकन (Evaluation)", "explanation": "ब्लूम के वर्गीकरण (Bloom's Taxonomy) में 'मूल्यांकन' (Evaluation) स्तर में निर्णय लेना, आलोचना करना या किसी चीज़ के मूल्य का आकलन करना शामिल है। 'वित्तीय प्रदर्शन का मूल्यांकन करने के लिए अनुपातों का उपयोग करना' इस स्तर पर आता है क्योंकि इसमें जानकारी का विश्लेषण करना और फिर उसके आधार पर निर्णय या आकलन करना शामिल है। 'अनुप्रयोग' (Application) में केवल नियमों या विधियों का उपयोग करना शामिल होता है, जबकि 'मूल्यांकन' में एक कदम आगे बढ़कर निर्णय लेना होता है।"}, {"id": 38, "section": "Pedagogy", "question": "एक शिक्षक द्वारा स्पष्ट अधिगम परिणामों (clear Learning Outcomes) का उपयोग करने से छात्रों की सीखने की प्रक्रिया पर क्या सकारात्मक प्रभाव पड़ता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह छात्रों को कम मेहनत करने के लिए प्रोत्साहित करता है।", "यह छात्रों को शिक्षक पर पूरी तरह निर्भर रहने के लिए प्रेरित करता है।", "यह छात्रों को केवल रटने (rote learning) पर ध्यान केंद्रित करने के लिए प्रेरित करता है।", "यह छात्रों को सीखने के लक्ष्यों को समझने और अपनी प्रगति को ट्रैक करने में मदद करता है।"], "answer": "यह छात्रों को सीखने के लक्ष्यों को समझने और अपनी प्रगति को ट्रैक करने में मदद करता है।", "explanation": "स्पष्ट अधिगम परिणाम (clear Learning Outcomes) छात्रों को यह समझने में मदद करते हैं कि उनसे क्या सीखने की उम्मीद की जाती है, जिससे वे अपने सीखने के लक्ष्यों को जान पाते हैं और अपनी प्रगति को ट्रैक कर सकते हैं। यह उन्हें अपनी सीखने की प्रक्रिया में अधिक सक्रिय और जिम्मेदार बनाता है। यह उन्हें कम मेहनत करने, केवल रटने या शिक्षक पर निर्भर रहने के लिए प्रोत्साहित नहीं करता है।"}, {"id": 39, "section": "Pedagogy", "question": "व्यवहारिक उद्देश्यों (Behavioural Objectives) को तैयार करते समय 'SMART' मानदंड में 'A' का क्या अर्थ है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अनुकूलनीय (Adaptable)", "विश्लेषणात्मक (Analytical)", "सक्रिय (Active)", "प्राप्त करने योग्य (Achievable)"], "answer": "प्राप्त करने योग्य (Achievable)", "explanation": "व्यवहारिक उद्देश्यों (Behavioural Objectives) को तैयार करते समय 'SMART' एक संक्षिप्त रूप (acronym) है जिसका अर्थ है Specific (विशिष्ट), Measurable (मापने योग्य), Achievable (प्राप्त करने योग्य), Relevant (प्रासंगिक), और Time-bound (समय-बद्ध)। इसलिए, 'A' का अर्थ 'प्राप्त करने योग्य' (Achievable) है।"}, {"id": 40, "section": "Pedagogy", "question": "एक शिक्षा शिक्षक 'केस स्टडी' (case study) विधि का उपयोग कर रहा है। इस विधि के लिए सबसे उपयुक्त अधिगम परिणाम (Learning Outcome) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्र केस स्टडी के बारे में जानकारी एकत्र करेंगे।", "छात्र केस स्टडी में प्रस्तुत व्यावसायिक समस्याओं (business problems) का विश्लेषण और समाधान कर पाएंगे।", "छात्र केस स्टडी के विभिन्न प्रकारों को सूचीबद्ध करेंगे।", "छात्र केस स्टडी के महत्व को याद करेंगे।"], "answer": "छात्र केस स्टडी में प्रस्तुत व्यावसायिक समस्याओं (business problems) का विश्लेषण और समाधान कर पाएंगे।", "explanation": "केस स्टडी (case study) विधि का उद्देश्य छात्रों को वास्तविक दुनिया की व्यावसायिक समस्याओं का विश्लेषण करने और समाधान खोजने के लिए प्रोत्साहित करना है। इसलिए, 'विश्लेषण और समाधान कर पाएंगे' एक उच्च-स्तरीय संज्ञानात्मक कौशल (cognitive skill) और एक उपयुक्त अधिगम परिणाम है जो केस स्टडी विधि के उद्देश्य के अनुरूप है। अन्य विकल्प केवल निम्न-स्तरीय कौशल (जैसे याद करना, सूचीबद्ध करना, जानकारी एकत्र करना) को दर्शाते हैं।"}, {"id": 41, "section": "Pedagogy", "question": "ब्लूम के संशोधित वर्गीकरण (Revised Bloom's Taxonomy) में 'याद रखना (Remembering)' स्तर का प्राथमिक उद्देश्य क्या है, विशेषकर शिक्षा के संदर्भ में?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विभिन्न विचारों के बीच संबंध स्थापित करना।", "जटिल समस्याओं का विश्लेषण करना।", "बुनियादी तथ्यों और अवधारणाओं को पुनः प्राप्त करना।", "नई अवधारणाओं का निर्माण करना।"], "answer": "बुनियादी तथ्यों और अवधारणाओं को पुनः प्राप्त करना।", "explanation": "ब्लूम के संशोधित वर्गीकरण में 'याद रखना (Remembering)' संज्ञानात्मक क्षेत्र का सबसे निचला स्तर है। इसका प्राथमिक उद्देश्य छात्रों को बुनियादी तथ्यों, शब्दावली, परिभाषाओं और अवधारणाओं को पहचानना या पुनः प्राप्त करना (recall) है। शिक्षा में, इसमें 'मांग के नियम' की परिभाषा याद रखना या 'बैलेंस शीट' के घटकों को पहचानना शामिल हो सकता है। अन्य विकल्प उच्च-स्तरीय संज्ञानात्मक प्रक्रियाओं से संबंधित हैं।"}, {"id": 42, "section": "Pedagogy", "question": "एक शिक्षक छात्रों से 'मांग के नियम (Law of Demand)' को अपने शब्दों में समझाने के लिए कहता है। ब्लूम के वर्गीकरण के अनुसार, यह किस संज्ञानात्मक स्तर को दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अनुप्रयोग (Application)", "ज्ञान (Knowledge)", "बोध (Comprehension)", "विश्लेषण (Analysis)"], "answer": "बोध (Comprehension)", "explanation": "जब छात्र किसी अवधारणा को अपने शब्दों में समझाते हैं, तो वे केवल उसे याद नहीं कर रहे होते, बल्कि उसकी समझ (understanding) प्रदर्शित कर रहे होते हैं। 'बोध (Comprehension)' स्तर में जानकारी की व्याख्या करना, सारांशित करना और अनुवाद करना शामिल है। 'ज्ञान (Knowledge)' केवल याद रखने से संबंधित है, जबकि 'अनुप्रयोग (Application)' और 'विश्लेषण (Analysis)' उच्च-स्तरीय कौशल हैं।"}, {"id": 43, "section": "Pedagogy", "question": "ब्लूम के संशोधित वर्गीकरण (Revised Bloom's Taxonomy) के 'ज्ञान के आयाम (Knowledge Dimensions)' में निम्नलिखित में से कौन सा शामिल नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्रक्रियात्मक ज्ञान (Procedural Knowledge)", "संश्लेषण ज्ञान (Synthesis Knowledge)", "वैचारिक ज्ञान (Conceptual Knowledge)", "तथ्यात्मक ज्ञान (Factual Knowledge)"], "answer": "संश्लेषण ज्ञान (Synthesis Knowledge)", "explanation": "ब्लूम के संशोधित वर्गीकरण में ज्ञान के चार आयाम (Knowledge Dimensions) हैं: तथ्यात्मक ज्ञान (Factual Knowledge), वैचारिक ज्ञान (Conceptual Knowledge), प्रक्रियात्मक ज्ञान (Procedural Knowledge) और मेटाकॉग्निटिव ज्ञान (Metacognitive Knowledge)। 'संश्लेषण (Synthesis)' ब्लूम के मूल वर्गीकरण में एक संज्ञानात्मक प्रक्रिया थी, जिसे संशोधित वर्गीकरण में 'निर्माण (Creating)' द्वारा प्रतिस्थापित किया गया है, और यह ज्ञान का आयाम नहीं है।"}, {"id": 44, "section": "Pedagogy", "question": "एक छात्र को 'दोहरी प्रविष्टि प्रणाली (Double Entry System)' के सिद्धांतों को याद करने के लिए कहा जाता है। यह ब्लूम के वर्गीकरण के किस स्तर पर आता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["ज्ञान (Knowledge)", "बोध (Comprehension)", "अनुप्रयोग (Application)", "विश्लेषण (Analysis)"], "answer": "ज्ञान (Knowledge)", "explanation": "किसी सिद्धांत को 'याद करना' या 'स्मरण करना' ब्लूम के वर्गीकरण के 'ज्ञान (Knowledge)' स्तर से संबंधित है। इस स्तर पर छात्र केवल जानकारी को पुनः प्राप्त करते हैं। 'बोध (Comprehension)' में जानकारी को समझना और उसकी व्याख्या करना शामिल है, जबकि 'अनुप्रयोग (Application)' में नई स्थितियों में ज्ञान का उपयोग करना शामिल है।"}, {"id": 45, "section": "Pedagogy", "question": "निम्नलिखित में से कौन सा कथन ब्लूम के वर्गीकरण के 'बोध (Comprehension)' स्तर का सबसे अच्छा वर्णन करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्र किसी अवधारणा के विभिन्न घटकों को अलग कर सकता है।", "छात्र किसी जानकारी की सटीकता या मूल्य का न्याय कर सकता है।", "छात्र किसी नई स्थिति में सीखे गए सिद्धांत का उपयोग कर सकता है।", "छात्र जानकारी को अपने शब्दों में समझा सकता है या उसका सारांश प्रस्तुत कर सकता है।"], "answer": "छात्र जानकारी को अपने शब्दों में समझा सकता है या उसका सारांश प्रस्तुत कर सकता है।", "explanation": "'बोध (Comprehension)' स्तर में जानकारी को समझना और उसकी व्याख्या करना शामिल है, जिसका अर्थ है कि छात्र उसे अपने शब्दों में समझा सकते हैं या उसका सारांश प्रस्तुत कर सकते हैं। अन्य विकल्प उच्च-स्तरीय संज्ञानात्मक कौशल जैसे 'विश्लेषण (Analysis)', 'अनुप्रयोग (Application)' और 'मूल्यांकन (Evaluation)' से संबंधित हैं।"}, {"id": 46, "section": "Pedagogy", "question": "एक शिक्षक छात्रों को विभिन्न प्रकार के व्यावसायिक संगठनों (जैसे एकल स्वामित्व, साझेदारी, कंपनी) के फायदे और नुकसान की तुलना करने के लिए एक कार्य देता है। ब्लूम के वर्गीकरण के अनुसार, यह कार्य मुख्य रूप से किस स्तर पर केंद्रित है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["ज्ञान (Knowledge)", "संश्लेषण (Synthesis)", "अनुप्रयोग (Application)", "विश्लेषण (Analysis)"], "answer": "विश्लेषण (Analysis)", "explanation": "विभिन्न व्यावसायिक संगठनों के फायदे और नुकसान की तुलना करना और उनके बीच अंतर करना 'विश्लेषण (Analysis)' स्तर का एक प्रमुख कार्य है। इस स्तर पर छात्र जानकारी को उसके घटकों में तोड़ते हैं और उनके बीच संबंधों को पहचानते हैं। 'ज्ञान (Knowledge)' केवल याद रखने से संबंधित है, 'अनुप्रयोग (Application)' में ज्ञान का उपयोग करना शामिल है, और 'संश्लेषण (Synthesis)' में नए विचारों का निर्माण शामिल है।"}, {"id": 47, "section": "Pedagogy", "question": "अभिकथन (A): ब्लूम के वर्गीकरण में 'ज्ञान (Knowledge)' सबसे निचला संज्ञानात्मक स्तर है।\nकारण (R): इस स्तर पर छात्र केवल तथ्यों और अवधारणाओं को याद करते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A सत्य है, लेकिन R असत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "ब्लूम के मूल वर्गीकरण में 'ज्ञान (Knowledge)' वास्तव में सबसे निचला संज्ञानात्मक स्तर है। इसका मुख्य कारण यह है कि इस स्तर पर छात्रों से केवल जानकारी, तथ्यों और अवधारणाओं को याद रखने की अपेक्षा की जाती है, जो कि कारण (R) में सही ढंग से बताया गया है। इसलिए, कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 48, "section": "Pedagogy", "question": "अभिकथन (A): एक शिक्षक को छात्रों को वास्तविक जीवन की व्यावसायिक समस्याओं को हल करने के लिए केस स्टडी (case studies) का उपयोग करने के लिए प्रोत्साहित करना चाहिए।\nकारण (R): यह छात्रों को ब्लूम के वर्गीकरण के 'अनुप्रयोग (Application)' स्तर पर अपने ज्ञान का उपयोग करने में मदद करता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A सत्य है, लेकिन R असत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A असत्य है, लेकिन R सत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "केस स्टडीज छात्रों को सैद्धांतिक ज्ञान को वास्तविक जीवन की स्थितियों में लागू करने का अवसर प्रदान करती हैं, जो 'अनुप्रयोग (Application)' स्तर की विशेषता है। इसलिए, अभिकथन (A) सही है कि शिक्षकों को केस स्टडीज का उपयोग करने के लिए प्रोत्साहित करना चाहिए, और कारण (R) इस अभ्यास के पीछे के शैक्षणिक तर्क को सही ढंग से बताता है कि यह 'अनुप्रयोग' स्तर पर ज्ञान का उपयोग करने में मदद करता है।"}, {"id": 49, "section": "Pedagogy", "question": "ब्लूम के वर्गीकरण के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: मूल वर्गीकरण में 'संश्लेषण (Synthesis)' 'मूल्यांकन (Evaluation)' से ऊपर था।\nK: संशोधित वर्गीकरण में, संज्ञानात्मक प्रक्रियाओं को क्रिया-आधारित शब्दों में व्यक्त किया गया है।\nL: 'विश्लेषण (Analysis)' स्तर में जानकारी को उसके घटकों में तोड़ना शामिल है।\nM: शिक्षण में, 'लाभ और हानि खाते (Profit and Loss Account)' का निर्माण 'ज्ञान (Knowledge)' स्तर का एक उदाहरण है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और L", "केवल J, K और L", "केवल K, L और M", "केवल J और K"], "answer": "केवल J, K और L", "explanation": "कथन J सही है; मूल ब्लूम के वर्गीकरण में 'संश्लेषण' 'मूल्यांकन' से ऊपर था, लेकिन संशोधित वर्गीकरण में 'निर्माण (Creating)' 'मूल्यांकन (Evaluating)' से ऊपर है। कथन K सही है; संशोधित वर्गीकरण ने संज्ञानात्मक स्तरों को क्रिया-आधारित शब्दों (जैसे याद रखना, समझना, लागू करना, विश्लेषण करना, मूल्यांकन करना, निर्माण करना) में बदल दिया। कथन L सही है; 'विश्लेषण' स्तर में जानकारी को उसके घटकों में तोड़ना और उनके बीच संबंधों को पहचानना शामिल है। कथन M गलत है; 'लाभ और हानि खाते' का निर्माण 'अनुप्रयोग (Application)' या 'निर्माण (Creating)' स्तर का एक उदाहरण है, न कि केवल 'ज्ञान (Knowledge)' का, क्योंकि इसमें नियमों और प्रक्रियाओं को लागू करना शामिल है।"}, {"id": 50, "section": "Pedagogy", "question": "एक शिक्षक ने ब्लूम के संशोधित वर्गीकरण (Revised Bloom's Taxonomy) के आधार पर निम्नलिखित शिक्षण उद्देश्यों को तैयार किया है। इनमें से कौन से उद्देश्य 'विश्लेषण (Analyzing)' स्तर से संबंधित हैं?\nJ: छात्र विभिन्न प्रकार के वित्तीय विवरणों (financial statements) के बीच अंतर कर सकेंगे।\nK: छात्र किसी कंपनी के वित्तीय प्रदर्शन पर आर्थिक नीतियों (economic policies) के प्रभाव की व्याख्या कर सकेंगे।\nL: छात्र एक व्यवसाय के लिए एक नया बजट मॉडल (budget model) विकसित कर सकेंगे।\nM: छात्र 'मांग के नियम (Law of Demand)' की परिभाषा बता सकेंगे।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल J, K और L", "केवल K और L", "केवल J, L और M"], "answer": "केवल J और K", "explanation": "ब्लूम के संशोधित वर्गीकरण में 'विश्लेषण (Analyzing)' स्तर में जानकारी को उसके घटकों में तोड़ना और उनके बीच संबंधों को समझना शामिल है।\nJ. 'अंतर कर सकेंगे' (differentiate) - यह विश्लेषण का एक कार्य है, जहाँ छात्र विभिन्न वित्तीय विवरणों की विशेषताओं को अलग करते हैं।\nK. 'प्रभाव की व्याख्या कर सकेंगे' (explain the impact) - इसमें आर्थिक नीतियों और वित्तीय प्रदर्शन के बीच कारण-और-प्रभाव संबंधों का विश्लेषण करना शामिल है।\nL. 'नया बजट मॉडल विकसित कर सकेंगे' (develop a new budget model) - यह 'निर्माण (Creating)' स्तर का उद्देश्य है, जो उच्चतम स्तर है।\nM. 'परिभाषा बता सकेंगे' (state the definition) - यह 'याद रखना (Remembering)' स्तर का उद्देश्य है, जो सबसे निचला स्तर है।\nइसलिए, केवल J और K 'विश्लेषण' स्तर से संबंधित हैं।"}, {"id": 51, "section": "Pedagogy", "question": "निम्नलिखित में से कौन से कार्य ब्लूम के वर्गीकरण के 'विश्लेषण (Analysis)' स्तर के अंतर्गत आते हैं?\nJ: किसी कंपनी के वित्तीय विवरणों (financial statements) में रुझानों (trends) की पहचान करना।\nK: 'मुद्रास्फीति (Inflation)' की अव े वर्गीकरण में क्रिया-आधारित शब्द (action verbs) सीखने के उद्देश्यों को स्पष्ट, मापने योग्य और अवलोकन योग्य बनाने में मदद करते हैं।\nL. यह कथन सही है। ब्लूम का वर्गीकरण एक पदानुक्रमित ढाँचा प्रदान करता है जो शिक्षकों को यह सुनिश्चित करने में मदद करता है कि पाठ्यक्रम में निम्न-स्तरीय से लेकर उच्च-स्तरीय सोच कौशल तक सभी स्तरों के उद्देश्य शामिल हों।\nM. यह कथन गलत है। ब्लूम के वर्गीकरण का उपयोग न केवल छात्रों के मूल्यांकन के लिए किया जाता है, बल्कि पाठ्यक्रम डिजाइन, शिक्षण रणनीतियों के विकास और सीखने के परिणामों को परिभाषित करने के लिए भी किया जाता है।\nइसलिए, केवल K और L सही कथन हैं।"}, {"id": 53, "section": "Pedagogy", "question": "ब्लूम के संशोधित वर्गीकरण के संज्ञानात्मक स्तरों को उनके संबंधित क्रिया-पदों (action verbs) से सुमेलित करें: सूची-I (संज्ञानात्मक स्तर) /\nसूची-I\nJ: याद रखना (Remembering)\nK: समझना (Understanding)\nL: विश्लेषण करना (Analyzing)\nM: मूल्यांकन करना (Evaluating)\nसूची-II\n1. व्याख्या करना (Explaining)\n2. न्याय करना (Judging)\n3. पहचानना (Identifying)\n4. तुलना करना (Comparing)\nसही मिलान चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-1, L-4, M-3", "J-3, K-1, L-4, M-2", "J-3, K-4, L-1, M-2", "J-1, K-3, L-2, M-4"], "answer": "J-3, K-1, L-4, M-2", "explanation": "सही मिलान इस प्रकार है: 'याद रखना (Remembering)' में 'पहचानना (Identifying)' शामिल है। 'समझना (Understanding)' में 'व्याख्या करना (Explaining)' शामिल है। 'विश्लेषण करना (Analyzing)' में जानकारी को तोड़ना और 'तुलना करना (Comparing)' शामिल है। 'मूल्यांकन करना (Evaluating)' में निर्णय लेना या 'न्याय करना (Judging)' शामिल है।"}, {"id": 54, "section": "Pedagogy", "question": "एक शिक्षण कक्षा में 'बजट (Budget)' की अवधारणा सिखाने के लिए ब्लूम के वर्गीकरण के अनुसार शिक्षण गतिविधियों के सही क्रम को व्यवस्थित करें:\nJ: छात्रों से एक व्यक्तिगत बजट (personal budget) बनाने के लिए कहना।\nK: छात्रों को बजट के विभिन्न प्रकारों और उनके घटकों को परिभाषित करने के लिए कहना।\nL: छात्रों को विभिन्न बजटों के बीच समानताएं और अंतर खोजने के लिए कहना।\nM: छात्रों को यह समझाने के लिए कहना कि बजट क्यों महत्वपूर्ण है।\nसही कालानुक्रमिक क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, M, L", "K, L, M, J", "M, K, L, J", "K, M, L, J"], "answer": "K, M, L, J", "explanation": "ब्लूम के वर्गीकरण के अनुसार, शिक्षण गतिविधियों को निम्न-स्तरीय से उच्च-स्तरीय संज्ञानात्मक कौशल की ओर बढ़ना चाहिए। सबसे पहले, छात्रों को बजट के प्रकारों और घटकों को 'परिभाषित' करना चाहिए (K - याद रखना)। फिर, उन्हें यह 'समझाना' चाहिए कि बजट क्यों महत्वपूर्ण है (M - समझना)। इसके बाद, उन्हें विभिन्न बजटों की 'तुलना' करनी चाहिए (L - विश्लेषण करना)। अंत में, उन्हें एक व्यक्तिगत बजट 'बनाना' चाहिए (J - निर्माण करना/अनुप्रयोग करना)।"}, {"id": 55, "section": "Pedagogy", "question": "एक प्रभावी शिक्षक ब्लूम के वर्गीकरण का उपयोग क्यों करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल छात्रों की याद रखने की क्षमता का परीक्षण करने के लिए।", "छात्रों को केवल तथ्यात्मक ज्ञान प्रदान करने के लिए।", "सीखने के उद्देश्यों को डिजाइन करने और आकलन (assessment) को संरेखित करने के लिए।", "पाठ्यक्रम को जटिल बनाने के लिए।"], "answer": "सीखने के उद्देश्यों को डिजाइन करने और आकलन (assessment) को संरेखित करने के लिए।", "explanation": "ब्लूम का वर्गीकरण शिक्षकों को स्पष्ट और मापने योग्य सीखने के उद्देश्यों को डिजाइन करने में मदद करता है, जो विभिन्न संज्ञानात्मक स्तरों को लक्षित करते हैं। यह शिक्षकों को यह सुनिश्चित करने में भी मदद करता है कि उनके आकलन (assessments) इन उद्देश्यों के साथ संरेखित हों, जिससे शिक्षण-अधिगम प्रक्रिया अधिक प्रभावी हो। यह केवल याद रखने या तथ्यात्मक ज्ञान तक सीमित नहीं है, न ही इसका उद्देश्य पाठ्यक्रम को अनावश्यक रूप से जटिल बनाना है।"}, {"id": 56, "section": "Pedagogy", "question": "एक शिक्षक ने छात्रों को 'लेखांकन समीकरण (Accounting Equation)' को याद करने के लिए कहा और फिर उन्हें एक नई व्यावसायिक स्थिति में इसका उपयोग करके लेनदेन (transactions) को रिकॉर्ड करने के लिए कहा। शिक्षक ने ब्लूम के वर्गीकरण के किस स्तर से किस स्तर तक प्रगति की?", "brand": "bilaspurtestseries.com 9669946966", "options": ["ज्ञान से बोध तक (Knowledge to Comprehension)", "अनुप्रयोग से विश्लेषण तक (Application to Analysis)", "बोध से अनुप्रयोग तक (Comprehension to Application)", "ज्ञान से अनुप्रयोग तक (Knowledge to Application)"], "answer": "ज्ञान से अनुप्रयोग तक (Knowledge to Application)", "explanation": "लेखांकन समीकरण को 'याद करना' ब्लूम के 'ज्ञान (Knowledge)' स्तर से संबंधित है। इसके बाद, एक नई स्थिति में इसका उपयोग करके लेनदेन को रिकॉर्ड करना 'अनुप्रयोग (Application)' स्तर को दर्शाता है, जहाँ छात्र सीखे गए ज्ञान को एक नई समस्या को हल करने के लिए लागू करते हैं। इसलिए, शिक्षक ने ज्ञान से अनुप्रयोग तक प्रगति की।"}, {"id": 57, "section": "Pedagogy", "question": "ब्लूम के वर्गीकरण के अनुसार, 'व्याख्यान विधि (Lecture Method)' मुख्य रूप से किस संज्ञानात्मक स्तर को लक्षित करती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अनुप्रयोग (Application)", "ज्ञान और बोध (Knowledge and Comprehension)", "विश्लेषण (Analysis)", "मूल्यांकन (Evaluation)"], "answer": "ज्ञान और बोध (Knowledge and Comprehension)", "explanation": "व्याख्यान विधि (Lecture Method) मुख्य रूप से छात्रों को जानकारी प्रदान करने और उनकी बुनियादी समझ विकसित करने पर केंद्रित होती है। यह 'ज्ञान (Knowledge)' (तथ्यों को याद रखना) और 'बोध (Comprehension)' (अवधारणाओं को समझना) स्तरों को लक्षित करती है। उच्च-स्तरीय कौशल जैसे 'अनुप्रयोग', 'विश्लेषण' या 'मूल्यांकन' के लिए अधिक सक्रिय और सहभागी शिक्षण विधियों की आवश्यकता होती है।"}, {"id": 58, "section": "Pedagogy", "question": "एक शिक्षक छात्रों को 'बाजार के विभिन्न प्रकारों (types of markets)' पर एक शोध परियोजना (research project) देता है, जिसमें उन्हें प्रत्येक प्रकार के फायदे और नुकसान का विश्लेषण करना होता है और निष्कर्ष निकालना होता है। यह गतिविधि ब्लूम के वर्गीकरण के किस स्तर को बढ़ावा देती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विश्लेषण और मूल्यांकन (Analysis and Evaluation)", "ज्ञान (Knowledge)", "अनुप्रयोग (Application)", "बोध (Comprehension)"], "answer": "विश्लेषण और मूल्यांकन (Analysis and Evaluation)", "explanation": "शोध परियोजना में 'विश्लेषण करना' (फायदे और नुकसान का विश्लेषण) और 'निष्कर्ष निकालना' (जानकारी के आधार पर निर्णय लेना) शामिल है। ये दोनों क्रियाएं ब्लूम के वर्गीकरण के 'विश्लेषण (Analysis)' और 'मूल्यांकन (Evaluation)' स्तरों से संबंधित हैं, जो उच्च-स्तरीय सोच कौशल हैं। 'ज्ञान', 'बोध' और 'अनुप्रयोग' इस गतिविधि के लिए आवश्यक आधारभूत कौशल हो सकते हैं, लेकिन मुख्य जोर विश्लेषण और मूल्यांकन पर है।"}, {"id": 59, "section": "Pedagogy", "question": "एक शिक्षक ने एक शिक्षण उद्देश्य (instructional objective) निर्धारित किया: 'छात्र विभिन्न प्रकार के व्यावसायिक संगठनों (business organizations) के बीच उनके कानूनी स्वरूप (legal structure) और दायित्व (liability) के आधार पर अंतर कर पाएंगे।' ब्लूम के संशोधित वर्गीकरण (Revised Bloom's Taxonomy) के संज्ञानात्मक क्षेत्र (cognitive domain) के अनुसार, यह उद्देश्य किस स्तर से संबंधित है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विश्लेषण करना (Analyze)", "याद रखना (Remember)", "समझना (Understand)", "मूल्यांकन करना (Evaluate)"], "answer": "विश्लेषण करना (Analyze)", "explanation": "यह उद्देश्य 'विश्लेषण करना' (Analyze) स्तर से संबंधित है क्योंकि इसमें छात्रों को विभिन्न व्यावसायिक संगठनों की विशेषताओं को तोड़कर (breaking down) और उनके बीच समानताएं व असमानताएं (similarities and differences) पहचानकर अंतर करने की आवश्यकता है। 'याद रखना' (Remember) केवल जानकारी को पुनः प्राप्त करना है, 'समझना' (Understand) जानकारी की व्याख्या करना है, और 'मूल्यांकन करना' (Evaluate) निर्णय लेना या आलोचना करना है। 'अंतर करना' (differentiate) क्रिया 'विश्लेषण' स्तर की एक प्रमुख क्रिया है जो जानकारी को उसके घटकों में विभाजित करने और उनके संबंधों को समझने पर केंद्रित है।"}, {"id": 60, "section": "Pedagogy", "question": "एक शिक्षक छात्रों से 'GST (वस्तु एवं सेवा कर)' के विभिन्न घटकों की पहचान करने और प्रत्येक घटक के कार्य का वर्णन करने के लिए कहता है। यह कार्य ब्लूम के वर्गीकरण के किस स्तर पर आता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अनुप्रयोग (Application)", "विश्लेषण (Analysis)", "ज्ञान (Knowledge)", "बोध (Comprehension)"], "answer": "बोध (Comprehension)", "explanation": "GST के घटकों की 'पहचान करना' 'ज्ञान (Knowledge)' स्तर का हिस्सा है, लेकिन प्रत्येक घटक के कार्य का 'वर्णन करना' या 'समझाना' 'बोध (Comprehension)' स्तर को दर्शाता है। इसमें केवल तथ्यों को याद रखना नहीं, बल्कि उनकी समझ को व्यक्त करना शामिल है। 'अनुप्रयोग' में ज्ञान का उपयोग करना और 'विश्लेषण' में जानकारी को तोड़ना शामिल है।"}, {"id": 61, "section": "Pedagogy", "question": "शिक्षण उद्देश्यों (teaching objectives) का शिक्षण विधियों (teaching methods) से संरेखण (alignment) से क्या तात्पर्य है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शिक्षण विधियों को छात्रों की संख्या के अनुसार बदलना।", "शिक्षण विधियों को शिक्षण सामग्री के अनुसार समायोजित करना।", "शिक्षण उद्देश्यों को पाठ्यक्रम (syllabus) के अनुसार निर्धारित करना।", "शिक्षण उद्देश्यों को प्राप्त करने के लिए सबसे उपयुक्त शिक्षण विधियों का चयन करना।"], "answer": "शिक्षण उद्देश्यों को प्राप्त करने के लिए सबसे उपयुक्त शिक्षण विधियों का चयन करना।", "explanation": "शिक्षण उद्देश्यों का शिक्षण विधियों से संरेखण का अर्थ है कि शिक्षक अपने निर्धारित शिक्षण लक्ष्यों (learning goals) को प्राप्त करने के लिए ऐसी शिक्षण विधियों का चुनाव करें जो उन लक्ष्यों को प्रभावी ढंग से पूरा कर सकें। यह सुनिश्चित करता है कि शिक्षण प्रक्रिया उद्देश्यपूर्ण और परिणाम-उन्मुख हो। अन्य विकल्प या तो संरेखण की गलत परिभाषा देते हैं या केवल आंशिक पहलू को दर्शाते हैं, जैसे सामग्री या छात्रों की संख्या के अनुसार समायोजन, जो संरेखण का प्राथमिक लक्ष्य नहीं है।"}, {"id": 62, "section": "Pedagogy", "question": "शिक्षण (Teaching) में उद्देश्य-विधि संरेखण का प्राथमिक महत्व क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शिक्षण प्रक्रिया को अधिक मनोरंजक और आकर्षक बनाना।", "शिक्षण संसाधनों (teaching resources) का प्रभावी ढंग से उपयोग करना।", "छात्रों के सीखने के परिणामों (learning outcomes) को अधिकतम करना और उन्हें वास्तविक दुनिया की समस्याओं के लिए तैयार करना।", "यह सुनिश्चित करना कि शिक्षक कम समय में अधिक पाठ्यक्रम पूरा कर सकें।"], "answer": "छात्रों के सीखने के परिणामों (learning outcomes) को अधिकतम करना और उन्हें वास्तविक दुनिया की समस्याओं के लिए तैयार करना।", "explanation": "शिक्षण में उद्देश्य-विधि संरेखण का प्राथमिक महत्व छात्रों के सीखने के परिणामों को अधिकतम करना है। जब शिक्षण विधियाँ स्पष्ट रूप से परिभाषित उद्देश्यों के साथ संरेखित होती हैं, तो छात्र न केवल सैद्धांतिक ज्ञान प्राप्त करते हैं बल्कि उसे वास्तविक शैक्षिक परिदृश्यों में लागू करने की क्षमता भी विकसित करते हैं, जिससे वे वास्तविक दुनिया की समस्याओं के लिए बेहतर ढंग से तैयार होते हैं। अन्य विकल्प महत्व के गौण पहलू हो सकते हैं, लेकिन वे सीखने के परिणामों को अधिकतम करने के व्यापक लक्ष्य को संबोधित नहीं करते हैं।"}, {"id": 63, "section": "Pedagogy", "question": "ब्लूम के वर्गीकरण (Bloom's Taxonomy) के 'विश्लेषण' (Analysis) स्तर के उद्देश्य को प्राप्त करने के लिए निम्नलिखित में से कौन सी शिक्षण विधि सबसे उपयुक्त है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["स्मरण विधि (Rote Learning Method)", "व्याख्यान विधि (Lecture Method)", "प्रदर्शन विधि (Demonstration Method)", "केस स्टडी विधि (Case Study Method)"], "answer": "केस स्टडी विधि (Case Study Method)", "explanation": "ब्लूम के वर्गीकरण के 'विश्लेषण' स्तर में छात्रों को जानकारी को छोटे भागों में तोड़ने, पैटर्न की पहचान करने और संबंधों को समझने की आवश्यकता होती है। केस स्टडी विधि छात्रों को वास्तविक या काल्पनिक शैक्षिक परिदृश्यों का विश्लेषण करने, समस्याओं की पहचान करने और समाधान विकसित करने का अवसर प्रदान करती है, जो विश्लेषण कौशल को बढ़ावा देती है। व्याख्यान विधि मुख्य रूप से ज्ञान (knowledge) और समझ (comprehension) के लिए उपयुक्त है, जबकि स्मरण विधि निम्न-स्तरीय ज्ञान के लिए है और प्रदर्शन विधि अक्सर अनुप्रयोग (application) या मनोगत्यात्मक (psychomotor) उद्देश्यों के लिए होती है।"}, {"id": 64, "section": "Pedagogy", "question": "एक शिक्षक का उद्देश्य छात्रों में 'वित्तीय विवरणों का मूल्यांकन करने की क्षमता' विकसित करना है, लेकिन वह मुख्य रूप से व्याख्यान विधि (lecture method) का उपयोग करता है। इस स्थिति में गलत संरेखण (misalignment) का संभावित परिणाम क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शिक्षक पाठ्यक्रम को समय पर पूरा नहीं कर पाएगा।", "छात्रों की कक्षा में उपस्थिति कम हो जाएगी।", "छात्र वित्तीय विवरणों का मूल्यांकन करने में सक्षम नहीं होंगे, भले ही उन्हें सैद्धांतिक ज्ञान हो।", "छात्रों में सैद्धांतिक ज्ञान की कमी होगी।"], "answer": "छात्र वित्तीय विवरणों का मूल्यांकन करने में सक्षम नहीं होंगे, भले ही उन्हें सैद्धांतिक ज्ञान हो।", "explanation": "वित्तीय विवरणों का मूल्यांकन करने की क्षमता एक उच्च-स्तरीय संज्ञानात्मक कौशल (cognitive skill) है जिसके लिए विश्लेषण और मूल्यांकन की आवश्यकता होती है। व्याख्यान विधि मुख्य रूप से ज्ञान और समझ के लिए प्रभावी है, लेकिन यह छात्रों को मूल्यांकन जैसे व्यावहारिक कौशल विकसित करने के लिए पर्याप्त अवसर प्रदान नहीं करती है। इसलिए, गलत संरेखण के कारण, छात्रों को सैद्धांतिक जानकारी तो मिल सकती है, लेकिन वे उस ज्ञान को लागू करके मूल्यांकन करने में असमर्थ रहेंगे। अन्य विकल्प गलत संरेखण के प्रत्यक्ष और प्राथमिक परिणाम नहीं हैं।"}, {"id": 65, "section": "Pedagogy", "question": "निम्नलिखित में से कौन सा कथन शिक्षण विधियों और उनके उपयुक्त उद्देश्यों के संरेखण के संबंध में सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["भूमिका-निर्वहन विधि (role-playing method) छात्रों में विश्लेषणात्मक कौशल (analytical skills) विकसित करने के लिए सबसे प्रभावी है।", "व्याख्यान विधि (lecture method) छात्रों में उच्च-स्तरीय आलोचनात्मक सोच (critical thinking) को बढ़ावा देती है।", "परियोजना विधि (project method) छात्रों में व्यावहारिक कौशल (practical skills) और सहयोग (collaboration) विकसित करने के लिए अत्यधिक प्रभावी है।", "समस्या-समाधान विधि (problem-solving method) मुख्य रूप से स्मरण (recall) उद्देश्यों के लिए उपयुक्त है।"], "answer": "परियोजना विधि (project method) छात्रों में व्यावहारिक कौशल (practical skills) और सहयोग (collaboration) विकसित करने के लिए अत्यधिक प्रभावी है।", "explanation": "परियोजना विधि छात्रों को वास्तविक दुनिया की समस्याओं पर काम करने, योजना बनाने, निष्पादित करने और परिणाम प्रस्तुत करने का अवसर देती है, जिससे व्यावहारिक कौशल और टीम वर्क (teamwork) या सहयोग विकसित होता है। समस्या-समाधान विधि स्मरण के बजाय उच्च-स्तरीय सोच के लिए है। ा' एक उच्च-स्तरीय संज्ञानात्मक उद्देश्य (higher-order cognitive objective) है जिसमें विश्लेषण (analysis) और मूल्यांकन (evaluation) शामिल है। इसके लिए 'केस स्टडी विधि' (1) सबसे उपयुक्त है, क्योंकि यह छात्रों को वास्तविक व्यावसायिक परिदृश्यों का गहन अध्ययन करने, डेटा का विश्लेषण करने और सूचित निर्णय लेने का अवसर प्रदान करती है।\n\nK. 'व्यावसायिक नैतिकता के सिद्धांतों को अपनी निर्णय लेने की प्रक्रिया में एकीकृत करना' एक भावात्मक उद्देश्य (affective objective) है जिसका संबंध मूल्यों के आंतरिककरण (internalization of values) से है। 'भूमिका-निर्वहन और नैतिक दुविधा चर्चा' (2) छात्रों को नैतिक दुविधाओं का अनुभव करने, विभिन्न दृष्टिकोणों पर विचार करने और नैतिक निर्णय लेने का अभ्यास करने में मदद करती है, जिससे सिद्धांतों का प्रभावी ढंग से एकीकरण होता है।\n\nL. 'माइक्रोसॉफ्ट एक्सेल का उपयोग करके एक जटिल बजट तैयार करना' एक मनोगत्यात्मक (psychomotor) और अनुप्रयोग-आधारित (application-based) उद्देश्य है जिसमें एक विशिष्ट कौशल (skill) का प्रदर्शन शामिल है। 'कंप्यूटर-आधारित सिमुलेशन और निर्देशित अभ्यास' (3) इस उद्देश्य के लिए आदर्श है, क्योंकि यह छात्रों को वास्तविक सॉफ्टवेयर वातावरण में हाथ से अभ्यास करने और तत्काल प्रतिक्रिया प्राप्त करने की अनुमति देता है।\n\nM. 'मुद्रास्फीति के कारणों और प्रभावों को पहचानना' एक निम्न-स्तरीय संज्ञानात्मक उद्देश्य (lower-order cognitive objective) है जिसमें याद रखना (remembering) और समझना (understanding) शामिल है। 'व्याख्यान-सह-चर्चा विधि' (4) इस उद्देश्य के लिए प्रभावी है, जहाँ व्याख्यान के माध्यम से अवधारणाओं को प्रस्तुत किया जाता है और चर्चा के माध्यम से छात्रों की समझ को गहरा किया जाता है।"}, {"id": 72, "section": "Pedagogy", "question": "निम्नलिखित सूची-I में शिक्षण विधियों को सूची-II में उनके सबसे उपयुक्त शिक्षण परिणाम (learning outcome) से सुमेलित करें:\nसूची-I\nJ: सिमुलेशन विधि\nK: समूह चर्चा विधि\nL: प्रश्नोत्तर विधि\nM: क्षेत्र भ्रमण विधि\nसूची-II\n1. अवधारणात्मक स्पष्टता और सक्रिय जुड़ाव\n2. जटिल निर्णय लेने के कौशल का विकास\n3. सैद्धांतिक ज्ञान का व्यावहारिक संदर्भ से जुड़ाव\n4. सहयोगात्मक समस्या-समाधान और संचार कौशल में वृद्धि\nसही मिलान चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-4, K-3, L-2, M-1", "J-2, K-4, L-1, M-3", "J-1, K-2, L-3, M-4", "J-3, K-1, L-4, M-2"], "answer": "J-2, K-4, L-1, M-3", "explanation": "J. 'सिमुलेशन विधि' (Simulation Method) छात्रों को वास्तविक दुनिया की जटिल व्यावसायिक स्थितियों का अनुभव करने और उनमें निर्णय लेने का अवसर देती है, जिससे 'जटिल निर्णय लेने के कौशल का विकास' (2) होता है।\nK. 'समूह चर्चा विधि' (Group Discussion Method) छात्रों को विभिन्न दृष्टिकोणों को सुनने, अपने विचारों को व्यक्त करने और दूसरों के साथ सहयोग करने के लिए प्रोत्साहित करती है, जिससे 'सहयोगात्मक समस्या-समाधान और संचार कौशल में वृद्धि' (4) होती है।\nL. 'प्रश्नोत्तर विधि' (Question-Answer Method) छात्रों की समझ का आकलन करने, उन्हें सोचने पर मजबूर करने और अवधारणाओं को स्पष्ट करने में मदद करती है, जिससे 'अवधारणात्मक स्पष्टता और सक्रिय जुड़ाव' (1) बढ़ता है।\nM. 'क्षेत्र भ्रमण विधि' (Field Trip Method) छात्रों को सैद्धांतिक ज्ञान को वास्तविक व्यावसायिक वातावरण में देखने और जोड़ने का अवसर देती है, जिससे 'सैद्धांतिक ज्ञान का व्यावहारिक संदर्भ से जुड़ाव' (3) होता है।"}, {"id": 73, "section": "Pedagogy", "question": "पाठ योजना (lesson planning) में उद्देश्य-विधि संरेखण के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: शिक्षण विधियों और गतिविधियों का चयन\nK: सीखने के परिणामों का मूल्यांकन\nL: विशिष्ट शिक्षण उद्देश्यों का निर्धारण\nM: मूल्यांकन रणनीतियों का विकास\nसही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, M, J, K", "L, J, M, K", "K, L, J, M", "J, L, M, K"], "answer": "L, J, M, K", "explanation": "पाठ योजना में उद्देश्य-विधि संरेखण का सही क्रम इस प्रकार है: सबसे पहले, विशिष्ट शिक्षण उद्देश्यों का निर्धारण (L) किया जाता है, यानी यह तय किया जाता है कि छात्रों को क्या सीखना चाहिए। फिर, इन उद्देश्यों को प्राप्त करने के लिए उपयुक्त शिक्षण विधियों और गतिविधियों का चयन (J) किया जाता है। इसके बाद, यह निर्धारित किया जाता है कि सीखने के परिणामों को कैसे मापा जाएगा, जिसके लिए मूल्यांकन रणनीतियों का विकास (M) किया जाता है। अंत में, वास्तविक शिक्षण के बाद, सीखने के परिणामों का मूल्यांकन (K) किया जाता है ताकि यह जांचा जा सके कि उद्देश्य प्राप्त हुए हैं या नहीं।"}, {"id": 74, "section": "Pedagogy", "question": "शिक्षण उद्देश्यों और विधियों के संरेखण (alignment) के संबंध में निम्नलिखित में से कौन सा कथन सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["K. उच्च-स्तरीय संज्ञानात्मक उद्देश्यों (higher-order cognitive objectives) जैसे 'मूल्यांकन' (evaluation) के लिए अक्सर निष्क्रिय शिक्षण विधियों (passive teaching methods) की आवश्यकता होती है।", "L. प्रभावी संरेखण के लिए, मूल्यांकन रणनीतियाँ (assessment strategies) भी शिक्षण उद्देश्यों और विधियों के अनुरूप होनी चाहिए।", "J. संरेखण का प्राथमिक लक्ष्य यह सुनिश्चित करना है कि शिक्षण गतिविधियाँ सीधे निर्धारित सीखने के परिणामों की ओर ले जाएँ।", "M. छात्रों की विविध सीखने की शैलियों (diverse learning styles) को समायोजित करने के लिए विभिन्न शिक्षण विधियों का उपयोग करना संरेखण का एक महत्वपूर्ण पहलू है।"], "answer": "K. उच्च-स्तरीय संज्ञानात्मक उद्देश्यों (higher-order cognitive objectives) जैसे 'मूल्यांकन' (evaluation) के लिए अक्सर निष्क्रिय शिक्षण विधियों (passive teaching methods) की आवश्यकता होती है।", "explanation": "कथन K सही नहीं है। उच्च-स्तरीय संज्ञानात्मक उद्देश्यों, जैसे 'विश्लेषण' (analysis), 'संश्लेषण' (synthesis), और 'मूल्यांकन' (evaluation) के लिए सक्रिय और सहभागी शिक्षण विधियों (active and participatory teaching methods) की आवश्यकता होती है। निष्क्रिय विधियाँ (जैसे केवल व्याख्यान सुनना) इन उद्देश्यों को प्राप्त करने में प्रभावी नहीं होती हैं क्योंकि वे छात्रों को सोचने, आलोचनात्मक विश्लेषण करने या निर्णय लेने के अवसर प्रदान नहीं करती हैं। अन्य सभी कथन शिक्षण उद्देश्यों और विधियों के संरेखण के संबंध में सही हैं।"}, {"id": 75, "section": "Pedagogy", "question": "एक शिक्षक ने 'वित्तीय साक्षरता' (financial literacy) के उद्देश्य के लिए एक इंटरैक्टिव सिमुलेशन गेम (interactive simulation game) का उपयोग किया। इस संरेखण की प्रभावशीलता का मूल्यांकन करने के लिए सबसे अच्छा मानदंड क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों द्वारा खेल में बिताया गया समय।", "शिक्षक द्वारा खेल के बारे में दी गई प्रतिक्रिया (feedback) की मात्रा।", "छात्रों द्वारा खेल के नियमों को कितनी अच्छी तरह याद किया गया।", "छात्रों की वित्तीय अवधारणाओं की समझ और वास्तविक जीवन की वित्तीय स्थितियों में उन्हें लागू करने की क्षमता में सुधार।"], "answer": "छात्रों की वित्तीय अवधारणाओं की समझ और वास्तविक जीवन की वित्तीय स्थितियों में उन्हें लागू करने की क्षमता में सुधार।", "explanation": "वित्तीय साक्षरता का उद्देश्य केवल अवधारणाओं को याद रखना नहीं है, बल्कि उन्हें समझना और वास्तविक जीवन में लागू करना है। एक इंटरैक्टिव सिमुलेशन गेम का उपयोग करने का लक्ष्य छात्रों को व्यावहारिक अनुभव देना है। इसलिए, संरेखण की प्रभावशीलता का मूल्यांकन इस बात से होगा कि छात्र वित्तीय अवधारणाओं को कितनी अच्छी तरह समझते हैं और उन्हें वास्तविक वित्तीय स्थितियों में लागू कर सकते हैं। खेल में बिताया गया समय या नियमों को याद रखना सतही मूल्यांकन होगा, और शिक्षक की प्रतिक्रिया की मात्रा सीधे छात्र के सीखने के परिणाम को नहीं मापती।"}, {"id": 76, "section": "Pedagogy", "question": "उद्देश्य-विधि संरेखण में निम्नलिखित में से कौन सी एक सामान्य बाधा (barrier) है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["स्पष्ट और मापने योग्य शिक्षण उद्देश्यों की कमी।", "छात्रों की सीखने की उच्च प्रेरणा (high motivation)।", "पर्याप्त शिक्षण संसाधनों की उपलब्धता।", "शिक्षक का अत्यधिक अनुभव।"], "answer": "स्पष्ट और मापने योग्य शिक्षण उद्देश्यों की कमी।", "explanation": "उद्देश्य-विधि संरेखण के लिए सबसे महत्वपूर्ण पूर्व शर्त स्पष्ट और मापने योग्य शिक्षण उद्देश्य हैं। यदि उद्देश्य अस्पष्ट या अमूर्त (abstract) हैं, तो शिक्षक के लिए यह निर्धारित करना मुश्किल हो जाता है कि कौन सी शिक्षण विधि उन उद्देश्यों को प्राप्त करने के लिए सबसे उपयुक्त होगी। शिक्षक का अनुभव, छात्रों की उच्च प्रेरणा और पर्याप्त संसाधन सभी संरेखण में सहायक होते हैं, बाधा नहीं।"}, {"id": 77, "section": "Pedagogy", "question": "निम्नलिखित में से कौन सी शिक्षण रणनीति (teaching strategy) 'आलोचनात्मक सोच' (critical thinking) और 'समस्या-समाधान' (problem-solving) जैसे उच्च-स्तरीय उद्देश्यों के साथ सबसे अच्छी तरह संरेखित होती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्रदर्शन और अनुकरण (Demonstration and Imitation)", "स्मरण और दोहराव (Rote and Repetition)", "व्याख्यान और नोट्स लेना (Lecture and Note-taking)", "केस स्टडी और समूह चर्चा (Case Study and Group Discussion)"], "answer": "केस स्टडी और समूह चर्चा (Case Study and Group Discussion)", "explanation": "आलोचनात्मक सोच और समस्या-समाधान जैसे उच्च-स्तरीय उद्देश्यों के लिए छात्रों को सक्रिय रूप से जानकारी का विश्लेषण करने, विभिन्न दृष्टिकोणों पर विचार करने और समाधान विकसित करने की आवश्यकता होती है। केस स्टडी छात्रों को वास्तविक या काल्पनिक समस्याओं का विश्लेषण करने का अवसर देती है, जबकि समूह चर्चा उन्हें विभिन्न विचारों पर बहस करने और अपनी सोच को परिष्कृत करने में मदद करती है। स्मरण और दोहराव, व्याख्यान और नोट्स लेना, और प्रदर्शन और अनुकरण मुख्य रूप से निम्न-स्तरीय संज्ञानात्मक या मनोगत्यात्मक उद्देश्यों के लिए अधिक उपयुक्त हैं।"}, {"id": 78, "section": "Pedagogy", "question": "शैक्षणिक दृष्टिकोण (pedagogical perspective) से, उद्देश्य-विधि संरेखण का सबसे महत्वपूर्ण औचित्य (justification) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह छात्रों को केवल परीक्षा पास करने में मदद करता है।", "यह सीखने की प्रक्रिया को अधिक कुशल, प्रभावी और उद्देश्यपूर्ण बनाता है, जिससे सार्थक सीखने के परिणाम प्राप्त होते हैं।", "यह पाठ्यक्रम को तेजी से पूरा करने में सहायता करता है।", "यह शिक्षकों के कार्यभार को कम करता है।"], "answer": "यह सीखने की प्रक्रिया को अधिक कुशल, प्रभावी और उद्देश्यपूर्ण बनाता है, जिससे सार्थक सीखने के परिणाम प्राप्त होते हैं।", "explanation": "शैक्षणिक दृष्टिकोण से, उद्देश्य-विधि संरेखण का सबसे महत्वपूर्ण औचित्य यह है कि यह सीखने की प्रक्रिया को अधिक कुशल, प्रभावी और उद्देश्यपूर्ण बनाता है। जब शिक्षण विधियाँ स्पष्ट उद्देश्यों के साथ संरेखित होती हैं, तो प्रत्येक गतिविधि का एक स्पष्ट उद्देश्य होता है, जिससे छात्र अधिक सार्थक रूप से सीखते हैं और वांछित सीखने के परिणाम प्राप्त होते हैं। यह शिक्षकों के कार्यभार को कम नहीं करता, बल्कि इसे अधिक संरचित और प्रभावी बनाता है। इसका उद्देश्य केवल परीक्षा पास करना या पाठ्यक्रम को तेजी से पूरा करना नहीं है, बल्कि गहरी और स्थायी समझ विकसित करना है।"}, {"id": 79, "section": "Pedagogy", "question": "शिक्षण उद्देश्यों (teaching objectives) के संदर्भ में, 'संज्ञानात्मक उद्देश्य' (cognitive objective) मुख्य रूप से किससे संबंधित होते हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["ज्ञान, समझ, विश्लेषण और मूल्यांकन जैसे बौद्धिक कौशल से।", "भावनाओं और दृष्टिकोणों के विकास से।", "शारीरिक कौशल और समन्वय से।", "सामाजिक अंतःक्रिया (social interaction) और संचार से।"], "answer": "ज्ञान, समझ, विश्लेषण और मूल्यांकन जैसे बौद्धिक कौशल से।", "explanation": "संज्ञानात्मक उद्देश्य ब्लूम के वर्गीकरण के अनुसार सीखने के उन लक्ष्यों को संदर्भित करते हैं जो ज्ञान, समझ, अनुप्रयोग, विश्लेषण, संश्लेषण और मूल्यांकन जैसे बौद्धिक कौशल और क्षमताओं से संबंधित होते हैं। ये मुख्य रूप से मस्तिष्क की सोच प्रक्रियाओं पर केंद्रित होते हैं। भावनाएँ और दृष्टिकोण भावात्मक (affective) उद्देश्यों से संबंधित हैं, जबकि शारीरिक कौशल मनोगत्यात्मक (psychomotor) उद्देश्यों से संबंधित हैं। सामाजिक अंतःक्रिया और संचार कई उद्देश्यों का हिस्सा हो सकते हैं लेकिन सीधे संज्ञानात्मक उद्देश्य की परिभाषा नहीं हैं।"}, {"id": 80, "section": "Pedagogy", "question": "एक शिक्षक छात्रों को 'कंपनी के वार्षिक प्रतिवेदन (annual report) का विश्लेषण करना' सिखाना चाहता है। इस उद्देश्य के लिए सबसे उपयुक्त शिक्षण विधि क्या होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वास्तविक कंपनी के वार्षिक प्रतिवेदन प्रदान करना और छात्रों को समूह में उनका विश्लेषण करने तथा निष्कर्ष प्रस्तुत करने के लिए कहना।", "केवल व्याख्यान देना और नोट्स लिखवाना।", "एक वीडियो दिखाना जिसमें वार्षिक प्रतिवेदन का सामान्य अवलोकन हो।", "छात्रों को वार्षिक प्रतिवेदन के बारे में एक पुस्तक पढ़ने के लिए कहना।"], "answer": "वास्तविक कंपनी के वार्षिक प्रतिवेदन प्रदान करना और छात्रों को समूह में उनका विश्लेषण करने तथा निष्कर्ष प्रस्तुत करने के लिए कहना।", "explanation": "कंपनी के वार्षिक प्रतिवेदन का विश्लेषण करना एक व्यावहारिक
