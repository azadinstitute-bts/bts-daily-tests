lliam Wordsworth", "passage_text": "I wandered lonely as a cloud\nThat floats on high o'er vales and hills,\nWhen all at once I saw a crowd,\nA host, of golden daffodils;\nBeside the lake, beneath the trees,\nFluttering and dancing in the breeze.\nContinuous as the stars that shine\nAnd twinkle on the milky way,\nThey stretched in never-ending line\nAlong the margin of a bay:\nTen thousand saw I at a glance,\nTossing their heads in sprightly dance."}, {"id": 80, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The description &quot;A host, of golden daffodils&quot; primarily emphasizes which two aspects of the flowers?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Their fragility and scent", "Their unique shape and quiet beauty", "Their vibrant color and immense quantity", "Their wild growth and short lifespan"], "answer": "Their vibrant color and immense quantity", "explanation": "\"Golden\" clearly refers to their vibrant color, and \"A host\" implies a very large number or multitude, emphasizing their quantity.", "passage_id": "P3", "passage_title": "From 'Daffodils' by William Wordsworth", "passage_text": "I wandered lonely as a cloud\nThat floats on high o'er vales and hills,\nWhen all at once I saw a crowd,\nA host, of golden daffodils;\nBeside the lake, beneath the trees,\nFluttering and dancing in the breeze.\nContinuous as the stars that shine\nAnd twinkle on the milky way,\nThey stretched in never-ending line\nAlong the margin of a bay:\nTen thousand saw I at a glance,\nTossing their heads in sprightly dance."}, {"id": 81, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__What literary device is predominantly used in the line &quot;Fluttering and dancing in the breeze,&quot; and what effect does it create?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Metaphor; it suggests the daffodils are like dancers.", "Personification; it imbues the daffodils with lively, human-like qualities.", "Alliteration; it creates a musical sound.", "Onomatopoeia; it imitates the sound of the breeze."], "answer": "Personification; it imbues the daffodils with lively, human-like qualities.", "explanation": "Personification is giving human qualities or actions to inanimate objects or animals. \"Fluttering and dancing\" are actions typically associated with living beings, making the daffodils seem lively and joyful.", "passage_id": "P3", "passage_title": "From 'Daffodils' by William Wordsworth", "passage_text": "I wandered lonely as a cloud\nThat floats on high o'er vales and hills,\nWhen all at once I saw a crowd,\nA host, of golden daffodils;\nBeside the lake, beneath the trees,\nFluttering and dancing in the breeze.\nContinuous as the stars that shine\nAnd twinkle on the milky way,\nThey stretched in never-ending line\nAlong the margin of a bay:\nTen thousand saw I at a glance,\nTossing their heads in sprightly dance."}, {"id": 82, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__What is the most significant transformation or shift in the speaker&#x27;s experience depicted in this stanza?", "brand": "bilaspurtestseries.com 9669946966", "options": ["From a cloudy sky to a clear one.", "From observing nature to actively participating in it.", "From a journey through hills to a stop by a lake.", "From a state of loneliness to an encounter with vibrant life."], "answer": "From a state of loneliness to an encounter with vibrant life.", "explanation": "The first line establishes the speaker's \"lonely\" state. The subsequent lines describe the sudden sight of \"a crowd, A host, of golden daffodils\" that are \"Fluttering and dancing,\" representing a vibrant and lively encounter that contrasts sharply with the initial loneliness.", "passage_id": "P3", "passage_title": "From 'Daffodils' by William Wordsworth", "passage_text": "I wandered lonely as a cloud\nThat floats on high o'er vales and hills,\nWhen all at once I saw a crowd,\nA host, of golden daffodils;\nBeside the lake, beneath the trees,\nFluttering and dancing in the breeze.\nContinuous as the stars that shine\nAnd twinkle on the milky way,\nThey stretched in never-ending line\nAlong the margin of a bay:\nTen thousand saw I at a glance,\nTossing their heads in sprightly dance."}, {"id": 83, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__What is the central theme explored in the poem?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The fleeting nature of power and authority.", "The struggle between personal desire and societal expectations.", "The importance of social connections.", "The unwavering autonomy and selective nature of the individual soul."], "answer": "The unwavering autonomy and selective nature of the individual soul.", "explanation": "The poem explicitly states 'The Soul selects her own Society' and then 'shuts the Door', emphasizing its absolute control over its associations, which is the core theme of autonomy and selectivity.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 84, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The speaker&#x27;s attitude towards the Soul&#x27;s actions can best be described as:", "brand": "bilaspurtestseries.com 9669946966", "options": ["Indifferent and detached.", "Admiring and understanding.", "Critical and disapproving.", "Puzzled and questioning."], "answer": "Admiring and understanding.", "explanation": "The speaker describes the Soul's actions with a tone of observation and acceptance, noting its 'divine Majority' and its 'unmoved' stance, suggesting admiration for its resolute nature rather than criticism or indifference.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 85, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__In the line &#x27;To her divine Majority – Present no more –&#x27;, what does &#x27;divine Majority&#x27; most likely refer to?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The overwhelming number of people or external influences rejected by the Soul.", "The Soul's inherent spiritual superiority.", "A democratic decision made by the Soul's inner self.", "A heavenly host or angelic beings."], "answer": "The overwhelming number of people or external influences rejected by the Soul.", "explanation": "After the Soul 'selects her own Society' and 'shuts the Door', the 'divine Majority' refers to the vast number of others, including powerful figures like Emperors, who are no longer granted access or consideration by the Soul.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 86, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The &#x27;Chariots&#x27; and &#x27;Emperor&#x27; in the second stanza primarily symbolize:", "brand": "bilaspurtestseries.com 9669946966", "options": ["The passage of time and inevitable decay.", "Wealth and material possessions.", "Divine intervention and spiritual guidance.", "Political power and worldly prestige."], "answer": "Political power and worldly prestige.", "explanation": "Chariots often represent status and power, and an Emperor is the epitome of worldly authority. The Soul remains 'unmoved' by these symbols, highlighting its transcendence over earthly concerns.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 87, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__What is the implied consequence of the Soul&#x27;s act of &#x27;shutting the Door&#x27; and choosing &#x27;One&#x27;?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The Soul attains a state of absolute self-sufficiency and impenetrable isolation.", "The Soul becomes vulnerable to external pressures due to its limited connections.", "The Soul experiences profound loneliness and regret.", "The Soul achieves universal acceptance and popularity."], "answer": "The Soul attains a state of absolute self-sufficiency and impenetrable isolation.", "explanation": "By 'shutting the Door' to the 'divine Majority' and closing 'the Valves of her attention – Like Stone –' after choosing 'One', the Soul establishes a state of complete and unyielding self-containment, implying isolation from all others.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 88, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The simile &#x27;Like Stone –&#x27; at the end of the poem emphasizes:", "brand": "bilaspurtestseries.com 9669946966", "options": ["The physical burden of the Soul's choices.", "The unyielding and permanent nature of the Soul's decision.", "The Soul's transformation into an inanimate object.", "The Soul's coldness and lack of emotion."], "answer": "The unyielding and permanent nature of the Soul's decision.", "explanation": "The comparison to 'Stone' conveys absolute finality, rigidity, and imperviousness. Once the Soul has made its choice and closed its attention, it is as unchangeable and impenetrable as stone.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 89, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Dickinson&#x27;s consistent use of capitalization for words like &#x27;Soul,&#x27; &#x27;Society,&#x27; &#x27;Door,&#x27; &#x27;Majority,&#x27; &#x27;Chariots,&#x27; &#x27;Emperor,&#x27; and &#x27;Stone&#x27; primarily serves to:", "brand": "bilaspurtestseries.com 9669946966", "options": ["Emphasize their symbolic weight and abstract significance.", "Adhere to grammatical rules of the 19th century.", "Create a sense of formality and reverence.", "Indicate proper nouns or titles within the poem."], "answer": "Emphasize their symbolic weight and abstract significance.", "explanation": "Dickinson frequently capitalizes common nouns to elevate them beyond their literal meaning, transforming them into abstract concepts or symbols that carry greater thematic importance within her poetry.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 90, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following best describes the paradox presented in the poem regarding the Soul&#x27;s &#x27;Society&#x27;?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The Soul's 'low Gate' attracts the most powerful figures.", "The Soul's choice of 'One' paradoxically leads to a broader understanding of humanity.", "The Soul's act of selecting a 'Society' results in its complete isolation from all others.", "The Soul seeks society but ultimately rejects it."], "answer": "The Soul's act of selecting a 'Society' results in its complete isolation from all others.", "explanation": "The paradox lies in the fact that by 'selecting her own Society' (even if it's just 'One'), the Soul simultaneously 'shuts the Door' to the 'divine Majority', effectively isolating itself from the vast world outside its chosen connection.", "passage_id": "P4", "passage_title": "The Soul selects her own Society", "passage_text": "The Soul selects her own Society –\nThen – shuts the Door –\nTo her divine Majority –\nPresent no more –\n\nUnmoved – she notes the Chariots – pausing –\nAt her low Gate –\nUnmoved – an Emperor be kneeling\nUpon her Mat –\n\nI've known her – from an ample nation –\nChoose One –\nThen – close the Valves of her attention –\nLike Stone –"}, {"id": 91, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The overall tone
