hrase. A transitive verb would require a direct object, such as in 'The children played games'."}, {"id": 3, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__In which of the following sentences is the adjective used &#x27;attributively&#x27;?", "brand": "bilaspurtestseries.com 9669946966", "options": ["She felt tired after the strenuous workout.", "The old house stood silently on the hill.", "The soup tasted incredibly delicious.", "He seemed quite happy with the unexpected news."], "answer": "The old house stood silently on the hill.", "explanation": "An attributive adjective is placed directly before the noun it modifies. In the correct option, 'old' is an attributive adjective modifying the noun 'house'. In the other options, 'tired', 'delicious', and 'happy' are predicative adjectives, as they follow a linking verb (felt, tasted, seemed) and describe the subject."}, {"id": 4, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Consider the sentence: &quot;She herself baked the cake.&quot; What type of pronoun is &#x27;herself&#x27; in this context, and what is its primary function?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Demonstrative pronoun; it points out the subject 'She'.", "Reflexive pronoun; it refers back to the subject as the object of the action.", "Possessive pronoun; it shows ownership of the cake.", "Intensive pronoun; it emphasizes the subject 'She'."], "answer": "Intensive pronoun; it emphasizes the subject 'She'.", "explanation": "In this sentence, 'herself' is an intensive pronoun because it emphasizes the subject 'She' and can be removed without changing the core meaning of the sentence (\"She baked the cake\"). A reflexive pronoun would be used when the subject and object are the same, as in \"She hurt herself\"."}, {"id": 5, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__In the sentence &quot;He rarely visits his hometown,&quot; the word &#x27;rarely&#x27; functions as an adverb of:", "brand": "bilaspurtestseries.com 9669946966", "options": ["Frequency", "Degree", "Manner", "Place"], "answer": "Frequency", "explanation": "'Rarely' indicates how often an action occurs, thus classifying it as an adverb of frequency. Adverbs of manner describe how an action is done (e.g., quickly), adverbs of place describe where (e.g., here), and adverbs of degree describe the intensity (e.g., very)."}, {"id": 6, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The committee decided to look _______ the matter before making a final decision.", "brand": "bilaspurtestseries.com 9669946966", "options": ["over", "at", "into", "for"], "answer": "into", "explanation": "The phrasal verb \"look into\" means to investigate or examine something thoroughly. \"Look at\" means to observe, \"look over\" means to examine quickly, and \"look for\" means to search for. Therefore, 'into' is the correct preposition to convey the intended meaning of investigation."}, {"id": 7, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__In the sentence &quot;Although it was raining, we decided to go for a walk, and we enjoyed the fresh air,&quot; identify the subordinating conjunction.", "brand": "bilaspurtestseries.com 9669946966", "options": ["and", "we", "Although", "for"], "answer": "Although", "explanation": "'Although' is a subordinating conjunction that introduces a subordinate (dependent) clause (\"Although it was raining\") and connects it to the main (independent) clause (\"we decided to go for a walk\"). 'And' is a coordinating conjunction, 'for' can be a coordinating conjunction or preposition, and 'we' is a pronoun."}, {"id": 8, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following sentences correctly uses an interjection to express sudden surprise or alarm?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Bravo! That was an excellent performance.", "Well, I think we should reconsider the plan.", "Oh, I forgot my keys at home.", "Hmm, I'm not sure about that."], "answer": "Oh, I forgot my keys at home.", "explanation": "'Oh' is commonly used to express sudden surprise, realization, or mild alarm, fitting the description. 'Well' often introduces a thought or pause. 'Bravo' expresses approval or applause. 'Hmm' indicates thought or hesitation."}, {"id": 9, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following statements regarding noun number and case is grammatically correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The news are always broadcast at 6 PM.", "The childrens' toys were scattered all over the floor.", "She admired the beauty of the two sister's dresses.", "The data is being processed by the new system."], "answer": "The data is being processed by the new system.", "explanation": "While 'data' is technically plural (singular 'datum'), it is widely accepted and commonly used as a singular mass noun in modern English, especially in general usage, making 'the data is' grammatically acceptable. Option A should be \"The children's toys\" (irregular plural + possessive). Option C should be \"the two sisters' dresses\" (plural possessive). Option D should be \"The news is always broadcast\" as 'news' is an uncountable noun and takes a singular verb."}, {"id": 10, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following statements about verb tenses and modals is INCORRECT?", "brand": "bilaspurtestseries.com 9669946966", "options": ["'Would' can be used to express habitual past actions, similar to 'used to'.", "'Must' and 'have to' are always interchangeable when expressing obligation.", "The present simple tense can be used to express a scheduled future event.", "The past perfect tense is always used to describe an action that happened before another action in the past."], "answer": "'Must' and 'have to' are always interchangeable when expressing obligation.", "explanation": "'Must' and 'have to' are not always interchangeable. 'Must' often expresses internal obligation or strong recommendation (e.g., \"I must study for the exam\"), while 'have to' often expresses external obligation or necessity (e.g., \"I have to wear a uniform at work\"). Options A, B, and C are correct statements regarding verb tense and modal usage."}, {"id": 11, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following statements correctly distinguishes between the usage of a word as an adjective and an adverb?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The word 'hard' can function as both an adjective (e.g., \"a hard task\") and an adverb (e.g., \"work hard\").", "'Early' is exclusively an adverb, as in \"He arrived early.\"", "In \"She sings well,\" 'well' functions as an adjective describing 'she'.", "The word 'fast' can only function as an adjective, as in \"a fast car.\""], "answer": "The word 'hard' can function as both an adjective (e.g., \"a hard task\") and an adverb (e.g., \"work hard\").", "explanation": "The word 'hard' can indeed be both an adjective (\"a hard task\" - describing the noun 'task') and an adverb (\"work hard\" - describing the verb 'work'). Option A is incorrect; 'fast' can also be an adverb (e.g., \"He runs fast\"). Option B is incorrect; 'well' in \"She sings well\" functions as an adverb modifying the verb 'sings'. Option D is incorrect; 'early' can also be an adjective (e.g., \"an early bird\")."}, {"id": 12, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">Assertion (A):</span><span class=\"stmt-text\">In the sentence &quot;Each of the students submitted their assignments,&quot; the pronoun &#x27;their&#x27; correctly agrees with its antecedent.</span></div><div class=\"statement-line\"><span class=\"statement-label\">Reason (R):</span><span class=\"stmt-text\">&#x27;Each&#x27; is a singular indefinite pronoun, but in informal contexts, plural pronouns are often used for gender-neutral agreement.</span></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is NOT the correct explanation of A.", "A is false, but R is true.", "Both A and R are true, and R is the correct explanation of A.", "A is true, but R is false."], "answer": "A is false, but R is true.", "explanation": "Assertion (A) is false. 'Each' is a singular indefinite pronoun, and traditionally, it requires a singular pronoun (his/her/his or her) for agreement. Reason (R) is true. 'Each' is indeed a singular indefinite pronoun, and while formal grammar dictates singular agreement, plural pronouns like 'their' are increasingly used in informal contexts for gender-neutrality, though this is still considered grammatically incorrect by strict traditional rules."}, {"id": 13, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">Assertion (A):</span><span class=\"stmt-text\">All words that modify nouns are classified as adjectives.</span></div><div class=\"statement-line\"><span class=\"statement-label\">Reason (R):</span><span class=\"stmt-text\">Determiners, such as &#x27;a&#x27;, &#x27;an&#x27;, &#x27;the&#x27;, &#x27;my&#x27;, &#x27;this&#x27;, also modify nouns by specifying or quantifying them, but they belong to a distinct grammatical category from adjectives.</span></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["A is true, but R is false.", "Both A and R are true, but R is NOT the correct explanation of A.", "Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true."], "answer": "A is false, but R is true.", "explanation": "Assertion (A) is false. While adjectives modify nouns by describing qualities, determiners also modify nouns by specifying or quantifying them, but they are a distinct grammatical category. Reason (R) is true, as it correctly identifies determiners as a separate category that modifies nouns, differentiating them from adjectives."}, {"id": 14, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">In the sentence: &quot;Despite the early warning, the swift current almost swept the entire boat away,&quot; identify the parts of speech for the bolded words.</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>early: Adjective, swift: Adjective, almost: Adverb, entire: Adjective</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>early: Adverb, swift: Adjective, almost: Adverb, entire: Adjective</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>early: Adjective, swift: Adverb, almost: Adverb, entire: Adverb</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>early: Adjective, swift: Adjective, almost: Adjective, entire: Adverb</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J", "M", "L", "K"], "answer": "J", "explanation": "In the sentence: 'early' modifies 'warning' (a noun), making it an adjective. 'swift' modifies 'current' (a noun), making it an adjective. 'almost' modifies 'swept' (a verb), indicating degree, making it an adverb. 'entire' modifies 'boat' (a noun), making it an adjective. Therefore, option J correctly identifies all parts of speech."}, {"id": 15, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Consider the following statements about verbals:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>A gerund always functions as a noun in a sentence.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>An infinitive (to + verb) can function as a noun, an adjective, or an adverb.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>A present participle always functions as part of a continuous verb tense.</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>A past participle can function as an adjective. Which of the above statements are correct?</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and M only", "J and K only", "J, K, and M only", "J, K, L, and M"], "answer": "J, K, and M only", "explanation": "Statement J is correct: A gerund (verb + -ing) always functions as a noun (e.g., 'Swimming is my hobby'). Statement K is correct: An infinitive can be a noun, an adjective, or an adverb. Statement L is incorrect: A present participle can also function as an adjective (e.g., 'a running tap'). Statement M is correct: A past participle can function as an adjective (e.g., 'a broken window'). Therefore, J, K, and M are correct."}, {"id": 16, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">In the sentence: &quot;The downpour caused significant damage, and the residents had to down their tools and evacuate down the hill,&quot; identify the part of speech for each instance of &#x27;down&#x27;.</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>First &#x27;down&#x27;: Adjective, Second &#x27;down&#x27;: Verb, Third &#x27;down&#x27;: Preposition</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>First &#x27;down&#x27;: Adverb, Second &#x27;down&#x27;: Verb, Third &#x27;down&#x27;: Adverb</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>First &#x27;down&#x27;: Adjective, Second &#x27;down&#x27;: Noun, Third &#x27;down&#x27;: Preposition</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>First &#x27;down&#x27;: Noun, Second &#x27;down&#x27;: Verb, Third &#x27;down&#x27;: Preposition</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["K", "M", "L", "J"], "answer": "M", "explanation": "In \"The downpour,\" 'downpour' is a compound noun, where 'down' functions as part of the noun. In \"had to down their tools,\" 'down' is a verb meaning to put down. In \"evacuate down the hill,\" 'down' is a preposition showing direction relative to 'the hill'. Therefore, the correct classification is Noun, Verb, Preposition."}, {"id": 17, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">In the sentence: &quot;The old house, which stood on the hill, was finally sold to a young couple who wanted to renovate it,&quot; identify the type and function of the bolded clauses.</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>&quot;which stood on the hill&quot;: Adjective clause modifying &#x27;house&#x27;; &quot;who wanted to renovate it&quot;: Adjective clause modifying &#x27;couple&#x27;.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>&quot;which stood on the hill&quot;: Adverbial clause of place; &quot;who wanted to renovate it&quot;: Noun clause acting as object.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>&quot;which stood on the hill&quot;: Noun clause acting as subject complement; &quot;who wanted to renovate it&quot;: Adverbial clause of purpose.</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>&quot;which stood on the hill&quot;: Adjective clause modifying &#x27;house&#x27;; &quot;who wanted to renovate it&quot;: Noun clause acting as subject.</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["L", "M", "J", "K"], "answer": "J", "explanation": "The clause \"which stood on the hill\" is a relative clause providing more information about 'the old house'. Since it modifies a noun, it functions as an adjective clause. Similarly, \"who wanted to renovate it\" is a relative clause providing more information about 'a young couple', also functioning as an adjective clause. Therefore, option J correctly identifies both."}, {"id": 18, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem matching-stem\"><div class=\"grouped-intro\">Match the highlighted words/phrases in</div><div class=\"matching-grid\"><div class=\"matching-col\"><div class=\"matching-title\">List-I</div><div class=\"matching-row\"><span class=\"matching-label\">J</span><span>He is well known for his honesty.</span></div><div class=\"matching-row\"><span class=\"matching-label\">K</span><span>She did well in the examination.</span></div><div class=\"matching-row\"><span class=\"matching-label\">L</span><span>The above statement is true.</span></div><div class=\"matching-row\"><span class=\"matching-label\">M</span><span>Read the passage given above.</span></div></div><div class=\"matching-col\"><div class=\"matching-title\">List-II (1)</div><div class=\"matching-row\"><span class=\"matching-label\">2</span><span>Adjective</span></div><div class=\"matching-row\"><span class=\"matching-label\">3</span><span>Preposition</span></div><div class=\"matching-row\"><span class=\"matching-label\">4</span><span>Noun</span></div></div></div><div class=\"grouped-tail\">Choose the correct matching:</div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-1, L-2, M-1", "J-2, K-1, L-2, M-3", "J-1, K-2, L-3, M-1", "J-4, K-1, L-2, M-3"], "answer": "J-1, K-1, L-2, M-1", "explanation": "In 'well known', well modifies the adjective known, so it functions as an adverb. In 'She did well', well modifies the verb did, so it is an adverb. In 'above statement', above modifies the noun statement, so it is an adjective. In 'given above', above functions adverbially. Therefore, J-1, K-1, L-2, M-1 is correct."}, {"id": 19, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Arrange the following steps in a logical order for systematically identifying the parts of speech of words in a complex sentence:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>Identify the main verb(s) and their subjects.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>Determine if any words are conjunctions, prepositions, or interjections, as these often have fixed roles.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>Analyze remaining words to see if they modify nouns (adjectives) or verbs/adjectives/other adverbs (adverbs).</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>Identify all nouns and pronouns, considering their function (subject, object, complement).</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, M, L", "M, J, K, L", "K, J, M, L", "J, M, K, L"], "answer": "J, M, K, L", "explanation": "A logical sequence for analyzing parts of speech begins with identifying the core of the sentence: verbs and their subjects (J). Once these are established, other nouns and pronouns can be identified based on their roles (M). Next, words with relatively fixed roles like conjunctions, prepositions, and interjections can be identified (K). Finally, modifiers like adjectives and adverbs, whose function depends on what they modify, can be determined (L). Thus, J, M, K, L is the most systematic order."}, {"id": 20, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__In which of the following sentences is the word &#x27;but&#x27; used as a preposition?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Nobody but John knew the answer.", "I would go, but I am tired.", "He is small but strong.", "There is no one but admires her courage."], "answer": "Nobody but John knew the answer.", "explanation": "In option B, 'but' functions as a preposition meaning 'except' or 'apart from'. For example, \"Nobody except John knew the answer.\" In option A, 'but' is a coordinating conjunction. In option C, 'but' is a coordinating conjunction connecting two independent clauses. In option D, 'but' functions as a relative pronoun, meaning 'who does not' or 'that does not'."}, {"id": 21, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following statements accurately defines a &#x27;comma splice&#x27;?", "brand": "bilaspurtestseries.com 9669946966", "options": ["A sentence that lacks a subject or a predicate, failing to express a complete thought.", "A sentence where two independent clauses are joined only by a comma, without a coordinating conjunction or semicolon.", "A sentence in which a modifying phrase is placed so that it appears to modify an unintended word.", "A sentence where two or more independent clauses are joined without any punctuation or coordinating conjunction."], "answer": "A sentence where two independent clauses are joined only by a comma, without a coordinating conjunction or semicolon.", "explanation": "A comma splice occurs when two independent clauses (complete thoughts that could stand alone as sentences) are incorrectly joined by only a comma. To correct a comma splice, one can use a period, a semicolon, or a comma followed by a coordinating conjunction (e.g., and, but, or, so, for, yet, nor). Option A describes a sentence fragment. Option C describes a misplaced modifier. Option D describes a fused sentence (run-on sentence)."}, {"id": 22, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Analyze the following sentence: &#x27;Having finished the marathon, a long rest was much needed.&#x27; Which type of sentence structure error is present, and why?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Misplaced modifier, because 'much needed' is too far from 'rest'.", "Dangling modifier, because 'Having finished the marathon' illogically modifies 'a long rest' instead of the person who finished.", "Fused sentence, because two independent clauses are joined without punctuation.", "Comma splice, because 'Having finished the marathon' is an independent clause joined by a comma."], "answer": "Dangling modifier, because 'Having finished the marathon' illogically modifies 'a long rest' instead of the person who finished.", "explanation": "The sentence contains a dangling modifier. The introductory participial phrase \"Having finished the marathon\" implies that the subject of the main clause performed the action of finishing. However, \"a long rest\" cannot finish a marathon. The logical subject (the person who finished the marathon) is missing from the sentence. To correct it, one might write: \"Having finished the marathon, I needed a long rest.\" It is not a fused sentence or comma splice as there is only one independent clause ('a long rest was much needed'). It's not a misplaced modifier because the modifier's logical subject is absent, not just in the wrong place."}, {"id": 23, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following sentences contains a clear error in parallel structure?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The new policy aims to reduce waste, conserve energy, and improve efficiency.", "He was praised for his courage, his dedication, and his unwavering commitment.", "She enjoys hiking in the mountains, swimming in the lake, and to explore new cities.", "They decided either to renovate the old building or to construct a new one."], "answer": "She enjoys hiking in the mountains, swimming in the lake, and to explore new cities.", "explanation": "This sentence contains an error in parallel structure. The first two items in the series ('hiking in the mountains', 'swimming in the lake') are gerund phrases. However, the third item ('to explore new cities') is an infinitive phrase. For correct parallelism, all elements in a list should be in the same grammatical form. It should be \"She enjoys hiking in the mountains, swimming in the lake, and exploring new cities.\" The other options maintain consistent grammatical forms within their respective lists."}, {"id": 24, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Compare the following two sentences: Sentence</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">1</span>&#x27;Running quickly, the bus was missed by the student.&#x27; Sentence</div><div class=\"statement-line\"><span class=\"statement-label\">2</span>&#x27;The student, running quickly, missed the bus.&#x27; Which statement accurately describes the structural difference and correctness?</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["Sentence 1 contains a misplaced modifier, while Sentence 2 is correct.", "Both sentences are grammatically correct and convey the same meaning.", "Sentence 1 contains a dangling modifier, while Sentence 2 is correct.", "Both sentences contain a structural error, but of different types."], "answer": "Sentence 1 contains a dangling modifier, while Sentence 2 is correct.", "explanation": "In Sentence 1, 'Running quickly' illogically modifies 'the bus', implying the bus was running quickly, which is a dangling modifier. The intended subject, 'the student', is not the grammatical subject of the introductory phrase. Sentence 2 correctly places the participial phrase 'running quickly' next to 'the student' it modifies, making it structurally sound and clear. Therefore, Sentence 1 has a dangling modifier, and Sentence 2 is correct."}, {"id": 25, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">Assertion (A):</span><span class=\"stmt-text\">A fused sentence is a type of run-on sentence.</span></div><div class=\"statement-line\"><span class=\"statement-label\">Reason (R):</span><span class=\"stmt-text\">Both fused sentences and comma splices involve joining independent clauses incorrectly.</span></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is not the correct explanation of A.", "Both A and R are true, and R is the correct explanation of A.", "A is true, but R is false.", "A is false, but R is true."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "A fused sentence is indeed a type of run-on sentence where two independent clauses are joined without any punctuation or conjunction. The reason correctly explains this by stating that both fused sentences (no punctuation) and comma splices (only a comma) are categories of run-on sentences because they both involve the incorrect joining of independent clauses. Thus, R provides a valid explanation for A."}, {"id": 26, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">Assertion (A):</span><span class=\"stmt-text\">Every grammatically correct sentence must contain at least one subject and one finite verb.</span></div><div class=\"statement-line\"><span class=\"statement-label\">Reason (R):</span><span class=\"stmt-text\">A sentence expresses a complete thought, and a subject performing an action (or being in a state) is essential for completeness.</span></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["A is false, but R is true.", "A is true, but R is false.", "Both A and R are true, and R is the correct explanation of A.", "Both A and R are true, but R is not the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Assertion (A) is true; the core of any grammatically complete sentence (an independent clause) requires at least one subject and one finite verb to form a predicate. Reason (R) correctly explains why this is necessary: a complete thought, which is the definition of a sentence, inherently requires an actor (subject) and an action/state (finite verb) to be fully expressed. Therefore, R directly supports and explains A."}, {"id": 27, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Consider the following sentences:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>Having studied all night, the exam seemed easy to the student.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>The team not only won the championship, but also they broke several records.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>Neither the manager nor the employees was informed about the sudden policy change.</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>She decided to quit her job, for she found a better opportunity elsewhere. Which of the above sentences contain a sentence structure error?</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, and M", "J and K only", "J, K, and L only", "K and L only"], "answer": "J, K, and L only", "explanation": "Let's analyze each sentence: J. 'Having studied all night, the exam seemed easy to the student.' This is a dangling modifier. The introductory phrase 'Having studied all night' illogically modifies 'the exam.' Exams don't study. The sentence should be 'Having studied all night, the student found the exam easy.' K. 'The team not only won the championship, but also they broke several records.' This contains a redundant pronoun ('they') and a parallelism error with the correlative conjunction 'not only...but also'. The structure should be parallel after 'not only' and 'but also'. A better phrasing would be 'The team not only won the championship but also broke several records.' or 'The team not only won the championship, but it also broke several records.' The current structure is flawed. L. 'Neither the manager nor the employees was informed about the sudden policy change.' This has a subject-verb agreement error. With 'neither...nor', the verb agrees with the noun closest to it. 'Employees' is plural, so the verb should be 'were' ('Neither the manager nor the employees were informed...'). M. 'She decided to quit her job, for she found a better opportunity elsewhere.' This sentence is grammatically correct. 'For' here acts as a coordinating conjunction meaning 'because', correctly joining two independent clauses with a comma before it. It is a valid compound sentence. Therefore, sentences J, K, and L contain structural errors."}, {"id": 28, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Evaluate the correctness of the following statements regarding sentence structure:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>A sentence with a compound subject always requires a plural verb.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>Subordinating conjunctions always introduce dependent clauses.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>A non-restrictive clause must always be set off by commas.</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>A sentence can be grammatically correct even if it contains a comma splice, provided the clauses are short.</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and M are incorrect; K and L are correct.", "J, K, and M are incorrect; L is correct.", "J, L, and M are incorrect; K is correct.", "J and L are incorrect; K and M are correct."], "answer": "J and M are incorrect; K and L are correct.", "explanation": "Statement J is incorrect: A compound subject joined by 'or' or 'nor' takes a singular verb if both subjects are singular, or agrees with the closer subject. Statement K is correct: Subordinating conjunctions (e.g., 'because', 'although', 'while') always introduce dependent clauses. Statement L is correct: Non-restrictive clauses provide extra, non-essential information and must be set off by commas. Statement M is incorrect: A comma splice is always a grammatical error, regardless of the length of the clauses; it requires correction with a semicolon, period, or coordinating conjunction."}, {"id": 29, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Which of the following sentences, despite appearing complex, is structurally flawed due to a subtle error?</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>The reason why he left was because he felt unappreciated.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>Not only did she excel in academics, but also in sports.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>Having completed the marathon, a long rest was what he needed.</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>The committee decided that the project was feasible and that it should proceed.</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, and M", "J, K, and L only", "J and L only", "K and L only"], "answer": "J and L only", "explanation": "Sentence J contains a redundancy error known as 'the reason...is because'. 'The reason why' already implies causation, so 'because' is superfluous. It should be 'The reason he left was that he felt unappreciated.' Sentence L has a dangling modifier; 'Having completed the marathon' illogically modifies 'a long rest' instead of the person who completed the marathon. Sentence K is correct; 'Not only...but also' is used correctly with parallel structure. Sentence M is also correct, using parallel 'that' clauses. Therefore, J and L are the flawed sentences."}, {"id": 30, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Identify the correct statements regarding common sentence structure errors:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>A run-on sentence can always be corrected by adding a comma.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>A sentence fragment always lacks a verb.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>Misplaced modifiers can create ambiguity or humorous unintended meanings.</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>Parallelism errors occur when elements in a series or comparison are not in the same grammatical form.</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["L and M only", "J, K, L, and M", "J and K only", "K, L, and M only"], "answer": "L and M only", "explanation": "Statement J is incorrect; adding only a comma to a run-on sentence creates a comma splice, which is still an error. It needs a semicolon, a period, or a comma with a coordinating conjunction. Statement K is incorrect; a sentence fragment can lack a subject, a complete verb, or both. Statement L is correct; misplaced modifiers often lead to confusion or comical interpretations because they appear to modify the wrong word. Statement M is correct; parallelism requires elements of equal importance to be expressed in the same grammatical structure."}, {"id": 31, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem matching-stem\"><div class=\"grouped-intro\">Match the sentence structure error in</div><div class=\"matching-grid\"><div class=\"matching-col\"><div class=\"matching-title\">List I</div><div class=\"matching-row\"><span class=\"matching-label\">J</span><span>Comma Splice</span></div><div class=\"matching-row\"><span class=\"matching-label\">K</span><span>Dangling Modifier</span></div><div class=\"matching-row\"><span class=\"matching-label\">L</span><span>Fused Sentence</span></div><div class=\"matching-row\"><span class=\"matching-label\">M</span><span>Parallelism Error</span></div></div><div class=\"matching-col\"><div class=\"matching-title\">List-II (1)</div><div class=\"matching-row\"><span class=\"matching-label\">2</span><span>Elements in a series or comparison lack consistent grammatical form.</span></div><div class=\"matching-row\"><span class=\"matching-label\">3</span><span>An introductory phrase or clause does not logically modify the subject of the main clause.</span></div><div class=\"matching-row\"><span class=\"matching-label\">4</span><span>Two independent clauses joined only by a comma.</span></div></div></div><div class=\"grouped-tail\">Choose the correct matching pair:</div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-2, L-3, M-4", "J-4, K-2, L-1, M-3", "J-3, K-4, L-2, M-1", "J-4, K-3, L-1, M-2"], "answer": "J-4, K-3, L-1, M-2", "explanation": "J (Comma Splice) matches with 4 (Two independent clauses joined only by a comma). K (Dangling Modifier) matches with 3 (An introductory phrase or clause does not logically modify the subject of the main clause). L (Fused Sentence) matches with 1 (Two independent clauses joined without any punctuation). M (Parallelism Error) matches with 2 (Elements in a series or comparison lack consistent grammatical form). This pairing correctly defines each error type."}, {"id": 32, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Arrange the following steps in the logical order for effectively identifying and correcting a run-on sentence:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>Identify the independent clauses within the sentence.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>Choose an appropriate correction method (e.g., period, semicolon, coordinating conjunction, subordinating conjunction).</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>Determine if the clauses are joined incorrectly (e.g., with only a comma or no punctuation).</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>Rewrite the sentence using the chosen correction method.</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "K, J, L, M", "J, L, K, M", "L, J, K, M"], "answer": "J, L, K, M", "explanation": "The most logical sequence for correcting a run-on sentence begins with identifying the independent clauses (J). Once identified, you then determine if they are joined incorrectly (L), which confirms it's a run-on. After confirming the error, you choose the most appropriate correction method (K). Finally, you apply that method by rewriting the sentence (M). This systematic approach ensures accurate identification and correction."}, {"id": 33, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__What is the primary process of word formation where two or more existing words are combined to form a new word with a new meaning?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Derivation", "Conversion", "Blending", "Compounding"], "answer": "Compounding", "explanation": "Compounding is the process of joining two or more independent words to create a new word, such as 'sun' + 'flower' = 'sunflower'. Derivation involves adding affixes, blending combines parts of words, and conversion changes a word's part of speech without changing its form."}, {"id": 34, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The word &#x27;to google&#x27; (meaning to search on the internet) is formed from the proper noun &#x27;Google&#x27; through which word formation process?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Conversion", "Blending", "Compounding", "Back-formation"], "answer": "Conversion", "explanation": "Conversion (or zero derivation) is a word formation process where a word changes its part of speech without any change in its form. In this case, the proper noun 'Google' is used as a verb 'to google' without any morphological alteration. Back-formation involves removing an affix, compounding combines two words, and blending combines parts of words."}, {"id": 35, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following words is an example of back-formation?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Flu (shortened from 'influenza')", "Edit (derived from 'editor')", "NASA (from 'National Aeronautics and Space Administration')", "Brunch (from 'breakfast' and 'lunch')"], "answer": "Edit (derived from 'editor')", "explanation": "Back-formation is a word formation process where a word is formed by removing an imagined affix from an existing word. In this case, 'edit' was formed by removing the '-or' suffix from 'editor'. 'Brunch' is an example of blending, combining parts of two words ('breakfast' and 'lunch'). 'NASA' is an acronym, formed from the initial letters of a phrase and pronounced as a word. 'Flu' is an example of clipping, where a word is shortened ('influenza' to 'flu')."}, {"id": 36, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following words is NOT primarily formed through the process of derivation?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Government", "Quickly", "Unhappy", "Brunch"], "answer": "Brunch", "explanation": "Derivation involves adding affixes (prefixes or suffixes) to a root word to create a new word, often changing its part of speech or meaning. 'Unhappy' (un- + happy), 'government' (govern + -ment), and 'quickly' (quick + -ly) are all formed by derivation. 'Brunch' is a blend of 'breakfast' and 'lunch', not a derived word."}, {"id": 37, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Classify the word &#x27;smog&#x27; according to its word formation process.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Compounding", "Back-formation", "Blending", "Clipping"], "answer": "Blending", "explanation": "'Smog' is a blend, formed by combining parts of two words: 'smoke' and 'fog'. Compounding combines whole words, clipping shortens a word, and back-formation creates a new word by removing a perceived affix."}, {"id": 38, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__The word &#x27;editor&#x27; led to the formation of the verb &#x27;edit&#x27;. This is an example of which word formation process, and why?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Derivation, because a suffix was added.", "Back-formation, because a perceived affix was removed.", "Conversion, because the word changed its part of speech.", "Compounding, because two words were combined."], "answer": "Back-formation, because a perceived affix was removed.", "explanation": "Back-formation is the process of creating a new word by removing an affix from an existing word, often resulting in a change of part of speech. In this case, the suffix '-or' was removed from 'editor' to form the verb 'edit'. Derivation adds affixes, conversion changes part of speech without morphological change, and compounding combines words."}, {"id": 39, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Consider the word &#x27;telecommute&#x27;. While it combines &#x27;tele-&#x27; and &#x27;commute&#x27;, which word formation process best describes its overall creation, considering &#x27;tele-&#x27; as a bound morpheme?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Derivation", "Compounding", "Neo-classical compounding", "Blending"], "answer": "Neo-classical compounding", "explanation": "'Telecommute' is an example of neo-classical compounding. It combines a classical element ('tele-', from Greek, meaning 'far') with a modern English word ('commute'). While it resembles compounding, the use of bound classical elements distinguishes it from typical English compounding of free morphemes. Derivation involves standard prefixes/suffixes, and blending combines parts of words."}, {"id": 40, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following sentences contains a word formed by &#x27;eponymy&#x27;?", "brand": "bilaspurtestseries.com 9669946966", "options": ["She received a photocopy of the document.", "The internet has revolutionized communication.", "He used a hoover to clean the carpet.", "They had a delicious brunch on Sunday."], "answer": "He used a hoover to clean the carpet.", "explanation": "Eponymy is the process where a word is formed from the name of a person or place. 'Hoover' (a brand name, originally a person's name) is used as a generic verb or noun for a vacuum cleaner, making it an eponym. 'Photocopy' is a compound, 'internet' is a blend/compound, and 'brunch' is a blend."}, {"id": 41, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Consider the following statements regarding word formation processes:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">I:</span><span class=\"stmt-text\">While suffixes frequently alter a word&#x27;s grammatical category, prefixes primarily change its meaning without altering its part of speech.</span></div><div class=\"statement-line\"><span class=\"statement-label\">II:</span><span class=\"stmt-text\">A compound word in English is always written as a single, unhyphenated unit.</span></div><div class=\"statement-line\"><span class=\"statement-label\">III:</span><span class=\"stmt-text\">The process of &#x27;conversion&#x27; involves changing a word&#x27;s part of speech without adding any affixes, such as using &#x27;google&#x27; (noun) as a verb. Which of the statements is/are correct?</span></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["I and III", "II and III", "Only II", "Only I"], "answer": "I and III", "explanation": "Statement I is correct. Suffixes often change a word's grammatical category (e.g., 'govern' (verb) to 'government' (noun), 'happy' (adjective) to 'happiness' (noun)). Prefixes, on the other hand, typically modify the meaning of a word but usually do not change its part of speech (e.g., 'happy' (adj) to 'unhappy' (adj), 'write' (verb) to 'rewrite' (verb)). Statement II is incorrect. Compound words in English can be written in three ways: as a single, closed unit (e.g., 'notebook'), as two separate words (open compound, e.g., 'ice cream'), or hyphenated (e.g., 'sister-in-law'). Statement III is correct. Conversion (also known as zero derivation) is a process where a word changes its grammatical category without any change in its form or the addition of affixes. For example, 'google' (originally a noun, the company name) is now commonly used as a verb ('to google something')."}, {"id": 42, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following word formation processes is least likely to result in a significant change in the semantic meaning of the original base word(s)?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Derivation with a negative prefix (e.g., 'un-')", "Clipping (e.g., 'phone' from 'telephone')", "Blending (e.g., 'motel' from 'motor' and 'hotel')", "Compounding (e.g., 'blackboard')"], "answer": "Clipping (e.g., 'phone' from 'telephone')", "explanation": "Clipping primarily shortens a word without altering its core meaning; 'phone' still means 'telephone'. Derivation with a negative prefix directly changes the meaning (happy vs. unhappy). Compounding often creates a new meaning that is not simply the sum of its parts (a 'blackboard' is not just any board that is black). Blending also creates a new concept by merging parts of words, often with a distinct meaning (a 'motel' is a specific type of hotel for motorists)."}, {"id": 43, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following sets of words are all examples of acronyms?", "brand": "bilaspurtestseries.com 9669946966", "options": ["NATO, radar, scuba", "Smog, brunch, motel", "ASAP, LOL, NASA", "FBI, USA, UNESCO"], "answer": "NATO, radar, scuba", "explanation": "Acronyms are words formed from the initial letters of other words and pronounced as a word. 'NATO' (North Atlantic Treaty Organization), 'radar' (radio detecting and ranging), and 'scuba' (self-contained underwater breathing apparatus) are all pronounced as words. Option B contains initialisms (FBI, USA) and an acronym (UNESCO). Option C contains blends. Option D contains initialisms (ASAP, LOL) and an acronym (NASA)."}, {"id": 44, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">Assertion (A):</span><span class=\"stmt-text\">The word &#x27;modem&#x27; is an example of blending.</span></div><div class=\"statement-line\"><span class=\"statement-label\">Reason (R):</span><span class=\"stmt-text\">Blending involves combining parts of two or more words to form a new word.</span></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["A is false, but R is true.", "Both A and R are true, but R is not the correct explanation of A.", "A is true, but R is false.", "Both A and R are true, and R is the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "The assertion is true; 'modem' is a blend of 'modulator' and 'demodulator'. The reason is also true and correctly explains the process of blending, which involves merging parts of existing words to create a new one."}, {"id": 45, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">Assertion (A):</span><span class=\"stmt-text\">The word &#x27;edit&#x27; (verb) formed from &#x27;editor&#x27; (noun) is an example of conversion.</span></div><div class=\"statement-line\"><span class=\"statement-label\">Reason (R):</span><span class=\"stmt-text\">Conversion is the process where a word changes its grammatical category without adding or removing any affixes.</span></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is not the correct explanation of A.", "A is true, but R is false.", "Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true."], "answer": "A is false, but R is true.", "explanation": "The assertion is false. The word 'edit' formed from 'editor' is an example of back-formation, where a perceived affix ('-or') is removed. Conversion involves changing a word's part of speech without any morphological change (e.g., 'book' as a noun to 'book' as a verb). The reason (R) accurately defines conversion."}, {"id": 46, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Consider the following words from a passage:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>&#x27;Smartphone&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>&#x27;Blog&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>&#x27;Unfriend&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>&#x27;Lab&#x27; Which of the following correctly identifies the word formation process for each word?</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J: Compounding, K: Blending, L: Derivation, M: Clipping", "J: Compounding, K: Blending, L: Conversion, M: Derivation", "J: Compounding, K: Clipping, L: Conversion, M: Blending", "J: Blending, K: Compounding, L: Derivation, M: Clipping"], "answer": "J: Compounding, K: Blending, L: Derivation, M: Clipping", "explanation": "'Smartphone' is a compound (smart + phone). 'Blog' is a blend of 'web' and 'log'. 'Unfriend' is formed by derivation (un- + friend). 'Lab' is a clipped form of 'laboratory'. Option A correctly matches these processes."}, {"id": 47, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Which of the following statements about word formation processes are generally true?</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>The group {&#x27;Smog&#x27;, &#x27;brunch&#x27;, &#x27;motel&#x27;} consists entirely of blends.</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>The group {&#x27;Editor&#x27;, &#x27;actor&#x27;, &#x27;teacher&#x27;} consists entirely of words formed by derivation.</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>The group {&#x27;NASA&#x27;, &#x27;NATO&#x27;, &#x27;radar&#x27;} consists entirely of acronyms.</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>The group {&#x27;Unkind&#x27;, &#x27;quickly&#x27;, &#x27;government&#x27;} consists entirely of words formed by derivation.</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["All of the above", "J, K, and M only", "J, K, and L only", "K, L, and M only"], "answer": "All of the above", "explanation": "Statement J is true: 'Smog' (smoke + fog), 'brunch' (breakfast + lunch), 'motel' (motor + hotel) are all blends. Statement K is true: 'Editor' (edit + -or), 'actor' (act + -or), 'teacher' (teach + -er) are all formed by derivation. Statement L is true: 'NASA', 'NATO', and 'radar' are all acronyms. Statement M is true: 'Unkind' (un- + kind), 'quickly' (quick + -ly), 'government' (govern + -ment) are all formed by derivation. Since all statements are accurate, 'All of the above' is the correct choice."}, {"id": 48, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Identify the word(s) below that are NOT formed by the process of compounding:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>&#x27;Blackboard&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>&#x27;Greenhouse&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>&#x27;Breakdown&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>&#x27;Undergo&#x27;</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["All of the above (none are compounds)", "None of the above (all are compounds)", "Only J", "Only K and L"], "answer": "None of the above (all are compounds)", "explanation": "Compounding is the process of combining two or more free morphemes (words) to create a new word. 'Blackboard' (black + board), 'Greenhouse' (green + house), 'Breakdown' (break + down), and 'Undergo' (under + go) are all examples of compounding. Therefore, none of the listed words are not formed by compounding."}, {"id": 49, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Which of the following groups of words are all examples of different word formation processes?</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>&#x27;Blackboard&#x27;, &#x27;unhappy&#x27;, &#x27;smog&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>&#x27;Phone&#x27;, &#x27;edit&#x27;, &#x27;google&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>&#x27;NASA&#x27;, &#x27;radar&#x27;, &#x27;scuba&#x27;</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>&#x27;Teacher&#x27;, &#x27;quickly&#x27;, &#x27;government&#x27;</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["K only", "J and K only", "J only", "L and M only"], "answer": "J and K only", "explanation": "The question asks for groups where each word is formed by a different word formation process. Group J contains 'Blackboard' (compounding), 'unhappy' (derivation), and 'smog' (blending), which are three different processes. Group K contains 'Phone' (clipping), 'edit' (back-formation), and 'google' (conversion), which are also three different processes. Group L ('NASA', 'radar', 'scuba') consists entirely of acronyms, and Group M ('Teacher', 'quickly', 'government') consists entirely of derivations. Therefore, only groups J and K fit the criteria."}, {"id": 50, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem matching-stem\"><div class=\"grouped-intro\">Match the words in</div><div class=\"matching-grid\"><div class=\"matching-col\"><div class=\"matching-title\">List I</div><div class=\"matching-row\"><span class=\"matching-label\">J</span><span>&#x27;Sitcom&#x27;</span></div><div class=\"matching-row\"><span class=\"matching-label\">K</span><span>&#x27;Chic&#x27;</span></div><div class=\"matching-row\"><span class=\"matching-label\">L</span><span>&#x27;Disinformation&#x27;</span></div><div class=\"matching-row\"><span class=\"matching-label\">M</span><span>&#x27;Burglarize&#x27;</span></div></div><div class=\"matching-col\"><div class=\"matching-title\">List-II (1)</div><div class=\"matching-row\"><span class=\"matching-label\">2</span><span>Blending</span></div><div class=\"matching-row\"><span class=\"matching-label\">3</span><span>Derivation</span></div><div class=\"matching-row\"><span class=\"matching-label\">4</span><span>Borrowing</span></div></div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-3, L-4, M-1", "J-1, K-3, L-2, M-4", "J-2, K-4, L-3, M-1", "J-4, K-2, L-1, M-3"], "answer": "J-2, K-4, L-3, M-1", "explanation": "P. 'Sitcom' is a blend of 'situation' and 'comedy'. Q. 'Chic' is a word borrowed from French. R. 'Disinformation' is formed by derivation, adding the prefix 'dis-' to 'information'. S. 'Burglarize' is a back-formation from 'burglar'. Thus, the correct matching is P-2, Q-4, R-3, S-1."}, {"id": 51, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__<div class=\"grouped-stem\"><div class=\"grouped-intro\">Arrange the following stages of word formation, from the most basic morphological unit to the most complex derived word:</div><div class=\"statement-box\"><div class=\"statement-line\"><span class=\"statement-label\">J</span>Free morpheme</div><div class=\"statement-line\"><span class=\"statement-label\">K</span>Root word with a derivational suffix</div><div class=\"statement-line\"><span class=\"statement-label\">L</span>Compound word</div><div class=\"statement-line\"><span class=\"statement-label\">M</span>Inflected form of a word</div></div></div>", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, M, K, L", "J, K, L, M", "K, J, M, L", "J, K, M, L"], "answer": "J, K, M, L", "explanation": "The logical order of morphological complexity is: J. Free morpheme (e.g., 'run') is the basic unit. K. Root word with a derivational suffix (e.g., 'runner' from 'run' + '-er') creates a new lexical item. M. Inflected form of a word (e.g., 'runners' from 'runner' + '-s') adds grammatical information without changing the core meaning or part of speech. L. Compound word (e.g., 'runner-up' from 'runner' + 'up') combines existing words or derived forms, representing a higher level of complexity. Therefore, the correct chronological order is J, K, M, L."}, {"id": 52, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following words is an example of a &#x27;folk etymology&#x27;?", "brand": "bilaspurtestseries.com 9669946966", "options": ["'Hamburger' (from Hamburg, Germany)", "'Bridal' (from bride + -al)", "'Asparagus' (mispronounced as 'sparrowgrass')", "'Workaholic' (from work + -aholic)"], "answer": "'Asparagus' (mispronounced as 'sparrowgrass')", "explanation": "Folk etymology is a process where the form of an unfamiliar word is altered to make it resemble more familiar words, often based on a mistaken belief about its origin or meaning. 'Asparagus' being reinterpreted as 'sparrowgrass' is a classic example. 'Hamburger' is an eponym/derivation from a place name. 'Bridal' is a derivation. 'Workaholic' is a blend/derivation using a combining form, not a folk etymology."}, {"id": 53, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__What is identified as one of the most pressing environmental challenges of our time in the passage?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Biodiversity loss", "Climate change", "Plastic pollution", "Greenhouse gas emissions"], "answer": "Plastic pollution", "explanation": "The first sentence explicitly states, 'The pervasive issue of plastic pollution has emerged as one of the most pressing environmental challenges of our time.'", "passage_id": "P1", "passage_title": "The Global Challenge of Plastic Pollution", "passage_text": "The pervasive issue of plastic pollution has emerged as one of the most pressing environmental challenges of our time. From the deepest ocean trenches to the highest mountain peaks, plastic debris infiltrates every corner of our planet, posing severe threats to ecosystems and human health. Annually, millions of tons of plastic waste enter our oceans, where it breaks down into microplastics, ingested by marine life, and subsequently enters the food chain. This process not only harms individual organisms but also disrupts entire marine ecosystems, leading to biodiversity loss and ecological imbalance.\n\nBeyond marine environments, plastic pollution contaminates soil and freshwater sources, affecting agriculture and drinking water supplies. The production of plastics, primarily from fossil fuels, also contributes significantly to greenhouse gas emissions, exacerbating climate change. The sheer durability of plastic, once considered its greatest asset, is now its most detrimental characteristic, as it can persist in the environment for hundreds of years.\n\nAddressing this multifaceted crisis requires a comprehensive approach. Reducing single-use plastics through policy changes and consumer choices is paramount. Investing in innovative recycling technologies and developing biodegradable alternatives are also crucial steps. Furthermore, fostering a circular economy, where resources are reused and recycled rather than discarded, offers a sustainable pathway forward. Public awareness campaigns play a vital role in educating individuals about responsible consumption and waste management. Ultimately, tackling plastic pollution demands global cooperation and a collective shift towards more sustainable practices to safeguard our planet for future generations."}, {"id": 54, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__According to the passage, what happens to plastic waste once it enters the oceans?", "brand": "bilaspurtestseries.com 9669946966", "options": ["It is collected by ocean currents and forms new landmasses.", "It immediately dissolves and disappears.", "It is primarily consumed by birds, not marine life.", "It breaks down into microplastics and is ingested by marine life."], "answer": "It breaks down into microplastics and is ingested by marine life  Pollution", "passage_text": "The pervasive issue of plastic pollution has emerged as one of the most pressing environmental challenges of our time. From the deepest ocean trenches to the highest mountain peaks, plastic debris infiltrates every corner of our planet, posing severe threats to ecosystems and human health. Annually, millions of tons of plastic waste enter our oceans, where it breaks down into microplastics, ingested by marine life, and subsequently enters the food chain. This process not only harms individual organisms but also disrupts entire marine ecosystems, leading to biodiversity loss and ecological imbalance.\n\nBeyond marine environments, plastic pollution contaminates soil and freshwater sources, affecting agriculture and drinking water supplies. The production of plastics, primarily from fossil fuels, also contributes significantly to greenhouse gas emissions, exacerbating climate change. The sheer durability of plastic, once considered its greatest asset, is now its most detrimental characteristic, as it can persist in the environment for hundreds of years.\n\nAddressing this multifaceted crisis requires a comprehensive approach. Reducing single-use plastics through policy changes and consumer choices is paramount. Investing in innovative recycling technologies and developing biodegradable alternatives are also crucial steps. Furthermore, fostering a circular economy, where resources are reused and recycled rather than discarded, offers a sustainable pathway forward. Public awareness campaigns play a vital role in educating individuals about responsible consumption and waste management. Ultimately, tackling plastic pollution demands global cooperation and a collective shift towards more sustainable practices to safeguard our planet for future generations."}, {"id": 61, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Imagine a new technology emerges that can completely break down all types of plastic into harmless organic compounds within hours. How would this technology impact the &#x27;circular economy&#x27; concept discussed in the passage?", "brand": "bilaspurtestseries.com 9669946966", "options": ["It would shift the focus of the circular economy from plastic reuse/recycling to other materials.", "It would have no impact on the circular economy, as the concept is unrelated to waste management.", "It would make the circular economy concept entirely obsolete as plastic would no longer be a problem.", "It would reinforce the need for a circular economy by making plastic recycling even more efficient."], "answer": "It would shift the focus of the circular economy from plastic reuse/recycling to other materials.", "explanation": "The circular economy aims to keep resources in use for as long as possible, extracting maximum value from them whilst in use, then recovering and regenerating products and materials at the end of each service life. If plastic can be broken down into harmless organic compounds within hours, the need for reusing and recycling plastic (as part of the circular economy's plastic strategy) would diminish significantly. The focus would shift to managing other materials within the circular economy framework, as plastic would no longer be a persistent waste issue requiring complex reuse/recycling loops. It wouldn't make the concept obsolete (A) because the circular economy applies to all resources, not just plastic. It wouldn't reinforce plastic recycling (B) because the plastic is broken down, not recycled in the traditional sense.", "passage_id": "P1", "passage_title": "The Global Challenge of Plastic Pollution", "passage_text": "The pervasive issue of plastic pollution has emerged as one of the most pressing environmental challenges of our time. From the deepest ocean trenches to the highest mountain peaks, plastic debris infiltrates every corner of our planet, posing severe threats to ecosystems and human health. Annually, millions of tons of plastic waste enter our s, which thrive on shared physical presence, vulnerability, and sustained empathetic effort.\n\nThe allure of instant gratification inherent in digital communication further complicates this landscape. The expectation of immediate responses and the rapid consumption of content can diminish our capacity for patience and deep reflection, qualities essential for nurturing meaningful bonds. Moreover, the algorithms that govern our digital experiences often create echo chambers, reinforcing existing beliefs and limiting exposure to diverse perspectives. This intellectual insularity, while offering a comforting sense of belonging within a like-minded group, can simultaneously foster a collective myopia, making genuine dialogue across ideological divides increasingly challenging. The digital realm, initially hailed as a democratizing force, thus presents a complex tapestry of opportunities and pitfalls, demanding a critical re-evaluation of what it truly means to be connected in the 21st century. The challenge lies not in rejecting technology, but in consciously cultivating the virtues of presence, empathy, and critical discernment to navigate its intricate currents without losing sight of our shared humanity."}, {"id": 73, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Identify the figure of speech used in the line &quot;I wandered lonely as a cloud&quot;.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Simile", "Hyperbole", "Personification", "Metaphor"], "answer": "Simile", "explanation": "A simile is a figure of speech that directly compares two different things, usually by employing the words \"like\" or \"as\". Here, the speaker's wandering is compared to a cloud using \"as\".", "passage_id": "P3", "passage_title": "From 'Daffodils' by William Wordsworth", "passage_text": "I wandered lonely as a cloud\nThat floats on high o'er vales and hills,\nWhen all at once I saw a crowd,\nA host, of golden daffodils;\nBeside the lake, beneath the t  saw a crowd,\nA host, of golden daffodils;\nBeside the lake, beneath the trees,\nFluttering and dancing in the breeze.\nContinuous as the stars that shine\nAnd twinkle on the milky way,\nThey stretched in never-ending line\nAlong the margin of a bay:\nTen thousand saw I at a glance,\nTossing their heads in sprightly dance."}, {"id": 76, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__What is the grammatical function of the word &quot;golden&quot; in the phrase &quot;A host, of golden daffodils&quot;?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Verb", "Adjective", "Noun", "Adverb"], "answer": "Adjective", "explanation": "\"Golden\" describes the noun \"daffodils,\" indicating their color, and thus functions as an adjective.", "passage_id": "P3", "passage_title": "From 'Daffodils' by William Wordsworth", "passage_text": "I wandered lonely as a cloud\nThat floats on high o'er vales and hills,\nWhen all at once I saw a crowd,\nA host, of golden daffodils;\nBeside the lake, beneath the trees,\nFluttering and dancing in the breeze.\nContinuous as the stars that shine\nAnd twinkle on the milky way,\nThey stretched in never-ending line\nAlong the margin of a bay:\nTen thousand saw I at a glance,\nTossing their heads in sprightly dance."}, {"id": 77, "section": "English", "question": "__AZAD_SAFE_QUESTION_HTML_R1__Which of the following words from the passage is an example of a collective noun?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Crowd", "Hills", "Breeze", "Lake"], "answer": "Crowd", "explanation": "A collective noun refers to a group of individuals or things. \"Crowd\" refers to a group of daffodils, making it a collective noun. \"Host\" is also a collective noun in this context.", "passage_id": "P3", "passage_title": "From 'Daffodils' by William Wordsworth", "passage_text": "I wandered lonely as a cloud\nThat floats on high o'er vales and hills,\nWhen all at once I saw a crowd,\nA host, of golden daffodils;\nBesid
