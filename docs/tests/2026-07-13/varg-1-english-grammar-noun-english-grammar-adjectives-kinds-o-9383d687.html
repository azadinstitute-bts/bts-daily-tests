69946966", "options": ["He drives very fastly on the highway.", "She sings quite beautifully.", "They arrived rather late for the meeting.", "I hardly ever go to the cinema."], "answer": "He drives very fastly on the highway.", "explanation": "The word 'fastly' is incorrect. 'Fast' functions as both an adjective and an adverb, so the correct adverbial form is 'fast', not 'fastly'. The sentence should be \"He drives very fast on the highway.\" Options B, C, and D use adverbs correctly: 'quite' modifies 'beautifully', 'rather' modifies 'late', and 'hardly ever' is a correct adverbial phrase of frequency."}, {"id": 83, "section": "English Grammar", "question": "Which of the following statements best distinguishes a preposition from a conjunction?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Conjunctions always precede a verb, while prepositions always follow a noun.", "A preposition introduces a noun phrase, indicating its relation to another word, whereas a conjunction joins words, phrases, or clauses.", "Both prepositions and conjunctions primarily modify verbs, but prepositions also modify adjectives.", "A preposition connects two clauses, while a conjunction shows the relationship between a noun and another word."], "answer": "A preposition introduces a noun phrase, indicating its relation to another word, whereas a conjunction joins words, phrases, or clauses.", "explanation": "Option B accurately defines the distinct roles of prepositions and conjunctions. A preposition establishes a relationship between its object (a noun or pronoun) and another part of the sentence, forming a prepositional phrase. A conjunction, on the other hand, serves to connect grammatical units of similar or dissimilar types. Option A incorrectly swaps their functions, and options C and D provide incorrect functional descriptions for both parts of speech."}, {"id": 84, "section": "English Grammar", "question": "Consider the word \"round\" in the following two sentences:\n1. The children ran round the tree.\n2. The table is round. What parts of speech does \"round\" function as in sentences 1 and 2, respectively?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Adverb, Adjective", "Preposition, Adverb", "Adjective, Adverb", "Preposition, Adjective"], "answer": "Preposition, Adjective", "explanation": "In sentence 1, \"round\" acts as a preposition, showing the spatial relationship between the action of running and \"the tree\" (it introduces the noun phrase \"the tree\"). In sentence 2, \"round\" describes the noun \"table,\" thus functioning as an adjective. Option A is incorrect because \"round\" in sentence 1 is not modifying the verb \"ran\" in terms of manner, but rather indicating direction/position relative to the tree."}, {"id": 85, "section": "English Grammar", "question": "Which of the following statements about parts of speech is TRUE?", "brand": "bilaspurtestseries.com 9669946966", "options": ["An interjection is a word or phrase that expresses strong emotion and is grammatically independent.", "All words ending in '-ly' are adverbs.", "A verb always expresses an action.", "A pronoun always replaces a specific noun mentioned earlier in the sentence."], "answer": "An interjection is a word or phrase that expresses strong emotion and is grammatically independent.", "explanation": "Interjections like \"Wow!\", \"Ouch!\", or \"Bravo!\" are indeed used to express sudden feelings or emotions and stand apart grammatically from the rest of the sentence. Option A is false; words like \"friendly,\" \"lovely,\" \"ugly\" are adjectives. Option B is false as verbs can also express a state of being (e.g., \"is,\" \"seem\"). Option C is false because pronouns can also refer to general or unspecified nouns (e.g., \"someone,\" \"anything\") or be used as subjects without a prior noun (e.g., \"I,\" \"you\")."}, {"id": 86, "section": "English Grammar", "question": "In the sentence, \"He had no choice but to obey,\" what part of speech is the word \"but\"?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Adverb", "Preposition", "Interjection", "Conjunction"], "answer": "Preposition", "explanation": "In this specific context, \"but\" functions as a preposition meaning \"except.\" It introduces the infinitive phrase \"to obey\" as the object of the preposition, indicating what was excluded from \"no choice.\" While \"but\" is most commonly known as a conjunction, its usage here is an exception. It is not joining clauses (conjunction) nor modifying a verb/adjective (adverb), nor expressing sudden emotion (interjection)."}, {"id": 87, "section": "English Grammar", "question": "Identify the parts of speech for the word \"like\" in the following sentences:\n1. She sings like a professional.\n2. I like to read books.\n3. They are very like their mother.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Preposition, Verb, Adjective", "Adverb, Verb, Preposition", "Conjunction, Verb, Adverb", "Preposition, Noun, Adjective"], "answer": "Preposition, Verb, Adjective", "explanation": "In sentence 1, \"like\" functions as a preposition, introducing the noun phrase \"a professional\" and showing comparison. In sentence 2, \"like\" is the main verb, expressing preference. In sentence 3, \"like\" functions as an adjective, meaning \"similar to\" and describing \"they.\" Option B is incorrect because \"like\" in sentence 1 is not a conjunction (it doesn't join clauses) and in sentence 3 it's not an adverb."}, {"id": 88, "section": "English Grammar", "question": "Identify the error in the following sentence and choose the option that correctly rectifies it with appropriate reasoning: \"She performed good in the final examination.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["Change \"good\" to \"better\" because a comparative adjective is required.", "Change \"examination\" to \"exam\" for conciseness, as \"good\" is correctly used as an adjective.", "Change \"performed\" to \"did\" because \"good\" should always follow a linking verb.", "Change \"good\" to \"well\" because an adverb is needed to modify the verb \"performed.\""], "answer": "Change \"good\" to \"well\" because an adverb is needed to modify the verb \"performed.\"", "explanation": "The error lies in using the adjective \"good\" to modify the verb \"performed.\" Adjectives modify nouns or pronouns, while adverbs modify verbs, adjectives, or other adverbs. \"Well\" is the adverbial form of \"good\" and is correctly used here to describe how she performed. Option B is incorrect as there's no comparison being made. Option C suggests an unnecessary verb change and misinterprets the role of \"good.\" Option D addresses conciseness, not the grammatical error related to parts of speech."}, {"id": 89, "section": "English Grammar", "question": "Which of the following sentences demonstrate the correct usage of the underlined word as per its intended part of speech?\nJ: The committee decided to <u>further</u> investigate the matter.\nK: She felt <u>badly</u> about the mistake she made.\nL: His <u>only</u> concern was to finish the project on time.\nM: The new regulations will <u>effect</u> significant changes in the industry.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L and M only", "K and M only", "J and K only", "J, K, L and M"], "answer": "J, L and M only", "explanation": "Let's analyze each statement: J. \"The committee decided to further investigate the matter.\" Here, 'further' is correctly used as an adverb modifying the verb 'investigate'. It means to investigate to a greater extent or degree. This usage is grammatically correct. K. \"She felt badly about the mistake she made.\" This statement contains an error. After a linking verb like 'felt' (which describes a state of being or emotion), an adjective is required to describe the subject's condition or state, not an adverb. Therefore, it should be \"She felt bad about the mistake.\" 'Badly' is an adverb that describes how an action is performed (e.g., 'He sings badly'), not how someone feels emotionally. L. \"His only concern was to finish the project on time.\" Here, 'only' is correctly used as an adjective modifying the noun 'concern'. It specifies that it was the sole or exclusive concern. This usage is grammatically correct. M. \"The new regulations will effect significant changes in the industry.\" This statement is grammatically correct. While 'affect' is commonly known as a verb (to influence) and 'effect' as a noun (a result), 'effect' can also function as a verb meaning 'to bring about' or 'to cause to happen'. In this sentence, the regulations will cause or bring about significant changes, making the verb 'effect' appropriate. This is a common point of confusion and a subtle usage. Based on the analysis, statements J, L, and M demonstrate correct usage, while K contains an error."}, {"id": 90, "section": "English Grammar", "question": "Consider the word \"down\" in the following sentences and evaluate the correctness of the statements: I. \"He felt down after the news.\" - \"Down\" is an adjective. II. \"The ball rolled down the hill.\" - \"Down\" is a preposition. III. \"They decided to down their tools.\" - \"Down\" is an adverb. IV. \"He looked down from the balcony.\" - \"Down\" is a verb. Which of the above statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["I and II only", "I, II, III, and IV", "II and IV only", "I, II, and III only"], "answer": "I and II only", "explanation": "Statement I is correct: \"down\" functions as an adjective describing the subject \"He\" (his emotional state). Statement II is correct: \"down\" acts as a preposition, showing the relationship between \"rolled\" and \"the hill.\" Statement III is incorrect: \"down\" in \"to down their tools\" is a verb, meaning to put down or cease using. Statement IV is incorrect: \"down\" in \"looked down\" is an adverb, modifying the verb \"looked\" to indicate direction."}, {"id": 91, "section": "English Grammar", "question": "Evaluate the following statements regarding parts of speech: I. A gerund, though derived from a verb, always functions as a noun. II. Participles can function as adjectives, but never as adverbs. III. The word \"that\" can function as a demonstrative adjective, a demonstrative pronoun, a relative pronoun, or a conjunction. IV. Adjectives can sometimes be used as nouns, especially when referring to a group (e.g., \"the rich\"). Which of the above statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["I, II, and III only", "II, III, and IV only", "I, III, and IV only", "I, II, III, and IV"], "answer": "I, III, and IV only", "explanation": "Statement I is correct: A gerund (verb + -ing) always functions as a noun (e.g., \"Swimming is good exercise\"). Statement II is incorrect: While participles primarily function as adjectives (e.g., \"a running stream\"), they can also be part of adverbial phrases (e.g., \"Running quickly, he caught the bus\" - 'running quickly' modifies the verb 'caught'). Statement III is correct: \"That\" is highly versatile (e.g., \"That book\" - adj; \"That is mine\" - pronoun; \"The book that I read\" - relative pronoun; \"He said that he would come\" - conjunction). Statement IV is correct: Adjectives can be nominalized to refer to groups (e.g., \"the poor,\" \"the brave\")."}, {"id": 92, "section": "English Grammar", "question": "Assertion (A): The word \"only\" always functions as an adverb.\nReason (R):: In the sentence \"He is the only person who can help,\" \"only\" modifies the noun \"person.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["A is true, but R is false.", "Both A and R are true, but R is not the correct explanation of A.", "Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true."], "answer": "A is false, but R is true.", "explanation": "Assertion (A) is false because \"only\" can function as an adjective (e.g., \"the only child,\" \"the only solution\") as well as an adverb (e.g., \"He only eats vegetables\"). Reason (R) is true because in the given sentence, \"only\" indeed modifies the noun \"person,\" indicating that he is the sole person, thus functioning as an adjective. Since A is false and R is true, option D is the correct choice."}, {"id": 93, "section": "English Grammar", "question": "Which of the following statements correctly identify the part of speech for the underlined words?\nJ: \"She looked after the children.\" - 'after' is a preposition.\nK: \"He arrived soon after.\" - 'after' is an adverb.\nL: \"We left after they had finished.\" - 'after' is a conjunction.\nM: \"The after-effects were severe.\" - 'after' is an adjective. Select the correct combination:", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, and M only", "J and K only", "J, K, and L only", "J, K, L, and M"], "answer": "J, K, L, and M", "explanation": "All statements are correct. In J, \"after\" introduces the noun phrase \"the children,\" functioning as a preposition. In K, \"after\" modifies the verb \"arrived,\" indicating when, thus acting as an adverb. In L, \"after\" connects two clauses (\"We left\" and \"they had finished\"), making it a conjunction. In M, \"after\" modifies the noun \"effects,\" describing which effects, thus functioning as an adjective. This word demonstrates significant versatility across different parts of speech."}, {"id": 94, "section": "English Grammar", "question": "Consider the sentence: \"The early bird catches the worm.\" Which of the following statements correctly explain why \"early\" is an adjective in this sentence?\nJ: It modifies the noun \"bird\" by describing its characteristic.\nK: It indicates the time when the bird acts, thus functioning as an adverb.\nL: It precedes the noun it modifies, which is a typical position for an adjective.\nM: It is derived from a noun, making it an adjective. Select the correct combination:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and L only", "J, L, and M only", "J and K only", "K and M only"], "answer": "J and L only", "explanation": "Statement J is correct: \"early\" describes the noun \"bird,\" indicating its quality or characteristic, which is the primary function of an adjective. Statement L is also correct: Adjectives typically precede the nouns they modify in English. Statement K is incorrect: While \"early\" can be an adverb (e.g., \"He arrived early\"), in this sentence, it modifies \"bird\" (a noun), not a verb, so it's not an adverb. Statement M is incorrect: \"Early\" is not derived from a noun; it can function as both an adjective and an adverb, but its origin doesn't define its current function as an adjective."}, {"id": 95, "section": "English Grammar", "question": "In which of the following sentences does the word \"but\" function as a PREPOSITION?\nJ: He tried hard, but he failed.\nK: Everyone but John attended the meeting.\nL: She is nothing but a liar.\nM: I would go, but I am tired.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and M only", "K and L only", "J, K, and L only", "K, L, and M only"], "answer": "K and L only", "explanation": "In statements K and L, 'but' functions as a preposition, meaning 'except.' In K, it introduces the noun 'John,' and in L, it introduces the noun phrase 'a liar.' In statements J and M, 'but' functions as a coordinating conjunction, connecting two independent clauses."}, {"id": 96, "section": "English Grammar", "question": "Match the underlined words in Column I with their respective parts of speech in Column II. Column I (Underlined Word) List-I\n(J) The light was too dim.\n(K) Please light the candle.\n(L) The box was surprisingly light.\n(M) He moved lightly across the floor. Column II (Part of Speech) List-II\n(1) Adverb\n(2) Noun\n(3) Adjective\n(4) Verb", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-4, L-2, M-1", "J-2, K-4, L-3, M-1", "J-4, K-2, L-1, M-3", "J-2, K-1, L-3, M-4"], "answer": "J-2, K-4, L-3, M-1", "explanation": "P. \"The light was too dim.\" - \"light\" refers to illumination, functioning as a Noun (2). Q. \"Please light the candle.\" - \"light\" is an action, meaning to ignite, functioning as a Verb (4). R. \"The box was surprisingly light.\" - \"light\" describes the weight of the box, functioning as an Adjective (3). S. \"He moved lightly across the floor.\" - \"lightly\" describes how he moved, functioning as an Adverb (1). Therefore, the correct match is P-2, Q-4, R-3, S-1."}, {"id": 97, "section": "English Grammar", "question": "Arrange the following statements about the classification of words into parts of speech in a logical order, from the most general principle to the most specific application or exception.\nJ: A word's part of speech is determined by its function and relationship to other words in a sentence.\nK: Some words, like \"fast\" or \"like,\" can belong to multiple parts of speech depending on their context.\nL: The eight traditional parts of speech are Noun, Pronoun, Verb, Adjective, Adverb, Preposition, Conjunction, and Interjection.\nM: Identifying the part of speech is crucial for understanding sentence structure and meaning.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, M, L, K", "M, L, J, K", "L, M, J, K", "L, J, M, K"], "answer": "L, M, J, K", "explanation": "The logical order from general to specific is L, M, J, K. Statement L introduces the fundamental classification system (the eight parts of speech), which is the most general principle. Statement M explains the importance or purpose of identifying parts of speech, a general conceptual understanding. Statement J provides the core rule for determining a word's part of speech (function in context), which is a more specific principle than just listing them or stating their importance. Statement K highlights a specific application or exception to the general rule, where words can be ambiguous, making it the most specific detail."}, {"id": 98, "section": "English Grammar", "question": "Identify the sentence that contains a subtle error in the usage of parts of speech.", "brand": "bilaspurtestseries.com 9669946966", "options": ["She looked at him suspiciously.", "The soup tastes delicious.", "He felt badly about the mistake he made.", "The flowers smell sweet."], "answer": "He felt badly about the mistake he made.", "explanation": "The error is in option A. \"Felt\" is a linking verb in this context, expressing a state of being or emotion. Linking verbs should be followed by an adjective that describes the subject, not an adverb. Therefore, \"badly\" (an adverb) should be \"bad\" (an adjective) to describe \"He.\" The correct sentence should be \"He felt bad about the mistake he made.\" Options B, C, and D are grammatically correct. \"Tastes delicious\" and \"smell sweet\" use adjectives after linking verbs (\"tastes,\" \"smell\") to describe the subject, which is correct. \"Looked suspiciously\" uses an adverb to modify the action verb \"looked,\" which is also correct."}, {"id": 99, "section": "English Grammar", "question": "When systematically analyzing a complex sentence for mixed grammatical errors related to various parts of speech, a logical and efficient sequence of steps is crucial for comprehensive error identification and correction. Arrange the following analytical steps in the most appropriate chronological order:\nJ: Verify pronoun-antecedent agreement, correct pronoun case (nominative, objective, possessive), and appropriate noun forms (singular/plural, possessive).\nK: Evaluate the correct usage and placement of adjectives and adverbs, including comparative/superlative forms and avoiding common modifier errors.\nL: Identify the main subject and verb, ensuring subject-verb agreement and consistent verb tense across clauses.\nM: Assess the accurate use of prepositions, conjunctions, and correlative conjunctions, ensuring parallelism and idiomatic correctness within the sentence structure.\nChoose the correct sequence:", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, J, K, M", "K, J, L, M", "J, L, K, M", "L, K, J, M"], "answer": "L, J, K, M", "explanation": "The most logical and efficient chronological order for analyzing a sentence for mixed grammatical errors follows a hierarchical approach, starting with the core structural elements and moving to modifiers and connectors.\n\n1. L (Identify the main subject and verb...): The fundamental step is to establish the core of the sentence т the subject and its verb. Ensuring subject-verb agreement and consistent verb tense is paramount, as errors here often affect other parts of the sentence.\n2. J (Verify pronoun-antecedent agreement...): After confirming the subject and verb, the next logical step is to check pronouns and noun forms. Pronouns refer back to nouns (antecedents), and their case depends on their grammatical function relative to the verb or other elements. Correct noun forms (e.g., possessives) are also crucial at this stage.\n3. K (Evaluate the correct usage and placement of adjectives and adverbs...): Once the core nouns, verbs, and pronouns are established, modifiers (adjectives and adverbs) can be accurately assessed. Their correct form and placement depend on the words they modify, which should already be verified.\n4. M (Assess the accurate use of prepositions, conjunctions...): Finally, prepositions, conjunctions, and parallelism, which deal with connecting phrases and clauses and ensuring broader structural consistency, are reviewed. These elements often involve idiomatic usage and complex structural relationships that are best checked after the internal consistency of individual parts of speech is confirmed.\n\nTherefore, the sequence L, J, K, M represents a systematic and effective approach to mixed error application."}, {"id": 100, "section": "English Grammar", "question": "Which of the following sentences contains an error in the usage of parts of speech?", "brand": "bilaspurtestseries.com 9669946966", "options": ["She felt bad about not being able to attend the farewell party last night.", "The committee members unanimously agreed that the proposal was more preferable to the previous one.", "Having finished the report, the manager proceeded to distribute it among the team.", "He is one of the most diligent employees in the entire organization."], "answer": "The committee members unanimously agreed that the proposal was more preferable to the previous one.", "explanation": "The error lies in the phrase 'more preferable'. The adjective 'preferable' inherently means 'more desirable' or 'more suitable', so adding 'more' before it creates redundancy and is grammatically incorrect. The other sentences are grammatically sound, demonstrating correct usage of participles, linking verbs with adjectives, and superlative forms."}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="VARG_1_ENGLISH_GRAMMAR_NOUN_ENGLISH_GRAMMAR_ADJECTIVES_KINDS_O_9383D687";const TEST_TITLE="Varg_1_English_Grammar_Noun_Pronoun_Adjective_Adverb_Week_2_Day_01_08_ENGLISH_GRAMMAR_NOUNS_CLASSIFICATION_C";const CONTACT_WHATSAPP="9669946966";const PRINT_QR_TEXT="";const PRINT_QR_MESSAGE="";const LOGO_SRC="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABOYAAATmBAMAAAB30rMZAAAAHlBMVEX+/v4DJVBvBA3f29r4gw26tbx7f5SMRT1AU3K6jIooXs8jAAAgAElEQVR42uydz3PbthLH3cHIqY/Sm1jKkeokjG9sMXTq/8KNhrJ1i90xLd0SvolY3Z7Ssat3y7NHVvjfPv6USBAAAZCUKHv30DZpQtHih7v73QUWBwdgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGAvxNCBsfkFxtjy7clem+f/coBx+s+DgZXHDpvW0LYXi3mbaYvFvT2xBgZ8W2BlafNhWyza4uajB+SBKeNm8xwbnzx7CeCByZjv3caquK2t53s8DN8lGNeMiDd70a7MFpPI34HTA2PEU3M4bldtvfsbcHdgjIBqz9s12cKG9A6MBK4GB0e4O8AOLBVSawdujR182aAafOCs7QAXB9kbAxTFCzfzad7est2Ds3vJNhq3d2GRswN7edYaztu7MsjsXqJZ4/Zu7X4JD+FlCdVFe/fW80MsrHx6KcTN282wHiR2L6I20moMcWvqwNk9a8ONIg58HUjVHVEHauKZJnFNyuNyBbtHeECgHKA function azadIdentityFromInputs(){var n=document.getElementById('stName'),m=document.getElementById('stMobile'),b=document.getElementById('stBatch');var name=n?n.value.trim():'';var raw=m?m.value.trim():'';var mobile=azadNormMobile(raw);var batch=b?b.value.trim():'';return {name:name,mobile:mobile,batch:batch,display_mobile:raw}}
function azadIdentityKey(st){return 'azad_own_v2_'+String(TEST_CODE||'test')+'_'+azadNormName(st&&st.name)+'_'+azadNormMobile(st&&st.mobile)}
function azadDraftKey(st){return azadIdentityKey(st)+'_draft'}function azadResultKey(st){return azadIdentityKey(st)+'_result'}
function azadClampIndex(i){i=Number(i)||0;return Math.max(0,Math.min((Array.isArray(Q)?Q.length:1)-1,i))}
function azadSafeArray(v,n,fill){if(!Array.isArray(v))return Array(n).fill(fill);var out=Array(n).fill(fill);for(var i=0;i<n;i++){if(i<v.length)out[i]=v[i]}return out}
function azadLoadJson(key){try{var raw=azadSafeStorageGet(key);return raw?JSON.parse(raw):null}catch(e){return null}}
function azadApplySavedState(data,ident){try{student=Object.assign({},data.student||{},ident||{});ans=azadSafeArray(data.ans,Q.length,null);marked=azadSafeArray(data.marked,Q.length,false).map(Boolean);cur=azadClampIndex(data.cur);startedAt=Number(data.startedAt)||Date.now();return true}catch(e){return false}}
function azadSaveDraft(){try{if(!azadStoreOk()||!student||lastSummary)return;azadSafeStorageSet(azadDraftKey(student),JSON.stringify({version:3,test_code:TEST_CODE,student:student,cur:azadClampIndex(cur),ans:ans,marked:marked,startedAt:startedAt||Date.now(),savedAt:Date.now()}))}catch(e){}}
function azadSaveResult(summary,note){try{if(!azadStoreOk()||!student||!summary)return;azadSafeStorageSet(azadResultKey(student),JSON.stringify({version:3,test_code:TEST_CODE,student:student,cur:azadClampIndex(cur),ans:ans,marked:marked,startedAt:startedAt||Date.now(),summary:summary,note:String(note||'Final submission already completed on this device.'),savedAt:Date.now()}));azadSafeStorageSet('azad_submitted_'+TEST_CODE+'_'+azadNormMobile(student.mobile),'1');localStorage.removeItem(azadDraftKey(student))}catch(e){}}
function azadResultData(ident){return azadLoadJson(azadResultKey(ident))}function azadDraftData(ident){return azadLoadJson(azadDraftKey(ident))}
function azadShowNotice(kind,ident,data,proceed){try{var old=document.getElementById('azadStartNotice');if(old)old.remove();var title='Test start karne se pehle';var body='<ul><li>Mobile par left swipe = Next, right swipe = Previous.</li><li>Answers aur Mark for Review local device par auto-save honge.</li><li>Reload/browser close ke baad same details se resume hoga.</li><li>Timer wahi se continue hoga, restart nahi hoga.</li></ul>';var primary='Start Test',secondary='';if(kind==='resume'){title='Saved test mila hai';body='<p>Same details se pehle start kiya hua test mila hai. Answers, marked questions aur timer resume honge.</p>';primary='Resume Test'}else if(kind==='submitted'){title='Result already submitted';body='<p>Is name/mobile se final submit is device par already ho chuka hai. Dobara test dena ho to dusra valid mobile number use karein.</p>';primary='Go to Result';secondary='<button class="gray" type="button" onclick="document.getElementById(\'azadStartNotice\').remove()">Back</button>'}var html='<div id="azadStartNotice" class="azad-start-modal"><div class="azad-start-card"><h2>'+title+'</h2>'+body+'<div class="azad-start-actions">'+secondary+'<button class="green" type="button" id="azadStartProceed">'+primary+'</button></div></div></div>';document.body.insertAdjacentHTML('beforeend',html);document.getElementById('azadStartProceed').onclick=function(){var el=document.getElementById('azadStartNotice');if(el)el.remove();proceed()};}catch(e){proceed()}}
function azadProceedFresh(){if(!azadPendingStart)return;var old=azadPendingStart.oldStartQuiz,args=azadPendingStart.args;azadPendingStart=null;var r=old.apply(window,args||[]);azadStartSaveTimer();azadSaveDraft();return r}
function azadProceedResume(ident,data){azadApplySavedState(data,ident);azadStartSaveTimer();render()}
function azadProceedResult(ident,data){azadApplySavedState(data,ident);lastSummary=data.summary;showResult(lastSummary,data.note||'Final submission already completed on this device.')}
function azadMarkedList(){try{return markedIndexes()}catch(e){var a=[];for(var i=0;i<marked.length;i++){if(marked[i])a.push(i)}return a}}
function azadEnterMarkedMode(){var list=azadMarkedList();if(!list.length){alert('Marked for Review questions abhi nahi hain.');return}azadMarkedMode=true;azadMarkedEntryCur=azadClampIndex(cur);if(list.indexOf(cur)<0)cur=list[0];azadSaveDraft();render()}
function azadExitMarkedMode(){azadMarkedMode=false;cur=azadClampIndex(azadMarkedEntryCur);azadSaveDraft();render()}
function azadStepMarked(dir){var list=azadMarkedList();if(!list.length){azadExitMarkedMode();return true}var pos=list.indexOf(cur);if(pos<0)pos=dir>0?-1:0;pos=pos+dir;if(pos<0)pos=0;if(pos>=list.length)pos=list.length-1;cur=list[pos];azadSaveDraft();render();return true}
window.azadEnterMarkedMode=azadEnterMarkedMode;window.azadExitMarkedMode=azadExitMarkedMode;
function azadHideOldToolButtons(){try{var tools=document.getElementById('ownToolsBody');if(!tools)return;var buttons=tools.querySelectorAll('button');for(var i=0;i<buttons.length;i++){var t=(buttons[i].textContent||'').toLowerCase();if(t.indexOf('review')>=0||t.indexOf('marked')>=0||t.indexOf('chihnit')>=0){buttons[i].style.display='none'}}}catch(e){}}
function azadReviewButtonHtml(){var isMarked=!!marked[cur];if(azadMarkedMode){return '<button type="button" class="azad-all-questions-btn" onclick="azadExitMarkedMode()">All Questions</button>'}if(cur===0){return '<button type="button" class="azad-review-full '+(isMarked?'mark-on':'')+'" onclick="toggleMark()">'+(isMarked?'Marked for Review':'Mark for Review')+'</button>'}var icon='&#128278;';if(cur>=1&&cur<=4){return '<button type="button" title="Mark for Review" class="azad-review-morph '+(isMarked?'mark-on':'')+'" onclick="toggleMark()"><span class="azad-mark-text">Review</span> '+icon+'</button>'}var mark='<button type="button" title="Mark for Review" aria-label="Mark for Review" class="azad-bookmark-btn '+(isMarked?'mark-on':'')+'" onclick="toggleMark()">'+icon+'</button>';if(cur>=Q.length-1){return mark+'<button type="button" class="azad-marked-nav-btn" onclick="azadEnterMarkedMode()">View Marked</button>'}return mark}
function azadApplyReviewUi(){try{if(!document.body.classList.contains('own-test-active'))return;azadHideOldToolButtons();var nav=document.querySelector('.own-bottom-nav');if(nav){nav.classList.toggle('azad-last-q',cur>=Q.length-1&&!azadMarkedMode);nav.classList.toggle('azad-not-last-q',cur<Q.length-1&&!azadMarkedMode);nav.classList.toggle('azad-marked-mode',azadMarkedMode);var next=nav.querySelector('.own-next');if(next)next.textContent=azadMarkedMode?'Next Marked':'рЄрЄрЄВрЄО т';var prev=nav.querySelector('.own-prev');if(prev)prev.textContent=azadMarkedMode?'Previous Marked':'т рЄЊрЄПрЄрЄВрЄО';var submit=nav.querySelector('.own-submit');if(submit)submit.textContent='т Final Submit'}var old=document.getElementById('azadReviewBar');if(old)old.remove();if(nav&&nav.parentNode){var bar=document.createElement('div');bar.id='azadReviewBar';bar.className='azad-reviewbar';bar.innerHTML=azadReviewButtonHtml();nav.parentNode.insertBefore(bar,nav)}}catch(e){}}
function azadStartSaveTimer(){try{if(azadResumeSaveTimer)clearInterval(azadResumeSaveTimer);azadResumeSaveTimer=setInterval(azadSaveDraft,1500)}catch(e){}}
function azadBindSwipe(){try{if(window.__azadSwipeBound)return;window.__azadSwipeBound=true;document.addEventListener('touchstart',function(ev){try{if(!document.body.classList.contains('own-test-active'))return;var t=ev.target;if(t&&String(t.tagName||'').match(/input|button|select|textarea|a/i))return;var p=ev.changedTouches&&ev.changedTouches[0];if(!p)return;azadTouchStartX=p.clientX;azadTouchStartY=p.clientY}catch(e){}},{passive:true});document.addEventListener('touchend',function(ev){try{if(!document.body.classList.contains('own-test-active'))return;var t=ev.target;if(t&&String(t.tagName||'').match(/input|button|select|textarea|a/i))return;var p=ev.changedTouches&&ev.changedTouches[0];if(!p)return;var dx=p.clientX-azadTouchStartX,dy=p.clientY-azadTouchStartY;if(Math.abs(dx)<45||Math.abs(dx)<Math.abs(dy)*1.05)return;if(dx<0){next()}else{prev()}}catch(e){}},{passive:true})}catch(e){}}
if(typeof startQuiz==='function'){var oldStartQuiz=startQuiz;startQuiz=function(){var ident=azadIdentityFromInputs();if(ident.name&&ident.mobile){var res=azadResultData(ident);if(res&&res.summary){return azadShowNotice('submitted',ident,res,function(){azadProceedResult(ident,res)})}var draft=azadDraftData(ident);if(draft&&draft.student){return azadShowNotice('resume',ident,draft,function(){azadProceedResume(ident,draft)})}}azadPendingStart={oldStartQuiz:oldStartQuiz,args:arguments};return azadShowNotice('fresh',ident,null,azadProceedFresh)}}
if(typeof render==='function'){var oldRender=render;render=function(){var r=oldRender.apply(this,arguments);azadApplyReviewUi();azadBindSwipe();azadSaveDraft();return r}}
if(typeof next==='function'){var oldNext=next;next=function(){if(azadMarkedMode)return azadStepMarked(1);var r=oldNext.apply(this,arguments);azadSaveDraft();return r}}
if(typeof prev==='function'){var oldPrev=prev;prev=function(){if(azadMarkedMode)return azadStepMarked(-1);var r=oldPrev.apply(this,arguments);azadSaveDraft();return r}}
if(typeof toggleMark==='function'){var oldToggleMark=toggleMark;toggleMark=function(){var r=oldToggleMark.apply(this,arguments);if(azadMarkedMode&&azadMarkedList().indexOf(cur)<0){var list=azadMarkedList();if(list.length){cur=list[0]}else{azadMarkedMode=false;cur=azadClampIndex(azadMarkedEntryCur)}}azadSaveDraft();return r}}
if(typeof gotoQ==='function'){var oldGotoQ=gotoQ;gotoQ=function(i){azadMarkedMode=false;var r=oldGotoQ.apply(this,arguments);azadSaveDraft();return r}}
if(typeof showResult==='function'){var oldShowResult=showResult;showResult=function(sd,note){lastSummary=sd||lastSummary;azadSaveResult(lastSummary,note);return oldShowResult.apply(this,arguments)}}
if(typeof submitQuiz==='function'){var oldSubmitQuiz=submitQuiz;submitQuiz=function(skipReview){try{if(student){var res=azadResultData(student);if(res&&res.summary){azadApplySavedState(res,student);lastSummary=res.summary;showResult(lastSummary,res.note||'Final submission already completed on this device.');return}}}catch(e){}return oldSubmitQuiz.apply(this,arguments)}}
window.addEventListener('beforeunload',azadSaveDraft);if(document&&document.addEventListener)document.addEventListener('change',function(ev){try{if(ev&&ev.target&&ev.target.name==='o')setTimeout(azadSaveDraft,0)}catch(e){}},true);
})();
