से भौतिक विधियों (physical methods) द्वारा सरल पदार्थों (simpler substances) में अलग नहीं किया जा सकता।", "एक मिश्रण जिसमें घटक (components) असमान रूप से वितरित (unevenly distributed) होते हैं और अलग-अलग परतें (separate layers) बनाते हैं।"], "answer": "एक मिश्रण जिसमें घटक समान रूप से वितरित होते हैं और एक ही प्रावस्था (single phase) में होते हैं।", "explanation": "एक समांगी मिश्रण वह होता है जिसके घटक पूरे मिश्रण में समान रूप से वितरित होते हैं, जिससे यह एक समान संरचना और गुण प्रदर्शित करता है। इसके विपरीत, विषमांगी मिश्रण में घटक असमान रूप से वितरित होते हैं और अक्सर अलग-अलग परतें या प्रावस्थाएँ बनाते हैं। शुद्ध पदार्थ और भौतिक विधियों द्वारा अलग न किए जा सकने वाले पदार्थ यौगिकों या तत्वों की विशेषताएँ हैं।"}, {"id": 3, "section": "Chemistry", "question": "कौन सा नियम बताता है कि किसी भी रासायनिक अभिक्रिया (chemical reaction) में, द्रव्यमान (mass) न तो बनाया जा सकता है और न ही नष्ट किया जा सकता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["गुणित अनुपात का नियम (Law of Multiple Proportions)", "स्थिर अनुपात का नियम (Law of Definite Proportions)", "गे-लुसैक का गैसीय आयतन का नियम (Gay-Lussac's Law of Gaseous Volumes)", "द्रव्यमान संरक्षण का नियम (Law of Conservation of Mass)"], "answer": "द्रव्यमान संरक्षण का नियम (Law of Conservation of Mass)", "explanation": "द्रव्यमान संरक्षण का नियम, जिसे एंटोनी लेवोइज़ियर (Antoine Lavoisier) ने प्रतिपादित किया था, यह बताता है कि एक बंद प्रणाली (closed system) में रासायनिक अभिक्रिया के दौरान कुल द्रव्यमान अपरिवर्तित रहता है। अन्य नियम रासायनिक संयोजन के अन्य पहलुओं से संबंधित हैं, जैसे तत्वों के निश्चित अनुपात में संयोजन या गैसीय आयतनों का संयोजन।"}, {"id": 4, "section": "Chemistry", "question": "डाल्टन (Dalton) के परमाणु सिद्धांत (atomic theory) ने रासायनिक संयोजन (chemical combination) के नियमों (laws) को सफलतापूर्वक समझाया। हालांकि, निम्नलिखित में से कौन सा कथन, जो मूल रूप से डाल्टन के सिद्धांत का हिस्सा था, बाद में गलत पाया गया?", "brand": "bilaspurtestseries.com 9669946966", "options": ["परमाणु (atoms) अविभाज्य (indivisible) कण (particles) होते हैं।", "विभिन्न तत्वों के परमाणु द्रव्यमान और गुणों में भिन्न होते हैं।", "एक ही तत्व (element) के सभी परमाणु द्रव्यमान (mass) और गुणों (properties) में समान होते हैं।", "परमाणु रासायनिक अभिक्रियाओं (chemical reactions) में पुनर्व्यवस्थित (rearranged) होते हैं।"], "answer": "परमाणु (atoms) अविभाज्य (indivisible) कण (particles) होते हैं।", "explanation": "डाल्टन ने प्रस्तावित किया था कि परमाणु अविभाज्य होते हैं, लेकिन बाद में उप-परमाण्विक कणों (sub-atomic particles) जैसे इलेक्ट्रॉन (electron), प्रोटॉन (proton) और न्यूट्रॉन (neutron) की खोज से यह गलत साबित हुआ। परमाणु वास्तव में विभाज्य होते हैं। अन्य कथन डाल्टन के सिद्धांत के सही पहलू हैं या आधुनिक परमाणु सिद्धांत द्वारा संशोधित किए गए हैं लेकिन पूरी तरह से गलत नहीं हैं।"}, {"id": 5, "section": "Chemistry", "question": "भौतिक (physical) और रासायनिक परिवर्तनों (chemical changes) के संबंध में निम्नलिखित कथनों पर विचार करें: I. भौतिक परिवर्तन (Physical changes) में पदार्थ की रासायनिक पहचान (chemical identity) अपरिवर्तित रहती है। II. रासायनिक परिवर्तन (Chemical changes) में नए पदार्थ (new substances) बनते हैं। III. भौतिक परिवर्तन आमतौर पर उत्क्रमणीय (reversible) होते हैं, जबकि रासायनिक परिवर्तन आमतौर पर अनुत्क्रमणीय (irreversible) होते हैं। IV. जल का जमना (freezing of water) एक रासायनिक परिवर्तन का उदाहरण है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल II, III और IV सही हैं।", "केवल I, II और III सही हैं।", "केवल I और II सही हैं।", "सभी कथन सही हैं।"], "answer": "केवल I, II और III सही हैं।", "explanation": "कथन I, II और III सही हैं। भौतिक परिवर्तन में केवल पदार्थ की अवस्था या रूप बदलता है, रासायनिक संरचना नहीं (जैसे जल का जमना या वाष्पीकरण)। रासायनिक परिवर्तन में, परमाणुओं का पुनर्व्यवस्थापन होता है और नए रासायनिक बंध (chemical bonds) बनते हैं, जिससे नए पदार्थ बनते हैं। भौतिक परिवर्तन अक्सर उत्क्रमणीय होते हैं (जैसे बर्फ को पानी में पिघलाना), जबकि रासायनिक परिवर्तन आमतौर पर अनुत्क्रमणीय होते हैं (जैसे लकड़ी का जलना)। कथन IV गलत है क्योंकि जल का जमना एक भौतिक परिवर्तन है, क्योंकि पानी की रासायनिक पहचान (H₂O) बर्फ बनने के बाद भी वही रहती है।"}, {"id": 6, "section": "Chemistry", "question": "निम्नलिखित में से कौन सा अवलोकन (observation) स्थिर अनुपात के नियम (Law of Definite Proportions) का सीधे समर्थन करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["जब कार्बन (carbon) और ऑक्सीजन (oxygen) मिलकर कार्बन मोनोऑक्साइड (carbon monoxide) और कार्बन डाइऑक्साइड (carbon dioxide) बनाते हैं, तो ऑक्सीजन के द्रव्यमान का अनुपात सरल पूर्णांक (simple whole number) होता है।", "एक रासायनिक अभिक्रिया में अभिकारकों (reactants) का कुल द्रव्यमान उत्पादों (products) के कुल द्रव्यमान के बराबर होता है।", "किसी भी स्रोत (source) से प्राप्त जल (water) में हाइड्रोजन (hydrogen) और ऑक्सीजन का द्रव्यमान अनुपात हमेशा 1:8 होता है।", "समान ताप (temperature) और दाब (pressure) पर, सभी गैसों (gases) के समान आयतन (equal volumes) में समान संख्या में अणु (molecules) होते हैं।"], "answer": "किसी भी स्रोत (source) से प्राप्त जल (water) में हाइड्रोजन (hydrogen) और ऑक्सीजन का द्रव्यमान अनुपात हमेशा 1:8 होता है।", "explanation": "स्थिर अनुपात का नियम (या जोसेफ प्राउस्ट (Joseph Proust) का नियम) बताता है कि एक दिए गए रासायनिक यौगिक (chemical compound) में, घटक तत्व (constituent elements) हमेशा द्रव्यमान द्वारा एक निश्चित अनुपात में मौजूद होते हैं, चाहे यौगिक का स्रोत कुछ भी हो। जल (H₂O) में हाइड्रोजन और ऑक्सीजन का 1:8 का निश्चित द्रव्यमान अनुपात इस नियम का एक उत्कृष्ट उदाहरण है। पहला विकल्प गुणित अनुपात के नियम से संबंधित है, तीसरा द्रव्यमान संरक्षण के नियम से, और चौथा आवोगाद्रो के नियम से।"}, {"id": 7, "section": "Chemistry", "question": "अभिकथन (A): एक बंद प्रणाली (closed system) में रासायनिक अभिक्रिया (chemical reaction) के दौरान कुल द्रव्यमान (total mass) अपरिवर्तित (unchanged) रहता है।\nकारण (R): रासायनिक अभिक्रियाओं में परमाणु (atoms) न तो बनाए जा सकते हैं और न ही नष्ट किए जा सकते हैं, केवल पुनर्व्यवस्थित (rearranged) होते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "कथन (A) असत्य है लेकिन (R) सत्य है।", "कथन (A) सत्य है लेकिन (R) असत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) द्रव्यमान संरक्षण के नियम का सीधा कथन है, जो सत्य है। कारण (R) डाल्टन के परमाणु सिद्धांत का एक प्रमुख अभिधारणा (postulate) है, जो यह भी सत्य है। चूंकि रासायनिक अभिक्रियाओं में परमाणु केवल पुनर्व्यवस्थित होते हैं और उनकी संख्या या द्रव्यमान में कोई परिवर्तन नहीं होता, इसलिए कुल द्रव्यमान संरक्षित रहता है। इस प्रकार, कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 8, "section": "Chemistry", "question": "अभिकथन (A): कार्बन (carbon) और ऑक्सीजन (oxygen) दो यौगिक (compounds) बनाते हैं: कार्बन मोनोऑक्साइड (CO) और कार्बन डाइऑक्साइड (CO₂)। इन यौगिकों में, कार्बन के निश्चित द्रव्यमान (fixed mass) के साथ संयोजित ऑक्सीजन के द्रव्यमान का अनुपात (ratio of masses) 1:2 होता है।\nकारण (R): यह अवलोकन (observation) गुणित अनुपात के नियम (Law of Multiple Proportions) का एक उदाहरण है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "कथन (A) असत्य है लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "कथन (A) सत्य है लेकिन (R) असत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है। कार्बन मोनोऑक्साइड (CO) में, 12 भाग कार्बन 16 भाग ऑक्सीजन से जुड़ता है। कार्बन डाइऑक्साइड (CO₂) में, 12 भाग कार्बन 32 भाग ऑक्सीजन से जुड़ता है। कार्बन के निश्चित द्रव्यमान (12 भाग) के साथ संयोजित ऑक्सीजन के द्रव्यमान का अनुपात 16:32 या 1:2 है। कारण (R) भी सही है क्योंकि गुणित अनुपात का नियम बताता है कि जब दो तत्व एक से अधिक यौगिक बनाने के लिए संयोजित होते हैं, तो एक तत्व के निश्चित द्रव्यमान के साथ संयोजित दूसरे तत्व के द्रव्यमान सरल पूर्णांक अनुपात में होते हैं। इस प्रकार, कारण (R) अभिकथन (A) की सही व्याख्या है।"}, {"id": 9, "section": "Chemistry", "question": "डाल्टन (Dalton) के परमाणु सिद् wer": "केवल J और L", "explanation": "J. यह आवोगाद्रो के नियम की मूल परिभाषा है और सही है। K. आवोगाद्रो का नियम आदर्श गैसों के लिए एक आदर्श व्यवहार है, लेकिन यह वास्तविक गैसों पर भी काफी हद तक लागू होता है, खासकर कम दाब और उच्च ताप पर। यह कहना कि यह 'केवल' आदर्श गैसों पर लागू होता है, गलत है। L. आवोगाद्रो का नियम सीधे तौर पर बताता है कि गैस का आयतन उसके मोलों की संख्या के समानुपाती होता है (V ∝ n), जो गैसीय अभिक्रियाओं में आयतन और मोल के बीच संबंध स्थापित करता है। यह सही है। M. आवोगाद्रो का नियम डाल्टन के परमाणु सिद्धांत के साथ पूरी तरह से संगत नहीं था। डाल्टन का सिद्धांत यह नहीं समझा सका कि गैसें सरल आयतन अनुपात में क्यों संयोजित होती हैं, और आवोगाद्रो ने अणुओं की अवधारणा पेश करके इस समस्या को हल किया, जो डाल्टन के अविभाज्य परमाणु की अवधारणा से थोड़ा अलग था। अतः, केवल J और L सही हैं।"}, {"id": 11, "section": "Chemistry", "question": "तत्व (elements), यौगिक (compounds) और मिश्रण (mixtures) के वर्गीकरण (classification) के संबंध में निम्नलिखित कथनों में से कौन से सही हैं?\nJ: तत्व शुद्ध पदार्थ (pure substances) होते हैं जिन्हें रासायनिक विधियों (chemical methods) द्वारा सरल पदार्थों में विभाजित नहीं किया जा सकता।\nK: यौगिक दो या दो से अधिक तत्वों के रासायनिक संयोजन (chemical combination) से बनते हैं और उनके घटक तत्वों के गुणों को बनाए रखते हैं।\nL: मिश्रण में घटक किसी भी अनुपात (any proportion) में मौजूद हो सकते हैं और उन्हें भौतिक विधियों (physical methods) द्वारा अलग किया जा सकता है।\nM: समांगी मिश्रण (homogeneous mixtures) के घटक नग्न आंखों (naked eye) से स्पष्ट रूप से दिखाई देते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और L", "केवल J, L और M", "केवल K और M", "केवल J, K और L"], "answer": "केवल J और L", "explanation": "J. तत्व शुद्ध पदार्थ होते हैं और उन्हें रासायनिक रूप से सरल पदार्थों में नहीं तोड़ा जा सकता। यह सही है। K. यौगिक दो या दो से अधिक तत्वों के रासायनिक संयोजन से बनते हैं, लेकिन वे अपने घटक तत्वों के गुणों को 'नहीं' बनाए रखते हैं। उदाहरण के लिए, हाइड्रोजन और ऑक्सीजन गैसें मिलकर पानी बनाती हैं, जिसके गुण पूरी तरह से अलग होते हैं। इसलिए, यह कथन गलत है। L. मिश्रण में घटक किसी भी अनुपात में हो सकते हैं (जैसे नमक और पानी का घोल) और उन्हें भौतिक विधियों (जैसे वाष्पीकरण) द्वारा अलग किया जा सकता है। यह सही है। M. समांगी मिश्रण के घटक समान रूप से वितरित होते हैं और नग्न आंखों से अलग-अलग दिखाई नहीं देते (जैसे चीनी का पानी में घोल)। विषमांगी मिश्रण के घटक दिखाई दे सकते हैं। इसलिए, यह कथन गलत है। अतः, केवल J और L सही हैं।"}, {"id": 12, "section": "Chemistry", "question": "गे-लुसैक (Gay-Lussac) के गैसीय आयतन (Gaseous Volumes) के नियम (Law) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: यह नियम बताता है कि जब गैसें रासायनिक रूप से संयोजित (chemically combine) होती हैं, तो वे आयतन (volume) में एक सरल अनुपात (simple ratio) में ऐसा करती हैं, बशर्ते सभी माप समान ताप (temperature) और दाब (pressure) पर हों।\nK: यह नियम केवल ठोस (solids) और तरल पदार्थों (liquids) की अभिक्रियाओं (reactions) पर लागू होता है।\nL: यह नियम आवोगाद्रो के नियम (Avogadro's Law) के साथ मिलकर डाल्टन के परमाणु सिद्धांत (Dalton's Atomic Theory) की कुछ सीमाओं (limitations) को दूर करने में मदद करता है।\nM: इस नियम के अनुसार, 100 mL हाइड्रोजन (hydrogen) और 50 mL ऑक्सीजन (oxygen) मिलकर 100 mL जल वाष्प (water vapor) बनाते हैं, सभी समान परिस्थितियों (similar conditions) में।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और L", "केवल J, L और M", "केवल J और K", "केवल K, L और M"], "answer": "केवल J, L और M", "explanation": "J. यह गे-लुसैक के गैसीय आयतन के नियम की सटीक परिभाषा है। यह सही है। K. यह नियम विशेष रूप से गैसीय अभिक्रियाओं पर लागू होता है, ठोस या तरल पदार्थों पर नहीं। इसलिए, यह कथन गलत है। L. गे-लुसैक के नियम ने गैसीय आयतनों के सरल अनुपात को दिखाया, और आवोगाद्रो ने अणुओं की अवधारणा पेश करके इसे समझाया, जिससे डाल्टन के सिद्धांत की कुछ विसंगतियों (inconsistencies) को दूर किया गया। यह सही है। M. अभिक्रिया 2H₂(g) + O₂(g) → 2H₂O(g) के अनुसार, 2 आयतन हाइड्रोजन 1 आयतन ऑक्सीजन के साथ मिलकर 2 आयतन जल वाष्प बनाते हैं। यदि 100 mL हाइड्रोजन है, तो 50 mL ऑक्सीजन की आवश्यकता होगी और 100 mL जल वाष्प बनेगा। यह गे-लुसैक के नियम का एक सीधा अनुप्रयोग है। यह सही है। अतः, J, L और M सही हैं।"}, {"id": 13, "section": "Chemistry", "question": "निम्नलिखित रासायनिक संयोजन के नियमों (Laws of Chemical Combination) को उनके प्रतिपादकों (proponents) के साथ सुमेलित (match) करें: सूची-I (नियम): सूची-I\n(J) द्रव्यमान संरक्षण का नियम\n(K) स्थिर अनुपात का नियम\n(L) गुणित अनुपात का नियम\n(M) गैसीय आयतन का नियम सूची-II\n(1) जॉन डाल्टन (John Dalton)\n(2) जोसेफ प्राउस्ट (Joseph Proust)\n(3) एंटोनी लेवोइज़ियर (Antoine Lavoisier)\n(4) जोसेफ लुई गे-लुसैक (Joseph Louis Gay-Lussac)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-1, L-2, M-4", "J-4, K-2, L-1, M-3", "J-2, K-3, L-1, M-4", "J-3, K-2, L-1, M-4"], "answer": "J-3, K-2, L-1, M-4", "explanation": "द्रव्यमान संरक्षण का नियम (Law of Conservation of Mass) एंटोनी लेवोइज़ियर (Antoine Lavoisier) द्वारा प्रतिपादित किया गया था। स्थिर अनुपात का नियम (Law of Definite Proportions) जोसेफ प्राउस्ट (Joseph Proust) द्वारा प्रतिपादित किया गया था। गुणित अनुपात का नियम (Law of Multiple Proportions) जॉन डाल्टन (John Dalton) द्वारा प्रतिपादित किया गया था। गैसीय आयतन का नियम (Law of Gaseous Volumes) जोसेफ लुई गे-लुसैक (Joseph Louis Gay-Lussac) द्वारा प्रतिपादित किया गया था। सही मिलान J-3, K-2, L-1, M-4 है।"}, {"id": 14, "section": "Chemistry", "question": "रासायनिक सिद्धांतों के ऐतिहासिक विकास (historical development) के अनुसार निम्नलिखित घटनाओं को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: एंटोनी लेवोइज़ियर (Antoine Lavoisier) द्वारा द्रव्यमान संरक्षण के नियम (Law of Conservation of Mass) का प्रतिपादन।\nK: जॉन डाल्टन (John Dalton) द्वारा परमाणु सिद्धांत (Atomic Theory) का प्रस्ताव।\nL: जोसेफ प्राउस्ट (Joseph Proust) द्वारा स्थिर अनुपात के नियम (Law of Definite Proportions) का प्रतिपादन।\nM: आवोगाद्रो (Avogadro) द्वारा अणुओं (molecules) की अवधारणा (concept) का प्रस्ताव।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L, K, M", "J, K, L, M", "K, J, L, M", "L, J, K, M"], "answer": "J, L, K, M", "explanation": "द्रव्यमान संरक्षण का नियम एंटोनी लेवोइज़ियर द्वारा 1789 में प्रतिपादित किया गया था। स्थिर अनुपात का नियम जोसेफ प्राउस्ट द्वारा 1799 में प्रतिपादित किया गया था। डाल्टन का परमाणु सिद्धांत 1803-1808 के बीच प्रस्तावित किया गया था। आवोगाद्रो का नियम 1811 में प्रस्तावित किया गया था। इसलिए, सही कालानुक्रमिक क्रम J, L, K, M है।"}, {"id": 15, "section": "Chemistry", "question": "यदि 10 ग्राम कैल्शियम कार्बोनेट (calcium carbonate) को गर्म करने पर 4.4 ग्राम कार्बन डाइऑक्साइड (carbon dioxide) और कुछ कैल्शियम ऑक्साइड (calcium oxide) प्राप्त होता है, तो द्रव्यमान संरक्षण के नियम (Law of Conservation of Mass) के अनुसार कैल्शियम ऑक्साइड का द्रव्यमान (mass) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["10 ग्राम", "14.4 ग्राम", "5.6 ग्राम", "4 ग्राम"], "answer": "5.6 ग्राम", "explanation": "द्रव्यमान संरक्षण के नियम के अनुसार, अभिक्रिया में अभिकारकों का कुल द्रव्यमान उत्पादों के कुल द्रव्यमान के बराबर होता है। कैल्शियम कार्बोनेट (अभिकारक) → कार्बन डाइऑक्साइड (उत्पाद) + कैल्शियम ऑक्साइड (उत्पाद)। अभिकारक का द्रव्यमान = 10 ग्राम। उत्पादों का कुल द्रव्यमान = 4.4 ग्राम (कार्बन डाइऑक्साइड) + कैल्शियम ऑक्साइड का द्रव्यमान। अतः, कैल्शियम ऑक्साइड का द्रव्यमान = 10 ग्राम - 4.4 ग्राम = 5.6 ग्राम।"}, {"id": 16, "section": "Chemistry", "question": "18 ग्राम जल (water) में 2 ग्राम हाइड्रोजन (hydrogen) और 16 ग्राम ऑक्सीजन (oxygen) होता है। यदि 36 ग्राम जल का एक और नमूना (sample) लिया जाए, तो उसमें ऑक्सीजन का द्रव्यमान (mass) कितना होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["4 ग्राम", "16 ग्राम", "32 ग्राम", "18 ग्राम"], "answer": "32 ग्राम", "explanation": "स्थिर अनुपात के नियम के अनुसार, जल (H₂O) में हाइड्रोजन और ऑक्सीजन का द्रव्यमान अनुपात हमेशा 2:16 या 1:8 होता है। यदि जल का द्रव्यमान 18 ग्राम से बढ़कर 36 ग्राम (दोगुना) हो जाता है, तो उसमें मौजूद प्रत्येक तत्व का द्रव्यमान भी दोगुना हो जाएगा, जबकि अनुपात वही रहेगा। इसलिए, 36 ग्राम जल में ऑक्सीजन का द्रव्यमान 16 ग्राम * 2 = 32 ग्राम होगा।"}, {"id": 17, "section": "Chemistry", "question": "दो तत्व (elements) X और Y मिलकर दो अलग-अलग यौगिक (compounds) बनाते हैं। पहले यौगिक में, 6 ग्राम X, 8 ग्राम Y के साथ संयोजित होता है। दूसरे यौगिक में, 9 ग्राम X, 24 ग्राम Y के साथ संयोजित होता है। गुणित अनुपात के नियम (Law of Multiple Proportions) के अनुसार, X के निश्चित द्रव्यमान (fixed mass) के साथ संयोजित Y के द्रव्यमानों का अनुपात (ratio) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["2", "3", "4", "1"], "answer": "2", "explanation": "गुणित अनुपात के नियम (Law of Multiple Proportions) के अनुसार, जब दो तत्व एक से अधिक यौगिक बनाने के लिए संयोजित होते हैं, तो एक तत्व के निश्चित द्रव्यमान के साथ संयोजित दूसरे तत्व के द्रव्यमान सरल पूर्णांक अनुपात (simple whole number ratio) में होते हैं। यहां, हमें तत्व X के निश्चित द्रव्यमान के साथ संयोजित तत्व Y के द्रव्यमानों का अनुपात ज्ञात करना है। पहले यौगिक के लिए: 6 ग्राम X, 8 ग्राम Y के साथ संयोजित होता है। अतः, 1 ग्राम X के साथ संयोजित Y का द्रव्यमान = (8 ग्राम Y) / (6 ग्राम X) = 4/3 ग्राम Y दूसरे यौगिक के लिए: 9 ग्राम X, 24 ग्राम Y के साथ संयोजित होता है। अतः, 1 ग्राम X के साथ संयोजित Y का द्रव्यमान = (24 ग्राम Y) / (9 ग्राम X) = 8/3 ग्राम Y अब, X के निश्चित द्रव्यमान (1 ग्राम) के साथ संयोजित Y के द्रव्यमानों का अनुपात: (पहले यौगिक में Y का द्रव्यमान): (दूसरे यौगिक में Y का द्रव्यमान) = (4/3): (8/3) = 4: 8 = 1: 2 इसलिए, Y के द्रव्यमानों का अनुपात 1:2 होगा।"}, {"id": 18, "section": "Chemistry", "question": "यदि 20 mL हाइड्रोजन गैस (hydrogen gas) 10 mL ऑक्सीजन गैस (oxygen gas) के साथ अभिक्रिया करके जल वाष्प (water vapor) बनाती है, तो गे-लुसैक (Gay-Lussac) के गैसीय आयतन (Gaseous Volumes) के नियम और आवोगाद्रो (Avogadro) के नियम के अनुसार, बनने वाली जल वाष्प का आयतन (volume) क्या होगा (समान ताप (temperature) और दाब (pressure) पर)?", "brand": "bilaspurtestseries.com 9669946966", "options": ["30 mL", "20 mL", "10 mL", "40 mL"], "answer": "20 mL", "explanation": "जल के निर्माण की अभिक्रिया है: 2H₂(g) + O₂(g) → 2H₂O(g)। गे-लुसैक के गैसीय आयतन के नियम के अनुसार, समान ताप और दाब पर, गैसें सरल आयतन अनुपात में संयोजित होती हैं। ्यमान संरक्षण के नियम से, CO₂ का द्रव्यमान = 10 ग्राम (CaCO₃) − 5.6 ग्राम (CaO) = 4.4 ग्राम। 2. CaCO₃ में Ca का द्रव्यमान: CaO का मोलर द्रव्यमान 56 g/mol (Ca=40, O=16) है। 5.6 ग्राम CaO में Ca का द्रव्यमान = (40/56) × 5.6 = 4.0 ग्राम। 3. CaCO₃ में C का द्रव्यमान: 22 ग्राम CO₂ में 6 ग्राम C है। स्थिर अनुपात से, 4.4 ग्राम CO₂ में C का द्रव्यमान = (6/22) × 4.4 = 1.2 ग्राम। 4. CaCO₃ में O का द्रव्यमान: कुल ऑक्सीजन = CaCO₃ का कुल द्रव्यमान - Ca का द्रव्यमान - C का द्रव्यमान = 10 − 4.0 − 1.2 = 4.8 ग्राम। 5. द्रव्यमान अनुपात Ca:C:O = 4.0: 1.2: 4.8। इसे सरल करने पर (0.4 से भाग देने पर) = 10: 3: 12।"}, {"id": 21, "section": "Chemistry", "question": "मोल (mole) की सही परिभाषा क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह किसी पदार्थ के 6.022 × 10²³ ग्राम को दर्शाता है।", "यह किसी पदार्थ के 22.4 लीटर आयतन (volume) को मानक ताप और दाब (STP) पर दर्शाता है।", "यह किसी पदार्थ के आणविक द्रव्यमान (molecular mass) के बराबर ग्राम में व्यक्त मात्रा है।", "यह किसी पदार्थ की वह मात्रा है जिसमें उतने ही कण (particles) होते हैं जितने 12 ग्राम कार्बन-12 (¹²C) में परमाणु होते हैं।"], "answer": "यह किसी पदार्थ की वह मात्रा है जिसमें उतने ही कण (particles) होते हैं जितने 12 ग्राम कार्बन-12 (¹²C) में परमाणु होते हैं।", "explanation": "मोल (mole) की परिभाषा कार्बन-12 समस्थानिक (isotope) के 12 ग्राम में उपस्थित परमाणुओं की संख्या पर आधारित है, जो एवोगैड्रो संख्या (Avogadro's number) के बराबर होती है। विकल्प A गलत है क्योंकि मोल ग्राम को नहीं, बल्कि कणों की संख्या को दर्शाता है। विकल्प C आणविक द्रव्यमान को ग्राम में व्यक्त करने पर मोलर द्रव्यमान (molar mass) होता है, जो एक मोल की मात्रा होती है, लेकिन यह परिभाषा नहीं है। विकल्प D केवल गैसों के लिए मानक ताप और दाब (STP) पर लागू होता है, सभी पदार्थों के लिए नहीं।"}, {"id": 22, "section": "Chemistry", "question": "एवोगैड्रो संख्या (Avogadro's number) का उपयोग किस प्रकार के कणों की संख्या ज्ञात करने के लिए किया जा सकता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["परमाणु, अणु, आयन या किसी भी अन्य मूलभूत कणों (fundamental particles) की संख्या के लिए।", "केवल अणुओं (molecules) की संख्या के लिए।", "केवल परमाणुओं (atoms) की संख्या के लिए।", "केवल आयनों (ions) की संख्या के लिए।"], "answer": "परमाणु, अणु, आयन या किसी भी अन्य मूलभूत कणों (fundamental particles) की संख्या के लिए।", "explanation": "एवोगैड्रो संख्या (6.022 × 10²³) किसी भी पदार्थ के एक मोल में उपस्थित कणों की संख्या को दर्शाती है। ये कण परमाणु, अणु, आयन, इलेक्ट्रॉन या कोई अन्य मूलभूत इकाई हो सकते हैं। इसलिए, यह केवल एक विशिष्ट प्रकार के कणों तक सीमित नहीं है, बल्कि सभी मूलभूत कणों पर लागू होती है।"}, {"id": 23, "section": "Chemistry", "question": "रासायनिक संयोजन के नियमों (Laws of Chemical Combination) के संबंध में निम्नलिखित में से कौन सा कथन सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["गै-लुसैक का गैसीय आयतन का नियम (Gay-Lussac's Law of Gaseous Volumes) सभी रासायनिक अभिक्रियाओं के लिए लागू होता है, चाहे अभिकर्मक (reactants) और उत्पाद (products) गैसीय अवस्था में हों या नहीं।", "गुणित अनुपात का नियम (Law of Multiple Proportions) कहता है कि जब दो तत्व एक से अधिक यौगिक बनाने के लिए संयोजित होते हैं, तो एक तत्व के निश्चित द्रव्यमान के साथ संयोजित होने वाले दूसरे तत्व के द्रव्यमान छोटे पूर्ण संख्याओं के अनुपात में होते हैं।", "स्थिर अनुपात का नियम (Law of Definite Proportions) कहता है कि एक रासायनिक यौगिक (chemical compound) में तत्वों का द्रव्यमान अनुपात हमेशा स्थिर रहता है।", "द्रव्यमान संरक्षण का नियम (Law of Conservation of Mass) कहता है कि रासायनिक अभिक्रिया में द्रव्यमान न तो बनाया जा सकता है और न ही नष्ट किया जा सकता है।"], "answer": "गै-लुसैक का गैसीय आयतन का नियम (Gay-Lussac's Law of Gaseous Volumes) सभी रासायनिक अभिक्रियाओं के लिए लागू होता है, चाहे अभिकर्मक (reactants) और उत्पाद (products) गैसीय अवस्था में हों या नहीं।", "explanation": "गै-लुसैक का गैसीय आयतन का नियम (Gay-Lussac's Law of Gaseous Volumes) केवल उन रासायनिक अभिक्रियाओं पर लागू होता है जिनमें अभिकर्मक और उत्पाद गैसीय अवस्था में होते हैं। यह नियम बताता है कि समान ताप और दाब पर, गैसीय अभिकर्मक और उत्पाद सरल पूर्ण संख्या अनुपात में आयतन में संयोजित होते हैं। अन्य सभी कथन रासायनिक संयोजन के नियमों के बारे में सही हैं।"}, {"id": 24, "section": "Chemistry", "question": "2 ग्राम हाइड्रोजन (H₂) और 16 ग्राम ऑक्सीजन (O₂) के बीच अभिक्रिया से अधिकतम कितना जल (H₂O) बन सकता है? (परमाणु द्रव्यमान: H=1, O=16)", "brand": "bilaspurtestseries.com 9669946966", "options": ["9 ग्राम", "32 ग्राम", "18 ग्राम", "16 ग्राम"], "answer": "18 ग्राम", "explanation": "अभिक्रिया है: 2H₂ + O₂ → 2H₂O। हाइड्रोजन का मोलर द्रव्यमान = 2 g/mol, ऑक्सीजन का मोलर द्रव्यमान = 32 g/mol, जल का मोलर द्रव्यमान = 18 g/mol। दिए गए हाइड्रोजन के मोल = 2 g / 2 g/mol = 1 मोल H₂। दिए गए ऑक्सीजन के मोल = 16 g / 32 g/mol = 0.5 मोल O₂। संतुलित समीकरण के अनुसार, 2 मोल H₂ को 1 मोल O₂ की आवश्यकता होती है। हमारे पास 1 मोल H₂ है, जिसे 0.5 मोल O₂ की आवश्यकता होगी। हमारे पास 0.5 मोल O₂ उपलब्ध है। इसलिए, दोनों अभिकर्मक पूरी तरह से अभिक्रिया करेंगे और कोई सीमित अभिकर्मक (limiting reagent) नहीं है। 1 मोल H₂ से 1 मोल H₂O बनता है (क्योंकि 2H₂ से 2H₂O बनता है, तो 1H₂ से 1H₂O)। 0.5 मोल O₂ से 1 मोल H₂O बनता है (क्योंकि 1O₂ से 2H₂O बनता है, तो 0.5O₂ से 1H₂O)। अतः, 1 मोल जल (H₂O) बनेगा, जिसका द्रव्यमान 18 ग्राम है।"}, {"id": 25, "section": "Chemistry", "question": "सांद्रता पदों (Concentration Terms) के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. मोलरता (Molarity) विलयन (solution) के आयतन (volume) पर निर्भर करती है, इसलिए यह तापमान (temperature) के साथ बदलती है।\n2. मोललता (Molality) विलायक (solvent) के द्रव्यमान (mass) पर निर्भर करती है, इसलिए यह तापमान से स्वतंत्र होती है।\n3. नॉर्मलता (Normality) हमेशा मोलरता के बराबर होती है जब तुल्यांकी द्रव्यमान (equivalent mass) आणविक द्रव्यमान (molecular mass) के बराबर होता है।\n4. मोल प्रभाज (Mole fraction) तापमान से स्वतंत्र होता है और इसकी कोई इकाई (unit) नहीं होती है", "brand": "bilaspurtestseries.com 9669946966", "options": ["1, 2, 3 और 4", "केवल 1, 2 और 4", "केवल 1 और 2", "केवल 2, 3 और 4"], "answer": "1, 2, 3 और 4", "explanation": "1. मोलरता (Molarity) = (विलेय के मोल) / (विलयन का आयतन लीटर में)। चूंकि आयतन तापमान के साथ बदलता है, इसलिए मोलरता भी तापमान पर निर्भर करती है। यह कथन सही है। 2. मोललता (Molality) = (विलेय के मोल) / (विलायक का द्रव्यमान किलोग्राम में)। चूंकि द्रव्यमान तापमान से स्वतंत्र होता है, इसलिए मोललता भी तापमान से स्वतंत्र होती है। यह कथन सही है। 3. नॉर्मलता (Normality) = (विलेय के ग्राम तुल्यांक) / (विलयन का आयतन लीटर में)। ग्राम तुल्यांक = (द्रव्यमान) / (तुल्यांकी द्रव्यमान)। मोलरता = (विलेय के मोल) / (विलयन का आयतन लीटर में)। यदि तुल्यांकी द्रव्यमान आणविक द्रव्यमान के बराबर है, तो ग्राम तुल्यांक मोल के बराबर होगा, और इस प्रकार नॉर्मलता मोलरता के बराबर होगी। यह कथन सही है। 4. मोल प्रभाज (Mole fraction) = (एक घटक के मोल) / (सभी घटकों के कुल मोल)। यह केवल मोलों की संख्या पर निर्भर करता है, जो तापमान से स्वतंत्र होती है। यह एक अनुपात है, इसलिए इसकी कोई इकाई नहीं होती। यह कथन सही है। अतः, सभी कथन सही हैं।"}, {"id": 26, "section": "Chemistry", "question": "सीमित अभिकर्मक (Limiting Reagent) के संबंध में निम्नलिखित में से कौन सा कथन गलत है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अभिक्रिया में बनने वाले उत्पाद की मात्रा हमेशा सीमित अभिकर्मक द्वारा निर्धारित होती है।", "यदि सभी अभिकर्मक स्टोइकियोमेट्रिक अनुपात (stoichiometric ratio) में मौजूद हों, तो कोई सीमित अभिकर्मक नहीं होता है।", "अभिक्रिया के अंत में, सीमित अभिकर्मक हमेशा कुछ मात्रा में बचा रहता है।", "सीमित अभिकर्मक वह अभिकर्मक है जो रासायनिक अभिक्रिया में पूरी तरह से उपभोग हो जाता है।"], "answer": "अभिक्रिया के अंत में, सीमित अभिकर्मक हमेशा कुछ मात्रा में बचा रहता है।", "explanation": "सीमित अभिकर्मक (Limiting Reagent) वह अभिकर्मक होता है जो रासायनिक अभिक्रिया में सबसे पहले पूरी तरह से समाप्त हो जाता है। यह अभिक्रिया की उपज (yield) को निर्धारित करता है क्योंकि एक बार यह समाप्त हो जाने पर अभिक्रिया रुक जाती है। इसलिए, अभिक्रिया के अंत में, सीमित अभिकर्मक की कोई मात्रा नहीं बचती है; यह पूरी तरह से उपभोग हो जाता है। विकल्प D गलत है। अन्य सभी कथन सीमित अभिकर्मक के बारे में सही हैं।"}, {"id": 27, "section": "Chemistry", "question": "अभिकथन (A): मूलानुपाती सूत्र (Empirical formula) एक यौगिक में परमाणुओं के सबसे सरल पूर्ण संख्या अनुपात को दर्शाता है।\nकारण (R): आणविक सूत्र (Molecular formula) हमेशा मूलानुपाती सूत्र का एक पूर्णांक गुणज (integer multiple) होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["कथन (A) असत्य है लेकिन (R) सत्य है।", "कथन (A) सत्य है लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।"], "answer": "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "explanation": "अभिकथन (A) सही है। मूलानुपाती सूत्र वास्तव में एक यौगिक में विभिन्न परमाणुओं के सबसे सरल पूर्ण संख्या अनुपात को दर्शाता है। कारण (R) भी सही है। आणविक सूत्र हमेशा मूलानुपाती सूत्र का एक पूर्णांक गुणज (n) होता है, जहाँ आणविक सूत्र = (मूलानुपाती सूत्र)n। हालांकि, कारण (R) अभिकथन (A) की सही व्याख्या नहीं है। अभिकथन मूलानुपाती सूत्र की परिभाषा देता है, जबकि कारण आणविक सूत्र के साथ उसके संबंध को बताता है, लेकिन यह परिभाषा की व्याख्या नहीं करता।"}, {"id": 28, "section": "Chemistry", "question": "अभिकथन (A): किसी रासायनिक अभिक्रिया की प्रतिशत उपज (Percentage Yield) हमेशा 100% से कम होती है।\nकारण (R): रासायनिक अभिक्रियाओं में अक्सर अवांछित उप-उत्पाद (by-products) बनते हैं और अभिकर्मकों का पूर्ण रूपांतरण (complete conversion) नहीं होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["कथन (A) असत्य है लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "कथन (A) सत्य है लेकिन (R) असत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है। व्यवहार में, रासायनिक अभिक्रियाओं की प्रतिशत उपज (Percentage Yield) शायद ही कभी 100% होती है और आमतौर पर इससे कम ही होती है। कारण (R) भी सत्य है और अभिकथन की सही व्याख्या करता है। कई कारक प्रतिशत उपज को 100% से कम कर सकते हैं, जैसे कि अभिकर्मकों का अधूरा रूपांतरण, अवांछित उप-उत्पादों का निर्माण, उत्पाद का नुकसान (जैसे छानने या l Gas Equation) PV = nRT का उपयोग किसी भी गैस के मोलों की संख्या ज्ञात करने के लिए किया जा सकता है, भले ही वह आदर्श व्यवहार से विचलित (deviate) हो।\nL: एवोगैड्रो का नियम (Avogadro's Law) बताता है कि समान ताप और दाब पर, सभी गैसों के समान आयतन में समान संख्या में अणु होते हैं।\nM: यदि एक गैसीय अभिक्रिया में अभिकर्मक और उत्पाद दोनों मौजूद हों, तो कुल आयतन हमेशा अभिकर्मकों के प्रारंभिक आयतन के योग के बराबर होता है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "केवल J, K और L", "केवल K और M", "केवल J और L"], "answer": "केवल J और L", "explanation": "कथन J सही है। गै-लुसैक का गैसीय आयतन का नियम विशेष रूप से गैसीय अभिकर्मकों और उत्पादों के लिए ही लागू होता है। कथन K गलत है। आदर्श गैस समीकरण (PV = nRT) केवल आदर्श गैसों के लिए सटीक रूप से लागू होता है; वास्तविक गैसें उच्च दाब और निम्न ताप पर आदर्श व्यवहार से विचलित होती हैं। कथन L सही है। एवोगैड्रो का नियम बताता है कि समान ताप और दाब पर, सभी गैसों के समान आयतन में समान संख्या में अणु होते हैं। कथन M गलत है। रासायनिक अभिक्रियाओं में, अभिकर्मकों के आयतन का योग उत्पादों के आयतन के योग के बराबर नहीं होता है, खासकर जब मोलों की संख्या बदलती है (उदाहरण के लिए, 2H₂(g) + O₂(g) → 2H₂O(g) में 3 आयतन से 2 आयतन बनते हैं)। अतः, कथन J और L सही हैं।"}, {"id": 31, "section": "Chemistry", "question": "विभिन्न प्रकार की रासायनिक अभिक्रियाओं में स्टोइकियोमेट्री (Stoichiometry) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: रेडॉक्स अभिक्रियाओं (Redox reactions) में, ऑक्सीकरण (oxidation) और अपचयन (reduction) दोनों प्रक्रियाएँ एक साथ होती हैं, और इलेक्ट्रॉनों का आदान-प्रदान स्टोइकियोमेट्री को प्रभावित करता है।\nK: उदासीनीकरण अभिक्रियाओं (Neutralization reactions) में, अम्ल (acid) और क्षार (base) के मोलों की संख्या हमेशा बराबर होती है, चाहे उनकी संयोजकता (valency) कुछ भी हो।\nL: अवक्षेपण अभिक्रियाओं (Precipitation reactions) में, सीमित अभिकर्मक (limiting reagent) की पहचान करना महत्वपूर्ण है क्योंकि यह बनने वाले अवक्षेप (precipitate) की अधिकतम मात्रा निर्धारित करता है।\nM: दहन अभिक्रियाओं (Combustion reactions) में, ँ एक संकेतक (indicator) रंग बदलता है, जो तुल्यता बिंदु (equivalence point) के करीब होता है, जहाँ अभिकर्मक स्टोइकियोमेट्रिक रूप से बराबर होते हैं। अंतिम बिंदु और तुल्यता बिंदु हमेशा बिल्कुल समान नहीं होते। कथन L सही है। तनुकरण में, केवल विलायक (solvent) की मात्रा बढ़ाई जाती है, जिससे विलेय की मात्रा (मोलों की संख्या) अपरिवर्तित रहती है। कथन M गलत है। दो विलयनों को मिलाने पर परिणामी विलयन की मोलरता केवल प्रारंभिक मोलरता का औसत नहीं होती है; यह प्रत्येक विलयन के मोलों की कुल संख्या और कुल आयतन पर निर्भर करती है (Mfᵢₙₐₗ = (M₁V₁ + M₂V₂) / (V₁ + V₂))। अतः, कथन J और L सही हैं।"}, {"id": 33, "section": "Chemistry", "question": "निम्नलिखित प्रमुख अवधारणाओं (Key Concepts) को उनकी विशेषताओं या अनुप्रयोगों (Characteristics or Applications) के साथ सुमेलित (match) करें: सूची-I\n(J) मोलरता (Molarity)\n(K) मोललता (Molality)\n(L) तुल्यांकी द्रव्यमान (Equivalent Mass)\n(M) सीमित अभिकर्मक (Limiting Reagent) सूची-II\n(1) तापमान परिवर्तन से अप्रभावित (Unaffected by temperature change)\n(2) रासायनिक अभिक्रिया की सीमा निर्धारित करता है (Determines the extent of a chemical reaction)\n(3) विलेय के मोल प्रति लीटर विलयन (Moles of solute per liter of solution)\n(4) अम्ल-क्षार अभिक्रियाओं में महत्वपूर्ण (Important in acid-base reactions)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-3, L-2, M-4", "J-3, K-1, L-4, M-2", "J-2, K-4, L-3, M-1", "J-4, K-2, L-1, M-3"], "answer": "J-3, K-1, L-4, M-2", "explanation": "सही मिलान इस प्रकार है: J. मोलरता (Molarity): यह विलेय (solute) के मोल प्रति लीटर विलयन (solution) के रूप में परिभाषित की जाती है। (3) K. मोललता (Molality): यह विलेय के मोल प्रति किलोग्राम विलायक (solvent) के रूप में परिभाषित की जाती है और तापमान परिवर्तन से अप्रभावित रहती है क्योंकि इसमें आयतन (volume) शामिल नहीं होता। (1) L. तुल्यांकी द्रव्यमान (Equivalent Mass): यह विशेष रूप से अम्ल-क्षार (acid-base) और रेडॉक्स अभिक्रियाओं (redox reactions) में महत्वपूर्ण होता है, जहाँ यह अभिक्रिया करने वाले पदार्थ की मात्रा को दर्शाता है। (4) M. सीमित अभिकर्मक (Limiting Reagent): यह वह अभिकर्मक है जो रासायनिक अभिक्रिया में पूरी तरह से उपभोग हो जाता है और उत्पाद (product) की अधिकतम मात्रा को निर्धारित करता है। (2) अतः, सही विकल्प J-3, K-1, L-4, M-2 है।"}, {"id": 34, "section": "Chemistry", "question": "किसी यौगिक (compound) के मूलानुपाती सूत्र (Empirical Formula) को निर्धारित करने के लिए निम्नलिखित चरणों को सही क्रम में व्यवस्थित करें:\nJ: प्रत्येक तत्व (element) के द्रव्यमान (mass) को उसके परमाणु द्रव्यमान (atomic mass) से विभाजित करके मोलों (moles) की संख्या ज्ञात करें।\nK: प्राप्त मोलों की संख्या को सबसे छोटी मोल संख्या से विभाजित करके सरलतम मोल अनुपात (simplest mole ratio) ज्ञात करें।\nL: यदि आवश्यक हो, तो सरलतम मोल अनुपात को पूर्णांकों (whole numbers) में बदलने के लिए उपयुक्त संख्या से गुणा करें।\nM: तत्वों के प्रतिशत संघटन (percentage composition) को उनके द्रव्यमान में परिवर्तित करें (मान लें कि नमूना 100 ग्राम है)।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, M, K, L", "J, K, M, L", "M, J, K, L", "M, K, J, L"], "answer": "M, J, K, L", "explanation": "किसी यौगिक के मूलानुपाती सूत्र को निर्धारित करने का सही क्रम इस प्रकार है: 1. M. तत्वों के प्रतिशत संघटन को उनके द्रव्यमान में परिवर्तित करें (मान लें कि नमूना 100 ग्राम है): यह पहला तार्किक कदम है, क्योंकि प्रतिशत संघटन को सीधे गणना में उपयोग नहीं किया जा सकता। 100 ग्राम नमूना मानकर, प्रतिशत को ग्राम में बदलना आसान हो जाता है। 2. J. प्रत्येक तत्व के द्रव्यमान को उसके परमाणु द्रव्यमान से विभाजित करके मोलों की संख्या ज्ञात करें: द्रव्यमान को मोलों में परिवर्तित करना अगला आवश्यक कदम है, क्योंकि रासायनिक अभिक्रियाएँ मोल अनुपात में होती हैं। 3. K. प्राप्त मोलों की संख्या को सबसे छोटी मोल संख्या से विभाजित करके सरलतम मोल अनुपात ज्ञात करें: यह कदम विभिन्न तत्वों के मोलों के बीच सबसे सरल अनुपात स्थापित करता है, जो मूलानुपाती सूत्र का आधार है। 4. L. यदि आवश्यक हो, तो सरलतम मोल अनुपात को पूर्णांकों में बदलने के लिए उपयुक्त संख्या से गुणा करें: मोल अनुपात कभी-कभी दशमलव (decimal) में हो सकता है, इसलिए इसे पूर्णांकों में बदलना आवश्यक है ताकि मूलानुपाती सूत्र में परमाणुओं की संख्या को सही ढंग से दर्शाया जा सके। अतः, सही क्रम M, J, K, L है।"}, {"id": 35, "section": "Chemistry", "question": "निम्नलिखित में से किस यौगिक का मोलर द्रव्यमान (Molar Mass) 98 g/mol है? (परमाणु द्रव्यमान: H=1, S=32, O=16, C=12, N=14)", "brand": "bilaspurtestseries.com 9669946966", "options": ["C₆H₁₂O₆", "H₂SO₄", "HNO₃", "NH₂CONH₂ (यूरिया)"], "answer": "H₂SO₄", "explanation": "प्रत्येक यौगिक के मोलर द्रव्यमान की गणना इस प्रकार है: A) H₂SO₄: (2 × 1) + (1 × 32) + (4 × 16) = 2 + 32 + 64 = 98 g/mol। B) HNO₃: (1 × 1) + (1 × 14) + (3 × 16) = 1 + 14 + 48 = 63 g/mol। C) C₆H₁₂O₆: (6 × 12) + (12 × 1) + (6 × 16) = 72 + 12 + 96 = 180 g/mol। D) NH₂CONH₂ (यूरिया): (2 × 14) + (4 × 1) + (1 × 12) + (1 × 16) = 28 + 4 + 12 + 16 = 60 g/mol। अतः, H₂SO₄ का मोलर द्रव्यमान 98 g/mol है।"}, {"id": 36, "section": "Chemistry", "question": "100 mL 0.5 M H₂SO₄ विलयन में H₂SO₄ के कितने मोल (moles) उपस्थित हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["0.5 मोल", "0.005 मोल", "0.05 मोल", "5 मोल"], "answer": "0.05 मोल", "explanation": "मोलरता (Molarity, M) = (विलेय के मोल) / (विलयन का आयतन लीटर में)। दिए गए मान: मोलरता (M) = 0.5 M आयतन (Volume, V) = 100 mL = 100 / 1000 लीटर = 0.1 लीटर विलेय के मोल = मोलरताआयतन (लीटर में) विलेय के मोल = 0.5 मोल/लीटर0.1 लीटर = 0.05 मोल। अतः, 100 mL 0.5 M H₂SO₄ विलयन में 0.05 मोल H₂SO₄ उपस्थित हैं।"}, {"id": 37, "section": "Chemistry", "question": "98% शुद्ध H₂SO₄ (भारानुसार) का एक विलयन है जिसका घनत्व (density) 1.80 g/mL है। इस विलयन की मोलरता (Molarity) क्या होगी? (परमाणु द्रव्यमान: H=1, S=32, O=16)", "brand": "bilaspurtestseries.com 9669946966", "options": ["8 M", "9.8 M", "36 M", "18 M"], "answer": "18 M", "explanation": "H₂SO₄ का मोलर द्रव्यमान (Molar mass) = 2(1) + 32 + 4(16) = 2 + 32 + 64 = 98 g/mol। मान लीजिए कि हमारे पास विलयन का 1 लीटर (1000 mL) है। विलयन का द्रव्यमान (Mass of solution) = आयतन (Volume)घनत्व (Density) = 1000 mL × 1.80 g/mL = 1800 g विलयन में शुद्ध H₂SO₄ का द्रव्यमान (Mass of pure H₂SO₄) = विलयन का द्रव्यमानशुद्धता प्रतिशत = 1800 g × (98/100) = 1800 g × 0.98 = 1764 g शुद्ध H₂SO₄ के मोलों की संख्या (Moles of pure H₂SO₄) = द्रव्यमान / मोलर द्रव्यमान = 1764 g / 98 g/mol = 18 मोल मोलरता (Molarity) = विलेय के मोल / विलयन का आयतन (लीटर में) = 18 मोल / 1 L = 18 M अतः, विलयन की मोलरता 18 M होगी।"}, {"id": 38, "section": "Chemistry", "question": "10 ग्राम हाइड्रोजन (H₂) और 64 ग्राम ऑक्सीजन (O₂) को मिलाकर जल (H₂O) बनाया जाता है। अधिकतम कितना जल उत्पन्न होगा? (परमाणु द्रव्यमान: H=1, O=16) अभिक्रिया: 2H₂(g) + O₂(g) → 2H₂O(l)", "brand": "bilaspurtestseries.com 9669946966", "options": ["72 ग्राम", "90 ग्राम", "36 ग्राम", "18 ग्राम"], "answer": "72 ग्राम", "explanation": "सबसे पहले, दिए गए अभिकारकों (reactants) के मोलों की संख्या ज्ञात करें: H₂ का मोलर द्रव्यमान (Molar mass) = 2 × 1 = 2 g/mol O₂ का मोलर द्रव्यमान = 2 × 16 = 32 g/mol H₂O का मोलर द्रव्यमान = 2 × 1 + 16 = 18 g/mol हाइड्रोजन (H₂) के मोल = 10 g / 2 g/mol = 5 मोल ऑक्सीजन (O₂) के मोल = 64 g / 32 g/mol = 2 मोल अब, संतुलित रासायनिक समीकरण (balanced chemical equation) देखें: 2H₂(g) + O₂(g) → 2H₂O(l) यह समीकरण दर्शाता है कि 2 मोल H₂ को 1 मोल O₂ के साथ अभिक्रिया करने की आवश्यकता होती है। सीमित अभिकर्मक (Limiting Reagent) की पहचान करें: विकल्प 1: यदि H₂ पूरी तरह से अभिक्रिया करता है (5 मोल H₂), तो आवश्यक O₂ = (1 मोल O₂ / 2 मोल H₂) × 5 मोल H₂ = 2.5 मोल O₂। हमारे पास केवल 2 मोल O₂ है, जो आवश्यक 2.5 मोल से कम है। अतः, O₂ सीमित अभिकर्मक है। विकल्प 2: यदि O₂ पूरी तरह से अभिक्रिया करता है (2 मोल O₂), तो आवश्यक H₂ = (2 मोल H₂ / 1 मोल O₂) × 2 मोल O₂ = 4 मोल H₂। हमारे पास 5 मोल H₂ है, जो आवश्यक 4 मोल से अधिक है। अतः, O₂ सीमित अभिकर्मक है। चूंकि O₂ सीमित अभिकर्मक है, उत्पाद (product) की मात्रा O₂ की मात्रा पर निर्भर करेगी। समीकरण के अनुसार, 1 मोल O₂ से 2 मोल H₂O बनता है। तो, 2 मोल O₂ से 2 × 2 = 4 मोल H₂O बनेगा। उत्पन्न जल (H₂O) का द्रव्यमान = मोलों की संख्यामोलर द्रव्यमान = 4 मोल18 g/mol = 72 ग्राम अतः, अधिकतम 72 ग्राम जल उत्पन्न होगा।"}, {"id": 39, "section": "Chemistry", "question": "एक कार्बनिक यौगिक (organic compound) में 40% कार्बन (C), 6.67% हाइड्रोजन (H) और शेष ऑक्सीजन (O) है। यदि यौगिक का वाष्प घनत्व (vapor density) 30 है, तो उसका आणविक सूत्र (molecular formula) क्या होगा? (परमाणु द्रव्यमान: C=12, H=1, O=16)", "brand": "bilaspurtestseries.com 9669946966", "options": ["C₃H₆O₃", "C₂H₄O₂", "CH₂O", "C₄H₈O₄"], "answer": "C₂H₄O₂", "explanation": "1. तत्वों का प्रतिशत: C = 40%, H = 6.67%, O = 100 − (40 + 6.67) = 53.33%। 2. मोल अनुपात: C: 40/12 = 3.33; H: 6.67/1 = 6.67; O: 53.33/16 = 3.33। 3. सरलतम मोल अनुपात: सबसे छोटे मान (3.33) से भाग देने पर: C: 1, H: 2, O: 1। मूलानुपाती सूत्र (Empirical formula) = CH₂O। 4. मूलानुपाती सूत्र द्रव्यमान: CH₂O = 12 + (2 × 1) + 16 = 30 g/mol। 5. आणविक द्रव्यमान (Molecular mass): 2वाष्प घनत्व = 2 × 30 = 60 g/mol। 6. n का मान: n = आणविक द्रव्यमान / मूलानुपाती सूत्र द्रव्यमान = 60 / 30 = 2। 7. आणविक सूत्र: (CH₂O)₂ = C₂H₄O₂। अतः, आणविक सूत्र C₂H₄O₂ है।"}, {"id": 40, "section": "Chemistry", "question": "10 ग्राम अशुद्ध चूना पत्थर (impure limestone) को गर्म करने पर 2.2 ग्राम कार्बन डाइऑक्साइड (CO₂) प्राप्त होती है। यदि चूना पत्थर में केवल कैल्शियम कार्बोनेट (CaCO₃) अशुद्धियों के साथ मौजूद है, तो चूना पत्थर में CaCO₃ की प्रतिशत शुद्धता (percentage purity) क्या है? (परमाणु द्रव्यमान: Ca=40, C=12, O=16) अभिक्रिया: CaCO₃(s) → CaO(s) + CO₂(g)", "brand": "bilaspurtestseries.com 9669946966", "options": ["25%", "50%", "100%", "75%"], "answer": "50%", "explanation": "1. CO₂ के मोल ज्ञात करें: CO₂ का मोलर द्रव्यमान = 12 + (2 × 16) = 44 g/mol। उत्पन्न CO₂ के मोल = 2.2 g / 44 g/mol = 0.05 मोल। 2. संतुलित समीकरण से CaCO₃ के मोल ज्ञात करें: अभिक्रिया: CaCO₃(s) → CaO(s) + CO₂(g)। समीकरण के अनुसार, 1 मोल CaCO₃ से 1 मोल CO₂ बनता है। इसलिए, 0.05 मोल CO₂ उत्पन्न करने के लिए 0.05 मोल CaCO₃ की आवश्यकता होगी। 3. CaCO₃ का द्रव्यमान ज्ञात करें: CaCO₃ का मोलर द्रव्यमान = 40 + 12 + (3 × 16) = 100 g/mol। अभिक्रिया करने वाले CaCO₃ का द्रव्यमान = 0.05 मोल100 g/mol = 5 ग्राम। 4. चूना पत्थर में CaCO₃ की प्रतिशत शुद्धता ज्ञात करें: शुद्धता = (अभिक्रिया करने वाले CaCO₃ का द्रव्यमान / अशुद्ध चूना पत्थर का कुल द्रव्यमान) × 100 = (5 g / 10 g) × 100 = 50%। अतः, चूना पत्थर में CaCO₃ की प्रतिशत शुद्धता 50% है।"}, {"id": 41, "section": "Chemistry", "question": "थॉमसन के परमाणु मॉडल (Thomson's atomic model) की मुख्य सीमा (main limitation) क्या थी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह परमाणु के धनावेशित (positively charged) भाग की प्रकृति को नहीं बता सका।", "यह इलेक्ट्रॉन (electron) की उपस्थिति को नहीं समझा सका।", "यह अल्फा कण प्रकीर्णन प्रयोग (alpha particle scattering experiment) के परिणामों की व्याख्या नहीं कर सका।", "यह परमाणु के स्थायित्व (stability) की व्याख्या नहीं कर सका।"], "answer": "यह अल्फा कण प्रकीर्णन प्रयोग (alpha particle scattering experiment) के परिणामों की व्याख्या नहीं कर सका।", "explanation": "थॉमसन का परमाणु मॉडल, जिसे 'प्लम पुडिंग मॉडल' (plum pudding model) भी कहा जाता है, परमाणु को एक धनावेशित गोले (positively charged sphere) के रूप में मानता था जिसमें इलेक्ट्रॉन (electrons) धंसे हुए होते हैं। यह मॉडल रदरफोर्ड के अल्फा कण प्रकीर्णन प्रयोग (alpha particle scattering experiment) के परिणामों की व्याख्या करने में विफल रहा, जहाँ अधिकांश अल्फा कण सीधे निकल गए और कुछ बड़े कोणों पर विक्षेपित (deflected) हुए। परमाणु के स्थायित्व की व्याख्या न कर पाना रदरफोर्ड मॉडल की सीमा थी, न कि थॉमसन मॉडल की। इलेक्ट्रॉन की उपस्थिति को थॉमसन ने ही प्रस्तावित किया था।"}, {"id": 42, "section": "Chemistry", "question": "रदरफोर्ड के अल्फा कण प्रकीर्णन प्रयोग (Rutherford's alpha particle scattering experiment) ने किस परमाणु मॉडल (atomic model) की नींव रखी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["बोर का परमाणु मॉडल (Bohr's atomic model)", "डाल्टन का परमाणु मॉडल (Dalton's atomic model)", "नाभिकीय परमाणु मॉडल (Nuclear atomic model)", "थॉमसन का परमाणु मॉडल (Thomson's atomic model)"], "answer": "नाभिकीय परमाणु मॉडल (Nuclear atomic model)", "explanation": "रदरफोर्ड के अल्फा कण प्रकीर्णन प्रयोग (alpha particle scattering experiment) के अवलोकनों (observations) ने यह निष्कर्ष निकाला कि परमाणु का अधिकांश द्रव्यमान (mass) और धनावेश (positive charge) उसके केंद्र में एक छोटे से क्षेत्र में केंद्रित होता है, जिसे नाभिक (nucleus) कहा जाता है। इस खोज ने नाभिकीय परमाणु मॉडल (Nuclear atomic model) की नींव रखी, जो थॉमसन के 'प्लम पुडिंग मॉडल' (plum pudding model) को अस्वीकार करता था। डाल्टन का मॉडल परमाणु को अविभाज्य (indivisible) मानता था, और बोर का मॉडल रदरफोर्ड के मॉडल की कमियों को दूर करने के लिए बाद में आया।"}, {"id": 43, "section": "Chemistry", "question": "इलेक्ट्रॉन (electron) की खोज का श्रेय (credit) किस वैज्ञानिक को दिया जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यूजेन गोल्डस्टीन (Eugen Goldstein)", "अर्नेस्ट रदरफोर्ड (Ernest Rutherford)", "जेम्स चैडविक (James Chadwick)", "जे.जे. थॉमसन (J.J. Thomson)"], "answer": "जे.जे. थॉमसन (J.J. Thomson)", "explanation": "जे.जे. थॉमसन (J.J. Thomson) ने 1897 में कैथोड किरण ट्यूब (cathode ray tube) प्रयोगों के माध्यम से इलेक्ट्रॉन (electron) की खोज की। उन्होंने दिखाया कि कैथोड किरणें ऋणावेशित कणों (negatively charged particles) से बनी होती हैं, जिन्हें बाद में इलेक्ट्रॉन नाम दिया गया। रदरफोर्ड ने नाभिक (nucleus) की खोज की, चैडविक ने न्यूट्रॉन (neutron) की खोज की, और गोल्डस्टीन ने प्रोटॉन (proton) की खोज में महत्वपूर्ण योगदान दिया।"}, {"id": 44, "section": "Chemistry", "question": "रदरफोर्ड के परमाणु मॉडल (Rutherford's atomic model) की कौन सी कमी परमाणु के स्थायित्व (stability) की व्याख्या नहीं कर पाई?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह बताता है कि इलेक्ट्रॉन नाभिक के चारों ओर घूमते हुए ऊर्जा (energy) खो देंगे और अंततः नाभिक में गिर जाएंगे।", "यह परमाणु के सतत स्पेक्ट्रम (continuous spectrum) की व्याख्या नहीं कर सका।", "यह परमाणु के नाभिक (nucleus) के आकार (size) की व्याख्या नहीं कर सका।", "यह इलेक्ट्रॉन (electron) के आवेश (charge) की व्याख्या नहीं कर सका।"], "answer": "यह बताता है कि इलेक्ट्रॉन नाभिक के चारों ओर घूमते हुए ऊर्जा (energy) खो देंगे और अंततः नाभिक में गिर जाएंगे।", "explanation": "रदरफोर्ड के परमाणु मॉडल (Rutherford's atomic model) के अनुसार, इलेक्ट्रॉन (electrons) नाभिक (nucleus) के चारों ओर वृत्ताकार कक्षाओं (circular orbits) में घूमते हैं। शास्त्रीय विद्युतगतिकी (classical electrodynamics) के सिद्धांतों के अनुसार, एक त्वरित आवेशित कण (accelerated charged particle) को लगातार ऊर्जा (energy) का विकिरण (radiate) करना चाहिए। यदि इलेक्ट्रॉन ऐसा करते, तो वे ऊर्जा खोते हुए सर्पिलाकार पथ (spiral path) में नाभिक में गिर जाते, जिससे परमाणु अस्थिर (unstable) हो जाता। यह परमाणु के प्रेक्षित स्थायित्व (observed stability) के विपरीत था, और यह रदरफोर्ड मॉडल की एक प्रमुख कमी थी।"}, {"id": 45, "section": "Chemistry", "question": "डाल्टन (Dalton), थॉमसन (Thomson) और रदरफोर्ड (Rutherford) के परमाणु मॉडलों (atomic models) के बारे में निम्नलिखित कथनों पर विचार करें:\n1. डाल्टन का मॉडल परमाणु को अविभाज्य (indivisible) मानता था।\n2. थॉमसन का मॉडल परमाणु में धनावेश (positive charge) के वितरण (distribution) को एक समान (uniform) मानता था।\n3. रदरफोर्ड का मॉडल परमाणु के अधिकांश द्रव्यमान (mass) और धनावेश को नाभिक (nucleus) में केंद्रित मानता था।\n4. तीनों मॉडल परमाणु के स्थायित्व (stability) की सफलतापूर्वक व्याख्या कर सके", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल 2 और 3", "केवल 1 और 2", "केवल 1, 2 और 3", "सभी 1, 2, 3 और 4"], "answer": "केवल 1, 2 और 3", "explanation": "डाल्टन का परमाणु सिद्धांत (Dalton's atomic theory) वास्तव में परमाणु को अविभाज्य (indivisible) और अविनाशी (indestructible) मानता था, इसलिए कथन 1 सही है। थॉमसन का 'प्लम पुडिंग मॉडल' (plum pudding model) परमाणु को एक धनावेशित गोले (positively charged sphere) के रूप में वर्णित करता है जिसमें इलेक्ट्रॉन (electrons) समान रूप से वितरित (uniformly distributed) होते हैं, इसलिए कथन 2 भी सही है। रदरफोर्ड के अल्फा कण प्रकीर्णन प्रयोग (alpha particle scattering experiment) ने नाभिकीय परमाणु मॉडल (nuclear atomic model) का प्रस्ताव दिया, जिसमें परमाणु का अधिकांश द्रव्यमान और धनावेश एक छोटे, सघन नाभिक (dense nucleus) में केंद्रित होता है, इसलिए कथन 3 भी सही है। हालांकि, रदरफोर्ड का मॉडल परमाणु के स्थायित्व (stability) की व्याख्या नहीं कर सका, और डाल्टन व थॉमसन के मॉडल भी इस पहलू पर अपर्याप्त थे, इसलिए कथन 4 गलत है।"}, {"id": 46, "section": "Chemistry", "question": "कैथोड किरण (cathode ray) प्रयोगों में, कैथोड किरणों के ऋणावेशित कणों (negatively charged particles) से बने होने का सबसे प्रत्यक्ष प्रमाण (most direct evidence) क्या था?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वे सीधी रेखाओं (straight lines) में गमन करती हैं।", "वे विद्युत (electric) और चुंबकीय क्षेत्रों (magnetic fields) द्वारा विक्षेपित (deflected) होती हैं।", "उनकी प्रकृति (nature) विसर्जन नली (discharge tube) में भरी गैस (gas) पर निर्भर नहीं करती है।", "वे फ्लोरेसेंस (fluorescence) उत्पन्न करती हैं।"], "answer": "वे विद्युत (electric) और चुंबकीय क्षेत्रों (magnetic fields) द्वारा विक्षेपित (deflected) होती हैं।", "explanation": "जे.जे. थॉमसन (J.J. Thomson) द्वारा किए गए कैथोड किरण प्रयोगों (cathode ray experiments) में यह देखा गया कि कैथोड किरणें विद्युत (electric) और चुंबकीय क्षेत्रों (magnetic fields) की उपस्थिति में विक्षेपित (deflected) होती हैं। इस विक्षेपण (deflection) की दिशा (direction) यह दर्शाती है कि ये किरणें ऋणावेशित कणों (negatively charged particles) से बनी हैं। यदि वे अनावेशित (uncharged) होतीं या विद्युत चुम्बकीय तरंगें (electromagnetic waves) होतीं, तो वे इन क्षेत्रों से विक्षेपित नहीं होतीं। सीधी रेखाओं में गमन करना और फ्लोरेसेंस उत्पन्न करना कैथोड किरणों के सामान्य गुण हैं, लेकिन ये सीधे तौर पर उनके आवेशित (charged) होने का प्रमाण नहीं देते। उनकी प्रकृति का गैस पर निर्भर न करना यह दर्शाता है कि इलेक्ट्रॉन सभी परमाणुओं के सार्वभौमिक घटक (universal constituents) हैं, न कि सीधे तौर पर उनके ऋणावेशित होने का प्रमाण।"}, {"id": 47, "section": "Chemistry", "question": "अभिकथन (A): प्रोटॉन (proton) परमाणु के नाभिक (nucleus) में पाए जाते हैं और धनावेशित (positively charged) होते हैं।\nकारण (R): प्रोटॉन का द्रव्यमान (mass) इलेक्ट्रॉन के द्रव्यमान से बहुत कम होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "कथन (A) असत्य है लेकिन (R) सत्य है।", "कथन (A) सत्य है लेकिन (R) असत्य है।"], "answer": "कथन (A) सत्य है लेकिन (R) असत्य है।", "explanation": "अभिकथन (A) सत्य है क्योंकि प्रोटॉन (protons) वास्तव में परमाणु के नाभिक (nucleus) में स्थित होते हैं और उन पर +1 इकाई धनावेश (positive charge) होता है। हालांकि, कारण (R) असत्य है। प्रोटॉन का द्रव्यमान (mass) इलेक्ट्रॉन (electron) के द्रव्यमान से लगभग 1836 गुना अधिक होता है, न कि कम। इसलिए, प्रोटॉन इलेक्ट्रॉन से काफी भारी होते हैं।"}, {"id": 48, "section": "Chemistry", "question": "अभिकथन (A): रदरफोर्ड के अल्फा कण प्रकीर्णन प्रयोग (Alpha particle scattering experiment) में अधिकांश अल्फा कण (alpha particles) सोने की पन्नी (gold foil) से सीधे निकल गए।\nकारण (R): परमाणु का अधिकांश भाग खाली स्थान (empty space) होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "कथन (A) असत्य है लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "कथन (A) सत्य है लेकिन (R) असत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है। रदरफोर्ड के अल्फा कण प्रकीर्णन प्रयोग (alpha particle scattering experiment) में, यह देखा गया कि अधिकांश अल्फा कण सोने की पतली पन्नी (thin gold foil) से बिना किसी विक्षेपण (deflection) के सीधे निकल गए। कारण (R) भी सत्य है। इस अवलोकन (observation) का निष्कर्ष यह था कि परमाणु का अधिकांश आयतन (volume) खाली स्थान (empty space) होता है, जिससे अल्फा कणों को बिना किसी बाधा के गुजरने का मार्ग मिलता है। इसलिए, कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 49, "section": "Chemistry", "question": "निम्नलिखित कथनों में से कौन सा/से कथन परमाणु संरचना के शास्त्रीय मॉडलों (classical models of atomic structure) के संबंध में सही है/हैं?\nJ: डाल्टन का परमाणु सिद्धांत (Dalton's atomic theory) यह मानता था कि परमाणु अविभाज्य (indivisible) होते हैं और रासायनिक अभिक्रियाओं (chemical reactions) में न तो बनाए जा सकते हैं और न ही नष्ट किए जा सकते हैं।\nK: थॉमसन का 'प्लम पुडिंग मॉडल' (plum pudding model) परमाणु में धनावेश (positive charge) को एक छोटे, सघन नाभिक (dense nucleus) में केंद्रित मानता था।\nL: रदरफोर्ड के मॉडल (Rutherford's model) ने परमाणु के स्थायित्व (stability) की सफलतापूर्वक व्याख्या की और इलेक्ट्रॉन (electrons) के ऊर्जा स्तरों (energy levels) को परिभाषित किया।\nM: कैथोड किरणें (Cathode rays) ऋणावेशित कणों (negatively charged particles) से बनी होती हैं, जो सभी परमाणुओं में मौजूद होते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M", "केवल K, L और M", "केवल J और L", "केवल J, K और M"], "answer": "केवल J और M", "explanation": "कथन J सही है। डाल्टन का परमाणु सिद्धांत (Dalton's atomic theory) परमाणु को अविभाज्य (indivisible) मानता था और द्रव्यमान के संरक्षण (conservation of mass) के नियम के अनुरूप था। कथन K गलत है। थॉमसन का मॉडल धनावेश को पूरे परमाणु में समान रूप से वितरित (uniformly distributed) मानता था, न कि एक छोटे, सघन नाभिक में केंद्रित। नाभिक की अवधारणा रदरफोर्ड ने दी थी। कथन L गलत है। रदरफोर्ड का मॉडल परमाणु के स्थायित्व (stability) की व्याख्या नहीं कर सका और इलेक्ट्रॉन के ऊर्जा स्तरों (energy levels) को परिभाषित नहीं किया; यह बोर के मॉडल (Bohr's model) की विशेषता थी। कथन M सही है। कैथोड किरण प्रयोगों (cathode ray experiments) ने दिखाया कि इलेक्ट्रॉन (electrons) ऋणावेशित कण होते हैं और सभी परमाणुओं के सार्वभौमिक घटक (universal constituents) होते हैं।"}, {"id": 50, "section": "Chemistry", "question": "परमाणु संरचना (atomic structure) के संदर्भ में निम्नलिखित में से कौन सी अवधारणाएँ गलत हैं?\nJ: एक परमाणु (atom) में प्रोटॉन (protons) और न्यूट्रॉन (neutrons) का द्रव्यमान (mass) लगभग समान होता है, जबकि इलेक्ट्रॉन (electrons) का द्रव्यमान नगण्य (negligible) होता है।\nK: आइसोटोप (isotopes) वे परमाणु होते हैं जिनकी परमाणु संख्या (atomic number) समान होती है लेकिन द्रव्यमान संख्या (mass number) भिन्न होती है।\nL: रदरफोर्ड के मॉडल (Rutherford's model) के अनुसार, इलेक्ट्रॉन (electrons) नाभिक (nucleus) के चारों ओर निश्चित वृत्ताकार कक्षाओं (fixed circular orbits) में घूमते हैं और ऊर्जा का विकिरण (radiate energy) नहीं करते हैं।\nM: कैथोड किरणें (Cathode rays) धनावेशित कणों (positively charged particles) से बनी होती हैं और एनोड (anode) की ओर आकर्षित होती हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल L और M", "केवल J, L और M", "केवल K और L", "केवल J और K"], "answer": "केवल L और M", "explanation": "कथन J सही है। प्रोटॉन (protons) और न्यूट्रॉन (neutrons) का द्रव्यमान (mass) लगभग 1 amu होता है, जो लगभग समान है, जबकि इलेक्ट्रॉन (electrons) का द्रव्यमान प्रोटॉन के द्रव्यमान का लगभग 1/1836 होता है, जिसे अक्सर नगण्य (negligible) माना जाता है। कथन K सही है। आइसोटोप (isotopes) एक ही तत्व (element) के परमाणु होते हैं जिनकी परमाणु संख्या (atomic number) (प्रोटॉन की संख्या) समान होती है लेकिन न्यूट्रॉन की संख्या भिन्न होने के कारण द्रव्यमान संख्या (mass number) भिन्न होती है। कथन L गलत है। रदरफोर्ड के मॉडल (Rutherford's model) में इलेक्ट्रॉन नाभिक के चारों ओर वृत्ताकार कक्षाओं (circular orbits) में घूमते हैं, लेकिन यह मॉडल यह नहीं बता सका कि वे ऊर्जा का विकिरण (radiate energy) क्यों नहीं करते और नाभिक में क्यों नहीं गिरते। निश्चित ऊर्जा स्तरों (fixed energy levels) और ऊर्जा विकिरण न करने की अवधारणा बोर के मॉडल (Bohr's model) की थी। कथन M गलत है। कैथोड किरणें (Cathode rays) ऋणावेशित कणों (negatively charged particles) (इलेक्ट्रॉन) से बनी होती हैं और धनावेशित एनोड (anode) की ओर आकर्षित होती हैं, न कि धनावेशित कणों से।"}, {"id": 51, "section": "Chemistry", "question": "आइसोटोप (isotopes), आइसोबार (isobars) और आइसोटोन (isotones) के बारे में निम्नलिखित कथनों पर विचार करें:\nJ: आइसोटोप (isotopes) में प्रोटॉन (protons) की संख्या समान होती है लेकिन न्यूट्रॉन (neutrons) की संख्या भिन्न होती है।\nK: आइसोबार (isobars) में द्रव्यमान संख्या (mass number) समान होती है लेकिन परमाणु संख्या (atomic number) भिन्न होती है।\nL: आइसोटोन (isotones) में न्यूट्रॉन (neutrons) की संख्या समान होती है लेकिन प्रोटॉन (protons) की संख्या भिन्न होती है।\nM: सभी आइसोटोप (isotopes) के रासायनिक गुण (chemical properties) समान होते हैं", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K, L और M", "केवल J, K और L", "केवल J, K और M", "सभी J, K, L और M"], "answer": "सभी J, K, L और M", "explanation": "कथन J सही है। आइसोटोप (isotopes) एक ही तत्व (element) के परमाणु होते हैं, जिसका अर्थ है कि उनमें प्रोटॉन (protons) की संख्या समान होती है। हालांकि, उनमें न्यूट्रॉन (neutrons) की संख्या भिन्न होती है, जिससे उनकी द्रव्यमान संख्या (mass number) भिन्न हो जाती है। कथन K सही है। आइसोबार (isobars) विभिन्न तत्वों (different elements) के परमाणु होते हैं जिनकी द्रव्यमान संख्या (mass number) समान होती है लेकिन परमाणु संख्या (atomic number) भिन्न होती है। कथन L सही है। आइसोटोन (isotones) वे परमाणु होते हैं जिनमें न्यूट्रॉन (neutrons) की संख्या समान होती है, लेकिन उनकी परमाणु संख्या (atomic number) और द्रव्यमान संख्या (mass number) भिन्न होती है। कथन M सही है। किसी तत्व के रासायनिक गुण (chemical properties) मुख्य रूप से उसके इलेक्ट्रॉनिक विन्यास (electronic configuration) और प्रोटॉन की संख्या (atomic number) पर निर्भर करते हैं। चूंकि आइसोटोप में प्रोटॉन की संख्या समान होती है, इसलिए उनके इलेक्ट्रॉनिक विन्यास भी समान होते हैं, जिसके परिणामस्वरूप उनके रासायनिक गुण समान होते हैं।"}, {"id": 52, "section": "Chemistry", "question": "इलेक्ट्रॉन (electron), प्रोटॉन (proton) और न्यूट्रॉन (neutron) के गुणों और खोजों के संबंध में निम्नलिखित कथनों में से कौन सा/से सही है/हैं?\nJ: इलेक्ट्रॉन (electron) की खोज जे.जे. थॉमसन (J.J. Thomson) ने की थी और यह ऋणावेशित (negatively charged) कण है।\nK: प्रोटॉन (proton) की खोज यूजेन गोल्डस्टीन (Eugen Goldstein) ने की थी और यह धनावेशित (positively charged) कण है।\nL: न्यूट्रॉन (neutron) की खोज जेम्स चैडविक (James Chadwick) ने की थी और यह उदासीन (neutral) कण है।\nM: इलेक्ट्रॉन का द्रव्यमान (mass) प्रोटॉन और न्यूट्रॉन के द्रव्यमान से काफी अधिक होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["सभी J, K, L और M", "केवल J, K और L", "केवल J और K", "केवल K, L और M"], "answer": "केवल J, K और L", "explanation": "कथन J सही है। इलेक्ट्रॉन (electron) की खोज जे.जे. थॉमसन (J.J. Thomson) ने कैथोड किरण प्रयोगों (cathode ray experiments) के माध्यम से की थी, और यह एक ऋणावेशित (negatively charged) कण है। कथन K सही है। यूजेन गोल्डस्टीन (Eugen Goldstein) ने कैनाल किरणों (canal rays) की खोज की, जो बाद में प्रोटॉन (proton) की पहचान का आधार बनीं, और प्रोटॉन एक धनावेशित (positively charged) कण है। कथन L सही है। न्यूट्रॉन (neutron) की खोज जेम्स चैडविक (James Chadwick) ने की थी, और यह एक उदासीन (neutral) कण है जिसका द्रव्यमान प्रोटॉन के लगभग बराबर होता है। कथन M गलत है। इलेक्ट्रॉन का द्रव्यमान (mass) प्रोटॉन और न्यूट्रॉन के द्रव्यमान से बहुत कम होता है (लगभग 1/1836 गुना), न कि अधिक।"}, {"id": 53, "section": "Chemistry", "question": "सूची-II (योगदान) से सुमेलित कीजिए और सही विकल्प का चयन कीजिए। नीचे दिए गए कोड का उपयोग करके सही उत्तर चुनिए:\nसूची-I\nJ: जे.जे. थॉमसन (J.J. Thomson)\nK: अर्नेस्ट रदरफोर्ड (Ernest Rutherford)\nL: जेम्स चैडविक (James Chadwick)\nM: यूजेन गोल्डस्टीन (Eugen Goldstein)\nसूची-II\n1. न्यूट्रॉन की खोज (Discovery of Neutron)\n2. इलेक्ट्रॉन की खोज (Discovery of Electron)\n3. नाभिकीय परमाणु मॉडल (Nuclear Atomic Model)\n4. प्रोटॉन की खोज (Discovery of Proton)\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-4, K-3, L-1, M-2", "J-2, K-3, L-1, M-4", "J-2, K-1, L-4, M-3", "J-1, K-2, L-3, M-4"], "answer": "J-2, K-3, L-1, M-4", "explanation": "जे.जे. थॉमसन (J.J. Thomson) ने इलेक्ट्रॉन (electron) की खोज की (J-2)। अर्नेस्ट रदरफोर्ड (Ernest Rutherford) ने अल्फा कण प्रकीर्णन प्रयोग (alpha particle scattering experiment) के माध्यम से नाभिकीय परमाणु मॉडल (Nuclear Atomic Model) का प्रस्ताव दिया (K-3)। जेम्स चैडविक (James Chadwick) ने न्यूट्रॉन (neutron) की खोज की (L-1)। यूजेन गोल्डस्टीन (Eugen Goldstein) ने कैनाल किरणों (canal rays) की खोज की, जिससे प्रोटॉन (proton) की पहचान हुई (M-4)।"}, {"id": 54, "section": "Chemistry", "question": "परमाणु संरचना (atomic structure) के विकास में निम्नलिखित घटनाओं को उनके कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: डाल्टन का परमाणु सिद्धांत (Dalton's Atomic Theory)\nK: इलेक्ट्रॉन की खोज (Discovery of Electron)\nL: रदरफोर्ड का नाभिकीय मॉडल (Rutherford's Nuclear Model)\nM: न्यूट्रॉन की खोज (Discovery of Neutron)", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, J, L, M", "K, L, J, M", "J, L, K, M", "J, K, L, M"], "answer": "J, K, L, M", "explanation": "परमाणु संरचना के विकास में इन घटनाओं का कालानुक्रमिक क्रम (chronological order) इस प्रकार है: J. डाल्टन का परमाणु सिद्धांत (Dalton's Atomic Theory): 1803 × K. इलेक्ट्रॉन की खोज (Discovery of Electron) (जे.जे. थॉमसन द्वारा): 1897 × L. रदरफोर्ड का नाभिकीय मॉडल (Rutherford's Nuclear Model) (अल्फा कण प्रकीर्णन प्रयोग के आधार पर): 1911 × M. न्यूट्रॉन की खोज (Discovery of Neutron) (जेम्स चैडविक द्वारा): 1932 इसलिए, सही क्रम J, K, L, M है।"}, {"id": 55, "section": "Chemistry", "question": "एक तत्व का परमाणु क्रमांक (atomic number) 17 और द्रव्यमान संख्या (mass number) 35 है। इसमें न्यूट्रॉन (neutrons) की संख्या कितनी होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["18", "17", "52", "35"], "answer": "18", "explanation": "न्यूट्रॉन (neutrons) की संख्या की गणना द्रव्यमान संख्या (mass number) में से परमाणु क्रमांक (atomic number) को घटाकर की जाती है। न्यूट्रॉन की संख्या = द्रव्यमान संख्या - परमाणु क्रमांक न्यूट्रॉन की संख्या = 35 − 17 = 18 इसलिए, इस तत्व में 18 न्यूट्रॉन होंगे।"}, {"id": 56, "section": "Chemistry", "question": "यदि एक उदासीन परमाणु (neutral atom) में 11 प्रोटॉन (protons) और 12 न्यूट्रॉन (neutrons) हैं, तो जब यह एक इलेक्ट्रॉन (electron) खो देता है, तो परिणामी आयन (ion) में कितने इलेक्ट्रॉन होंगे?", "brand": "bilaspurtestseries.com 9669946966", "options": ["13", "10", "12", "11"], "answer": "10", "explanation": "एक उदासीन परमाणु (neutral atom) में प्रोटॉन (protons) की संख्या इलेक्ट्रॉन (electrons) की संख्या के बराबर होती है। इस परमाणु में 11 प्रोटॉन हैं, इसलिए इसमें 11 इलेक्ट्रॉन भी होंगे। जब यह परमाणु एक इलेक्ट्रॉन (electron) खो देता है, तो इलेक्ट्रॉनों की संख्या 11 − 1 = 10 हो जाएगी। न्यूट्रॉन (neutrons) की संख्या आयन बनने की प्रक्रिया में नहीं बदलती है।"}, {"id": 57, "section": "Chemistry", "question": "क्लोरीन (Chlorine) × (2e) × (Ze)) / (1/2 × mv²)", "r₀ = (k × (2e) × (Ze)) / (mv²)", "r₀ = (k × (Ze)²) / (mv²)"], "answer": "r₀ = (k × (2e) × (Ze)) / (1/2 × mv²)", "explanation": "रदरफोर्ड के अल्फा कण प्रकीर्णन (Rutherford's alpha particle scattering) प्रयोग में, निकटतम पहुँच की दूरी (distance of closest approach, r₀) वह दूरी है जहाँ अल्फा कण (alpha particle) की प्रारंभिक गतिज ऊर्जा (initial kinetic energy) पूरी तरह से नाभिक (nucleus) के साथ उसकी विद्युत स्थैतिक स्थितिज ऊर्जा (electrostatic potential energy) में परिवर्तित हो जाती है। अल्फा कण की गतिज ऊर्जा = 1/2 mv² नाभिक और अल्फा कण के बीच स्थितिज ऊर्जा = k × (q₁q₂) / r₀ जहाँ q₁ = अल्फा कण का आवेश = +2e q₂ = नाभिक का आवेश = +Ze (Z परमाणु क्रमांक है) संतुलन पर, 1/2 mv² = k × (2e × Ze) / r₀ इसलिए, r₀ = (k × (2e) × (Ze)) / (1/2 × mv²) यह सूत्र अल्फा कण की गतिज ऊर्जा को नाभिक के साथ उसकी विद्युत स्थैतिक प्रतिकर्षण (electrostatic repulsion) के कारण स्थितिज ऊर्जा के बराबर करके प्राप्त किया जाता है।"}, {"id": 60, "section": "Chemistry", "question": "1.8 ग्राम जल (H₂O) के एक नमूने में कुल न्यूट्रॉनों (total neutrons) की संख्या ज्ञात कीजिए, यदि इस नमूने में द्रव्यमान के अनुसार (by mass) 50% D₂O (ड्यूटेरियम ऑक्साइड) और 50% H₂O (सामान्य जल) उपस्थित है। (दिया गया है: ¹H का परमाणु द्रव्यमान (atomic mass) = 1 amu, ²D का परमाणु द्रव्यमान = 2 amu, ¹⁶O का परमाणु द्रव्यमान = 16 amu, एवोगैड्रो संख्या (Avogadro's number) = 6.022 × 10²³ mol⁻¹)", "brand": "bilaspurtestseries.com 9669946966", "options": ["5.12 × 10²³", "41 × 10²³", "5.72 × 10²³", "71 × 10²³"], "answer": "5.12 × 10²³", "explanation": "इस प्रश्न को हल करने के लिए निम्नलिखित चरणों का पालन करें: 1. नमूने में H₂O और D₂O का द्रव्यमान (mass) ज्ञात करें: कुल नमूने का द्रव्यमान = 1.8 g H₂O का द्रव्यमान = 50% of 1.8 g = 0.9 g D₂O का द्रव्यमान = 50% of 1.8 g = 0.9 g 2. H₂O और D₂O का मोलर द्रव्यमान (molar mass) ज्ञात करें: H₂O का मोलर द्रव्यमान = (2¹H का परमाणु द्रव्यमान) + ¹⁶O का परमाणु द्रव्यमान = (2 × 1) + 16 = 18 g/mol D₂O का मोलर द्रव्यमान = (2²D का परमाणु द्रव्यमान) + ¹⁶O का परमाणु द्रव्यमान = (2 options": ["केवल I", "केवल II", "I, II और III", "I और III दोनों"], "answer": "I और III दोनों", "explanation": "कथन I सही है। बोर मॉडल इलेक्ट्रॉन को एक कण के रूप में मानता है जो निश्चित, वृत्ताकार कक्षाओं में घूमता है, जबकि तरंग यांत्रिकी मॉडल इलेक्ट्रॉन की तरंग प्रकृति को स्वीकार करता है और ऑर्बिटल्स (इलेक्ट्रॉन पाए जाने की अधिकतम संभावना वाले क्षेत्र) की अवधारणा का उपयोग करता है। कथन II गलत है क्योंकि दोनों मॉडल ऊर्जा स्तरों के क्वांटमीकरण की व्याख्या करते हैं, लेकिन तरंग यांत्रिकी मॉडल इसे अधिक मौलिक तरीके से प्राप्त करता है। कथन III सही है। तरंग यांत्रिकी मॉडल, श्रोडिंगर समीकरण (Schrödinger equation) के माध्यम से, बहु-इलेक्ट्रॉन परमाणुओं के स्पेक्ट्रा की व्याख्या करने में सक्षम है, जो बोर मॉडल की एक बड़ी सीमा थी।"}, {"id": 66, "section": "Chemistry", "question": "हाइजेनबर्ग के अनिश्चितता सिद्धांत (Heisenberg's Uncertainty Principle) और डी-ब्रोगली संबंध (de Broglie relation) के महत्व के बारे में निम्नलिखित में से कौन सा कथन सबसे उपयुक्त है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["दोनों सिद्धांत परमाणु के नाभिक (nucleus) की स्थिरता (stability) की व्याख्या करते हैं।", "डी-ब्रोगली संबंध इलेक्ट्रॉन की तरंग प्रकृति को स्थापित करता है, जबकि हाइजेनबर्ग का सिद्धांत यह बताता है कि इलेक्ट्रॉन की स्थिति (position) और संवेग (momentum) को एक साथ सटीक रूप से निर्धारित नहीं किया जा सकता।", "हाइजेनबर्ग का सिद्धांत केवल बड़े स्थूल कणों (macroscopic particles) पर लागू होता है, जबकि डी-ब्रोगली संबंध केवल सूक्ष्म कणों (microscopic particles) पर लागू होता है।", "दोनों सिद्धांत इलेक्ट्रॉन की निश्चित कक्षा (definite orbit) की अवधारणा को मजबूत करते हैं।"], "answer": "डी-ब्रोगली संबंध इलेक्ट्रॉन की तरंग प्रकृति को स्थापित करता है, जबकि हाइजेनबर्ग का सिद्धांत यह बताता है कि इलेक्ट्रॉन की स्थिति (position) और संवेग (momentum) को एक साथ सटीक रूप से निर्धारित नहीं किया जा सकता।", "explanation": "डी-ब्रोगली संबंध (λ = h/mv) यह स्थापित करता है कि पदार्थ (जैसे इलेक्ट्रॉन) में तरंग जैसी प्रकृति होती है, जिससे इलेक्ट्रॉन की निश्चित कक्षा की अवधारणा कमजोर पड़ती है। हाइजेनबर्ग क 74, "section": "Chemistry", "question": "परमाणु संरचना के विकास में निम्नलिखित प्रमुख खोजों/मॉडल को उनके कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: इलेक्ट्रॉन की खोज (Discovery of Electron)\nK: रदरफोर्ड का परमाणु मॉडल (Rutherford's Atomic Model)\nL: न्यूट्रॉन की खोज (Discovery of Neutron)\nM: बोर का परमाणु मॉडल (Bohr's Atomic Model) सही क्रम का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, J, M, L", "J, K, M, L", "J, M, K, L", "K, M, J, L"], "answer": "J, K, M, L", "explanation": "परमाणु संरचना के विकास में प्रमुख खोजों का कालानुक्रमिक क्रम इस प्रकार है: J. इलेक्ट्रॉन की खोज (J.J. Thomson, 1897) K. रदरफोर्ड का परमाणु मॉडल (Ernest Rutherford, 1911) M. बोर का परमाणु मॉडल (Niels Bohr, 1913) L. न्यूट्रॉन की खोज (James Chadwick, 1932) इसलिए, सही क्रम J, K, M, L है।"}, {"id": 75, "section": "Chemistry", "question": "बोर मॉडल के अनुसार, हाइड्रोजन परमाणु (hydrogen atom) में n=2 ऊर्जा स्तर पर एक इलेक्ट्रॉन की ऊर्जा (energy) क्या होगी? (दिया गया है: हाइड्रोजन परमाणु के लिए Eₙ = -13.6/n² eV)", "brand": "bilaspurtestseries.com 9669946966", "options": ["-3.4 eV", "-1.51 eV", "-0.85 eV", "-13.6 eV"], "answer": "-3.4 eV", "explanation": "हाइड्रोजन परमाणु के लिए ऊर्जा का सूत्र है: Eₙ = -13.6/n² eV। यहाँ, n = 2 दिया गया है। तो, E₂ = -13.6 / (2)² = -13.6 / 4 = -3.4 eV। इसलिए, n=2 ऊर्जा स्तर पर इलेक्ट्रॉन की ऊर्जा -3.4 eV होगी।"}, {"id": 76, "section": "Chemistry", "question": "एक इलेक्ट्रॉन (द्रव्यमान = 9.1 × 10⁻³¹ kg) 1.0 × 10⁶ m/s के वेग (velocity) से गति कर रहा है। इसकी डी-ब्रोगली तरंगदैर्ध्य (de Broglie wavelength) क्या होगी? (प्लैंक स्थिरांक (Planck's constant, h) = 6.626 × 10⁻³⁴ J·s)", "brand": "bilaspurtestseries.com 9669946966", "options": ["45 × 10⁻¹⁰ m", "45 × 10⁻⁷ m", "7.27 × 10⁻⁷ m", "7.27 × 10⁻¹⁰ m"], "answer": "7.27 × 10⁻¹⁰ m", "explanation": "डी-ब्रोगली तरंगदैर्ध्य का सूत्र है: λ = h / (mv) जहाँ, h = 6.626 × 10⁻³⁴ J·s m = 9.1 × 10⁻³¹ kg v = 1.0 × 10⁶ m/s λ = (6.626 × 10⁻³⁴ J·s) / (9.1 × 10⁻³¹ kg × 1.0 × 10⁶ m/s) λ = (6.626 × 10⁻³⁴) / (9.1 × 10⁻²⁵) m λ ≈ 0.728 × 10⁻⁹ m = 7.28 × 10⁻¹⁰ m निकटतम विकल्प 7.27 × 10⁻¹⁰ m है।"}, {"id": 77, "section": "Chemistry", "question": "एक परमाणु में, यदि मुख्य क्वांटम संख्या (n) = 3 है, तो उस कोश (shell) में अधिकतम कितने इलेक्ट्रॉन हो सकते हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["8", "2", "18", "32"], "answer": "18", "explanation": "किसी भी मुख्य कोश (shell) में अधिकतम इलेक्ट्रॉनों की संख्या 2n² सूत्र द्वारा दी जाती है, जहाँ n मुख्य क्वांटम संख्या है। यहाँ, n = 3 दिया गया है। अधिकतम इलेक्ट्रॉन = 2 × (3)² = 2 × 9 = 18। इसलिए, n=3 कोश में अधिकतम 18 इलेक्ट्रॉन हो सकते हैं। इस कोश में 3s, 3p और 3d उपकोश होते हैं, जिनमें क्रमशः 2, 6 और 10 इलेक्ट्रॉन हो सकते हैं (2+6+10 = 18)।"}, {"id": 78, "section": "Chemistry", "question": "यदि एक इलेक्ट्रॉन की स्थिति (position) में अनिश्चितता (uncertainty, Δx) 1 Å (10⁻¹⁰\nm: है, तो उसके संवेग (momentum) में न्यूनतम अनिश्चितता (Δp) क्या होगी? (h = 6.626 × 10⁻³⁴ J·s)", "brand": "bilaspurtestseries.com 9669946966", "options": ["05 × 10⁻²⁴ kg·m/s", "6.62 × 10⁻²⁴ kg·m/s", "5.27 × 10⁻²⁵ kg·m/s", "31 × 10⁻²⁵ kg·m/s"], "answer": "5.27 × 10⁻²⁵ kg·m/s", "explanation": "हाइजेनबर्ग का अनिश्चितता सिद्धांत (Heisenberg's Uncertainty Principle) है: ΔxΔp ≥ h / (4π) न्यूनतम अनिश्चितता के लिए, हम समानता का उपयोग करते हैं: ΔxΔp = h / (4π) दिया गया है: Δx = 1 Å = 1 × 10⁻¹⁰ m h = 6.626 × 10⁻³⁴ J·s π ≈ 3.14159 Δp = h / (4πΔx) Δp = (6.626 × 10⁻³⁴) / (4 × 3.14159 × 1 × 10⁻¹⁰) Δp = (6.626 × 10⁻³⁴) / (12.56636 × 10⁻¹⁰) Δp ≈ 0.5272 × 10⁻²⁴ kg·m/s = 5.27 × 10⁻²⁵ kg·m/s इसलिए, संवेग में न्यूनतम अनिश्चितता 5.27 × 10⁻²⁵ kg·m/s होगी।"}, {"id": 79, "section": "Chemistry", "question": "एक इलेक्ट्रॉन (electron) को एक निश्चित विभवान्तर (potential difference) से त्वरित (accelerated) करने पर उसकी डी ब्रोगली तरंगदैर्घ्य (de Broglie wavelength) 0.5 Å प्राप्त होती है। इस इलेक्ट्रॉन की गतिज ऊर्जा (kinetic energy) कितनी होगी? (दिए गए स्थिरांक: h = 6.626 × 10⁻³⁴ J·s, mₑ = 9.109 × 10⁻³¹ kg, 1 eV = 1.602 × 10⁻¹⁹ J)", "brand": "bilaspurtestseries.com 9669946966", "options": ["150.4 eV", "601.7 eV", "300.8 eV", "1203.4 eV"], "answer": "601.7 eV", "explanation": "डी ब्रोगली तरंगदैर्घ्य (de Broglie wavelength) (λ) और गतिज ऊर्जा (kinetic energy) (KE) के बीच संबंध निम्न सूत्र द्वारा दिया जाता है: λ = h / √(2mKE) जहाँ, h = प्लैंक स्थिरांक (Planck's constant) = 6.626 × 10⁻³⁴ J·s m = इलेक्ट्रॉन का द्रव्यमान (mass of electron) = 9.109 × 10⁻³¹ kg KE = गतिज ऊर्जा दिए गए मान: λ = 0.5 Å = 0.5 × 10⁻¹⁰ m = 5 × 10⁻¹¹ m सूत्र को KE के लिए पुनर्व्यवस्थित (rearrange) करने पर: λ² = h² / (2mKE) KE = h² / (2mλ²) मान रखने पर: KE = (6.626 × 10⁻³⁴ J·s)² / (2 × 9.109 × 10⁻³¹ kg × (5 × 10⁻¹¹ m)²) KE = (43.9039 × 10⁻⁶⁸) / (18.218 × 10⁻³¹25 × 10⁻²²) KE = (43.9039 × 10⁻⁶⁸) / (455.45 × 10⁻⁵³) KE = 0.09639 × 10⁻¹⁵ J KE = 9.639 × 10⁻¹⁷ J अब, गतिज ऊर्जा को इलेक्ट्रॉन वोल्ट (electron volts) (eV) में परिवर्तित करें: 1 eV = 1.602 × 10⁻¹⁹ J KE (eV) = (9.639 × 10⁻¹⁷ J) / (1.602 × 10⁻¹⁹ J/eV) KE (eV) ≈ 601.68 eV निकटतम विकल्प 601.7 eV है। अतः, सही उत्तर 601.7 eV है।"}, {"id": 80, "section": "Chemistry", "question": "हाइड्रोजन परमाणु में, एक इलेक्ट्रॉन n=4 से n=2 ऊर्जा स्तर पर संक्रमण (transition) करता है। उत्सर्जित फोटॉन (emitted photon) की तरंगदैर्ध्य (wavelength) क्या होगी? (रिडबर्ग स्थिरांक (Rydberg constant, RH₎ = 1.097 × 10⁷ m⁻¹)", "brand": "bilaspurtestseries.com 9669946966", "options": ["656 nm", "434 nm", "486 nm", "410 nm"], "answer": "486 nm", "explanation": "हाइड्रोजन स्पेक्ट्रम में उत्सर्जित तरंगदैर्ध्य की गणना रिडबर्ग सूत्र (Rydberg formula) द्वारा की जाती है: 1/λ = RH × (1/n₁² − 1/n₂²) जहाँ, RH = 1.097 × 10⁷ m⁻¹ n₁ = 2 (अंतिम ऊर्जा स्तर) n₂ = 4 (प्रारंभिक ऊर्जा स्तर) 1/λ = 1.097 × 10⁷ × (1/2² − 1/4²) 1/λ = 1.097 × 10⁷ × (1/4 − 1/16) 1/λ = 1.097 × 10⁷ × (4/16 − 1/16) 1/λ = 1.097 × 10⁷ × (3/16) 1/λ = 1.097 × 10⁷ × 0.1875 1/λ = 2.056875 × 10⁶ m⁻¹ λ = 1 / (2.056875 × 10⁶) m λ ≈ 4.861 × 10⁻⁷ m λ ≈ 486.1 × 10⁻⁹ m = 486.1 nm यह बाल्मर श्रृंखला (Balmer series) की Hβ रेखा है। निकटतम विकल्प 486 nm है।"}, {"id": 81, "section": "Chemistry Pedagogy", "question": "रसायन विज्ञान शिक्षणशास्त्र (Chemistry Pedagogy) का मुख्य उद्देश्य क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों को उच्च शिक्षा (higher education) के लिए तैयार करना।", "केवल प्रयोगशाला तकनीकों (laboratory techniques) का ज्ञान प्रदान करना।", "छात्रों को केवल रासायनिक सूत्र (chemical formulas) याद कराना।", "छात्रों में वैज्ञानिक दृष्टिकोण (scientific attitude) और समस्या-समाधान कौशल (problem-solving skills) विकसित करना।"], "answer": "छात्रों में वैज्ञानिक दृष्टिकोण (scientific attitude) और समस्या-समाधान कौशल (problem-solving skills) विकसित करना।", "explanation": "रसायन विज्ञान शिक्षणशास्त्र का मुख्य उद्देश्य छात्रों में केवल तथ्यों को रटने के बजाय वैज्ञानिक दृष्टिकोण, आलोचनात्मक सोच (critical thinking) और समस्या-समाधान कौशल विकसित करना है ताकि वे वास्तविक दुनिया की समस्याओं को हल कर सकें। अन्य विकल्प इसके आंशिक पहलू हो सकते हैं लेकिन मुख्य उद्देश्य नहीं हैं, क्योंकि वे शिक्षण के व्यापक लक्ष्यों को सीमित करते हैं।"}, {"id": 82, "section": "Chemistry Pedagogy", "question": "एक रसायन विज्ञान शिक्षक छात्रों को विभिन्न धातुओं (metals) के गुणों (properties) का अवलोकन (observation) करने और फिर सामान्य निष्कर्ष (general conclusion) निकालने के लिए प्रोत्साहित करता है। यह किस शिक्षण विधि (teaching method) का उदाहरण है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["व्याख्यान विधि (Lecture Method)", "प्रोजेक्ट विधि (Project Method)", "निगमन विधि (Deductive Method)", "आगमन विधि (Inductive Method)"], "answer": "आगमन विधि (Inductive Method)", "explanation": "आगमन विधि में, छात्र विशिष्ट उदाहरणों (specific examples) या अवलोकनों से सामान्य नियमों या सिद्धांतों (general rules or principles) की ओर बढ़ते हैं। यहाँ, विभिन्न धातुओं के गुणों का अवलोकन करके सामान्य निष्कर्ष निकालना आगमन विधि का प्रत्यक्ष अनुप्रयोग है। निगमन विधि इसके विपरीत होती है, जहाँ सामान्य से विशिष्ट की ओर बढ़ा जाता है, जबकि व्याख्यान और प्रोजेक्ट विधियों की कार्यप्रणाली भिन्न होती है।"}, {"id": 83, "section": "Chemistry Pedagogy", "question": "रसायन gogy", "question": "रसायन विज्ञान शिक्षण में 'समस्या-समाधान विधि' (Problem-Solving Method) और 'प्रोजेक्ट विधि' (Project Method) के बीच मुख्य अंतर क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्रोजेक्ट विधि केवल प्रयोगशाला में की जाती है, जबकि समस्या-समाधान विधि कक्षा में।", "समस्या-समाधान विधि में हमेशा एक ही सही उत्तर होता है, जबकि प्रोजेक्ट विधि में नहीं।", "समस्या-समाधान विधि में शिक्षक अधिक सक्रिय होता है, जबकि प्रोजेक्ट विधि में छात्र।", "समस्या-समाधान विधि का लक्ष्य एक विशिष्ट समस्या का समाधान खोजना है, जबकि प्रोजेक्ट विधि का लक्ष्य एक मूर्त उत्पाद (tangible product) या परिणाम (outcome) बनाना है।"], "answer": "समस्या-समाधान विधि का लक्ष्य एक विशिष्ट समस्या का समाधान खोजना है, जबकि प्रोजेक्ट विधि का लक्ष्य एक मूर्त उत्पाद (tangible product) या परिणाम (outcome) बनाना है।", "explanation": "समस्या-समाधान विधि मुख्य रूप से एक विशिष्ट बौद्धिक चुनौती (intellectual challenge) या समस्या के तार्किक समाधान (logical solution) पर केंद्रित होती है। इसके विपरीत, प्रोजेक्ट विधि एक व्यापक, दीर्घकालिक कार्य (long-term task) है जिसका उद्देश्य अक्सर एक मूर्त उत्पाद, मॉडल (model), रिपोर्ट (report) या प्रदर्शन (presentation) का निर्माण करना होता है, जिसमें समस्या-समाधान एक घटक हो सकता है। अन्य विकल्प गलत हैं क्योंकि दोनों में छात्र सक्रिय होते हैं, प्रोजेक्ट विधि केवल प्रयोगशाला तक सीमित नहीं है, और समस्या-समाधान में भी हमेशा एक ही सही उत्तर नहीं होता।"}, {"id": 86, "section": "Chemistry Pedagogy", "question": "एक रसायन विज्ञान शिक्षक छात्रों की अवधारणात्मक समझ (conceptual understanding) में अंतराल (gaps) की पहचान करने और उन्हें दूर करने के लिए शिक्षण के दौरान नियमित रूप से छोटे क्विज़ (quizzes) और चर्चाएँ (discussions) आयोजित करता है। यह किस प्रकार के मूल्यांकन का उदाहरण है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["निर्माणात्मक मूल्यांकन (Formative Assessment)", "योगात्मक मूल्यांकन (Summative Assessment)", "नैदानिक मूल्यांकन (Diagnostic Assessment)", "मानदंड-संदर्भित मूल्यांकन (Criterion-Referenced Assessment)"], "answer": "निर्माणात्मक मूल्यांकन (Formative Assessment)", "explanation": "निर्माणात्मक मूल्यांकन शिक्षण-अधिगम प्रक्रिया (teaching-learning process) के दौरान छात्रों की प्रगति की निगरानी (monitoring progress) करने और उनकी अवधारणात्मक समझ में अंतराल की पहचान करने के लिए किया जाता है, ताकि शिक्षण रणनीतियों (teaching strategies) को समायोजित किया जा सके। योगात्मक मूल्यांकन सीखने के अंत में होता है, जबकि नैदानिक मूल्यांकन सीखने की शुरुआत में कठिनाइयों की पहचान करता है। मानदंड-संदर्भित मूल्यांकन प्रदर्शन की तुलना एक पूर्व-निर्धारित मानक (pre-determined standard) से करता है।"}, {"id": 87, "section": "Chemistry Pedagogy", "question": "रसायन विज्ञान प्रयोगशाला में 'सुरक्षा चश्मे' (safety goggles) पहनना क्यों अनिवार्य है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह आंखों को रासायनिक छींटों (chemical splashes) और उड़ने वाले मलबे (flying debris) से बचाता है।", "यह प्रयोगशाला के तापमान (laboratory temperature) को नियंत्रित करने में मदद करता है।", "यह छात्रों को अधिक पेशेवर (professional) दिखने में मदद करता है।", "यह रासायनिक धुएं (chemical fumes) को सांस लेने से रोकता है।"], "answer": "यह आंखों को रासायनिक छींटों (chemical splashes) और उड़ने वाले मलबे (flying debris) से बचाता है।", "explanation": "सुरक्षा चश्मे का प्राथमिक कार्य आंखों को संभावित रासायनिक छींटों, कांच के टुकड़ों या अन्य उड़ने वाले कणों से बचाना है जो प्रयोगों के दौरान उत्पन्न हो सकते हैं। यह रासायनिक धुएं को सांस लेने से नहीं रोकता है, जिसके लिए फ्यूम हुड (fume hood) का उपयोग किया जाता है, और न ही यह तापमान नियंत्रण या पेशेवर दिखने से संबंधित है।"}, {"id": 88, "section": "Chemistry Pedagogy", "question": "रसायन विज्ञान शिक्षण में सूचना और संचार प्रौद्योगिकी (Information and Communication Technology − ICT) के प्रभावी उपयोग के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. यह जटिल रासायनिक संरचनाओं (complex chemical structures) और प्रतिक्रियाओं (reactions) को दृश्य रूप से (visually) समझने में मदद करता है।\n2. यह छात्रों को आभासी प्रयोगशाला (virtual laboratory) प्रयोगों के माध्यम से अभ्यास करने का अवसर प्रदान करता है।\n s": ["(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) और (R) दोनों सत्य हैं, और (R), (A) की सही व्याख्या है।", "कथन (A) सत्य है, लेकिन (R) असत्य है।", "असत्य है, लेकिन (R) सत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं, और (R), (A) की सही व्याख्या है।", "explanation": "व्याख्यान विधि अक्सर छात्रों को निष्क्रिय श्रोता (passive listeners) बनाती है और उन्हें सक्रिय रूप से सोचने या चर्चा में भाग लेने का अवसर नहीं देती है, जिससे आलोचनात्मक सोच और गहन समझ (deep understanding) बाधित होती है। इसलिए, यह हमेशा सबसे प्रभावी तरीका नहीं है, खासकर जटिल या व्यावहारिक विषयों के लिए। कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 91, "section": "Chemistry Pedagogy", "question": "अभिकथन (A): रसायन विज्ञान शिक्षण में प्रायोगिक कार्य (Practical Work) केवल सैद्धांतिक अवधारणाओं (theoretical concepts) को सत्यापित (verify) करने के लिए महत्वपूर्ण है।\nकारण (R): प्रायोगिक कार्य छात्रों में अवलोकन कौशल (observation skills), डेटा विश्लेषण (data analysis) और समस्या-समाधान क्षमताओं (problem-solving abilities) को विकसित करता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["कथन (A) सत्य है, लेकिन (R) असत्य है।", "असत्य है, लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) और (R) दोनों सत्य हैं, और (R), (A) की सही व्याख्या है।"], "answer": "असत्य है, लेकिन (R) सत्य है।", "explanation": "अभिकथन (A) गलत है क्योंकि प्रायोगिक कार्य केवल सैद्धांतिक अवधारणाओं को सत्यापित करने से कहीं अधिक है; यह छात्रों में वैज्ञानिक कौशल, जैसे अवलोकन, डेटा विश्लेषण, परिकल्पना निर्माण (hypothesis formulation) और समस्या-समाधान को विकसित करने में महत्वपूर्ण भूमिका निभाता है। कारण (R) सत्य है और प्रायोगिक कार्य के व्यापक लाभों को सही ढंग से बताता है।"}, {"id": 92, "section": "Chemistry Pedagogy", "question": "रसायन विज्ञान में वैज्ञानिक पूछताछ (scientific inquiry) प्रक्रिया के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: प्रयोग के लिए एक परिकल्पना (hypothesis) विकसित करना।\nK: प्रायोगिक डेटा (data) का विश्लेषण (analysis) और व्याख्या (interpretation) करना।\nL: प्रयोग को डिजाइन करना और आवश्यक सामग्री का चयन करना।\nM: अवलोकन करना और डेटा एकत्र करना।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L, M, K", "L, M, J, K", "J, M, L, K", "L, J, M, K"], "answer": "J, L, M, K", "explanation": "वैज्ञानिक पूछताछ (scientific inquiry) प्रक्रिया एक व्यवस्थित दृष्टिकोण है जिसका उपयोग वैज्ञानिक घटनाओं को समझने के लिए करते हैं। इसके चरणों का सही कालानुक्रमिक क्रम (chronological order) इस प्रकार है: 1. J. प्रयोग के लिए एक परिकल्पना (hypothesis) विकसित करना: यह पहला कदम है जहाँ एक परीक्षण योग्य कथन या अनुमान तैयार किया जाता है जो किसी अवलोकन या प्रश्न का संभावित उत्तर प्रदान करता है। 2. L. प्रयोग को डिजाइन करना और आवश्यक सामग्री का चयन करना: परिकल्पना विकसित करने के बाद, उसे परीक्षण करने के लिए एक प्रयोग की योजना बनाई जाती है। इसमें प्रायोगिक प्रक्रिया का निर्धारण और आवश्यक उपकरणों व रसायनों का चयन शामिल है। 3. M. अवलोकन करना और डेटा एकत्र करना: प्रयोग को निष्पादित करने के दौरान, सावधानीपूर्वक अवलोकन किए जाते हैं और प्रासंगिक डेटा (data) एकत्र किया जाता है। 4. K. प्रायोगिक डेटा का विश्लेषण और व्याख्या करना: एकत्र किए गए डेटा का विश्लेषण किया जाता है ताकि पैटर्न, संबंध या रुझान की पहचान की जा सके, और फिर इन निष्कर्षों की व्याख्या की जाती है कि वे परिकल्पना का समर्थन करते हैं या खंडन करते हैं। अतः, सही क्रम J, L, M, K है।"}, {"id": 93, "section": "Chemistry Pedagogy", "question": "वैज्ञानिक विधि (Scientific Method) के चरणों के संबंध में निम्नलिखित में से कौन से कथन सही हैं?\nJ: अवलोकन (Observation) वैज्ञानिक विधि का प्रारंभिक बिंदु है।\nK: परिकल्पना (Hypothesis) एक परीक्षण योग्य स्पष्टीकरण (testable explanation) है।\nL: प्रयोग (Experimentation) परिकल्पना को साबित करने का एकमात्र तरीका है।\nM: निष्कर्ष (Conclusion) हमेशा परिकल्पना का समर्थन करना चाहिए।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल J, L और M", "केवल J, K और M", "केवल K और L"], "answer": "केवल J और K", "explanation": "वैज्ञानिक विधि अवलोकन से शुरू होती है (J) और ए J, K, L, M", "K, L, J, M", "L, K, J, M"], "answer": "K, J, L, M", "explanation": "वैज्ञानिक विधि आमतौर पर अवलोकन (K) से शुरू होती है, जिसके आधार पर एक परिकल्पना का निर्माण किया जाता है (J)। फिर, इस परिकल्पना का परीक्षण करने के लिए प्रयोगों का संचालन किया जाता है (L), और अंत में, प्रयोगों के परिणामों के आधार पर निष्कर्ष निकाले जाते हैं (M)। यह वैज्ञानिक जांच का एक मानक अनुक्रम (standard sequence) है, जहाँ प्रत्येक चरण अगले के लिए आधार तैयार करता है।"}, {"id": 98, "section": "Chemistry Pedagogy", "question": "रसायन विज्ञान शिक्षण में अवधारणा मानचित्र (Concept Maps) का उपयोग करने का मुख्य लाभ क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह केवल शिक्षक के लिए शिक्षण योजना (lesson planning) को आसान बनाता है।", "यह छात्रों को केवल तथ्यों को रटने में मदद करता है।", "यह जटिल अवधारणाओं (complex concepts) के बीच संबंधों (relationships) को दृश्य रूप से (visually) समझने में सहायता करता है।", "यह छात्रों के लिए गृहकार्य (homework) को कम करता है।"], "answer": "यह जटिल अवधारणाओं (complex concepts) के बीच संबंधों (relationships) को दृश्य रूप से (visually) समझने में सहायता करता है।", "explanation": "अवधारणा मानचित्र छात्रों को विभिन्न रासायनिक अवधारणाओं और उनके बीच के संबंधों को एक संरचित और दृश्य तरीके से व्यवस्थित करने में मदद करते हैं, जिससे उनकी समझ गहरी होती है। यह केवल तथ्यों को रटने या गृहकार्य कम करने के लिए नहीं है, बल्कि यह सीखने की प्रक्रिया को अधिक सार्थक बनाता है और छात्रों को ज्ञान को व्यवस्थित करने में मदद करता है।"}, {"id": 99, "section": "Chemistry Pedagogy", "question": "रसायन विज्ञान शिक्षण में 'शिक्षण सहायक सामग्री' (Teaching Aids) से क्या तात्पर्य है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शिक्षक द्वारा उपयोग किए जाने वाले व्यक्तिगत नोट्स (personal notes)।", "केवल डिजिटल संसाधन (digital resources) जैसे वीडियो और सिमुलेशन (simulations)।", "वे सभी उपकरण और सामग्री जो शिक्षण-अधिगम प्रक्रिया को अधिक प्रभावी बनाते हैं।", "केवल पाठ्यपुस्तकें (textbooks) और ब्लैकबोर्ड (blackboard)।"], "answer": "वे सभी उपकरण और सामग्री जो
