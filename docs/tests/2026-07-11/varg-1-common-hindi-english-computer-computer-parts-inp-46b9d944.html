 संवैधानिक संशोधन की आवश्यकता होती है, और वे आधारभूत संरचना (Basic Structure) के सिद्धांत के अधीन हैं।"}, {"id": 90, "section": "Polity", "question": "भारतीय राजनैतिक व्यवस्था में 'लोकतांत्रिक गणराज्य' (Democratic Republic) के सिद्धांत का क्या अर्थ है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["शासन एक तानाशाह द्वारा चलाया जाता है, लेकिन जनता को कुछ मूलभूत अधिकार प्राप्त होते हैं।", "राज्य का प्रमुख वंशानुगत होता है, लेकिन शासन जनता द्वारा चुने गए प्रतिनिधियों द्वारा चलाया जाता है।", "राज्य का प्रमुख एक धार्मिक नेता होता है, और कानून धार्मिक ग्रंथों पर आधारित होते हैं।", "शासन जनता द्वारा चुने गए प्रतिनिधियों द्वारा चलाया जाता है और राज्य का प्रमुख भी अप्रत्यक्ष रूप से जनता द्वारा चुना जाता है।"], "answer": "शासन जनता द्वारा चुने गए प्रतिनिधियों द्वारा चलाया जाता है और राज्य का प्रमुख भी अप्रत्यक्ष रूप से जनता द्वारा चुना जाता है।", "explanation": "लोकतांत्रिक गणराज्य (Democratic Republic) का अर्थ है कि भारत में शासन जनता द्वारा चुने गए प्रतिनिधियों के माध्यम से होता है (लोकतांत्रिक पहलू) और राज्य का प्रमुख (राष्ट्रपति) भी वंशानुगत नहीं होता, बल्कि एक निश्चित अवधि के लिए अप्रत्यक्ष रूप से चुना जाता है (गणराज्य पहलू)। यह सुनिश्चित करता है कि सर्वोच्च शक्ति जनता में निहित है और कोई भी पद वंशानुगत नहीं है। अन्य विकल्प या तो राजशाही, तानाशाही या धर्मतंत्र का वर्णन करते हैं, जो भारतीय व्यवस्था के विपरीत हैं।"}, {"id": 91, "section": "Polity", "question": "मौलिक कर्तव्य (Fundamental Duties) के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. इन्हें 42वें संविधान संशोधन अधिनियम, 1976 द्वारा संविधान में जोड़ा गया था।\n2. ये संविधान के भाग IV-A में अनुच्छेद 51-A के तहत सूचीबद्ध हैं।\n3. ये प्रकृति में न्यायोचित (justiciable) हैं और इनके उल्लंघन पर न्यायालय द्वारा दंडित किया जा सकता है।\n4. ये स्वर्ण सिंह समिति (Swaran Singh Committee) की सिफारिशों पर आधारित हैं", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल 1, 2 और 4", "केवल 1, 2 और 3", "केवल 2, 3 और 4", "सभी 1, 2, 3 और 4"], "answer": "केवल 1, 2 और 4", "explanation": "मौलिक कर्तव्य (Fundamental Duties) 42वें संविधान संशोधन अधिनियम, 1976 द्वारा संविधान में जोड़े गए थे और ये संविधान के भाग IV-A में अनुच्छेद 51-A के तहत सूचीबद्ध हैं। ये स्वर्ण सिंह समिति (Swaran Singh Committee) की सिफारिशों पर आधारित थे। हालांकि, मौलिक कर्तव्य प्रकृति में गैर-न्यायोचित (non-justiciable) हैं, जिसका अर्थ है कि उनके उल्लंघन के लिए न्यायालय द्वारा सीधे दंडित नहीं किया जा सकता है। इसलिए, कथन 3 गलत है, जबकि 1, 2 और 4 सही हैं।"}, {"id": 92, "section": "Polity", "question": "अनुच्छेद 19 के तहत प्रदत्त 'वाक् और अभिव्यक्ति की स्वतंत्रता' (Freedom of Speech and Expression) पर युक्तियुक्त प्रतिबंध (Reasonable Restrictions) किन आधारों पर लगाए जा सकते हैं)", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल राष्ट्रीय सुरक्षा और सार्वजनिक व्यवस्था के आधार पर।", "सरकार की नीतियों के विरुद्ध प्रदर्शन करने पर।", "किसी भी राजनीतिक दल की आलोचना करने पर।", "राज्य की सुरक्षा, सार्वजनिक व्यवस्था, मानहानि, न्यायालय की अवमानना और शिष्टाचार या नैतिकता के आधार पर।"], "answer": "राज्य की सुरक्षा, सार्वजनिक व्यवस्था, मानहानि, न्यायालय की अवमानना और शिष्टाचार या नैतिकता के आधार पर।", "explanation": "अनुच्छेद 19(1)(a) 'वाक् और अभिव्यक्ति की स्वतंत्रता' प्रदान करता है, लेकिन अनुच्छेद 19(2) इस पर युक्तियुक्त प्रतिबंध लगाने के आधारों को सूचीबद्ध करता है। इन आधारों में राज्य की सुरक्षा, सार्वजनिक व्यवस्था, मानहानि, न्यायालय की अवमानना, शिष्टाचार या नैतिकता, भारत की संप्रभुता और अखंडता, विदेशी राज्यों के साथ मैत्रीपूर्ण संबंध और अपराध के लिए उकसाना शामिल हैं। केवल राष्ट्रीय सुरक्षा और सार्वजनिक व्यवस्था ही एकमात्र आधार नहीं हैं, और राजनीतिक दल की आलोचना या सरकार की नीतियों के विरुद्ध शांतिपूर्ण प्रदर्शन आमतौर पर इन प्रतिबंधों के दायरे में नहीं आते, जब तक कि वे सूचीबद्ध आधारों का उल्लंघन न करें।"}, {"id": 93, "section": "Polity", "question": "नीति निदेशक तत्व (Directive Principles of State Policy − DPSP) और मूल अधिकारों (Fundamental Rights − FRs) के बीच मुख्य अंतरों में से एक क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["FRs केवल नागरिकों के लिए उपलब्ध हैं, जबकि DPSP सभी व्यक्तियों पर लागू होते हैं।", "FRs राज्य पर सकारात्मक दायित्व डालते हैं, जबकि DPSP राज्य पर नकारात्मक दायित्व डालते हैं।", "FRs न्यायोचित (justiciable) हैं और न्यायालय द्वारा लागू किए जा सकते हैं, जबकि DPSP गैर-न्यायोचित (non-justiciable) हैं।", "DPSP का उद्देश्य राजनीतिक लोकतंत्र स्थापित करना है, जबकि FRs का उद्देश्य सामाजिक और आर्थिक लोकतंत्र स्थापित करना है।"], "answer": "FRs न्यायोचित (justiciable) हैं और न्यायालय द्वारा लागू किए जा सकते हैं, जबकि DPSP गैर-न्यायोचित (non-justiciable) हैं।", "explanation": "मूल अधिकारों (FRs) और नीति निदेशक तत्वों (DPSP) के बीच सबसे महत्वपूर्ण अंतर उनकी न्यायोचितता (justiciability) है। FRs न्यायोचित हैं, जिसका अर्थ है कि उनके उल्लंघन के मामले में व्यक्ति न्यायालय जा सकता है और उन्हें लागू करवा सकता है। इसके विपरीत, DPSP गैर-न्यायोचित हैं, जिसका अर्थ है कि उन्हें न्यायालय द्वारा सीधे लागू नहीं किया जा सकता है, हालांकि वे शासन के लिए मूलभूत हैं। FRs का उद्देश्य राजनीतिक लोकतंत्र स्थापित करना है, जबकि DPSP का उद्देश्य सामाजिक और आर्थिक लोकतंत्र स्थापित करना है। FRs राज्य पर नकारात्मक दायित्व डालते हैं (राज्य को कुछ करने से रोकते हैं), जबकि DPSP राज्य पर सकारात्मक दायित्व डालते हैं (राज्य को कुछ करने के लिए निर्देशित करते हैं)। FRs कुछ मामलों में गैर-नागरिकों के लिए भी उपलब्ध हैं।"}, {"id": 94, "section": "Polity", "question": "भारतीय संविधान की 'आधारभूत संरचना' (Basic Structure) के सिद्धांत के संबंध में निम्नलिखित में से कौन सा कथन सही नहीं है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["न्यायपालिका समय-समय पर आधारभूत संरचना के तत्वों की पहचान करती रही है।", "यह सिद्धांत केशवानंद भारती बनाम केरल राज्य मामले (1973) में प्रतिपादित किया गया था।", "आधारभूत संरचना के तत्वों को संविधान में स्पष्ट रूप से परिभाषित किया गया है।", "यह संसद की संविधान संशोधन की शक्ति पर एक सीमा लगाता है।"], "answer": "आधारभूत संरचना के तत्वों को संविधान में स्पष्ट रूप से परिभाषित किया गया है।", "explanation": "आधारभूत संरचना (Basic Structure) का सिद्धांत केशवानंद भारती बनाम केरल राज्य मामले (1973) में सर्वोच्च न्यायालय द्वारा प्रतिपादित किया गया था। इस सिद्धांत के अनुसार, संसद संविधान के किसी भी हिस्से में संशोधन कर सकती है, लेकिन वह संविधान की 'आधारभूत संरचना' को नहीं बदल सकती। यह संसद की संशोधन शक्ति पर एक महत्वपूर्ण सीमा है। हालांकि, आधारभूत संरचना के तत्वों को संविधान में स्पष्ट रूप से परिभाषित नहीं किया गया है; बल्कि, न्यायपालिका (विशेषकर सर्वोच्च न्यायालय) विभिन्न मामलों में इन तत्वों की पहचान करती रही है। इसलिए, यह कहना कि तत्वों को संविधान में स्पष्ट रूप से परिभाषित किया गया है, गलत है।"}, {"id": 95, "section": "Polity", "question": "अभिकथन (A): भारत में संसदीय प्रणाली (Parliamentary System) को अपनाया गया है, जिसमें कार्यपालिका विधायिका के प्रति सामूहिक रूप से उत्तरदायी होती है।\nकारण (R): संसदीय प्रणाली में, सरकार के प्रमुख (प्रधानमंत्री) और राज्य के प्रमुख (राष्ट्रपति) के पद अलग-अलग व्यक्तियों द्वारा धारण किए जाते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["कथन A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "कथन A सत्य है, लेकिन R असत्य है।"], "answer": "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "explanation": "अभिकथन (A) सही है। भारत में संसदीय प्रणाली है, जिसमें कार्यपालिका (मंत्रिपरिषद) विधायिका (लोकसभा) के प्रति सामूहिक रूप से उत्तरदायी होती है। कारण (R) भी सही है। संसदीय प्रणाली की एक विशेषता यह है कि सरकार का प्रमुख (प्रधानमंत्री) और राज्य का प्रमुख (राष्ट्रपति) अलग-अलग व्यक्ति होते हैं (जिसे 'नाममात्र और वास्तविक कार्यपालिका' भी कहते हैं)। हालांकि, कारण (R) अभिकथन (A) की सही व्याख्या नहीं है। कार्यपालिका का विधायिका के प्रति सामूहिक उत्तरदायित्व संसदीय प्रणाली का एक मूलभूत सिद्धांत है, जबकि सरकार और राज्य के प्रमुखों का अलग होना एक अन्य विशेषता है, लेकिन यह सीधे तौर पर सामूहिक उत्तरदायित्व की व्याख्या नहीं करता। सामूहिक उत्तरदायित्व का अर्थ है कि यदि लोकसभा में अविश्वास प्रस्ताव पारित हो जाए तो पूरी मंत्रिपरिषद को इस्तीफा देना पड़ता है।"}, {"id": 96, "section": "Polity", "question": "स्थानीय स्वशासन (Local Self-Governance) के संदर्भ में, निम्नलिख
