बंध में निम्नलिखित में से कौन-सा कथन सत्य नहीं है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["ह्रस्व स्वरों के उच्चारण में सबसे कम समय लगता है।", "हिंदी में सभी दीर्घ स्वर मूलतः संस्कृत से आए हैं और उनका स्वतंत्र अस्तित्व नहीं है।", "प्लुत स्वरों का प्रयोग प्रायः किसी को पुकारने या नाटक के संवादों में होता है।", "दीर्घ स्वरों के उच्चारण में ह्रस्व स्वरों से दुगुना समय लगता है।"], "answer": "हिंदी में सभी दीर्घ स्वर मूलतः संस्कृत से आए हैं और उनका स्वतंत्र अस्तित्व नहीं है।", "explanation": "हिंदी में दीर्घ स्वरों का स्वतंत्र अस्तित्व है और वे केवल संस्कृत से ही नहीं आए हैं, बल्कि कुछ हिंदी की अपनी ध्वनियाँ भी हैं। जैसे 'आ', 'ई', 'ऊ', 'ए', 'ऐ', 'ओ', 'औ' दीर्घ स्वर हैं। अन्य सभी कथन ह्रस्व, दीर्घ और प्लुत स्वरों की सही विशेषताओं का वर्णन करते हैं।"}, {"id": 4, "section": "Hindi", "question": "हिंदी स्वरों के वर्गीकरण में 'ऋ' स्वर को किस श्रेणी में रखा जाता है और इसकी क्या विशिष्टता है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह एक ह्रस्व स्वर है और इसका उच्चारण 'रि' के समान होता है।", "यह एक दीर्घ स्वर है और इसका उच्चारण 'री' के समान होता है।", "यह एक प्लुत स्वर है और इसका प्रयोग केवल वैदिक संस्कृत में होता है।", "यह एक संयुक्त स्वर है और 'र' तथा 'इ' के मेल से बनता है।"], "answer": "यह एक ह्रस्व स्वर है और इसका उच्चारण 'रि' के समान होता है।", "explanation": "'ऋ' को हिंदी में ह्रस्व स्वर माना जाता है, हालाँकि इसका प्रयोग अब बहुत कम हो गया है और इसका उच्चारण 'रि' के समान होता है। यह दीर्घ या प्लुत स्वर नहीं है, न ही यह संयुक्त स्वर है, बल्कि यह एक मूल स्वर है जो संस्कृत से हिंदी में आया है।"}, {"id": 5, "section": "Hindi", "question": "जिह्वा के प्रयोग के आधार पर स्वरों के वर्गीकरण में 'अग्र स्वर' और 'मध्य स्वर' के बीच मुख्य अंतर क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["अग्र स्वरों के उच्चारण में जिह्वा ऊपर उठती है, जबकि मध्य स्वरों में जिह्वा नीचे गिरती है।", "अग्र स्वरों के उच्चारण में जिह्वा का अगला भाग सक्रिय होता है, जबकि मध्य स्वरों में जिह्वा का मध्य भाग सामान्य स्थिति में रहता है।", "अग्र स्वर दीर्घ होते हैं, जबकि मध्य स्वर ह्रस्व होते हैं।", "अग्र स्वर केवल मौखिक होते हैं, जबकि मध्य स्वर अनुनासिक भी हो सकते हैं।"], "answer": "अग्र स्वरों के उच्चारण में जिह्वा का अगला भाग सक्रिय होता है, जबकि मध्य स्वरों में जिह्वा का मध्य भाग सामान्य स्थिति में रहता है।", "explanation": "जिह्वा के प्रयोग के आधार पर स्वरों के वर्गीकरण में 'अग्र स्वर' वे होते हैं जिनके उच्चारण में जिह्वा का अगला भाग सक्रिय होता है (जैसे इ, ई, ए, ऐ)। 'मध्य स्वर' वे होते हैं जिनके उच्चारण में जिह्वा का मध्य भाग सामान्य स्थिति में रहता है (जैसे अ)। अन्य विकल्प जिह्वा की ऊँचाई या स्वरों की मात्रा से संबंधित हैं, जो इस वर्गीकरण का मुख्य आधार नहीं हैं।"}, {"id": 6, "section": "Hindi", "question": "मुखाकृति (मुख खुलने की स्थिति) के आधार पर 'विवृत' और 'संवृत' स्वरों के वर्गीकरण का मुख्य कारण क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["उच्चारण में लगने वाले समय की मात्रा।", "जिह्वा की स्थिति का आगे या पीछे होना।", "ओष्ठों का गोलाकार या फैला हुआ होना।", "उच्चारण के समय मुख विवर का अधिकतम या न्यूनतम खुलना।"], "answer": "उच्चारण के समय मुख विवर का अधिकतम या न्यूनतम खुलना।", "explanation": "मुखाकृति के आधार पर स्वरों का वर्गीकरण मुख विवर के खुलने की स्थिति पर निर्भर करता है। 'विवृत' स्वर (जैसे आ) वे होते हैं जिनके उच्चारण में मुख विवर पूरा खुलता है, जबकि 'संवृत' स्वर (जैसे इ, ई, उ, ऊ) वे होते हैं जिनके उच्चारण में मुख विवर लगभग बंद रहता है। अन्य विकल्प उच्चारण समय (मात्रा), जिह्वा की स्थिति या ओष्ठों की स्थिति से संबंधित हैं, जो मुखाकृति वर्गीकरण के आधार नहीं हैं।"}, {"id": 7, "section": "Hindi", "question": "निम्नलिखित कथनों पर विचार कीजिए:\n1. 'ए' और 'ऐ' संयुक्त स्वर हैं क्योंकि ये दो भिन्न स्वरों के मेल से बने हैं।\n2. 'ओ' और 'औ' संयुक्त स्वर हैं क्योंकि ये दो भिन्न स्वरों के मेल से बने हैं।\n3. 'अ', 'इ', 'उ', 'ऋ' मूल स्वर हैं क्योंकि ये किसी अन्य स्वर के मेल से नहीं बने हैं", "brand": "bilaspurtestseries.com 9669946966", "options": ["1, 2 और 3", "केवल 1 और 3", "केवल 2 और 3", "केवल 1 और 2"], "answer": "1, 2 और 3", "explanation": "सभी तीनों कथन सत्य हैं। 'ए' (अ + इ), 'ऐ' (अ + ए), 'ओ' (अ + उ) और 'औ' (अ + ओ) संयुक्त स्वर कहलाते हैं क्योंकि ये दो भिन्न स्वरों के मेल से बनते हैं। 'अ', 'इ', 'उ', 'ऋ' मूल या ह्रस्व स्वर हैं क्योंकि ये किसी अन्य स्वर के मेल से नहीं बनते और इनके उच्चारण में सबसे कम समय लगता है।"}, {"id": 8, "section": "Hindi", "question": "अभिकथन (A): 'चाँद' शब्द में प्रयुक्त 'आँ' एक अनुनासिक स्वर है।\nकारण (R): अनुनासिक स्वरों के उच्चारण में वायु मुख और नासिका दोनों से बाहर निकलती है। निम्नलिखित विकल्पों में से सही उत्तर चुनिए:", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं करता है।", "कथन A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या करता है।", "कथन A सत्य है, लेकिन R असत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या करता है।", "explanation": "अभिकथन (A) सत्य है क्योंकि 'चाँद' शब्द में 'आँ' अनुनासिक स्वर है, जिसे चंद्रबिंदु से दर्शाया जाता है। कारण (R) भी सत्य है क्योंकि अनुनासिक स्वरों की परिभाषा ही यही है कि उनके उच्चारण में वायु मुख और नासिका दोनों से बाहर निकलती है। अतः, कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 9, "section": "Hindi", "question": "स्वरों के उच्चारण संबंधी निम्नलिखित कथनों का मूल्यांकन कीजिए:\nJ: 'अ' एक उदासीन स्वर है क्योंकि इसके उच्चारण में जिह्वा सामान्य स्थिति में रहती है।\nK: 'ए' और 'ऐ' कंठ-तालव्य स्वर हैं क्योंकि इनके उच्चारण में कंठ और तालु दोनों का सहयोग होता है।\nL: 'ओ' और 'औ' कंठ-ओष्ठ्य स्वर हैं क्योंकि इनके उच्चारण में कंठ और ओष्ठ दोनों का सहयोग होता है।\nM: 'इ' और 'ई' पश्च स्वर हैं क्योंकि इनके उच्चारण में जिह्वा का पिछला भाग सक्रिय होता है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "केवल J, K और L", "केवल K, L और M", "केवल J, K और M"], "answer": "केवल J, K और L", "explanation": "कथन J, K और L सही हैं। 'अ' को मध्य या उदासीन स्वर कहा जाता है क्योंकि इसके उच्चारण में जिह्वा सामान्य स्थिति में रहती है। 'ए' और 'ऐ' कंठ-तालव्य स्वर हैं (अ+इ = ए, अ+ए = ऐ), और 'ओ' तथा 'औ' कंठ-ओष्ठ्य स्वर हैं (अ+उ = ओ, अ+ओ = औ)। कथन M गलत है क्योंकि 'इ' ते हैं, क्योंकि वे दो स्वरों के मेल से बनते हैं (सजातीय या विजातीय)।"}, {"id": 23, "section": "Hindi", "question": "List-I में दिए गए स्वर प्रकारों को List-II में दिए गए उनके उदाहरणों/विशेषताओं से सुमेलित कीजिए: List-I (स्वर प्रकार):\n(J) ह्रस्व स्वर\n(K) दीर्घ स्वर\n(L) संयुक्त स्वर\n(M) प्लुत स्वर List-II (उदाहरण/विशेषता):\n(1) ओ३म्\n(2) अ, इ, उ, ऋ\n(3) आ, ई, ऊ\n(4) ए, ऐ, ओ, औ", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-3, L-4, M-1", "J-3, K-2, L-4, M-1", "J-1, K-2, L-3, M-4", "J-2, K-4, L-3, M-1"], "answer": "J-2, K-3, L-4, M-1", "explanation": "सही सुमेलन इस प्रकार है: J. ह्रस्व स्वर (मूल स्वर) − 2. अ, इ, उ, ऋ (इनके उच्चारण में कम समय लगता है) K. दीर्घ स्वर (सजातीय संधि स्वर) − 3. आ, ई, ऊ (ये समान स्वरों के मेल से बनते हैं और इनके उच्चारण में ह्रस्व से दोगुना समय लगता है) L. संयुक्त स्वर (विजातीय संधि स्वर) − 4. ए, ऐ, ओ, औ (ये भिन्न स्वरों के मेल से बनते हैं) M. प्लुत स्वर - 1. ओ३म् (इनके उच्चारण में दीर्घ से भी अधिक समय लगता है, अक्सर पुकारने में प्रयुक्त होते हैं) अतः, विकल्प J-2, K-3, L-4, M-1 सही है।"}, {"id": 24, "section": "Hindi", "question": "हिंदी व्याकरण में स्वरों के वर्गीकरण के आधार पर उनके क्रमिक विकास को सही क्रम में व्यवस्थित कीजिए:\nJ: उच्चारण में लगने वाले समय के आधार पर (ह्रस्व, दीर्घ, प्लुत)\nK: जिह्वा के प्रयोग के आधार पर (अग्र, मध्य, पश्च)\nL: मुख विवर के खुलने के आधार पर (विवृत, अर्ध-विवृत, अर्ध-संवृत, संवृत)\nM: ओष्ठों की स्थिति के आधार पर (वृत्ताकार, अवृत्ताकार) सही कालानुक्रमिक क्रम का चयन कीजिए:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L, K, M", "L, M, J, K", "J, K, L, M", "K, J, L, M"], "answer": "J, K, L, M", "explanation": "स्वरों के वर्गीकरण का यह क्रम भाषाई विश्लेषण की गहराई को दर्शाता है। सबसे पहले और सबसे मूलभूत वर्गीकरण उच्चारण में लगने वाले समय के आधार पर (ह्रस्व, दीर्घ, प्लुत) किया जाता है (J)। इसके बाद, जिह्वा की स्थिति (अग्र, मध्य, पश्च) (K) और मुख विवर के खुलने की स्थिति (विवृत, अर्ध-विवृत, अर्ध-संवृत, संवृत) (L) जैसे अधिक सूक्ष्म उच्चारण-स्थान संबंधी वर्गीकरण आते हैं। अंत में, ओष्ठों की स्थिति (वृत्ताकार, अवृत्ताकार) (M) जैसे अन्य शारीरिक कारकों पर आधारित वर्गीकरण किया जाता है। यह क्रम सामान्यतः व्याकरणिक ग्रंथों में स्वरों के विश्लेषण की तार्किक प्रगति को दर्शाता है, जहाँ सरल से जटिल की ओर बढ़ा जाता है।"}, {"id": 25, "section": "Hindi", "question": "हिंदी में 'अं' (अनुस्वार) और 'अँ' (अनुनासिक) के प्रयोग में मुख्य सूक्ष्म भेद क्या है, जिसके कारण वर्तनी में अक्सर त्रुटियाँ होती हैं)", "brand": "bilaspurtestseries.com 9669946966", "options": ["अनुस्वार का उच्चारण अधिक तीव्र होता है, जबकि अनुनासिक का धीमा।", "अनुस्वार का प्रयोग केवल व्यंजन के साथ होता है, जबकि अनुनासिक का स्वर के साथ।", "अनुस्वार का प्रयोग केवल तत्सम शब्दों में होता है, जबकि अनुनासिक का तद्भव शब्दों में।", "अनुस्वार एक पूर्ण नासिक्य ध्वनि है, जबकि अनुनासिक स्वर का नासिक्यीकरण है।"], "answer": "अनुस्वार एक पूर्ण नासिक्य ध्वनि है, जबकि अनुनासिक स्वर का नासिक्यीकरण है।", "explanation": "अनुस्वार (ं) एक पूर्ण नासिक्य व्यंजन ध्वनि है (जैसे 'पंच', 'कंठ'), जिसका उच्चारण केवल नाक से होता है और यह अपने बाद आने वाले व्यंजन के वर्ग के पंचम वर्ण का प्रतिनिधित्व करता है। इसके विपरीत, अनुनासिक (ँ) स्वयं कोई ध्वनि नहीं है, बल्कि यह स्वर का नासिक्यीकरण है, जिसका अर्थ है कि स्वर का उच्चारण नाक और मुँह दोनों से होता है (जैसे 'चाँद', 'गाँव')। पहला विकल्प गलत है क्योंकि दोनों का प्रयोग तत्सम और तद्भव दोनों में होता है। तीसरा विकल्प भी गलत है क्योंकि दोनों का प्रयोग स्वर के साथ ही होता है (स्वर के ऊपर लगते हैं)। चौथा विकल्प उच्चारण की तीव्रता का सही मापदंड नहीं है, बल्कि उच्चारण की प्रकृति का अंतर महत्वपूर्ण है।"}, {"id": 26, "section": "English", "question": "Which of the following statements best defines the 'Common Gender' in English grammar)", "brand": "bilaspurtestseries.com 9669946966", "options": ["It refers to nouns that denote inanimate objects.", "It refers to nouns that can be either masculine or feminine, without specifying the gender.", "It refers to nouns that denote only female beings.", "It refers to nouns that denote only male beings."], "answer": "It refers to nouns that can be either masculine or feminine, without specifying the gender.", "explanation": "Common gender nouns are those that can refer to both male and female individuals, such as 'teacher', 'student', 'doctor', or 'parent'. They do not specify the gender, making them applicable to either. Options A, C, and D describe Neuter, Masculine, and Feminine genders respectively, not Common gender."}, {"id": 27, "section": "English", "question": "Identify the gender of the noun 'child' in the sentence: 'The child was playing happily in the park.'", "brand": "bilaspurtestseries.com 9669946966", "options": ["Neuter Gender", "Masculine Gender", "Feminine Gender", "Common Gender"], "answer": "Common Gender", "explanation": "The noun 'child' can refer to either a male or a female young person without specifying the gender. Therefore, it falls under the category of Common Gender. It is not exclusively masculine, feminine, or neuter, as it denotes a living being whose gender is not specified by the word itself."}, {"id": 28, "section": "English", "question": "Which of the following statements about gender in English grammar is correct)", "brand": "bilaspurtestseries.com 9669946966", "options": ["All nouns referring to animals are always of the Neuter Gender.", "The gender of a noun always changes its verb conjugation.", "English grammar primarily uses natural gender, not grammatical gender.", "Only proper nouns have gender in English."], "answer": "English grammar primarily uses natural gender, not grammatical gender.", "explanation": "English grammar assigns gender based on the actual sex of the referent (natural gender), unlike languages like German or French which assign arbitrary grammatical genders to nouns. Option A is incorrect because animals can sometimes be referred to with masculine or feminine pronouns (e.g., 'he' for a pet dog, 'she' for a pet cat). Option C is incorrect as verb conjugation in English does not change based on the gender of the noun. Option D is incorrect; common nouns also have gender (e.g., 'man' is masculine, 'woman' is feminine)."}, {"id": 29, "section": "English", "question": "Which of the following nouns, despite referring to a living being, is typically treated as Neuter Gender in English, especially when its sex is unknown or irrelevant)", "brand": "bilaspurtestseries.com 9669946966", "options": ["Monk", "Nephew", "Niece", "Baby"], "answer": "Baby", "explanation": "While 'nephew', 'niece', and 'monk' clearly denote specific masculine or feminine genders, 'baby' is often referred to with the pronoun 'it' when its sex is unknown or not emphasized. This makes 'baby' an exception where a living being can be treated as Neuter Gender in certain contexts. For example, 'The baby cried; it needed its milk.'"}, {"id": 30, "section": "English", "question": "Consider the following pairs of nouns: (i) 'Lion' and 'Lioness', (ii) 'Author' and 'Authoress', (iii) 'Doctor' and 'Doctor'. Which pair exemplifies a shift from masculine to feminine gender through a suffix, and which pair represents a common gender noun)", "brand": "bilaspurtestseries.com 9669946966", "options": ["(i) Common Gender, (iii) Masculine to Feminine", "(i) Masculine to Feminine, (ii) Common Gender", "(iii) Common Gender, (i) Masculine to Feminine", "(ii) Masculine to Feminine, (iii) Common Gender"], "answer": "(ii) Masculine to Feminine, (iii) Common Gender", "explanation": "In pair (ii), 'Author' (masculine) becomes 'Authoress' (feminine) by adding the suffix '-ess', demonstrating a clear shift from masculine to feminine. In pair (iii), 'Doctor' is a common gender noun because it can refer to both male and female practitioners without changing its form. Pair (i) 'Lion' and 'Lioness' also shows a masculine to feminine shift, but the question asks for the pair representing common gender, which is 'Doctor'."}, {"id": 31, "section": "English", "question": "In English, personification often assigns gender to inanimate objects or abstract concepts. When a ship is referred to as 'she', what grammatical principle is being applied)", "brand": "bilaspurtestseries.com 9669946966", "options": ["Natural gender, based on the ship's physical characteristics.", "Common gender, as ships can be of any type.", "Figurative gender, used for poetic or emphatic effect.", "Grammatical gender, as in Latin."], "answer": "Figurative gender, used for poetic or emphatic effect.", "explanation": "Referring to a ship as 'she' is an example of personification, where an inanimate object is given human qualities, including gender, for rhetorical or poetic effect. This is not grammatical gender in the strict sense (which is inherent to the noun in some languages), nor is it natural gender (as ships don't have biological sex). It's a figurative use of gender to add vividness or emotional connection. Common gender is incorrect as it applies to nouns that can be male or female, not inanimate objects."}, {"id": 32, "section": "English", "question": "Consider the following statements regarding gender in English:\n1. The Neuter Gender is exclusively used for inanimate objects.\n2. Some nouns can function as both Masculine and Feminine without any change in form, falling under Common Gender.\n3. English nouns have grammatical gender that dictates agreement with adjectives and articles.\n4. Collective nouns are always treated as Neuter Gender.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Only Statement 2 is correct.", "Statements 1 and 2 are correct.", "Statements 1 and 3 are correct.", "Statements 2 and 4 are correct."], "answer": "Only Statement 2 is correct.", "explanation": "Statement 1 is incorrect because 'baby' or 'infant' can be treated as neuter gender even though they are living beings. Statement 2 is correct; words like 'teacher', 'student', 'doctor' are common gender nouns. Statement 3 is incorrect because English primarily uses natural gender, not grammatical gender that affects adjective divided by article agreement. Statement 4 is incorrect; collective nouns can be treated as neuter (e.g., 'the team won its game') or common (e.g., 'the team are celebrating their victory') depending on whether they are viewed as a single unit or individual members."}, {"id": 33, "section": "English", "question": "अभिकथन (A): The noun 'sun' is often personified as masculine in English, while 'moon' is personified as feminine.\nकारण (R): This personification is a remnant of older linguistic traditions and cultural associations, not a rule of modern English grammatical gender.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both (A) and (R) are true, and (R) is the correct explanation for (A).", "(A) is false, but (R) is true.", "Both (A) and (R) are true, but (R) is not the correct explanation for (A).", "(A) is true, but (R) is false."], "answer": "Both (A) and (R) are true, and (R) is the correct explanation for (A).", "explanation": "Assertion (A) is true; 'sun' is often referred to as 'he' (e.g., 'The sun cast his golden rays') and 'moon' as 'she' (e.g., 'The moon hid her face'). Reason (R) is also true and correctly explains (A). This practice stems from ancient mythologies and linguistic influences (e.g., Latin 'sol' is masculine, 'luna' is feminine) rather than any inherent grammatical gender rule in contemporary English. Modern English does not assign grammatical gender to inanimate objects; such usage is purely figurative and traditional."}, {"id": 34, "section": "English", "question": "Evaluate the following statements regarding gender in English grammar:\nJ: Modern English primarily employs natural gender, distinguishing sex where relevant, rather than assigning grammatical gender to inanimate objects as seen in many other Indo-European languages.\nK: Epicene nouns, such as 'fish' or 'bird', are a subset of common gender nouns that use a single form to refer to both male and female individuals of a species, often requiring explicit modifiers like 'male' or 'female' for sex-specific reference.\nL: The traditional practice of referring to inanimate objects like ships, cars, or countries with feminine pronouns ('she', 'her') is a stylistic device rooted in personification, rather than a strict grammatical gender classification in contemporary English.\nM: The ongoing evolution towards gender-neutral language in English aims to replace gender-specific occupational titles (e.g., 'chairman') with inclusive alternatives (e.g., 'chairperson' or 'chair') to avoid implied gender bias.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, and M are all correct.", "K, L, and M are correct, but J is incorrect.", "J, K, and L are correct, but M is incorrect.", "J and M are correct, but K and L are incorrect."], "answer": "J, K, L, and M are all correct.", "explanation": "Statement J is correct because English has largely lost the grammatical gender system prevalent in Old English and other Indo-European languages, focusing instead on natural gender (biological sex). Statement K is correct; epicene nouns are indeed common gender nouns that do not differentiate between sexes in their base form, necessitating modifiers for clarity. Statement L accurately describes the use of feminine pronouns for inanimate objects as a form of personification, a stylistic choice, not a grammatical rule in modern English. Statement M is also correct, reflecting the contemporary linguistic shift towards inclusivity by adopting gender-neutral terms for roles and professions."}, {"id": 35, "section": "English", "question": "Consider the following statements about gender classification in English:\nJ: Nouns ending in '-ess' are exclusively feminine and are formed by adding the suffix to a masculine noun.\nK: The gender of a noun can sometimes be inferred from its associated pronoun, even if the noun itself is common gender.\nL: In English, abstract nouns like 'courage' or 'justice' are always classified under the Neuter Gender.\nM: Words like 'parent', 'spouse', and 'sibling' are examples of common gender nouns that have largely replaced older gender-specific terms in formal contexts.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L and M only", "J and K only", "K and M only", "J, K, L and M"], "answer": "K, L and M only", "explanation": "Statement J is incorrect. While many feminine nouns end in '-ess' (e.g., 'lioness', 'actress'), not all are formed by adding it to a masculine noun (e.g., 'duchess' from 'duke' is irregular). Also, not all feminine nouns end in '-ess'. Statement K is correct; for instance, 'teacher' is common gender, but if we say 'The teacher brought her books', we infer feminine gender. Statement L is correct; abstract nouns, lacking biological sex, are consistently treated as Neuter Gender. Statement M is correct; 'parent', 'spouse', and 'sibling' are indeed common gender terms that are widely used to avoid gender specification."}, {"id": 36, "section": "English", "question": "Match the following nouns with their appropriate gender classification in English: List I (Noun):\n(J) Ship\n(K) Heir\n(L) Infant\n(M) Committee List II (Gender Classification):\n(1) Common Gender\n(2) Masculine Gender\n(3) Neuter Gender (often personified as Feminine)\n(4) Collective Noun (can be Neuter or Common)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-3, L-1, M-4", "J-3, K-2, L-1, M-4", "J-4, K-1, L-2, M-3", "J-3, K-1, L-2, M-4"], "answer": "J-3, K-2, L-1, M-4", "explanation": "J. 'Ship' is typically Neuter Gender but is famously personified as feminine ('she'). So, J-3. K. 'Heir' specifically refers to a male successor, making it Masculine Gender. So, K-2. L. 'Infant' is a common gender noun, as it can refer to either a male or female baby, and is often treated as Neuter when sex is unknown. So, L-1. M. 'Committee' is a collective noun, which can be treated as Neuter (as a single unit) or Common (referring to its members). So, M-4. Therefore, the correct match is J-3, K-2, L-1, M-4."}, {"id": 37, "section": "English", "question": "Arrange the following stages in the historical development and modern usage of gender in English grammar in chronological order:\nJ: English largely abandons grammatical gender, relying primarily on natural gender.\nK: Old English possesses a robust system of grammatical gender, similar to Latin or German, affecting noun, adjective, and article agreement.\nL: The rise of gender-neutral language movements influences the adoption of common gender terms and avoidance of gender-specific pronouns where possible.\nM: Middle English sees a significant decline in grammatical gender distinctions, with many inflections being lost.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, M, L", "M, K, J, L", "K, M, J, L", "K, J, M, L"], "answer": "K, M, J, L", "explanation": "The chronological order of gender development in English is as follows: K. Old English (c. 450-1150 AD) had a complex grammatical gender system. M. Middle English (c. 1150-1500 AD) saw a substantial simplification and loss of these grammatical gender distinctions. J. Early Modern and Modern English (from c. 1500 AD onwards) largely moved to natural gender, where gender is determined by the sex of the referent. L. The most recent development is the rise of gender-neutral language movements, which is a contemporary phenomenon influencing modern usage. Thus, the correct order is K, M, J, L."}, {"id": 38, "section": "English", "question": "Which of the following statements correctly identifies a nuanced aspect of gender assignment in English)", "brand": "bilaspurtestseries.com 9669946966", "options": ["All collective nouns are strictly Neuter Gender, regardless of context.", "Some nouns, like 'ship' or 'country', can be treated as feminine through personification, but grammatically they remain neuter.", "The term 'gender' in English grammar is synonymous with biological sex.", "Common gender nouns always require a clarifying phrase (e.g., 'male teacher') to indicate specific sex."], "answer": "Some nouns, like 'ship' or 'country', can be treated as feminine through personification, but grammatically they remain neuter.", "explanation": "This statement correctly captures a nuanced aspect. While 'ship' or 'country' are often personified as 'she' (e.g., 'India is proud of her heritage'), their grammatical gender in standard English remains neuter, meaning they would typically take 'it' as a pronoun in non-personified contexts. Option A is incorrect because collective nouns can sometimes take plural pronouns ('they') if the individuals within the group are emphasized. Option B is incorrect; while English relies heavily on natural gender (biological sex), 'gender' in grammar also includes categories like common and neuter, which are not strictly biological. Option D is incorrect; common gender nouns are specifically used when the sex is unknown or irrelevant, and do not always require clarification, though it can be added if needed."}, {"id": 39, "section": "English", "question": "Consider the following statements concerning gender in English:\nJ: The transition from Old English to Middle and Modern English saw a significant reduction in grammatical gender, shifting towards a system predominantly based on natural gender.\nK: For common gender nouns like 'student' or 'doctor', the use of singular 'they' ('they', 'them', 'their') is now widely accepted as a gender-neutral pronoun, especially when the gender of the individual is unknown or irrelevant.\nL: The grammatical category of 'common gender' in English is primarily concerned with nouns that can refer to either male or female beings, whereas 'gender-neutral language' is a broader sociolinguistic movement advocating for the avoidance of gender-specific terms.\nM: While some nouns, such as 'ship' or 'nature', are occasionally personified with feminine pronouns in literary or poetic contexts, their inherent grammatical gender in standard English remains neuter.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, and M are correct, but J is incorrect.", "J, K, L, and M are all correct.", "J and L are correct, but K and M are incorrect.", "J, K, and M are correct, but L is incorrect."], "answer": "J, K, L, and M are all correct.", "explanation": "Statement J is correct as English evolved from a grammatically gendered language (Old English) to one that primarily uses natural gender. Statement K is correct; singular 'they' has gained widespread acceptance as a gender-neutral pronoun for common gender nouns when the sex is unspecified. Statement L accurately distinguishes 'common gender' as a grammatical classification of nouns from 'gender-neutral language' as a broader sociolinguistic movement. Statement M is also correct, highlighting that personification in literature does not alter the grammatical neuter gender of inanimate objects in standard English."}, {"id": 40, "section": "English", "question": "Which of the following sentences correctly uses a noun that is exclusively of the feminine gender)", "brand": "bilaspurtestseries.com 9669946966", "options": ["The nurse attended to the patient.", "The empress ruled with grace and power.", "The author signed her latest novel.", "The doctor prescribed medication."], "answer": "The empress ruled with grace and power.", "explanation": "An 'empress' is exclusively a female ruler, making 'empress' a noun of the feminine gender. 'Author', 'nurse', and 'doctor' are all common gender nouns, as they can refer to individuals of either male or female sex."}, {"id": 41, "section": "English", "question": "Which of the following statements about gender in English grammar is NOT entirely accurate)", "brand": "bilaspurtestseries.com 9669946966", "options": ["Some nouns can change their gender based on context or personification.", "Collective nouns are always treated as neuter gender.", "Most nouns referring to inanimate objects are of the neuter gender.", "The gender of a noun often dictates the choice of pronoun (he divided by she divided by it)."], "answer": "Collective nouns are always treated as neuter gender.", "explanation": "While collective nouns often take neuter pronouns (e.g., 'The team won its match'), they can sometimes be treated as masculine or feminine, especially when referring to a group of people acting individually, in which case they might take 'they' or 'their'. For example, 'The jury delivered their verdict.' This makes the statement 'always treated as neuter' inaccurate. The other statements are generally true regarding English gender rules."}, {"id": 42, "section": "English", "question": "In English, certain inanimate objects are personified and referred to with masculine or feminine pronouns. Which of the following nouns, when personified, is traditionally referred to as 'she')", "brand": "bilaspurtestseries.com 9669946966", "options": ["Sun", "Death", "Ship", "Time"], "answer": "Ship", "explanation": "Traditionally, ships, countries, and certain abstract concepts like 'Liberty' or 'Justice' are personified and referred to with feminine pronouns ('she', 'her'). The Sun, Time, and Death are often personified as masculine ('he', 'him') or sometimes neuter, but 'ship' is a classic example of feminine personification."}, {"id": 43, "section": "English", "question": "Which pair of words correctly demonstrates a masculine-feminine gender distinction through a suffix, rather than an entirely different word)", "brand": "bilaspurtestseries.com 9669946966", "options": ["Nephew − Niece", "Bull − Cow", "Hero − Heroine", "King − Queen"], "answer": "Hero − Heroine", "explanation": "The pair 'Hero − Heroine' shows a gender distinction achieved by adding a suffix ('-ine') to the masculine form. 'King − Queen', 'Nephew − Niece', and 'Bull − Cow' are examples where the masculine and feminine forms are entirely different words, not derived through a suffix."}, {"id": 44, "section": "English", "question": "Why is it generally considered more appropriate to use 'chairperson' instead of 'chairman' or 'chairwoman' in formal contexts today)", "brand": "bilaspurtestseries.com 9669946966", "options": ["Because 'chairperson' is a shorter word.", "To avoid specifying gender, promoting inclusivity and gender neutrality.", "To simplify grammatical agreement with pronouns.", "Because 'chairman' and 'chairwoman' are archaic terms."], "answer": "To avoid specifying gender, promoting inclusivity and gender neutrality.", "explanation": "The shift towards terms like 'chairperson' (or simply 'chair') reflects a broader movement towards gender-neutral language. This practice aims to avoid assumptions about a person's gender based on their role and to promote inclusivity by using terms that can apply to anyone, regardless of sex. While 'chairman' and 'chairwoman' are not archaic, their gender-specific nature is often seen as less inclusive in modern formal usage."}, {"id": 45, "section": "English", "question": "Assertion (A): In English, the grammatical gender of a noun does not always correspond to the natural sex of the entity it represents.\nReason (R):: Many English nouns are of common gender, referring to both males and females, and inanimate objects are typically neuter regardless of their perceived 'strength' or 'beauty'.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, and R is the correct explanation of A.", "A is true, but R is false.", "A is false, but R is true.", "Both A and R are true, but R is not the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Assertion (A) is true because English grammatical gender is not as rigidly tied to natural sex as in some other languages. Reason (R) correctly explains this by pointing out the existence of common gender nouns (e.g., 'student', 'doctor') which don't specify sex, and the neuter gender for inanimate objects (e.g., 'table', 'book') which doesn't assign a sex. This demonstrates that grammatical gender in English often diverges from natural sex, making R a correct explanation for A."}, {"id": 46, "section": "English", "question": "Which of the following statements correctly describe aspects of gender in English grammar)\nJ: The word 'child' is an example of common gender.\nK: Nouns referring to abstract qualities are typically of the neuter gender.\nL: The feminine form of 'duke' is 'duchess'.\nM: Animals are always referred to with 'it' regardless of their known sex.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L, and M only", "J, K, and M only", "K, L, and M only", "J, K, and L only"], "answer": "J, K, and L only", "explanation": "Statement J is correct: 'child' can refer to a boy or a girl, making it common gender. Statement K is correct: Abstract qualities like 'love', 'happiness', 'courage' are neuter. Statement L is correct: 'Duchess' is indeed the feminine form of 'duke'. Statement M is incorrect: While animals are often referred to as 'it', if their sex is known or they are pets, they are frequently referred to as 'he' or 'she' (e.g., 'My dog, he loves to play'). Therefore, J, K, and L are the correct statements."}, {"id": 47, "section": "English", "question": "Consider the following statements regarding gender usage in English:\nJ: The use of 'they' as a singular pronoun for common gender nouns (e.g., 'Every student should bring their book') is grammatically incorrect and should be avoided.\nK: Nouns like 'friend', 'cousin', and 'guest' are inherently common gender and do not require gender-specific alternatives.\nL: When personifying a country, it is always referred to as 'she' or 'her' to denote its nurturing aspect.\nM: The gender of a compound noun is typically determined by the gender of its head noun.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and L only", "J, K, and M only", "K, L, and M only", "K and M only"], "answer": "K and M only", "explanation": "Statement J is incorrect. The singular 'they' is widely accepted in modern English as a gender-neutral pronoun for common gender nouns, especially when the gender of the antecedent is unknown or irrelevant. Statement K is correct; 'friend', 'cousin', 'guest' are classic examples of common gender nouns. Statement L is incorrect; while countries are often personified as 'she', this is not 'always' the case, nor is it solely for 'nurturing aspect' (e.g., 'Motherland' vs. 'Fatherland'). Statement M is correct; for compound nouns, the head noun usually determines the gender (e.g., 'schoolboy' is masculine because 'boy' is masculine, 'girlfriend' is feminine because 'girl' is feminine). Therefore, only K and M are correct."}, {"id": 48, "section": "English", "question": "Match the following nouns with their appropriate gender classification, considering common exceptions and nuances in English: List I (Noun)\n(J) Sun\n(K) Orphan\n(L) Czarina\n(M) Parliament List II (Gender Classification):\n(1) Masculine (often personified)\n(2) Feminine\n(3) Common\n(4) Neuter", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-3, L-2, M-4", "J-1, K-2, L-3, M-4", "J-4, K-3, L-1, M-2", "J-3, K-1, L-2, M-4"], "answer": "J-1, K-3, L-2, M-4", "explanation": "Let's analyze each match: A. Sun: While an inanimate object, the 'Sun' is traditionally and often personified as masculine in English literature and mythology (e.g., 'He shines brightly'). Thus, Masculine (often personified) (J-1). B. Orphan: An 'orphan' can be a child of either male or female sex who has lost their parents. Therefore, it is a Common Gender noun (K-3). C. Czarina: A 'czarina' is specifically the wife of a czar or a female ruler of Russia. This noun is exclusively of the Feminine Gender (L-2). D. Parliament: 'Parliament' refers to a legislative body, which is an institution or an inanimate entity. Therefore, it is a Neuter Gender noun (M-4). Combining these, the correct match is J-1, K-3, L-2, M-4."}, {"id": 49, "section": "English", "question": "Arrange the following categories of nouns in a logical progression based on the increasing complexity or nuance of determining their gender in English grammar:\nJ: Nouns with clear natural gender (e.g., 'boy', 'girl')\nK: Nouns referring to inanimate objects (e.g., 'table', 'stone')\nL: Nouns that are gender-neutral but can refer to either sex (e.g., 'student', 'doctor')\nM: Nouns that are inanimate but are often personified with masculine or feminine pronouns (e.g., 'ship', 'sun')", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "J, L, K, M", "K, J, L, M", "L, J, K, M"], "answer": "J, K, L, M", "explanation": "This sequence represents a progression from the most straightforward gender assignments to the most nuanced: J. Nouns with clear natural gender (Masculine divided by Feminine) are the simplest to classify, directly corresponding to biological sex. K. Nouns referring to inanimate objects are also relatively straightforward, almost universally falling into the Neuter gender. L. Nouns that are gender-neutral but can refer to either sex (Common Gender) introduce a slight complexity as they don't specify sex, requiring context or further specification if sex is relevant. M. Nouns that are inanimate but are often personified represent the highest level of nuance and exception, as their gender assignment (masculine or feminine) is based on figurative language rather than natural sex or grammatical rule for inanimate objects. Thus, J, K, L, M follows a logical progression of increasing complexity."}, {"id": 50, "section": "English", "question": "Which of the following sentences correctly uses gender-specific pronouns for an animal, reflecting a common exception to the general rule of using 'it' for animals)", "brand": "bilaspurtestseries.com 9669946966", "options": ["The cat chased the mouse; it caught it easily.", "My dog, a golden retriever, wagged his tail excitedly when he saw me.", "The bird built its nest high in the tree, protecting its young.", "The lion roared, asserting its dominance over the pride."], "answer": "My dog, a golden retriever, wagged his tail excitedly when he saw me.", "explanation": "The general rule is to use 'it' for animals. However, a common exception occurs when the animal is a pet, or its sex is known and relevant, in which case 'he' or 'she' is often used. In the sentence 'My dog, a golden retriever, wagged his tail excitedly when he saw me,' the dog is a pet, and the use of 'his' and 'he' is appropriate and common. The other sentences correctly use 'it' or 'its' for animals where the sex is not specified or the animal is not a pet, adhering to the general rule."}, {"id": 51, "section": "Computer", "question": "कंप्यूटर के 'डेटा प्रोसेसिंग' (Data Processing) उपयोग की सबसे सटीक वैचारिक परिभाषा क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["कच्चे डेटा (raw data) को सूचना (information) में बदलने की प्रक्रिया।", "कंप्यूटर में डेटा को स्टोर (store) करने की प्रक्रिया।", "डेटा को एक स्थान से दूसरे स्थान पर स्थानांतरित (transfer) करने की प्रक्रिया।", "केवल संख्यात्मक डेटा (numerical data) का विश्लेषण (analysis) करना।"], "answer": "कच्चे डेटा (raw data) को सूचना (information) में बदलने की प्रक्रिया।", "explanation": "डेटा प्रोसेसिंग (Data Processing) कंप्यूटर के सबसे मौलिक उपयोगों में से एक है, जिसमें कच्चे, असंगठित डेटा (raw, unorganized data) को सार्थक और उपयोगी जानकारी (meaningful and useful information) में परिवर्तित किया जाता है। इसमें डेटा का संग्रह (collection), हेरफेर (manipulation) और विश्लेषण (analysis) शामिल है। अन्य विकल्प डेटा प्रोसेसिंग के केवल विशिष्ट पहलुओं को दर्शाते हैं या इसकी पूर्ण परिभाषा नहीं हैं, जैसे केवल स्टोर करना या स्थानांतरित करना, या केवल संख्यात्मक डेटा का विश्लेषण करना।"}, {"id": 52, "section": "Computer", "question": "शिक्षा के क्षेत्र में कंप्यूटर का उपयोग 'ई-लर्निंग' (e-learning) के संदर्भ में मुख्य रूप से किस उद्देश्य को पूरा करता है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों को मनोरंजन प्रदान करना।", "भौगोलिक बाधाओं को दूर करते हुए सीखने के संसाधनों तक पहुँच प्रदान करना।", "केवल तकनीकी कौशल (technical skills) विकसित करना।", "शिक्षण संस्थानों के लिए राजस्व (revenue) बढ़ाना।"], "answer": "भौगोलिक बाधाओं को दूर करते हुए सीखने के संसाधनों तक पहुँच प्रदान करना।", "explanation": "ई-लर्निंग (e-learning) का प्राथमिक उद्देश्य कंप्यूटर और इंटरनेट (internet) का उपयोग करके छात्रों को कहीं भी और कभी भी सीखने के संसाधनों (learning resources) तक पहुँच प्रदान करना है, जिससे भौगोलिक और समय की बाधाएँ (geographical and time barriers) दूर होती हैं। जबकि मनोरंजन, राजस्व वृद्धि या केवल तकनीकी कौशल विकास इसके गौण परिणाम हो सकते हैं, मुख्य उद्देश्य पहुँच और लचीलापन (accessibility and flexibility) है।"}, {"id": 53, "section": "Computer", "question": "निम्नलिखित में से कौन सा कथन 'डेटा माइनिंग' (Data Mining) के संबंध में सही है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह डेटा को एन्क्रिप्ट (encrypt) करने की प्रक्रिया है ताकि उसे सुरक्षित रखा जा सके।", "यह डेटा को मैन्युअल रूप से (manually) दर्ज करने की प्रक्रिया है।", "यह बड़े डेटासेट (datasets) से पैटर्न (patterns), रुझान (trends) और उपयोगी जानकारी निकालने की प्रक्रिया है।", "यह केवल डेटा को एक डेटाबेस (database) में संग्रहीत (store) करने की प्रक्रिया है।"], "answer": "यह बड़े डेटासेट (datasets) से पैटर्न (patterns), रुझान (trends) और उपयोगी जानकारी निकालने की प्रक्रिया है।", "explanation": "डेटा माइनिंग (Data Mining) एक विश्लेषणात्मक प्रक्रिया (analytical process) है जिसका उपयोग बड़े डेटासेट से छिपे हुए पैटर्न (hidden patterns), अज्ञात सहसंबंधों (unknown correlations) और अन्य उपयोगी जानकारी को खोजने के लिए किया जाता है। यह डेटा को संग्रहीत करने, मैन्युअल रूप से दर्ज करने या एन्क्रिप्ट करने से कहीं अधिक है; यह डेटा से ज्ञान निकालने पर केंद्रित है।"}, {"id": 54, "section": "Computer", "question": "सामान्यतः, कंप्यूटर का उपयोग 'रियल-टाइम प्रोसेसिंग' (Real-Time Processing) के लिए किया जाता है। निम्नलिखित में से कौन सा एक ऐसा परिदृश्य है जहाँ रियल-टाइम प्रोसेसिंग की आवश्यकता नहीं होती है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["एयर ट्रैफिक कंट्रोल (Air Traffic Control) सिस्टम।", "ऑटोमेटेड इंडस्ट्रियल कंट्रोल (Automated Industrial Control) सिस्टम।", "मौसम पूर्वानुमान (Weather Forecasting) मॉडल का बैच प्रोसेसिंग (batch processing)।", "ऑनलाइन ट्रांजैक्शन प्रोसेसिंग (Online Transaction Processing − OLTP) सिस्टम।"], "answer": "मौसम पूर्वानुमान (Weather Forecasting) मॉडल का बैच प्रोसेसिंग (batch processing)।", "explanation": "रियल-टाइम प्रोसेसिंग (Real-Time Processing) उन प्रणालियों में आवश्यक है जहाँ डेटा को तुरंत संसाधित (processed) किया जाना चाहिए ताकि समय-संवेदनशील प्रतिक्रिया (time-sensitive response) दी जा सके, जैसे एयर ट्रैफिक कंट्रोल, OLTP और औद्योगिक नियंत्रण। मौसम पूर्वानुमान मॉडल का बैच प्रोसेसिंग (batch processing) आमतौर पर रियल-टाइम नहीं होता है, क्योंकि इसमें बड़ी मात्रा में डेटा को एक साथ संसाधित किया जाता है और परिणाम तुरंत नहीं चाहिए होते हैं, बल्कि एक निश्चित समय अंतराल के बाद उपलब्ध होते हैं।"}, {"id": 55, "section": "Computer", "question": "'कंप्यूटर एडेड डिजाइन' (Computer-Aided Design − CAD) और 'कंप्यूटर एडेड मैन्युफैक्चरिंग' (Computer-Aided Manufacturing − CAM) के बीच मुख्य अंतर क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["CAD केवल ग्राफिक्स (graphics) बनाने के लिए है, जबकि CAM केवल डेटा विश्लेषण (data analysis) के लिए है।", "CAD का उपयोग केवल 2D डिज़ाइन (design) के लिए होता है, जबकि CAM का उपयोग 3D डिज़ाइन के लिए।", "CAD का उपयोग केवल सॉफ्टवेयर (software) विकास में होता है, जबकि CAM का उपयोग हार्डवेयर (hardware) निर्माण में।", "CAD उत्पादों के डिज़ाइन और मॉडलिंग (modeling) पर केंद्रित है, जबकि CAM उत्पादन प्रक्रिया (production process) के स्वचालन (automation) पर केंद्रित है।"], "answer": "CAD उत्पादों के डिज़ाइन और मॉडलिंग (modeling) पर केंद्रित है, जबकि CAM उत्पादन प्रक्रिया (production process) के स्वचालन (automation) पर केंद्रित है।", "explanation": "CAD (Computer-Aided Design) मुख्य रूप से उत्पादों के डिज़ाइन (design), ड्राफ्टिंग (drafting) और मॉडलिंग (modeling) के लिए कंप्यूटर सॉफ्टवेयर का उपयोग करता है। इसके विपरीत, CAM (Computer-Aided Manufacturing) कंप्यूटर सॉफ्टवेयर का उपयोग करके विनिर्माण प्रक्रियाओं (manufacturing processes) को नियंत्रित और स्वचालित (automate) करता है, जैसे मशीन टूल्स (machine tools) का संचालन। CAD डिज़ाइन चरण में आता है, जबकि CAM उत्पादन चरण में आता है, अक्सर CAD डेटा का उपयोग करके।"}, {"id": 56, "section": "Computer", "question": "एक आधुनिक कार्यालय या शैक्षणिक संस्थान में डिजिटल डेटा प्रबंधन (digital data management) और सुरक्षा (security) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: संवेदनशील छात्र डेटा (sensitive student data) को केवल स्थानीय सर्वर (local servers) पर संग्रहीत किया जाना चाहिए ताकि क्लाउड-आधारित समाधानों (cloud-based solutions) से जुड़े सुरक्षा जोखिमों (security risks) से बचा जा सके।\nK: डेटा गोपनीयता (data privacy) कानूनों का अनुपालन (compliance) सुनिश्चित करने के लिए, सभी कर्मचारियों और छात्रों को नियमित रूप से डेटा सुरक्षा प्रोटोकॉल (data security protocols) पर प्रशिक्षित किया जाना चाहिए।\nL: डेटा अखंडता (data integrity) बनाए रखने के लिए, डेटाबेस (databases) में प्रविष्टियों (entries) को मैन्युअल रूप से (manually) सत्यापित (verified) करना स्वचालित सत्यापन (automated validation) प्रक्रियाओं की तुलना में अधिक प्रभावी है।\nM: आपदा रिकवरी योजना (disaster recovery plan) में नियमित डेटा बैकअप (regular data backups) और ऑफ-साइट स्टोरेज (off-site storage) शामिल होना चाहिए ताकि डेटा हानि (data loss) के जोखिम को कम किया जा सके", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और M", "केवल K, L और M", "केवल J, K और L", "केवल J और K"], "answer": "केवल K और M", "explanation": "कथन J गलत है। आधुनिक डेटा प्रबंधन में, क्लाउड-आधारित समाधान (cloud-based solutions) अक्सर स्थानीय सर्वर (local servers) की तुलना में बेहतर सुरक्षा, मापनीयता (scalability) और पहुंच (accessibility) प्रदान करते हैं, बशर्ते उन्हें ठीक से कॉन्फ़िगर (configured) और प्रबंधित किया जाए। \"केवल स्थानीय सर्वर\" पर जोर देना एक सीमित और अक्सर कम सुरक्षित दृष्टिकोण है, खासकर जब क्लाउड प्रदाता उन्नत सुरक्षा उपाय प्रदान करते हैं। कथन K सही है। डेटा गोपनीयता कानूनों (data privacy laws) का अनुपालन और समग्र डेटा सुरक्षा सुनिश्चित करने के लिए कर्मचारियों और छात्रों को नियमित रूप से डेटा सुरक्षा प्रोटोकॉल (data security protocols) पर प्रशिक्षित करना महत्वपूर्ण है। मानवीय त्रुटि (human error) डेटा उल्लंघनों (data breaches) का एक प्रमुख कारण है। कथन L गलत है। बड़े डेटासेट (datasets) के लिए डेटा अखंडता (data integrity) बनाए रखने में स्वचालित सत्यापन (automated validation) प्रक्रियाएं (जैसे डेटा प्रकार जांच, रेंज जांच, रेफरेंशियल इंटीग्रिटी) मैन्युअल सत्यापन (manual verification) की तुलना में अधिक कुशल और कम त्रुटि-प्रवण (error-prone) होती हैं। मैन्युअल सत्यापन केवल छोटे, विशिष्ट मामलों के लिए व्यावहारिक है और बड़े पैमाने पर अक्षम है। कथन M सही है। एक प्रभावी आपदा रिकवरी योजना (disaster recovery plan) में डेटा हानि (data loss) के जोखिम को कम करने के लिए नियमित डेटा बैकअप (regular data backups) और ऑफ-साइट स्टोरेज (off-site storage) आवश्यक घटक हैं। यह किसी भी अप्रत्याशित घटना (unforeseen event) से डेटा को सुरक्षित रखने में मदद करता है। इसलिए, कथन K और M सही हैं।"}, {"id": 57, "section": "Computer", "question": "'वर्चुअल रियलिटी' (Virtual Reality − VR) के संदर्भ में, निम्नलिखित में से कौन सा कथन इसकी एक महत्वपूर्ण सीमा को दर्शाता है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["VR केवल 2D विज़ुअलाइज़ेशन (visualization) तक सीमित है।", "VR सिस्टम वास्तविक दुनिया (real world) के साथ कोई इंटरैक्शन (interaction) प्रदान नहीं करते हैं।", "VR सिस्टम केवल मनोरंजन (entertainment) के लिए उपयोग किए जा सकते हैं।", "VR अनुभव अक्सर उच्च लागत वाले हार्डवेयर (hardware) और सॉफ्टवेयर (software) की मांग करते हैं।"], "answer": "VR अनुभव अक्सर उच्च लागत वाले हार्डवेयर (hardware) और सॉफ्टवेयर (software) की मांग करते हैं।", "explanation": "वर्चुअल रियलिटी (VR) एक इमर्सिव (immersive) अनुभव प्रदान करती है, लेकिन इसकी एक महत्वपूर्ण सीमा उच्च लागत है। VR हेडसेट (headsets), शक्तिशाली कंप्यूटर और विशेष सॉफ्टवेयर अक्सर महंगे होते हैं, जिससे यह सभी के लिए सुलभ नहीं हो पाता है। VR मनोरंजन के अलावा प्रशिक्षण, शिक्षा और चिकित्सा जैसे कई क्षेत्रों में उपयोग होता है, वास्तविक दुनिया के साथ इंटरैक्शन प्रदान कर सकता है (जैसे ऑगमेंटेड रियलिटी - AR के साथ मिलकर), और 3D विज़ुअलाइज़ेशन प्रदान करता है, इसलिए अन्य विकल्प गलत हैं।"}, {"id": 58, "section": "Computer", "question": "अभिकथन (A): आधुनिक कार्यालयों में 'एंटरप्राइज रिसोर्स प्लानिंग' (Enterprise Resource Planning − ERP) सिस्टम का उपयोग दक्षता (efficiency) बढ़ाता है।\nकारण (R): ERP सिस्टम विभिन्न व्यावसायिक प्रक्रियाओं (business processes) को एकीकृत (integrate) करके डेटा साझाकरण (data sharing) और समन्वय (coordination) को सुगम बनाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["कथन A सत्य है, लेकिन R असत्य है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "कथन A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है क्योंकि ERP सिस्टम वास्तव में आधुनिक कार्यालयों में दक्षता बढ़ाते हैं। कारण (R) भी सत्य है और यह A की सही व्याख्या है। ERP सिस्टम विभिन्न विभागों (departments) जैसे वित्त (finance), मानव संसाधन (human resources), विनिर्माण (manufacturing) आदि के डेटा और प्रक्रियाओं को एक केंद्रीकृत प्रणाली (centralized system) में एकीकृत करते हैं, जिससे डेटा साझाकरण और समन्वय में सुधार होता है, जिसके परिणामस्वरूप समग्र दक्षता में वृद्धि होती है।"}, {"id": 59, "section": "Computer", "question": "कंप्यूटर के विभिन्न उपयोगों के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:\nJ: 'क्लाउड कंप्यूटिंग' (Cloud Computing) उपयोगकर्ताओं को स्थानीय हार्डवेयर (local hardware) पर निर्भरता कम करके संसाधनों (resources) तक पहुँच प्रदान करती है।\nK: 'बिग डेटा एनालिटिक्स' (Big Data Analytics) केवल संरचित डेटा (structured data) के विश्लेषण पर केंद्रित है।\nL: 'इंटरनेट ऑफ थिंग्स' (Internet of Things − IoT) भौतिक वस्तुओं (physical objects) को इंटरनेट से जोड़कर डेटा संग्रह (data collection) और नियंत्रण (control) को सक्षम बनाता है।\nM: 'ब्लॉकचेन' (Blockchain) तकनीक मुख्य रूप से केंद्रीकृत (centralized) डेटाबेस प्रबंधन (database management) के लिए उपयोग की जाती है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल J, L और M", "केवल J और L", "केवल K और M"], "answer": "केवल J और L", "explanation": "कथन J सही है क्योंकि क्लाउड कंप्यूटिंग (Cloud Computing) उपयोगकर्ताओं को इंटरनेट के माध्यम से कंप्यूटिंग संसाधनों (computing resources) जैसे सर्वर (servers), स्टोरेज (storage) और एप्लिकेशन (applications) तक पहुँच प्रदान करती है, जिससे स्थानीय हार्डवेयर की आवश्यकता कम हो जाती है। कथन L भी सही है क्योंकि इंटरनेट ऑफ थिंग्स (IoT) भौतिक उपकरणों, वाहनों, घरेलू उपकरणों और अन्य वस्तुओं को सेंसर (sensors), सॉफ्टवेयर और अन्य तकनीकों के साथ जोड़ता है, जिससे वे इंटरनेट पर डेटा को कनेक्ट और एक्सचेंज (exchange) कर सकें। कथन K गलत है क्योंकि बिग डेटा एनालिटिक्स (Big Data Analytics) संरचित (structured), अर्ध-संरचित (semi-structured) और असंरचित डेटा (unstructured data) तीनों के विश्लेषण पर केंद्रित है। कथन M गलत है क्योंकि ब्लॉकचेन (Blockchain) तकनीक एक विकेन्द्रीकृत (decentralized) और वितरित लेजर (distributed ledger) प्रणाली है, न कि केंद्रीकृत डेटाबेस प्रबंधन के लिए।"}, {"id": 60, "section": "Computer", "question": "कंप्यूटर के अनुप्रयोगों के संबंध में निम्नलिखित में से कौन सा/से कथन भ्रामक (misleading) है/हैं)\nJ: 'ई-लर्निंग प्लेटफॉर्म' (E-learning platforms) केवल दूरस्थ शिक्षा (distance education) के लिए डिज़ाइन किए गए हैं और पारंपरिक कक्षा शिक्षण (traditional classroom teaching) में उनका कोई उपयोग नहीं है।\nK: 'प्रोजेक्ट मैनेजमेंट सॉफ्टवेयर' (Project Management Software) का उपयोग केवल बड़े पैमाने के इंजीनियरिंग परियोजनाओं (large-scale engineering projects) के लिए किया जाता है और छोटे व्यावसायिक कार्यों (small business tasks) के लिए अनुपयुक्त है।\nL: 'क्लाउड स्टोरेज' (Cloud Storage) सेवाएँ डेटा की सुरक्षा (data security) के लिए पूरी तरह से उपयोगकर्ता (user) पर निर्भर करती हैं और सेवा प्रदाता (service provider) की कोई जिम्मेदारी नहीं होती।\nM: 'ऑपरेटिंग सिस्टम' (Operating System) का प्राथमिक कार्य केवल कंप्यूटर हार्डवेयर (hardware) को नियंत्रित करना है और यह सॉफ्टव -4, L-1, M-3", "J-2, K-1, L-4, M-3"], "answer": "J-2, K-1, L-4, M-3", "explanation": "सही मिलान इस प्रकार है: GIS (Geographic Information System) भौगोलिक डेटा (geographic data) के विश्लेषण और मानचित्रण (mapping) के लिए उपयोग होता है, इसलिए J-2। CRM (Customer Relationship Management) ग्राहक डेटा प्रबंधन (customer data management) और बिक्री प्रक्रियाओं (sales processes) पर केंद्रित है, इसलिए K-1। POS (Point of Sale) सिस्टम खुदरा (retail) लेनदेन और इन्वेंट्री (inventory) प्रबंधन के लिए उपयोग किए जाते हैं, इसलिए L-4। SCADA (Supervisory Control and Data Acquisition) औद्योगिक प्रक्रियाओं (industrial processes) की निगरानी और नियंत्रण (monitoring and control) के लिए उपयोग किया जाता है, इसलिए M-3।"}, {"id": 62, "section": "Computer", "question": "एक सामान्य 'डेटा प्रोसेसिंग चक्र' (Data Processing Cycle) के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: आउटपुट (Output)\nK: इनपुट (Input)\nL: प्रोसेसिंग (Processing)\nM: स्टोरेज (Storage) सही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, M, J", "K, L, J, M", "K, M, L, J", "L, K, M, J"], "answer": "K, L, J, M", "explanation": "एक सामान्य डेटा प्रोसेसिंग चक्र (Data Processing Cycle) में डेटा को संसाधित (processed) करने के लिए एक तार्किक प्रवाह (logical flow) होता है। सबसे पहले, डेटा को सिस्टम में 'इनपुट' (Input) किया जाता है (K)। फिर, इनपुट किए गए डेटा को 'प्रोसेसिंग' (Processing) के माध्यम से परिवर्तित या हेरफेर किया जाता है (L)। प्रोसेसिंग के बाद, परिणामी जानकारी को 'आउटपुट' (Output) के रूप में प्रस्तुत किया जाता है (J)। अंत में, इस जानकारी को भविष्य के उपयोग के लिए 'स्टोरेज' (Storage) में सहेजा जा सकता है (M)। इसलिए, सही क्रम K, L, J, M है।"}, {"id": 63, "section": "Computer", "question": "'डेटा वेयरहाउस' (Data Warehouse) और 'डेटाबेस' (Database) के बीच सबसे महत्वपूर्ण सूक्ष्म अंतर (subtle difference) क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["डेटाबेस का उपयोग मुख्य रूप से परिचालन (operational) लेनदेन (transactions) के लिए होता है, जबकि डेटा वेयरहाउस का उपयोग विश्लेषणात्मक (analytical) रिपोर्टिंग (reporting) और निर्णय लेने के लिए होता है।", "डेटाबेस हमेशा क्लाउड (cloud) पर आधारित होते हैं, जबकि डेटा वेयरहाउस हमेशा ऑन-प्रिमाइसेस (on-premises) होते हैं।", "डेटाबेस केवल संरचित डेटा (structured data) संग्रहीत करता है, जबकि डेटा वेयरहाउस असंरचित डेटा (unstructured data) संग्रहीत करता है।", "डेटाबेस में डेटा को केवल एक बार लिखा जा सकता है, जबकि डेटा वेयरहाउस में डेटा को बार-बार अपडेट (update) किया जा सकता है।"], "answer": "डेटाबेस का उपयोग मुख्य रूप से परिचालन (operational) लेनदेन (transactions) के लिए होता है, जबकि डेटा वेयरहाउस का उपयोग विश्लेषणात्मक (analytical) रिपोर्टिंग (reporting) और निर्णय लेने के लिए होता है।", "explanation": "डेटाबेस (Database) और डेटा वेयरहाउस (Data Warehouse) दोनों डेटा संग्रहीत करते हैं, लेकिन उनके प्राथमिक उपयोग और संरचना में सूक्ष्म अंतर हैं। डेटाबेस (जैसे OLTP सिस्टम) मुख्य रूप से दैनिक परिचालन लेनदेन (daily operational transactions) को संभालने और रियल-टाइम डेटा को अपडेट करने के लिए डिज़ाइन किए गए हैं। इसके विपरीत, डेटा वेयरहाउस (Data Warehouse) को ऐतिहासिक (historical) और समेकित डेटा (consolidated data) को संग्रहीत करने के लिए डिज़ाइन किया गया है, जिसका उपयोग जटिल विश्लेषणात्मक रिपोर्टिंग (analytical reporting), डेटा माइनिंग (data mining) और व्यावसायिक निर्णय लेने (business decision-making) के लिए किया जाता है। अन्य विकल्प गलत हैं: डेटाबेस संरचित और असंरचित दोनों डेटा संग्रहीत कर सकते हैं, डेटा वेयरहाउस में डेटा आमतौर पर अपडेट नहीं होता बल्कि जोड़ा जाता है, और दोनों क्लाउड या ऑन-प्रिमाइसेस हो सकते हैं।"}, {"id": 64, "section": "Computer", "question": "कंप्यूटर सिस्टम (computer system) में इनपुट (input) और आउटपुट (output) डिवाइस (device) का प्राथमिक उद्देश्य क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["कंप्यूटर को बिजली (power) की आपूर्ति (supply) करना।", "डेटा (data) को प्रोसेस (process) करना और स्टोर (store) करना।", "कंप्यूटर के आंतरिक घटकों (internal components) को ठंडा रखना।", "उपयोगकर्ता (user) और कंप्यूटर के बीच संचार (communication) स्थापित कर ries.com 9669946966", "options": ["केवल इनपुट डिवाइस", "न तो इनपुट और न ही आउटपुट डिवाइस", "केवल आउटपुट डिवाइस", "इनपुट और आउटपुट दोनों डिवाइस"], "answer": "इनपुट और आउटपुट दोनों डिवाइस", "explanation": "टचस्क्रीन एक अद्वितीय डिवाइस है क्योंकि यह उपयोगकर्ता से इनपुट (टच के माध्यम से) स्वीकार करता है और साथ ही स्क्रीन पर जानकारी (आउटपुट) भी प्रदर्शित करता है। इसलिए, इसे इनपुट और आउटपुट दोनों डिवाइस की श्रेणी में रखा जाता है।"}, {"id": 68, "section": "Computer", "question": "एक इंजीनियर (engineer) कंप्यूटर पर एक जटिल 3D मॉडल (3D model) डिज़ाइन करता है और फिर उस डिज़ाइन का एक विस्तृत, बड़े आकार का भौतिक ब्लूप्रिंट (physical blueprint) तैयार करना चाहता है। इस प्रक्रिया में उपयोग होने वाले इनपुट और आउटपुट डिवाइस के कार्यों का सबसे सटीक वर्णन करने वाला युग्म (pair) कौन सा है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["इनपुट: कीबोर्ड (Keyboard) - कमांड (commands) और टेक्स्ट (text) दर्ज करना; आउटपुट: मॉनिटर (Monitor) - डिज़ाइन का दृश्य प्रदर्शन (visual display) करना।", "इनपुट: माउस (Mouse) − 3D मॉडल में ऑब्जेक्ट्स (objects) को हेरफेर (manipulate) करना; आउटपुट: प्लॉटर (Plotter) - बड़े पैमाने पर ग्राफिक (graphic) डिज़ाइन को प्रिंट करना।", "इनपुट: माइक्रोफोन (Microphone) - डिज़ाइन के लिए मौखिक निर्देश (verbal instructions) देना; आउटपुट: स्पीकर (Speaker) - डिज़ाइन से संबंधित ऑडियो फीडबैक (audio feedback) प्रदान करना।", "इनपुट: स्कैनर (Scanner) - मौजूदा ब्लूप्रिंट को डिजिटल करना; आउटपुट: प्रिंटर (Printer) - छोटे आकार के ब्लूप्रिंट की कॉपी बनाना।"], "answer": "इनपुट: माउस (Mouse) − 3D मॉडल में ऑब्जेक्ट्स (objects) को हेरफेर (manipulate) करना; आउटपुट: प्लॉटर (Plotter) - बड़े पैमाने पर ग्राफिक (graphic) डिज़ाइन को प्रिंट करना।", "explanation": "दिए गए परिदृश्य में, इंजीनियर 3D मॉडल डिज़ाइन कर रहा है और बड़े आकार का भौतिक ब्लूप्रिंट तैयार कर रहा है। माउस (Mouse) 3D मॉडल में ऑब्जेक्ट्स को हेरफेर करने के लिए एक प्राथमिक इनपुट डिवाइस (input device) है। प्लॉटर (Plotter) एक विशेष आउटपुट डिवाइस (output device) है जिसका उपयोग बड़े पैमाने पर, उच्च-गुणवत्ता वाले ग्राफिक डिज़ाइन, जैसे कि ब्लूप्रिंट और इंजीनियरिंग ड्रॉइंग (engineering drawings) को प्रिंट करने के लिए किया जाता है। अन्य विकल्प भी इनपुट/आउटपुट डिवाइस के कार्य बताते हैं, लेकिन वे इस विशिष्ट 3D डिज़ाइन और बड़े ब्लूप्रिंट उत्पादन प्रक्रिया के लिए सबसे सटीक और प्रासंगिक युग्म नहीं हैं।"}, {"id": 69, "section": "Computer", "question": "निम्नलिखित कथनों पर विचार करें: कथन I: एक इनपुट डिवाइस (input device) कंप्यूटर को डेटा (data) और निर्देश (instructions) प्रदान करता है। कथन II: एक आउटपुट डिवाइस (output device) कंप्यूटर से संसाधित डेटा (processed data) को उपयोगकर्ता (user) के लिए सुलभ (accessible) प्रारूप (format) में प्रस्तुत करता है। इन कथनों के संबंध में कौन सा विकल्प सही है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["कथन II सही है, लेकिन कथन I गलत है।", "कथन I सही है, लेकिन कथन II गलत है।", "कथन I और कथन II दोनों सही हैं, और कथन II, कथन I की सही व्याख्या है।", "कथन I और कथन II दोनों सही हैं, लेकिन कथन II, कथन I की सही व्याख्या नहीं है।"], "answer": "कथन I और कथन II दोनों सही हैं, लेकिन कथन II, कथन I की सही व्याख्या नहीं है।", "explanation": "दोनों कथन I और II व्यक्तिगत रूप से सही हैं। इनपुट डिवाइस कंप्यूटर को डेटा और निर्देश देते हैं, और आउटपुट डिवाइस संसाधित डेटा को उपयोगकर्ता के लिए प्रस्तुत करते हैं। हालांकि, कथन II, कथन I की व्याख्या नहीं करता है; वे दोनों I divided by O डिवाइस के अलग-अलग लेकिन पूरक (complementary) कार्यों का वर्णन करते हैं। वे एक-दूसरे के कारण या परिणाम नहीं हैं, बल्कि कंप्यूटर सिस्टम में उनकी भूमिकाओं का वर्णन करते हैं।"}, {"id": 70, "section": "Computer", "question": "अभिकथन (A): प्रिंटर (printer) एक आउटपुट डिवाइस (output device) है।\nकारण (R): प्रिंटर कंप्यूटर (computer) से डिजिटल डेटा (digital data) प्राप्त करता है और उसे भौतिक (physical) रूप (जैसे कागज़ पर) में परिवर्तित करता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सही हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।", "कथन (A) सही है, लेकिन (R) गलत है।", "कथन (A) गलत है, लेकिन (R) सही है।"], "answer": "(A) और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि प्रिंटर वास्तव में एक आउटपुट डिवाइस है। कारण (R) भी सही है क्योंकि यह प्रिंटर के कार्य को सटीक रूप से बताता है - डिजिटल डेटा को भौतिक रूप में बदलना। यह कार्य ही प्रिंटर को आउटपुट डिवाइस बनाता है, इसलिए (R), (A) की सही व्याख्या है।"}, {"id": 71, "section": "Computer", "question": "निम्नलिखित में से कौन से डिवाइस (devices) एक कंप्यूटर (computer) के लिए इनपुट (input) के रूप में कार्य कर सकते हैं)\nJ: वेबकैम (Webcam)\nK: बारकोड रीडर (Barcode Reader)\nL: प्लॉटर (Plotter)\nM: लाइट पेन (Light Pen) सही संयोजन (combination) चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "केवल J, K और L", "केवल J, K और M", "केवल K, L और M"], "answer": "केवल J, K और M", "explanation": "वेबकैम (वीडियो इनपुट), बारकोड रीडर (बारकोड डेटा इनपुट) और लाइट पेन (स्क्रीन पर पॉइंटिंग इनपुट) सभी इनपुट डिवाइस हैं। प्लॉटर एक आउटपुट डिवाइस है जिसका उपयोग बड़े ग्राफिक्स (graphics) और डिज़ाइन (designs) को प्रिंट करने के लिए किया जाता है। इसलिए, सही संयोजन J, K और M है।"}, {"id": 72, "section": "Computer", "question": "इनपुट/आउटपुट (I divided by O) डिवाइस के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:\nJ: कुछ डिवाइस (devices) एक ही समय में इनपुट और आउटपुट दोनों के रूप में कार्य कर सकते हैं।\nK: ऑप्टिकल मार्क रीडर (Optical Mark Reader − OMR) एक आउटपुट डिवाइस है जो विशेष चिह्नों (marks) को पढ़ता है।\nL: वर्चुअल रियलिटी (Virtual Reality − VR) हेडसेट (headset) मुख्य रूप से एक आउटपुट डिवाइस है, लेकिन इसमें कुछ इनपुट क्षमताएं (capabilities) भी हो सकती हैं।\nM: बायोमेट्रिक सेंसर (Biometric sensor) एक इनपुट डिवाइस है जो अद्वितीय शारीरिक विशेषताओं (unique physical characteristics) को कैप्चर (capture) करता है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "केवल J, K और M", "केवल J, K और L", "केवल K, L और M"], "answer": "केवल J, L और M", "explanation": "कथन J सही है। टचस्क्रीन (touchscreen) और मल्टीफंक्शन प्रिंटर (multifunction printer) जैसे डिवाइस एक साथ इनपुट और आउटपुट दोनों कार्य कर सकते हैं। कथन K गलत है। OMR एक इनपुट डिवाइस है जो पेंसिल (pencil) या पेन (pen) से बनाए गए चिह्नों को पढ़ता है, न कि आउटपुट डिवाइस। कथन L सही है। VR हेडसेट मुख्य रूप से दृश्य और श्रव्य (auditory) आउटपुट प्रदान करते हैं, लेकिन उनमें अक्सर मोशन सेंसर (motion sensors) या आई-ट्रैकिंग (eye-tracking) जैसी इनपुट क्षमताएं भी होती हैं। कथन M सही है। बायोमेट्रिक सेंसर (जैसे फिंगरप्रिंट (fingerprint) रीडर (reader) या फेस (face) स्कैनर (scanner)) उपयोगकर्ता की अद्वितीय शारीरिक विशेषताओं को इनपुट के रूप में कैप्चर करते हैं। इसलिए, सही कथन J, L और M हैं।"}, {"id": 73, "section": "Computer", "question": "List-I में दिए गए इनपुट/आउटपुट डिवाइस (Input divided by Output Devices) को List-II में दिए गए उनके विशिष्ट कार्य (specific function) या विशेषता (feature) से सुमेलित (match) करें: List-I (डिवाइस):\n(J) डिजिटाइज़र (Digitizer)\n(K) मैग्नेटिक इंक कैरेक्टर रिकॉग्निशन (Magnetic Ink Character Recognition − MICR)\n(L) प्रोजेक्टर (Projector)\n(M) हैप्टिक फीडबैक (Haptic Feedback) डिवाइस List-II (कार्य/विशेषता):\n(1) चेक (cheque) प्रोसेसिंग (processing) में उपयोग\n(2) डिजिटल छवियों (digital images) को बड़ी सतह (surface) पर प्रदर्शित करना\n(3) स्पर्श (touch) या बल (force) के माध्यम से उपयोगकर्ता को प्रतिक्रिया (feedback) देना\n(4) एनालॉग (analog) जानकारी को डिजिटल रूप (digital form) में परिवर्तित करना\nसही मिलान वाला विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-4, L-2, M-3", "J-4, K-1, L-2, M-3", "J-3, K-1, L-2, M-4", "J-4, K-2, L-1, M-3"], "answer": "J-4, K-1, L-2, M-3", "explanation": "J. डिजिटाइज़र (Digitizer): यह एनालॉग जानकारी (जैसे हाथ से खींची गई ड्राइंग (drawing)) को डिजिटल रूप में परिवर्तित करता है, इसलिए J-4 सही है। K. मैग्नेटिक इंक कैरेक्टर रिकॉग्निशन (MICR): यह विशेष चुंबकीय स्याही (magnetic ink) से लिखे गए अक्षरों को पढ़ता है और मुख्य रूप से बैंक (bank) में चेक प्रोसेसिंग में उपयोग होता है, इसलिए K-1 सही है। L. प्रोजेक्टर (Projector): यह कंप्यूटर से प्राप्त डिजिटल छवियों को एक बड़ी स्क्रीन (screen) या दीवार (wall) जैसी सतह पर प्रदर्शित करता है, इसलिए L-2 सही है। M. हैप्टिक फीडबैक (Haptic Feedback) डिवाइस: ये डिवाइस उपयोगकर्ता को स्पर्श या बल के माध्यम से प्रतिक्रिया देते हैं (जैसे कंपन (vibration) या प्रतिरोध (resistance)), इसलिए M-3 सही है। अतः, सही संयोजन J-4, K-1, L-2, M-3 है।"}, {"id": 74, "section": "Computer", "question": "एक कंप्यूटर (computer) में डेटा (data) इनपुट (input) करने और उसे संसाधित (process) करके आउटपुट (output) प्राप्त करने की सामान्य प्रक्रिया (general process) के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: संसाधित डेटा (processed data) को आउटपुट डिवाइस (output device) के माध्यम से उपयोगकर्ता (user) को प्रस्तुत करना।\nK: इनपुट डिवाइस (input device) द्वारा डेटा और निर्देशों (instructions) को कंप्यूटर में दर्ज करना।\nL: सेंट्रल प्रोसेसिंग यूनिट (Central Processing Unit − CPU) द्वारा दर्ज किए गए डेटा और निर्देशों को संसाधित करना।\nM: मेमोरी (memory) में डेटा और निर्देशों को अस्थायी (temporarily) रूप से संग्रहीत (store) करना। सही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, M, L, J", "K, L, M, J", "K, M, J, L", "M, K, L, J"], "answer": "K, M, L, J", "explanation": "कंप्यूटर में डेटा प्रोसेसिंग की सामान्य प्रक्रिया इस प्रकार है: 1. K. इनपुट डिवाइस द्वारा डेटा और निर्देशों को कंप्यूटर में दर्ज करना: सबसे पहले, उपयोगकर्ता इनपुट डिवाइस (जैसे कीबोर्ड, माउस) का उपयोग करके डेटा और निर्देश कंप्यूटर में डालता है। 2. M. मेमोरी में डेटा और निर्देशों को अस्थायी रूप से संग्रहीत करना: दर्ज किया गया डेटा और निर्देश प्रोसेसिंग से पहले अस्थायी रूप से कंप्यूटर की मुख्य मेमोरी (RAM) में संग्रहीत होते हैं। 3. L. सेंट्रल प्रोसेसिंग यूनिट (CPU) द्वारा दर्ज किए गए डेटा और निर्देशों को संसाधित करना: CPU मेमोरी से डेटा और निर्देशों को प्राप्त करता है और उन पर आवश्यक गणनाएं (calculations) और ऑपरेशन (operations) करता है। 4. J. संसाधित डेटा को आउटपुट डिवाइस के माध्यम से उपयोगकर्ता को प्रस्तुत करना: प्रोसेसिंग के बाद, परिणामी डेटा (आउटपुट) को आउटपुट डिवाइस (जैसे मॉनिटर, प्रिंटर) के माध्यम से उपयोगकर्ता को दिखाया या प्रदान किया जाता है। इसलिए, सही कालानुक्रमिक क्रम K, M, L, J है।"}, {"id": 75, "section": "Computer", "question": "एक कंप्यूटर (computer) सिस्टम (system) में, यदि कोई डिवाइस (device) केवल डेटा (data) को कंप्यूटर से बाहर भेजता है और कंप्यूटर में डेटा प्राप्त नहीं करता है, तो उसे अनिवार्य रूप से एक आउटपुट डिवाइस (output device) माना जाएगा। इस कथन के संदर्भ में, निम्नलिखित में से कौन सा डिवाइस इस परिभाषा के लिए एक संभावित अपवाद (potential exception) हो सकता है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["मॉडेम (Modem)", "प्रोजेक्टर (Projector)", "स्पीकर (Speaker)", "प्रिंटर (Printer)"], "answer": "मॉडेम (Modem)", "explanation": "स्पीकर, प्रिंटर और प्रोजेक्टर सभी स्पष्ट रूप से आउटपुट डिवाइस हैं क्योंकि वे केवल कंप्यूटर से डेटा प्राप्त करते हैं और उसे उपयोगकर्ता के लिए सुलभ प्रारूप में प्रस्तुत करते हैं। वे कंप्यूटर में डेटा इनपुट नहीं करते हैं। हालांकि, मॉडेम (Modulator-Demodulator) एक ऐसा डिवाइस है जो कंप्यूटर से डेटा भेजता भी है (आउटपुट) और कंप्यूटर में डेटा प्राप्त भी करता है (इनपुट)। यह टेलीफोन लाइन (telephone line) या केबल (cable) पर डिजिटल डेटा को एनालॉग सिग्नल (analog signal) में मॉड्यूलेट (modulate) करता है और एनालॉग सिग्नल को डिजिटल डेटा में डिमॉड्यूलेट (demodulate) करता है। इसलिए, यह एक इनपुट/आउटपुट (I divided by O) डिवाइस है, न कि केवल एक आउटपुट डिवाइस। यह दिए गए कथन की 'केवल डेटा को कंप्यूटर से बाहर भेजता है' वाली शर्त का उल्लंघन करता है, जिससे यह एक संभावित अपवाद बन जाता है।"}, {"id": 76, "section": "Polity", "question": "भारतीय संविधान की प्रस्तावना (Preamble) में प्रयुक्त शब्द 'संप्रभुता' (Sovereignty) का सही अर्थ क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["भारत किसी भी विदेशी शक्ति के नियंत्रण से मुक्त है और अपने आंतरिक तथा बाहरी मामलों में स्वतंत्र निर्णय लेने में सक्षम है।", "भारत में सरकार का चुनाव जनता द्वारा किया जाता है।", "भारत के सभी नागरिक कानून के समक्ष समान हैं।", "भारत एक धर्मनिरपेक्ष राष्ट्र है जहाँ सभी धर्मों को समान सम्मान दिया जाता है।"], "answer": "भारत किसी भी विदेशी शक्ति के नियंत्रण से मुक्त है और अपने आंतरिक तथा बाहरी मामलों में स्वतंत्र निर्णय लेने में सक्षम है।", "explanation": "'संप्रभुता' का अर्थ है कि भारत किसी भी बाहरी शक्ति के अधीन नहीं है और अपने सभी निर्णयों, चाहे वे आंतरिक हों या बाहरी, को स्वतंत्र रूप से लेने की शक्ति रखता है। यह भारत की सर्वोच्च और स्वतंत्र सत्ता को दर्शाता है। अन्य विकल्प समानता, लोकतंत्र और धर्मनिरपेक्षता के अर्थ को दर्शाते हैं, जो संप्रभुता से भिन्न अवधारणाएँ हैं।"}, {"id": 77, "section": "Polity", "question": "भारतीय संविधान की प्रस्तावना में उल्लिखित 'सामाजिक, आर्थिक और राजनीतिक न्याय' (Social, Economic and Political Justice) के आदर्श का मुख्य उद्देश्य क्या है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["सरकार को नागरिकों के लिए कल्याणकारी योजनाएँ बनाने का अधिकार देना।", "भारत को एक समाजवादी राज्य घोषित करना।", "न्यायपालिका को कानून की व्याख्या करने की सर्वोच्च शक्ति प्रदान करना।", "नागरिकों के बीच किसी भी प्रकार के भेदभाव को समाप्त करना और सभी को समान अवसर प्रदान करना।"], "answer": "नागरिकों के बीच किसी भी प्रकार के भेदभाव को समाप्त करना और सभी को समान अवसर प्रदान करना।", "explanation": "प्रस्तावना में 'सामाजिक, आर्थिक और राजनीतिक न्याय' का आदर्श नागरिकों के बीच जाति, धर्म, लिंग, नस्ल या आर्थिक स्थिति के आधार पर किसी भी भेदभाव को समाप्त करने और सभी को समान अवसर तथा गरिमापूर्ण जीवन सुनिश्चित करने का लक्ष्य रखता है। यह एक समावेशी समाज के निर्माण पर जोर देता है। विकल्प B, C और D न्याय के आदर्श के व्यापक उद्देश्य को पूरी तरह से व्यक्त नहीं करते हैं।"}, {"id": 78, "section": "Polity", "question": "42वें संविधान संशोधन अधिनियम (42nd Constitutional Amendment Act), 1976 द्वारा भारतीय संविधान की प्रस्तावना में निम्नलिखित में से कौन से शब्द जोड़े गए थे)", "brand": "bilaspurtestseries.com 9669946966", "options": ["स्वतंत्रता, समानता, बंधुत्व", "लोकतांत्रिक, गणराज्य, न्याय", "संप्रभुता, एकता, बंधुत्व", "समाजवादी, धर्मनिरपेक्ष, अखंडता"], "answer": "समाजवादी, धर्मनिरपेक्ष, अखंडता", "explanation": "42वें संविधान संशोधन अधिनियम, 1976 द्वारा भारतीय संविधान की प्रस्तावना में 'समाजवादी' (Socialist), 'धर्म (1973) में सर्वोच्च न्यायालय (Supreme Court) ने निर्णय दिया कि प्रस्तावना संविधान की मूल संरचना (Basic Structure) का हिस्सा है। कथन 4 गलत है। प्रस्तावना को संविधान के अनुच्छेद 368 के तहत संशोधित किया जा सकता है, बशर्ते कि ऐसा संशोधन संविधान की मूल संरचना को परिवर्तित न करे। 42वें संविधान संशोधन (1976) द्वारा प्रस्तावना में 'समाजवादी', 'धर्मनिरपेक्ष' और 'अखंडता' शब्द जोड़े गए थे।"}, {"id": 81, "section": "Polity", "question": "'मूल संरचना सिद्धांत' (Basic Structure Doctrine) ने भारतीय संसद की संविधान संशोधन की शक्ति (amending power) को किस प्रकार प्रभावित किया है)", "brand": "bilaspurtestseries.com 9669946966", "options": ["इसने न्यायिक समीक्षा (judicial review) की शक्ति को समाप्त कर दिया है।", "इसने संसद की संशोधन शक्ति को सीमित कर दिया है, जिससे वह संविधान की मूल संरचना को नहीं बदल सकती।", "इसने संसद को केवल साधारण बहुमत (simple majority) से संविधान में संशोधन करने की अनुमति दी है।", "इसने संसद की संशोधन शक्ति को असीमित बना दिया है, जिससे वह संविधान के किसी भी हिस्से को बदल सकती है।"], "answer": "इसने संसद की संशोधन शक्ति को सीमित कर दिया है, जिससे वह संविधान की मूल संरचना को नहीं बदल सकती।", "explanation": "मूल संरचना सिद्धांत ने संसद की संविधान संशोधन की शक्ति को सीमित कर दिया है। केशवानंद भारती वाद, 1973 के निर्णय के अनुसार, संसद संविधान के किसी भी भाग में संशोधन कर सकती है, लेकिन ऐसा कोई संशोधन नहीं कर सकती जिससे संविधान की मूल संरचना (Basic Structure) नष्ट या परिवर्तित हो जाए। यह सिद्धांत न्यायिक समीक्षा की शक्ति को मजबूत करता है, न कि समाप्त करता है, क्योंकि न्यायालय ही यह निर्धारित करता है कि कोई संशोधन मूल संरचना का उल्लंघन करता है या नहीं।"}, {"id": 82, "section": "Polity", "question": "सर्वोच्च न्यायालय (Supreme Court) द्वारा विभिन्न निर्णयों में भारतीय संविधान की मूल संरचना (Basic Structure) के रूप में निम्नलिखित में से किन तत्वों को मान्यता दी गई है) 1. संविधान की सर्वोच्चता (Supremacy of the Constitution) 2. गणतांत्रिक और लोकतांत्रिक स्वरूप (Republican and Democratic form) 3. धर्मनिरपेक्ष स्वरूप (Secular character) 4. संघीय स्वरूप (Federal character) 5. न्यायिक समीक्षा (Judicial Review)", "brand": "bilaspurtestseries.com 9669946966", "options": ["1, 2, 3, 4 और 5 सभी", "केवल 1, 3, 4 और 5", "केवल 1, 2 और 3", "केवल 2, 3 और 4"], "answer": "1, 2, 3, 4 और 5 सभी", "explanation": "सर्वोच्च न्यायालय ने विभिन्न वादों में संविधान की सर्वोच्चता, गणतांत्रिक और लोकतांत्रिक स्वरूप, धर्मनिरपेक्ष स्वरूप, संघीय स्वरूप, न्यायिक समीक्षा, शक्तियों का पृथक्करण (separation of powers), कल्याणकारी राज्य (welfare state) की स्थापना, मौलिक अधिकारों और नीति निर्देशक सिद्धांतों के बीच संतुलन आदि कई तत्वों को मूल संरचना का हिस्सा माना है। दिए गए सभी पाँचों तत्व मूल संरचना के महत्वपूर्ण घटक हैं, जिन्हें न्यायालय ने समय-समय पर स्पष्ट किया है।"}, {"id": 83, "section": "Polity", "question": "अभिकथन (A): भारतीय संविधान की प्रस्तावना संविधान का एक अभिन्न अंग है।\nकारण (R): प्रस्तावना में संविधान के मूल दर्शन और आदर्शों को समाहित किया गया है, जो इसकी मूल संरचना का आधार हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["कथन (A) गलत है, लेकिन (R) सही है।", "(A) और (R) दोनों सही हैं, लेकिन (R), (A) का सही स्पष्टीकरण नहीं है।", "(A) और (R) दोनों सही हैं, और (R), (A) का सही स्पष्टीकरण है।", "कथन (A) सही है, लेकिन (R) गलत है।"], "answer": "(A) और (R) दोनों सही हैं, और (R), (A) का सही स्पष्टीकरण है।", "explanation": "सर्वोच्च न्यायालय ने केशवानंद भारती वाद (1973) में यह निर्णय दिया कि प्रस्तावना संविधान का एक भाग है, जिससे अभिकथन (A) सही है। प्रस्तावना में संविधान के मूलभूत आदर्श और दर्शन (जैसे न्याय, स्वतंत्रता, समानता, बंधुत्व, संप्रभुता, धर्मनिरपेक्षता, लोकतंत्र) निहित हैं, जो संविधान की मूल संरचना के कई घटकों का आधार बनते हैं। इस प्रकार, कारण (R) भी सही है और अभिकथन (A) का सही स्पष्टीकरण प्रदान करता है।"}, {"id": 84, "section": "Polity", "question": "भारतीय संविधान की प्रस्तावना के संबंध में निम्नलिखित कथनों पर विचार कीजिए:\n1. प्रस्तावना न तो विधायिका (legislature) की शक्ति का स्रोत है और न ही उसकी शक्तियों पर प्रतिबंध लगाती है।\n2. यह गैर-न्यायसंगत (non-justiciable) है, अर्थात इसके प्रावधानों को न्यायालय में लागू नहीं किया जा सकता।\n3.
