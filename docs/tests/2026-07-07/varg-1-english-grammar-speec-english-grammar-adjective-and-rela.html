while a non-finite adverbial phrase does not.", "explanation": "The fundamental difference lies in the verb form. An adverb clause is a dependent clause that includes a subject and a finite verb, typically introduced by a subordinating conjunction (e.g., \"When he arrived...\"). A non-finite adverbial phrase, on the other hand, uses a non-finite verb form (participle, infinitive, or gerund) and lacks a finite verb, functioning adverbially (e.g., \"To succeed, you must work hard,\" \"Running quickly, he fell\"). Both are dependent and cannot stand alone, and both primarily modify verbs, adjectives, or other adverbs, not nouns."}, {"id": 72, "section": "English Grammar", "question": "Assertion (A): In the sentence \"He works hard so that he may succeed,\" \"so that he may succeed\" is an adverb clause of purpose.\nReason (R):: Adverb clauses of purpose explain the reason or intention behind the action in the main clause.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is not the correct explanation of A.", "A is true, but R is false.", "A is false, but R is true.", "Both A and R are true, and R is the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Assertion (A) is true because the clause \"so that he may succeed\" clearly states the intention or goal of his working hard, making it an adverb clause of purpose. Reason (R) is also true, as adverb clauses of purpose are indeed used to explain the reason or intention behind the action in the main clause. Furthermore, R directly and accurately explains why A is correct."}, {"id": 73, "section": "English Grammar", "question": "Assertion (A): In the sentence \"Driven by ambition, he worked tirelessly,\" the phrase \"Driven by ambition\" functions as an adverbial non-finite clause.\nReason (R):: Past participle phrases can function adverbially, providing information about the cause, manner, or condition of the action in the main clause.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true.", "A is true, but R is false.", "Both A and R are true, but R is not the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Assertion (A) is true. The phrase \"Driven by ambition\" is a past participle phrase. It modifies the verb \"worked\" by explaining the cause or motivation behind his tireless work. Therefore, it functions as an adverbial non-finite clause. Reason (R) is also true. Past participle phrases frequently act as adverbial modifiers, indicating the cause, manner, or condition related to the main verb or clause. Since R provides the general grammatical rule that explains why the specific instance in A functions as it does, R is the correct explanation of A."}, {"id": 74, "section": "English Grammar", "question": "Which of the following sentences correctly identifies the underlined clause/phrase?\nJ: \"I know what you did last summer.\" (Noun clause, direct object)\nK: \"Running late, she missed her train.\" (Non-finite adverbial phrase of reason)\nL: \"This is the house where I grew up.\" (Adverb clause of place)\nM: \"He wants to finish the project by Friday.\" (Non-finite noun phrase, direct object)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and M only", "J, K, L, and M", "K and M only", "J and K only"], "answer": "J, K, and M only", "explanation": "J. \"what you did last summer\" functions as the direct object of the verb \"know,\" making it a noun clause. This classification is correct. K. \"Running late\" is a participial phrase that indicates the reason why she missed her train, thus functioning adverbially. This classification is correct. L. \"where I grew up\" modifies the noun \"house\" by specifying which house, making it an adjective clause (specifically, a relative clause of place), not an adverb clause. Adverb clauses modify verbs, adjectives, or other adverbs. This classification is incorrect. M. \"to finish the project by Friday\" acts as the direct object of the verb \"wants,\" functioning as a noun, and it is an infinitive phrase, which is non-finite. This classification is correct. Therefore, J, K, and M are correctly identified."}, {"id": 75, "section": "English Grammar", "question": "Which of the following statements about clauses and phrases are correct?\nJ: A non-finite clause, by definition, cannot have an explicit subject.\nK: In the sentence \"He works hard so that he may succeed,\" \"so that he may succeed\" is an adverb clause of purpose.\nL: A noun clause can only function as the subject or object of a verb, not as a complement.\nM: The phrase \"walking in the park\" in \"I saw him walking in the park\" is a non-finite adjectival clause modifying \"him.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and L only", "K and M only", "J, K, and M only", "K, L, and M only"], "answer": "K and M only", "explanation": "J. A non-finite clause can indeed have an explicit subject, especially with infinitives (e.g., \"For him to win is unlikely\") or participles (e.g., \"The weather being fine, we went for a walk\"). Therefore, statement J is incorrect. K. \"So that he may succeed\" is a subordinate clause introduced by the conjunction \"so that,\" which expresses the purpose of the action \"works hard.\" Thus, it is an adverb clause of purpose. Therefore, statement K is correct. L. A noun clause can function as the subject, object of a verb, object of a preposition, and also as a complement (e.g., \"The problem is that he lied\"). Therefore, statement L is incorrect. M. \"Walking in the park\" is a present participle phrase that describes or modifies the pronoun \"him.\" It is non-finite (lacks a finite verb) and functions adjectivally. Therefore, statement M is correct. Based on the analysis, only statements K and M are correct."}, {"id": 76, "section": "English Grammar", "question": "Identify the sentences where the underlined part is correctly classified.\nJ: \"I don't know when he will arrive.\" (Noun clause)\nK: \"He left before I could say goodbye.\" (Adverb clause of time)\nL: \"The decision to resign was difficult.\" (Non-finite adjective phrase)\nM: \"She is the student who won the award.\" (Adverb clause)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and L only", "J, K, L, and M", "J and K only", "K, L, and M only"], "answer": "J, K, and L only", "explanation": "J. \"when he will arrive\" functions as the direct object of the verb \"know,\" making it a noun clause. This classification is correct. K. \"before I could say goodbye\" indicates the time of his leaving, functioning as an adverb clause of time. This classification is correct. L. \"to resign\" is an infinitive phrase that modifies the noun \"decision,\" specifying what kind of decision it was, thus functioning as a non-finite adjective phrase. This classification is correct. M. \"who won the award\" modifies the noun \"student,\" providing more information about her. This makes it an adjective clause (specifically, a relative clause), not an adverb clause. This classification is incorrect. Therefore, J, K, and L are correctly classified."}, {"id": 77, "section": "English Grammar", "question": "Which of the following statements accurately describe the function of the underlined parts?\nJ: \"She worked hard to achieve her goals.\" (Non-finite adverbial phrase of purpose)\nK: \"The fact that he failed surprised everyone.\" (Noun clause in apposition)\nL: \"He is taller than I am.\" (Adverb clause of comparison)\nM: \"I saw him crossing the street.\" (Non-finite adjective phrase)", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, and M only", "J and K only", "All of the above", "J, K, and L only"], "answer": "J, K, and L only", "explanation": "J. \"to achieve her goals\" is an infinitive phrase that explains the purpose of her working hard, thus functioning as a non-finite adverbial phrase of purpose. This is correct. K. \"that he failed\" explains or renames \"the fact,\" functioning as a noun clause in apposition to \"fact.\" This is correct. L. \"than I am\" is a clause that makes a comparison, functioning as an adverb clause of comparison, modifying \"taller.\" This is correct. M. \"crossing the street\" is a participial phrase that describes the action \"him\" was performing when he was seen. It functions as an object complement or an adverbial modifier of the verb \"saw,\" describing the state or manner of the object. It is not typically classified as a non-finite adjective phrase directly modifying the noun \"him\" in this construction. This is incorrect. Therefore, J, K, and L are accurate descriptions."}, {"id": 78, "section": "English Grammar", "question": "Match the underlined phrases/clauses with their correct grammatical classification: List I (Phrase/Clause)\n(J) \"I don't know what to do.\"\n(K) \"To err is human.\"\n(L) \"He left without saying goodbye.\"\n(M) \"The news that he resigned shocked us.\" List II (Classification):\n(1) Non-finite noun phrase (object)\n(2) Non-finite adverbial phrase\n(3) Non-finite noun phrase (subject)\n(4) Noun clause (in apposition)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-1, L-2, M-4", "J-1, K-3, L-4, M-2", "J-2, K-3, L-1, M-4", "J-1, K-3, L-2, M-4"], "answer": "J-1, K-3, L-2, M-4", "explanation": "P. \"what to do\" is an infinitive phrase acting as the direct object of \"know,\" functioning as a non-finite noun phrase. Thus, P-1. Q. \"To err\" is an infinitive phrase acting as the subject of the sentence, functioning as a non-finite noun phrase. Thus, Q-3. R. \"without saying goodbye\" is a prepositional phrase containing a gerund phrase, functioning adverbially by modifying the verb \"left.\" Thus, R-2. S. \"that he resigned\" explains or renames \"the news,\" functioning as a noun clause in apposition to \"news.\" Thus, S-4. Therefore, the correct match is P-1, Q-3, R-2, S-4."}, {"id": 79, "section": "English Grammar", "question": "Arrange the following steps in the logical order to correctly identify a non-finite clause in a given sentence:\nJ: Determine if the clause contains a verb form that is an infinitive, participle, or gerund.\nK: Check if the clause functions as a noun, adjective, or adverb within the sentence.\nL: Identify if the clause has a finite verb and can stand alone as a complete sentence.\nM: Look for a subject and a predicate within the clause.", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, M, J, K", "M, J, L, K", "J, L, M, K", "J, M, L, K"], "answer": "L, M, J, K", "explanation": "The most logical sequence for identifying a non-finite clause is: 1. L. Identify if the clause has a finite verb and can stand alone as a complete sentence. This initial step helps distinguish between main clauses, dependent finite clauses, and non-finite structures. 2. M. Look for a subject and a predicate within the clause. This helps confirm if it's a full clause (finite or non-finite) or just a phrase, and whether the verb form is finite or non-finite. 3. J. Determine if the clause contains a verb form that is an infinitive, participle, or gerund. If the previous steps indicate it's not a finite clause, this step confirms its non-finite nature. 4. K. Check if the clause functions as a noun, adjective, or adverb within the sentence. Once identified as a non-finite clause, its grammatical function determines its specific classification (e.g., non-finite noun phrase, participial adjective phrase, infinitive adverbial phrase). Therefore, the correct chronological order is L, M, J, K."}, {"id": 80, "section": "English Grammar", "question": "In the sentence \"He is too weak to walk,\" what is the grammatical function of \"to walk\"?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Non-finite noun phrase (object of 'is')", "Non-finite adjective phrase modifying 'weak'", "Non-finite adverbial phrase of result/degree", "Finite adverb clause of purpose"], "answer": "Non-finite adverbial phrase of result/degree", "explanation": "In the construction \"too...to...\" (e.g., \"too weak to walk\"), the infinitive phrase \"to walk\" modifies the adjective \"weak\" by indicating the degree or result of his weakness (he is so weak that he cannot walk). This makes it a non-finite adverbial phrase expressing result or degree. It is not a noun phrase, nor does it directly modify 'weak' as an adjective (it modifies the adjective adverbially), and it is certainly not a finite clause as it lacks a finite verb."}, {"id": 81, "section": "English Grammar", "question": "Which of the following statements best describes the primary distinction between 'must' and 'have to' when expressing obligation?", "brand": "bilaspurtestseries.com 9669946966", "options": ["'Must' expresses an internal or speaker's obligation, while 'have to' expresses an external obligation.", "'Must' implies an external obligation, while 'have to' implies an internal obligation.", "'Must' is used for past obligations, and 'have to' is used for future obligations.", "'Must' indicates a suggestion, whereas 'have to' indicates a strong command."], "answer": "'Must' expresses an internal or speaker's obligation, while 'have to' expresses an external obligation.", "explanation": "The primary distinction is that 'must' often conveys an obligation that comes from the speaker or is internal, reflecting a personal necessity or strong recommendation. In contrast, 'have to' typically indicates an obligation imposed by external rules, circumstances, or another authority. For example, 'I must study' (internal drive) vs. 'I have to study for the exam' (external requirement)."}, {"id": 82, "section": "English Grammar", "question": "In which context would 'may' be more appropriate than 'can' for requesting permission?", "brand": "bilaspurtestseries.com 9669946966", "options": ["When expressing ability to perform an action.", "In a formal setting, such as addressing a superior or in written communication.", "When asking for a physical capability, like 'Can you lift this box?'", "In an informal conversation with a close friend."], "answer": "In a formal setting, such as addressing a superior or in written communication.", "explanation": "While both 'can' and 'may' can be used to request permission, 'may' is generally considered more formal and polite. 'Can' is more common in informal contexts and also expresses ability. Therefore, in a formal setting, 'may' is the more appropriate choice for permission."}, {"id": 83, "section": "English Grammar", "question": "Consider the statement: 'All modal verbs are followed by the bare infinitive form of the main verb.' Is this statement generally correct, and why?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Yes, but only in affirmative sentences; in negative sentences, they take 'to' + infinitive.", "Yes, because modals do not take '-s' in the third person singular and are always followed by the base form.", "No, because modals can be followed by a past participle in perfect tenses.", "No, because some modals are followed by 'to' + infinitive."], "answer": "Yes, because modals do not take '-s' in the third person singular and are always followed by the base form.", "explanation": "The statement is generally correct. Modal verbs (like can, could, may, might, must, shall, should, will, would) are auxiliary verbs that are always followed by the bare infinitive (base form without 'to') of the main verb. They do not change form for person or number and do not take '-s' in the third person singular. Options A and D are incorrect as modals are not followed by 'to' + infinitive, and option C refers to modal perfects (e.g., 'could have done'), where 'have' is the bare infinitive, followed by a past participle, not the modal itself being followed by a past participle."}, {"id": 84, "section": "English Grammar", "question": "Which of the following modals is an exception to the rule that modals do not have past tense forms, as it can refer to past ability?", "brand": "bilaspurtestseries.com 9669946966", "options": ["May", "Must", "Could", "Will"], "answer": "Could", "explanation": "While most modals do not have distinct past tense forms (e.g., 'must' doesn't become 'musted'), 'could' is the past tense form of 'can' and can express past ability (e.g., 'When I was young, I could run very fast'). However, for general past ability, 'was/were able to' is often preferred to avoid ambiguity with 'could' expressing possibility or polite requests."}, {"id": 85, "section": "English Grammar", "question": "Which of the following is classified as a 'semi-modal' or 'quasi-modal' verb?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Might", "Would", "Shall", "Ought to"], "answer": "Ought to", "explanation": "Semi-modals (or quasi-modals) are expressions that function like modal verbs but share some characteristics of main verbs, often requiring 'to' before the infinitive. 'Ought to' is a classic example, expressing advice or moral obligation. 'Shall', 'might', and 'would' are pure modal verbs."}, {"id": 86, "section": "English Grammar", "question": "Why is 'must not' used for prohibition, while 'need not' is used for lack of necessity?", "brand": "bilaspurtestseries.com 9669946966", "options": ["'Must not' refers to future actions, while 'need not' refers to present actions.", "'Must not' implies a strong external rule, while 'need not' implies a personal choice.", "'Must not' is a formal prohibition, and 'need not' is an informal suggestion.", "'Must not' indicates that something is forbidden, whereas 'need not' indicates that something is not required."], "answer": "'Must not' indicates that something is forbidden, whereas 'need not' indicates that something is not required.", "explanation": "The distinction lies in their core meanings: 'must not' (or 'mustn't') expresses a strong prohibition, meaning an action is forbidden or not allowed. 'Need not' (or 'needn't'), on the other hand, expresses a lack of necessity, meaning an action is not required or optional. They address different aspects of obligation and requirement."}, {"id": 87, "section": "English Grammar", "question": "Choose the most appropriate modal verb to complete the sentence, conveying a strong sense of advice or recommendation, almost bordering on necessity, but without the absolute force of 'must': 'You ______ consult a doctor immediately if the pain persists.'", "brand": "bilaspurtestseries.com 9669946966", "options": ["could", "might", "should", "would"], "answer": "should", "explanation": "The sentence conveys a strong recommendation or advice that is highly advisable. 'Should' is the most appropriate modal for this purpose, indicating what is right or advisable to do. 'Could' suggests possibility or ability, 'might' suggests a weaker possibility, and 'would' is used for hypothetical situations or polite requests, none of which fit the strong advisory tone required here."}, {"id": 88, "section": "English Grammar", "question": "The manager insisted that the report ______ submitted by Friday, as the deadline was strict. However, due to unforeseen circumstances, it ______ be delayed until Monday.", "brand": "bilaspurtestseries.com 9669946966", "options": ["would be / should", "must be / might", "should be / could", "had to be / might"], "answer": "had to be / might", "explanation": "For the first blank, 'had to be' correctly expresses an external, past obligation (the manager insisted on a strict deadline). 'Must be' would imply an internal obligation or present necessity. For the second blank, 'might' expresses a possibility of delay due to unforeseen circumstances. 'Could' would also work for possibility, but 'might' often implies a slightly weaker or more uncertain possibility, fitting the 'unforeseen circumstances' context well. 'Should be' and 'would be' do not fit the context of strict deadlines and possibilities of delay."}, {"id": 89, "section": "English Grammar", "question": "Which of the following sentences correctly uses modals to express a past unfulfilled obligation or regret?", "brand": "bilaspurtestseries.com 9669946966", "options": ["You should have told me earlier about the problem.", "You would have told me earlier about the problem.", "You must have told me earlier about the problem.", "You could tell me earlier about the problem."], "answer": "You should have told me earlier about the problem.", "explanation": "The modal perfect 'should have + past participle' is used to express regret or an unfulfilled obligation in the past, indicating that something was advisable but was not done. 'Must have told' expresses a strong deduction about a past event. 'Would have told' implies a hypothetical past condition. 'Could tell' refers to present ability or a polite request."}, {"id": 90, "section": "English Grammar", "question": "Identify the sentence that contains an incorrect usage of a preposition.", "brand": "bilaspurtestseries.com 9669946966", "options": ["I prefer coffee to tea.", "They arrived at the airport on time.", "He is accustomed with the cold weather.", "She is good at playing the piano."], "answer": "He is accustomed with the cold weather.", "explanation": "The correct idiomatic expression is 'accustomed to' something, not 'accustomed with'. Therefore, the sentence should be 'He is accustomed to the cold weather.' The other sentences use prepositions correctly: 'good at' (skill), 'arrived at' (specific place), and 'prefer to' (comparison)."}, {"id": 91, "section": "English Grammar", "question": "Which statement accurately differentiates the usage of 'in' and 'into'?", "brand": "bilaspurtestseries.com 9669946966", "options": ["'In' denotes position within, while 'into' denotes movement towards the interior of something.", "'In' is always followed by a noun, and 'into' is always followed by a verb.", "'In' is used for large areas, and 'into' is used for small, enclosed spaces.", "'In' refers to a state of being, whereas 'into' refers to a change of state."], "answer": "'In' denotes position within, while 'into' denotes movement towards the interior of something.", "explanation": "The key difference between 'in' and 'into' lies in motion. 'In' indicates a static position or location within something (e.g., 'The book is in the bag'). 'Into' indicates movement from outside to the inside of something (e.g., 'He walked into the room'). Options B, C, and D provide incorrect or incomplete differentiations."}, {"id": 92, "section": "English Grammar", "question": "Assertion (A): The modal verb 'will' can be used to express a strong intention or determination.\nReason (R):: 'Will' is primarily used to form the future tense and therefore always indicates a prediction.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, and R is the correct explanation of A.", "Both A and R are true, but R is not the correct explanation of A.", "A is false, but R is true.", "A is true, but R is false."], "answer": "A is true, but R is false.", "explanation": "Assertion (A) is true: 'Will' can indeed express strong intention or determination (e.g., 'I will succeed!'). However, Reason (R) is false. While 'will' is used for the future tense, it does not always indicate a prediction; it can also express willingness, promises, or strong intentions, as stated in the assertion. Therefore, the reason incorrectly limits the function of 'will'."}, {"id": 93, "section": "English Grammar", "question": "Assertion (A): The preposition 'for' can indicate purpose or\nReason (R)::\nReason (R):: It is often interchangeable with 'since' when referring to duration.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is not the correct explanation of A.", "A is true, but R is false.", "A is false, but R is true.", "Both A and R are true, and R is the correct explanation of A."], "answer": "A is true, but R is false.", "explanation": "Assertion (A) is true: 'For' clearly indicates purpose (e.g., 'This tool is for cutting') or reason (e.g., 'He was punished for his actions'). However, Reason (R) is false. 'For' and 'since' are not interchangeable when referring to duration. 'For' indicates a period of time (e.g., 'for two hours'), while 'since' indicates a starting point in time (e.g., 'since 2005'). They have distinct uses for duration."}, {"id": 94, "section": "English Grammar", "question": "Which of the following sentences demonstrate correct and appropriate usage of modals or prepositions in their respective contexts?\nJ: He must have left his keys at home; I saw them on the table this morning.\nK: You ought to have apologized for your rude behavior yesterday.\nL: The meeting will be held on 10 AM, October 26th.\nM: She is capable to solve complex mathematical problems.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and M only", "J and K only", "J, K, and L only", "J, K, L, and M"], "answer": "J and K only", "explanation": "Sentence J is correct: 'must have left' expresses a strong deduction about a past event, and 'at home' and 'on the table' are correct prepositional usages. Sentence K is correct: 'ought to have apologized' expresses a past unfulfilled obligation or regret. Sentence L is incorrect: 'at 10 AM' should be used for specific times, not 'on'. Sentence M is incorrect: the correct idiom is 'capable of solving', not 'capable to solve'. Therefore, only J and K are correct."}, {"id": 95, "section": "English Grammar", "question": "Evaluate the correctness of the following statements regarding modal and preposition usage:\nJ: 'Need' can function as both a modal verb and a main verb, but its modal form is primarily used in negative and interrogative sentences.\nK: The preposition 'during' is used to specify a point in time, similar to 'at'.\nL: 'Would rather' is a semi-modal used to express preference, and it is followed by a bare infinitive.\nM: When expressing purpose, 'for' is always followed by a gerund (verb-ing form), never an infinitive.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and M are correct.", "J, K, and L are correct.", "J and L are correct.", "Only L is correct."], "answer": "J and L are correct.", "explanation": "Statement J is correct: 'Need' can be a modal (e.g., 'You needn't worry') or a main verb (e.g., 'You don't need to worry'), with its modal use typically in negatives and questions. Statement K is incorrect: 'During' specifies a period of time (e.g., 'during the meeting'), not a specific point like 'at'. Statement L is correct: 'Would rather' expresses preference and is followed by a bare infinitive (e.g., 'I would rather stay home'). Statement M is incorrect: 'For' can be followed by a gerund for purpose (e.g., 'for cleaning'), but 'to' + infinitive is also commonly used for purpose (e.g., 'to clean'). Therefore, only J and L are correct."}, {"id": 96, "section": "English Grammar", "question": "Which of the following sentences correctly illustrate nuanced or exceptional uses of modals or prepositions?\nJ: He dare not challenge the authority of the principal.\nK: We used to live in that old house, but we moved out last year.\nL: She insisted on going to the party, despite feeling unwell.\nM: The cat jumped upon the table with a sudden leap.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and M only", "J, K, and L only", "J, K, L, and M", "J and K only"], "answer": "J, K, L, and M", "explanation": "All four sentences illustrate correct and nuanced usage. J uses 'dare' as a semi-modal in its negative form, followed by a bare infinitive. K uses 'used to' for a past habitual action or state, which is a semi-modal construction. L correctly uses 'insisted on' followed by a gerund, which is a common prepositional idiom. M correctly uses 'upon' to indicate movement onto a surface, often with a sense of formality or emphasis, which is a valid usage distinct from 'on'."}, {"id": 97, "section": "English Grammar", "question": "Classify the primary function of the modal verb in each of the following sentences:\nJ: You must submit your assignment by Friday. (Function: _________)\nK: It might rain later today. (Function: _________)\nL: Could you please pass the salt? (Function: _________)\nM: She should apologize for her mistake. (Function: _________) Which option correctly matches the sentences with their primary modal functions?", "brand": "bilaspurtestseries.com 9669946966", "options": ["J: Obligation, K: Possibility, L: Request, M: Advice", "J: Command, K: Probability, L: Capability, M: Recommendation", "J: Necessity, K: Certainty, L: Ability, M: Suggestion", "J: Prohibition, K: Prediction, L: Permission, M: Obligation"], "answer": "J: Obligation, K: Possibility, L: Request, M: Advice", "explanation": "J. 'Must submit' expresses a strong obligation. K. 'Might rain' expresses a possibility. L. 'Could you please pass' is a polite request. M. 'Should apologize' offers advice or a recommendation. The other options misclassify one or more of the modal functions. For example, 'might' indicates possibility, not certainty or strong prediction. 'Could' here is a request, not ability."}, {"id": 98, "section": "English Grammar", "question": "Match the modal/preposition usage in List I with the grammatical rule or reason that governs it in List II: List I (Usage)\n(J) 'He used to smoke a lot.'\n(K) 'She must be tired after that long journey.'\n(L) 'I am interested in learning new languages.'\n(M) 'The cat jumped off the fence.' List II (Rule/Reason)\n(1) Expresses a past habitual action or state.\n(2) Indicates a strong deduction or logical conclusion.\n(3) Follows an adjective to complete its meaning, indicating involvement.\n(4) Denotes separation or movement away from a surface.\nChoose the correct matching pair:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-3, L-2, M-4", "J-4, K-2, L-1, M-3", "J-2, K-1, L-4, M-3", "J-1, K-2, L-3, M-4"], "answer": "J-1, K-2, L-3, M-4", "explanation": "J. 'Used to smoke' correctly matches with (1) 'Expresses a past habitual action or state'. Q. 'Must be tired' correctly matches with (2) 'Indicates a strong deduction or logical conclusion'. R. 'Interested in' correctly matches with (3) 'Follows an adjective to complete its meaning, indicating involvement'. S. 'Jumped off' correctly matches with (4) 'Denotes separation or movement away from a surface'. All pairings are accurate based on standard English grammar rules."}, {"id": 99, "section": "English Grammar", "question": "Match the modal/preposition with its primary function or typical context of use: List I (Modal/Preposition)\n(J) 'Shall'\n(K) 'Might'\n(L) 'Among'\n(M) 'Beside' List II (Function/Context)\n(1) Expresses a weaker possibility or suggestion.\n(2) Used for suggestions, offers, or formal future actions, especially with 'I' and 'we'.\n(3) Refers to being next to or at the side of something.\n(4) Used when referring to three or more distinct items or people.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-1, L-4, M-3", "J-3, K-1, L-4, M-2", "J-1, K-2, L-3, M-4", "J-2, K-4, L-1, M-3"], "answer": "J-2, K-1, L-4, M-3", "explanation": "J. 'Shall' (2) is used for suggestions, offers, or formal future actions, especially with 'I' and 'we'. Q. 'Might' (1) expresses a weaker possibility or suggestion. R. 'Among' (4) is used when referring to three or more distinct items or people. S. 'Beside' (3) refers to being next to or at the side of something. This matching correctly identifies the primary functions and contexts for each word."}, {"id": 100, "section": "English Grammar", "question": "Choose the most appropriate option to complete the sentence, paying close attention to the subtle difference in meaning: 'The old man was so weak that he ______ hardly walk without assistance.'", "brand": "bilaspurtestseries.com 9669946966", "options": ["may", "could", "would", "can"], "answer": "could", "explanation": "The sentence describes a past state ('was so weak') and a past ability or lack thereof. 'Could' is the past tense of 'can' and is used to express past ability. 'Can' refers to present ability. 'May' expresses possibility or permission. 'Would' is used for hypothetical situations or past habits. Therefore, 'could' is the only modal that correctly conveys past inability in this context."}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="VARG_1_ENGLISH_GRAMMAR_SPEEC_ENGLISH_GRAMMAR_ADJECTIVE_AND_RELA_";const TEST_TITLE="Varg_1_English_Grammar_Speech_Clauses_Modals_Prepositions_Week_1_Day_02_03_ENGLISH_GRAMMAR_DIRECT_INDIRECT_SPE";const CONTACT_WHATSAPP="9669946966";const PRINT_QR_TEXT="";const PRINT_QR_MESSAGE="";const LOGO_SRC="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDABsSFBcUERsXFhceHBsgKEIrKCUlKFE6PTBCYFVlZF9VXVtqeJmBanGQc1tdhbWGkJ6jq62rZ4C8ybqmx5moq6T/2wBDARweHigjKE4rK06kbl1upKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKT/wAARCANtA20DASIAAhEBAxEB/8QAGwABAQADAQEBAAAAAAAAAAAAAAEDBAUCBgf/xABLEAACAQIDBwEEBwUGBQMDBAMAAQIDEQQhMQUSQVFhcYGREyKh8BQyQlKxwdEVI2Jy4QYzU4KS8SQ0Q1STRFWDZHOiFiU1Y6
