</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo">AZAD</div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 Common_Foundation_CDP_Test_-_Week_1_Day_01_05_CDP_CDP_DEVELOPMENT_MEANIN</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "CDP", "question": "विकास के संबंध में, निम्नलिखित में से कौन सा कथन सबसे व्यापक और सटीक है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह गुणात्मक और मात्रात्मक दोनों परिवर्तनों को समाहित करता है, जो जीवनपर्यंत चलते हैं।", "यह केवल अधिगम के माध्यम से होता है।", "यह केवल शारीरिक परिवर्तनों तक सीमित है।", "यह केवल परिपक्वता का परिणाम है।"], "answer": "यह गुणात्मक और मात्रात्मक दोनों परिवर्तनों को समाहित करता है, जो जीवनपर्यंत चलते हैं।", "explanation": "विकास एक व्यापक प्रक्रिया है जिसमें शारीरिक, संज्ञानात्मक, सामाजिक, भावनात्मक आदि सभी आयामों में गुणात्मक (जैसे कौशल, समझ) और मात्रात्मक (जैसे ऊंचाई, वजन) दोनों प्रकार के परिवर्तन शामिल होते हैं। यह जन्म से मृत्यु तक निरंतर चलता रहता है। अन्य विकल्प विकास के केवल एक पहलू को दर्शाते हैं या गलत धारणा प्रस्तुत करते हैं।"}, {"id": 2, "section": "CDP", "question": "एक बच्चा साइकिल चलाना सीखता है। यह उदाहरण बाल विकास के किस पहलू से सबसे अधिक संबंधित है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल संज्ञानात्मक विकास", "परिपक्वता का परिणाम", "अधिगम के माध्यम से विकास", "केवल शारीरिक विकास"], "answer": "अधिगम के माध्यम से विकास", "explanation": "साइकिल चलाना सीखना एक कौशल है जो अभ्यास और अनुभव (अधिगम) के माध्यम से प्राप्त होता है। यह अधिगम बच्चे के शारीरिक समन्वय, संतुलन और स्थानिक समझ के विकास में योगदान देता है। विकल्प (a) और (b) अधूरे हैं क्योंकि इसमें शारीरिक और संज्ञानात्मक दोनों पहलू शामिल हैं, लेकिन मुख्य जोर अधिगम की प्रक्रिया पर है। विकल्प (d) गलत है क्योंकि यह केवल परिपक्वता का परिणाम नहीं है, बल्कि सक्रिय अधिगम का भी परिणाम है।"}, {"id": 3, "section": "CDP", "question": "बाल विकास के संदर्भ में, निम्नलिखित में से कौन सा कथन सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विकास एक सतत प्रक्रिया है जो जन्म से मृत्यु तक चलती है।", "विकास के सभी आयाम (शारीरिक, संज्ञानात्मक, सामाजिक) एक साथ और समान गति से विकसित होते हैं।", "विकास आनुवंशिकता और पर्यावरण की अंतःक्रिया का परिणाम है।", "विकास व्यक्तिगत भिन्नताओं को दर्शाता है।"], "answer": "विकास के सभी आयाम (शारीरिक, संज्ञानात्मक, सामाजिक) एक साथ और समान गति से विकसित होते हैं।", "explanation": "विकास के विभिन्न आयाम (शारीरिक, संज्ञानात्मक, सामाजिक, भावनात्मक) एक-दूसरे से जुड़े होते हैं और एक-दूसरे को प्रभावित करते हैं, लेकिन वे हमेशा एक साथ और समान गति से विकसित नहीं होते हैं। किसी बच्चे का शारीरिक विकास तेजी से हो सकता है जबकि उसका सामाजिक विकास थोड़ा धीमा हो सकता है, या इसके विपरीत। अन्य विकल्प विकास के मान्य सिद्धांतों को दर्शाते हैं।"}, {"id": 4, "section": "CDP", "question": "वृद्धि (Growth) और विकास (Development) के संदर्भ में, निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वृद्धि केवल मात्रात्मक परिवर्तनों को संदर्भित करती है, जबकि विकास में मात्रात्मक और गुणात्मक दोनों परिवर्तन शामिल होते हैं।", "वृद्धि एक व्यापक प्रक्रिया है जबकि विकास एक संकीर्ण प्रक्रिया है।", "विकास को मापा जा सकता है, लेकिन वृद्धि को नहीं।", "वृद्धि जीवनपर्यंत चलती है, जबकि विकास एक निश्चित आयु तक होता है।"], "answer": "वृद्धि केवल मात्रात्मक परिवर्तनों को संदर्भित करती है, जबकि विकास में मात्रात्मक और गुणात्मक दोनों परिवर्तन शामिल होते हैं।", "explanation": "वृद्धि मुख्य रूप से शारीरिक आकार, वजन आदि में होने वाले मात्रात्मक परिवर्तनों को दर्शाती है, जो एक निश्चित आयु तक होते हैं। इसके विपरीत, विकास एक व्यापक अवधारणा है जिसमें शारीरिक, संज्ञानात्मक, सामाजिक, भावनात्मक आदि सभी आयामों में होने वाले मात्रात्मक और गुणात्मक दोनों परिवर्तन शामिल होते हैं, और यह जीवनपर्यंत चलने वाली प्रक्रिया है।"}, {"id": 5, "section": "CDP", "question": "पियाजे के संज्ञानात्मक विकास के सिद्धांत के अनुसार, 'संवेदी-गामक अवस्था' (Sensorimotor Stage) में बच्चे मुख्य रूप से किसके माध्यम से सीखते हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["इंद्रियों और शारीरिक क्रियाओं", "प्रतीकात्मक विचार", "अमूर्त सोच", "तार्किक तर्क"], "answer": "इंद्रियों और शारीरिक क्रियाओं", "explanation": "पियाजे के सिद्धांत के अनुसार, संवेदी-गामक अवस्था (जन्म से 2 वर्ष) में शिशु अपनी इंद्रियों (देखना, सुनना, छूना) और शारीरिक क्रियाओं (पकड़ना, चूसना) के माध्यम से दुनिया को समझते हैं और सीखते हैं। अमूर्त सोच, प्रतीकात्मक विचार और तार्किक तर्क बाद की अवस्थाओं की विशेषताएँ हैं।"}, {"id": 6, "section": "CDP", "question": "एक बच्चा जो पहले आग से जलने के बाद अब आग के पास जाने से डरता है, यह किस प्रकार के अधिगम का उदाहरण है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अनुभवजन्य अधिगम", "आनुवंशिक प्रवृत्ति", "परिपक्वता", "सहज क्रिया"], "answer": "अनुभवजन्य अधिगम", "explanation": "अधिगम व्यवहार में अपेक्षाकृत स्थायी परिवर्तन है जो अनुभव या अभ्यास के परिणामस्वरूप होता है। इस स्थिति में, बच्चे ने आग से जलने के अपने अनुभव से सीखा है कि आग खतरनाक है, जिससे उसके व्यवहार में परिवर्तन आया है (आग से डरना)। यह परिपक्वता या सहज क्रिया नहीं है, न ही यह केवल आनुवंशिक प्रवृत्ति है, बल्कि यह सीधे अनुभव से जुड़ा अधिगम है।"}, {"id": 7, "section": "CDP", "question": "एक शिक्षिका अपने छात्रों को ऐसे कार्य देती है जो वे अकेले तो नहीं कर सकते, लेकिन किसी वयस्क या अधिक जानकार साथी की मदद से आसानी से कर पाते हैं। वायगोत्स्की के किस सिद्धांत का उपयोग शिक्षिका कर रही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शास्त्रीय अनुबंधन", "नैतिक विकास", "स्कीमा निर्माण", "निकटस्थ विकास का क्षेत्र (ZPD)"], "answer": "निकटस्थ विकास का क्षेत्र (ZPD)", "explanation": "वायगोत्स्की का निकटस्थ विकास का क्षेत्र (ZPD) उस अंतर को संदर्भित करता है जो एक बच्चा अकेले क्या कर सकता है और एक वयस्क या अधिक कुशल साथी के मार्गदर्शन में क्या कर सकता है, के बीच होता है। शिक्षिका छात्रों को उनकी ZPD में काम करने का अवसर दे रही है, जिससे वे अपनी क्षमता से थोड़ा ऊपर के कार्यों को सीख सकें। स्कीमा निर्माण पियाजे से संबंधित है, नैतिक विकास कोहलबर्ग से, और शास्त्रीय अनुबंधन पावलोव से संबंधित है।"}, {"id": 8, "section": "CDP", "question": "एक बच्चा जो अभी तक चलना नहीं सीख पाया है, उसे दौड़ने के लिए प्रोत्साहित करना किस विकासात्मक सिद्धांत का उल्लंघन करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विकास व्यक्तिगत होता है।", "विकास परिपक्वता और अधिगम पर निर्भर करता है।", "विकास एक सतत प्रक्रिया है।", "विकास सामान्य से विशिष्ट की ओर बढ़ता है।"], "answer": "विकास परिपक्वता और अधिगम पर निर्भर करता है।", "explanation": "चलना सीखने के लिए बच्चे में पर्याप्त शारीरिक परिपक्वता (जैसे मांसपेशियों का नियंत्रण, संतुलन) का होना आवश्यक है। जब तक बच्चा शारीरिक रूप से चलने के लिए परिपक्व नहीं होता, तब तक उसे दौड़ने के लिए प्रोत्साहित करना या सिखाना अप्रभावी और हानिकारक हो सकता है। यह सिद्धांत बताता है कि अधिगम तभी प्रभावी होता है जब बच्चा विकासात्मक रूप से उस कार्य के लिए तैयार हो। अन्य विकल्प भी विकास के सिद्धांत हैं, लेकिन इस विशिष्ट परिदृश्य में परिपक्वता और अधिगम की अंतःनिर्भरता सबसे उपयुक्त है।"}, {"id": 9, "section": "CDP", "question": "बाल विकास के सामान्य सिद्धांतों के संबंध में, निम्नलिखित में से कौन सा कथन असत्य है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विकास सामान्य से विशिष्ट प्रतिक्रियाओं की ओर बढ़ता है।", "विकास परिपक्वता और अधिगम दोनों का परिणाम है।", "विकास एक व्यवस्थित और अनुक्रमिक प्रक्रिया है।", "विकास की दर सभी बच्चों में समान होती है।"], "answer": "विकास की दर सभी बच्चों में समान होती है।", "explanation": "विकास की दर सभी बच्चों में समान नहीं होती है; यह व्यक्तिगत भिन्नताओं के कारण अलग-अलग होती है। प्रत्येक बच्चे की अपनी गति और पैटर्न होता है, हालांकि विकास के सामान्य चरण समान रहते हैं। अन्य सभी कथन विकास के मान्य सिद्धांत हैं: विकास एक व्यवस्थित और अनुक्रमिक प्रक्रिया है, यह सामान्य से विशिष्ट की ओर बढ़ता है, और यह परिपक्वता और अधिगम दोनों की अंतःक्रिया का परिणाम है।"}, {"id": 10, "section": "CDP" े हैं। इसलिए, सही कालानुक्रमिक क्रम J, K, L, M है।"}, {"id": 36, "section": "CDP", "question": "बच्चों में भाषा विकास के निम्नलिखित चरणों को उनके घटित होने के सही कालानुक्रमिक क्रम में व्यवस्थित करें:\nJ: बबलाना (Babbling) और कूइंग (Cooing) की शुरुआत।\nK: एक-शब्द के वाक्य (One-word utterances) का प्रयोग।\nL: दो-शब्द के वाक्य (Two-word phrases) का प्रयोग।\nM: व्याकरणिक रूप से जटिल वाक्यों (Grammatically complex sentences) का निर्माण।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "L, J, K, M", "K, J, L, M", "J, L, K, M"], "answer": "J, K, L, M", "explanation": "बच्चों में भाषा विकास एक व्यवस्थित और कालानुक्रमिक प्रक्रिया का अनुसरण करता है: 1. J. बबलाना (Babbling) और कूइंग (Cooing) की शुरुआत: यह भाषा विकास का सबसे प्रारंभिक चरण है, जो आमतौर पर जन्म से 6 महीने की उम्र के बीच होता है। कूइंग में स्वर ध्वनियाँ (जैसे 'ऊह', 'आह') शामिल होती हैं, जबकि बबलाना में व्यंजन और स्वर ध्वनियों का दोहराव (जैसे 'बा-बा-बा', 'दा-दा-दा') शामिल होता है। 2. K. एक-शब्द के वाक्य (One-word utterances) का प्रयोग: लगभग 10-14 महीने की उम्र में, बच्चे अपने पहले सार्थक शब्द बोलना शुरू करते हैं, जो अक्सर एक पूरे विचार या इच्छा को व्यक्त करने के लिए एक ही शब्द का उपयोग करते हैं (जैसे 'पानी' का अर्थ 'मुझे पानी चाहिए')। इसे होलोफ्रेस्टिक स्टेज भी कहते हैं। 3. L. दो-शब्द के वाक्य (Two-word phrases) का प्रयोग: लगभग 18-24 महीने की उम्र में, बच्चे दो शब्दों को जोड़कर सरल वाक्य बनाना शुरू करते हैं (जैसे 'मम्मी पानी', 'और दूध')। इसे टेलीग्राफिक स्पीच भी कहा जाता है क्योंकि इसमें केवल आवश्यक शब्द ही होते हैं। 4. M. व्याकरणिक रूप से जटिल वाक्यों (Grammatically complex sentences) का निर्माण: 2-3 वर्ष की उम्र और उसके बाद, बच्चे धीरे-धीरे अधिक जटिल वाक्य संरचनाओं, व्याकरणिक नियमों और बहु-शब्द वाक्यों का उपयोग करना शुरू कर देते हैं, जिससे उनकी भाषा अधिक परिष्कृत और धाराप्रवाह हो जाती है। इसलिए, सही कालानुक्रमिक क्रम J, K, L, M है।"}, {"id": 37, "section": "CDP", "question": "निम्नलिखित विकास के सिद्धांतों को उनकी विशेषताओं से सुमेलित करें: सूची-I (सिद्धांत):\n(J) मस्तकाधोमुखी सिद्धांत\n eriod) − 1. यह विकास का वह चरण है जब कोई विशेष कौशल या विशेषता सबसे आसानी से सीखी जाती है, लेकिन बाद में भी संभव है। संवेदनशील अवधि विकास का वह समय होता है जब कोई व्यक्ति किसी विशेष कौशल या विशेषता को सीखने के लिए सबसे अधिक ग्रहणशील होता है। इस अवधि के दौरान सीखना आसान और अधिक प्रभावी होता है, लेकिन यदि इस अवधि में सीखना नहीं होता है, तो भी बाद में कुछ हद तक सीखना संभव है (हालांकि यह अधिक कठिन या कम पूर्ण हो सकता है)। यह 'महत्वपूर्ण अवधि' (critical period) से भिन्न है, जहाँ यदि सीखना एक निश्चित समय-सीमा के भीतर नहीं होता है, तो वह कभी नहीं हो सकता। C. प्राथमिक समाजीकरण (Primary Socialisation) − 3. यह परिवार के भीतर होता है और बच्चे के व्यक्तित्व और बुनियादी सामाजिक कौशल के निर्माण में महत्वपूर्ण भूमिका निभाता है। प्राथमिक समाजीकरण वह प्रारंभिक प्रक्रिया है जिसके माध्यम से बच्चे अपने परिवार के सदस्यों के साथ बातचीत करके समाज के बुनियादी मानदंडों, मूल्यों और व्यवहारों को सीखते हैं। यह बच्चे के व्यक्तित्व की नींव रखता है और उसे बुनियादी सामाजिक कौशल प्रदान करता है जो भविष्य के सामाजिक अंतःक्रियाओं के लिए आवश्यक हैं। D. सहकर्मी समूह का प्रभाव (Peer Group Influence) − 4. यह किशोरावस्था के दौरान सामाजिक मानदंडों, मूल्यों और पहचान के विकास में महत्वपूर्ण भूमिका निभाता है, अक्सर परिवार के प्रभाव को चुनौती देता है। सहकर्मी समूह (समान आयु और सामाजिक स्थिति के लोग) विशेष रूप से किशोरावस्था के दौरान समाजीकरण में महत्वपूर्ण भूमिका निभाते हैं। इस चरण में, व्यक्ति अक्सर अपने सहकर्मी समूह से अनुमोदन और पहचान चाहते हैं, जिससे उनके सामाजिक मानदंडों, मूल्यों और व्यक्तिगत पहचान का विकास होता है। यह प्रभाव कभी-कभी पारिवारिक मूल्यों और अपेक्षाओं को चुनौती दे सकता है। अतः, सही सुमेलन है: J-2, K-1, L-3, M-4।"}, {"id": 57, "section": "CDP", "question": "सूची-I में दी गई अवधारणाओं को सूची-II में उनके विवरण से सुमेलित करें: सूची-I (अवधारणा):\n(J) जीन\n(K) फेनोटाइप\n(L) समाजीकरण\n(M) प्रकृति बनाम पोषण सूची-II (विवरण):\n(1) आनुवंशिकता और वातावरण के सापेक्ष योगदान पर बहस\n(2) व्यक्ति के अवलोकन योग्य लक्षण\n(3) आनुवंशिकता की मूल इकाई\n(4) सामाजिक मानदंडों और मूल्यों को सीखने की प्रक्रिया\nसही विक  (K-3), (L-1), (M-4)", "(J-4), (K-3), (L-2), (M-1)", "(J-3), (K-2), (L-1), (M-4)", "(J-2), (K-1), (L-3), (M-4)"], "answer": "(J-2), (K-3), (L-1), (M-4)", "explanation": "सही सुमेलन इस प्रकार है: A. अंतर्ज्ञान बनाम तार्किक तर्क (संज्ञानात्मक विकास): यह अवधारणा संज्ञानात्मक विकास से संबंधित है क्योंकि यह सोचने के तरीकों, समस्या-समाधान और तर्क क्षमता में बदलाव को दर्शाती है। जीन पियाजे के संज्ञानात्मक विकास के सिद्धांत में, बच्चे पहले अंतर्ज्ञान पर अधिक निर्भर करते हैं और फिर धीरे-धीरे तार्किक और अमूर्त तर्क विकसित करते हैं। यह संज्ञानात्मक प्रक्रियाओं के विकास का एक महत्वपूर्ण पहलू है। B. पहचान संकट और भूमिका भ्रम (सामाजिक-भावनात्मक विकास): यह एरिक एरिकसन के मनोसामाजिक विकास के सिद्धांत का एक केंद्रीय पहलू है, विशेष रूप से किशोरावस्था के दौरान। यह सामाजिक-भावनात्मक विकास के क्षेत्र में आता है क्योंकि इसमें आत्म-अवधारणा का निर्माण, सामाजिक भूमिकाओं की समझ, व्यक्तिगत पहचान की खोज और भावनात्मक स्थिरता शामिल होती है। C. सूक्ष्म गत्यात्मक कौशल का समन्वय (शारीरिक विकास): यह शारीरिक विकास का एक स्पष्ट घटक है। सूक्ष्म गत्यात्मक कौशल में छोटी मांसपेशियों का उपयोग करके सटीक और समन्वित गतिविधियाँ करना शामिल है, जैसे लिखना, बटन लगाना, चित्र बनाना या किसी वस्तु को पकड़ना। इन कौशलों का विकास बच्चे के शारीरिक परिपक्वता और तंत्रिका तंत्र के समन्वय पर निर्भर करता है। D. नैतिक दुविधाओं पर सामाजिक-सांस्कृतिक प्रभाव (नैतिक विकास): यह नैतिक विकास से संबंधित है। लॉरेंस कोहलबर्ग के नैतिक विकास के सिद्धांत में, व्यक्ति नैतिक दुविधाओं का सामना करते हैं और उनके निर्णय सामाजिक और सांस्कृतिक संदर्भों से प्रभावित होते हैं। यह दर्शाता है कि नैतिक तर्क केवल व्यक्तिगत नहीं बल्कि सामाजिक कारकों से भी आकार लेता है, और विभिन्न संस्कृतियों में नैतिक मूल्यों की व्याख्या भिन्न हो सकती है।"}, {"id": 77, "section": "CDP", "question": "सूची-I (डोमेन)\nसूची-II (विकासात्मक विशेषता)\n(J) शारीरिक विकास\n(1) अमूर्त सोच\n(K) संज्ञानात्मक विकास\n(2) आत्म-नियमन\n(L) सामाजिक-भावनात्मक विकास\n(3) सकल गत्यात्मक कौशल\n(M) भाषाई विकास\n(4) शब्दावली का विस्तार\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 96699469 ions": ["बाह्य मूल्यांकन", "योगात्मक मूल्यांकन", "स्व-मूल्यांकन और सहकर्मी मूल्यांकन", "मानकीकृत मूल्यांकन"], "answer": "स्व-मूल्यांकन और सहकर्मी मूल्यांकन", "explanation": "जब छात्रों को अपने स्वयं के काम का मूल्यांकन करने के लिए कहा जाता है, तो यह स्व-मूल्यांकन (Self-assessment) होता है, और जब वे अपने साथियों के काम का मूल्यांकन करते हैं, तो यह सहकर्मी मूल्यांकन (Peer-assessment) होता है। ये दोनों मूल्यांकन के प्रकार छात्रों में आलोचनात्मक सोच, जिम्मेदारी और सीखने की प्रक्रिया में सक्रिय भागीदारी को बढ़ावा देते हैं।"}, {"id": 87, "section": "CDP", "question": "एक समावेशी कक्षा में मूल्यांकन का उद्देश्य क्या होना चाहिए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों को उनकी अक्षमताओं के आधार पर वर्गीकृत करना।", "सभी छात्रों की सीखने की शैलियों और आवश्यकताओं को समझना और तदनुसार शिक्षण को समायोजित करना।", "मानकीकृत परीक्षणों के माध्यम से छात्रों की तुलना करना।", "केवल विशेष आवश्यकता वाले छात्रों की पहचान करना।"], "answer": "सभी छात्रों की सीखने की शैलियों और आवश्यकताओं को समझना और तदनुसार शिक्षण को समायोजित करना।", "explanation": "एक समावेशी कक्षा में मूल्यांकन का मुख्य उद्देश्य प्रत्येक छात्र की अद्वितीय सीखने की शैलियों, शक्तियों और आवश्यकताओं को समझना है, चाहे वे विशेष आवश्यकता वाले हों या नहीं। इसका लक्ष्य शिक्षण रणनीतियों को व्यक्तिगत आवश्यकताओं के अनुरूप ढालना है ताकि सभी छात्र अपनी पूरी क्षमता तक पहुँच सकें। छात्रों को वर्गीकृत करना या तुलना करना समावेशी शिक्षा के सिद्धांतों के विरुद्ध है।"}, {"id": 88, "section": "CDP", "question": "एक शिक्षक ने छात्रों को एक निबंध लिखने के लिए कहा और फिर उन्हें निबंध के विभिन्न पहलुओं (जैसे सामग्री, संगठन, व्याकरण) पर विस्तृत प्रतिक्रिया दी। यह किस प्रकार के मूल्यांकन और उसके निहितार्थों को दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["रचनात्मक मूल्यांकन, जिसका उद्देश्य सीखने में सुधार के लिए प्रतिक्रिया प्रदान करना है।", "योगात्मक मूल्यांकन, जिसका उद्देश्य अंतिम ग्रेड देना है।", "मानदंड-संदर्भित मूल्यांकन, जिसका उद्देश्य पूर्व-निर्धारित मानकों के खिलाफ प्रदर्शन का आकलन करना ह  का आकलन करता है।", "दोनों मूल्यांकन प्रकारों का उद्देश्य छात्रों को ग्रेड देना है।"], "answer": "मानदंड-संदर्भित मूल्यांकन पूर्व-निर्धारित मानकों के खिलाफ प्रदर्शन का आकलन करता है, जबकि मानक-संदर्भित मूल्यांकन छात्रों की तुलना समूह से करता है।", "explanation": "मानदंड-संदर्भित मूल्यांकन में, छात्र के प्रदर्शन का आकलन पूर्व-निर्धारित सीखने के लक्ष्यों या मानकों के एक सेट के खिलाफ किया जाता है। इसके विपरीत, मानक-संदर्भित मूल्यांकन में, छात्र के प्रदर्शन की तुलना एक बड़े संदर्भ समूह (जैसे अन्य छात्रों) के प्रदर्शन से की जाती है। यह दोनों मूल्यांकन प्रकारों के बीच का मूलभूत अंतर है।"}, {"id": 91, "section": "CDP", "question": "अभिकथन (A): रचनात्मक मूल्यांकन शिक्षण-अधिगम प्रक्रिया का एक महत्वपूर्ण हिस्सा है।\nकारण (R): यह छात्रों को उनकी सीखने की प्रगति के बारे में तत्काल प्रतिक्रिया प्रदान करता है और शिक्षकों को अपनी शिक्षण रणनीतियों को समायोजित करने में मदद करता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सही हैं, लेकिन R, A की सही व्याख्या नहीं करता है।", "A और R दोनों सही हैं, और R, A की सही व्याख्या करता है।", "कथन A गलत है, लेकिन R सही है।", "कथन A सही है, लेकिन R गलत है।"], "answer": "A और R दोनों सही हैं, और R, A की सही व्याख्या करता है।", "explanation": "अभिकथन (A) सही है क्योंकि रचनात्मक मूल्यांकन वास्तव में शिक्षण-अधिगम प्रक्रिया का एक अभिन्न अंग है। कारण (R) भी सही है क्योंकि रचनात्मक मूल्यांकन का मुख्य उद्देश्य छात्रों को तत्काल प्रतिक्रिया देना और शिक्षकों को अपनी शिक्षण विधियों को छात्रों की आवश्यकताओं के अनुसार ढालने में मदद करना है। इस प्रकार, कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 92, "section": "CDP", "question": "अभिकथन (A): मूल्यांकन को केवल छात्रों की याद रखने की क्षमता का परीक्षण करना चाहिए।\nकारण (R): याद रखना सीखने का सबसे महत्वपूर्ण पहलू है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सही हैं, और R, A की सही व्याख्या करता है।", "A और R दोनों गलत हैं।", "कथन A सही है, लेकिन R गलत है।", "A और R दोनों सही हैं, लेकिन R, A की सही व्याख्या नहीं करता है।"], "answer": "A और R दोनों गलत हैं।", "explanation": "अभिकथन (A) गलत है क्योंकि मूल्यांकन को केवल याद रखने की क्षमता का परीक्षण नहीं करना चाहिए, बल्कि समझ, अनुप्रयोग, विश्लेषण, संश्लेषण और मूल्यांकन जैसे उच्च-स्तरीय सोच कौशल का भी परीक्षण करना चाहिए। कारण (R) भी गलत है क्योंकि याद रखना सीखने का एक पहलू है, लेकिन यह सबसे महत्वपूर्ण पहलू नहीं है; समझ और अनुप्रयोग अधिक महत्वपूर्ण हैं।"}, {"id": 93, "section": "CDP", "question": "एक शिक्षक अपनी कक्षा में छात्रों के सीखने के परिणामों को बेहतर बनाने के लिए मूल्यांकन का उपयोग करना चाहता है। इस संदर्भ में, निम्नलिखित में से कौन से कथन सही हैं?\nJ: मूल्यांकन को केवल ग्रेड देने के लिए उपयोग किया जाना चाहिए।\nK: मूल्यांकन को छात्रों की सीखने की कठिनाइयों की पहचान करने में मदद करनी चाहिए।\nL: मूल्यांकन को छात्रों को अपनी प्रगति पर विचार करने के अवसर प्रदान करने चाहिए।\nM: मूल्यांकन को शिक्षकों को अपनी शिक्षण विधियों को संशोधित करने के लिए जानकारी देनी चाहिए।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M", "केवल J, K और L", "केवल K, L और M", "केवल K और M"], "answer": "केवल K, L और M", "explanation": "कथन J गलत है क्योंकि मूल्यांकन का उद्देश्य केवल ग्रेड देना नहीं है, बल्कि सीखने में सुधार करना भी है। कथन K, L और M सभी सही हैं। मूल्यांकन छात्रों की कठिनाइयों को पहचानने (K), उन्हें अपनी प्रगति पर विचार करने (L) और शिक्षकों को अपनी शिक्षण विधियों को समायोजित करने (M) में मदद करता है, जिससे सीखने के परिणामों में सुधार होता है।"}, {"id": 94, "section": "CDP", "question": "निम्नलिखित में से कौन से कथन एक प्रभावी कक्षा मूल्यांकन प्रणाली के लिए सबसे उपयुक्त हैं?\nJ: यह छात्रों के बीच प्रतिस्पर्धा को बढ़ावा देता है।\nK: यह छात्रों को सीखने के लिए आंतरिक रूप से प्रेरित करता है।\nL: यह छात्रों की विविध आवश्यकताओं के प्रति संवेदनशील होता है।\nM: यह केवल उच्च उपलब्धि प्राप्त करने वाले छात्रों पर केंद्रित होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M", "केवल K और L", "केवल J, K और L", "केवल L और M"], "answer": "केवल K और L", "explanation": "एक प्रभावी कक्षा मूल्यांकन प्रणाली छात्रों को आंतरिक रूप स
