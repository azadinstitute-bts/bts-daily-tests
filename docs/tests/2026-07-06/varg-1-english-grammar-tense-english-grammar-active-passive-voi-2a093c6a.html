he police officer.\nM: The problem was discussed about by the committee.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and M only", "J and M only", "All J, K, L, and M", "K and L only"], "answer": "J and M only", "explanation": "J is incorrect: 'Arrive' is an intransitive verb and cannot be passivized. The correct active sentence would be 'The package arrived yesterday.' K is correct: This is a grammatically correct present continuous passive sentence. L is correct: This is a grammatically correct past simple passive sentence. M is incorrect: The preposition 'about' is redundant after 'discussed' when 'the problem' is the direct object. The correct passive would be 'The problem was discussed by the committee.'"}, {"id": 57, "section": "English Grammar", "question": "Classify the following sentences as either Active (A) or Passive (P) voice:\nJ: The door remained locked.\nK: The report was submitted on time.\nL: She felt tired after the long journey.\nM: The decision has been made.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-A, K-A, L-J, M-A", "J-J, K-J, L-A, M-J", "J-J, K-A, L-J, M-A", "J-A, K-J, L-A, M-J"], "answer": "J-A, K-J, L-A, M-J", "explanation": "J. 'The door remained locked.' - Active. 'Locked' is a predicate adjective describing the state of the door, following the linking verb 'remained.' K. 'The report was submitted on time.' - Passive. 'Was submitted' is a 'be' verb + past participle, and 'the report' is the recipient of the action. L. 'She felt tired after the long journey.' - Active. 'Felt' is a linking verb, and 'tired' is a predicate adjective describing 'She.' M. 'The decision has been made.' - Passive. 'Has been made' is a 'be' verb + past participle construction, and 'the decision' is the recipient of the action."}, {"id": 58, "section": "English Grammar", "question": "Match the active voice sentences in List-I with their correct passive voice transformations in List-II: List-I\n(J) Someone has stolen my wallet.\n(K) They are painting the house.\n(L) We must finish the work by tomorrow.\n(M) The news surprised everyone. List-II\n(1) Everyone was surprised by the news.\n(2) My wallet has been stolen.\n(3) The house is being painted.\n(4) The work must be finished by tomorrow.\nChoose the correct matching:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-3, L-4, M-1", "J-2, K-4, L-3, M-1", "J-3, K-2, L-1, M-4", "J-1, K-3, L-4, M-2"], "answer": "J-2, K-3, L-4, M-1", "explanation": "Someone has stolen my wallet → My wallet has been stolen, so J-2. They are painting the house → The house is being painted, so K-3. We must finish the work by tomorrow → The work must be finished by tomorrow, so L-4. The news surprised everyone → Everyone was surprised by the news, so M-1."}, {"id": 59, "section": "English Grammar", "question": "Arrange the following steps in the correct chronological order for converting an active voice sentence into a passive voice sentence:\nJ: Identify the direct object of the active sentence.\nK: Place the original subject (agent) in a 'by' phrase (optional).\nL: Change the main verb to its past participle form and add an appropriate 'be' verb.\nM: Make the direct object the new subject of the sentence.", "brand": "bilaspurtestseries.com 9669946966", "options": ["M, L, J, K", "J, L, M, K", "J, M, L, K", "M, J, L, K"], "answer": "J, M, L, K", "explanation": "The correct sequence for converting an active sentence to passive voice is: J. First, identify the direct object of the active sentence. M. Next, make this identified direct object the new subject of the sentence. L. Then, change the main verb to its past participle form and add the correct form of the 'be' verb. K. Finally, if the agent is important, place the original subject in a 'by' phrase (this step is optional)."}, {"id": 60, "section": "English Grammar", "question": "Which of the following sentences correctly uses the passive voice, even though the agent performing the action is not explicitly mentioned?", "brand": "bilaspurtestseries.com 9669946966", "options": ["The cake was baked this morning.", "Birds sing beautiful songs.", "He became a doctor last year.", "The sun rises in the east."], "answer": "The cake was baked this morning.", "explanation": "In option B, 'The cake was baked this morning,' the verb 'was baked' is in the passive voice (form of 'be' + past participle). The agent (who baked the cake) is not mentioned, which is a common and grammatically correct use of the passive voice when the agent is unknown, unimportant, or obvious from context. Options A, C, and D are all in the active voice. 'Rises,' 'sing,' and 'became' are active verbs where the subjects ('sun,' 'birds,' 'he') are performing the action."}, {"id": 61, "section": "English Grammar", "question": "Which of the following correctly describes the fundamental structure of a passive voice sentence involving a modal verb?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Modal verb + having + main verb (past participle)", "Modal verb + be + main verb (past participle)", "Modal verb + main verb (past participle)", "Modal verb + been + main verb (past participle)"], "answer": "Modal verb + be + main verb (past participle)", "explanation": "The core structure for forming the passive voice with a modal verb is 'modal verb + be + past participle of the main verb'. This construction ensures that the action is received by the subject, and the modal verb expresses possibility, necessity, or permission. Options A, C, and D represent incorrect or incomplete passive structures for modal verbs."}, {"id": 62, "section": "English Grammar", "question": "Which statement accurately describes a grammatical rule for forming passive imperative sentences?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Passive imperatives are formed by using \"Let + object + be + past participle.\"", "Passive imperatives always begin with \"You must\" followed by the passive structure.", "The main verb in a passive imperative is always in its base form.", "Passive imperatives can only be used for negative commands."], "answer": "Passive imperatives are formed by using \"Let + object + be + past participle.\"", "explanation": "The standard and most common way to form a passive imperative is using the structure \"Let + object + be + past participle.\" For example, \"Let the door be opened.\" Options B, C, and D describe incorrect or limited rules for passive imperatives; they do not always start with \"You must,\" the main verb is in past participle form, and they can be used for both positive and negative commands."}, {"id": 63, "section": "English Grammar", "question": "What is the correct passive structure for a sentence containing a modal perfect verb (e.g., 'should have done')?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Modal + had + been + past participle", "Modal + be + past participle", "Modal + have + being + past participle", "Modal + have + been + past participle"], "answer": "Modal + have + been + past participle", "explanation": "When a modal verb is used in the perfect tense (e.g., should have, might have), its passive form follows the structure 'modal + have + been + past participle'. For example, 'The letter should have been sent.'"}, {"id": 64, "section": "English Grammar", "question": "Which statement is true regarding the passive voice of imperative sentences?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Imperative passive sentences always begin with \"Let's\".", "The passive form of an imperative sentence typically uses \"Let + object + be + past participle\".", "Imperative passive sentences can only be formed for negative commands.", "The subject \"you\" is always explicitly stated in imperative passive sentences."], "answer": "The passive form of an imperative sentence typically uses \"Let + object + be + past participle\".", "explanation": "The standard structure for forming the passive voice of an imperative sentence is \"Let + object + be + past participle.\" For example, \"Close the door\" becomes \"Let the door be closed.\" Option A is incorrect as \"Let's\" implies a suggestion, not a command. Option C is incorrect as both positive and negative commands can be made passive. Option D is incorrect as the implied subject \"you\" is not explicitly stated in the passive imperative."}, {"id": 65, "section": "English Grammar", "question": "What is the primary communicative purpose of using a passive voice construction like \"The decision might have been made by the committee\" instead of \"The committee might have made the decision\"?", "brand": "bilaspurtestseries.com 9669946966", "options": ["To express a stronger sense of certainty about the action.", "To make the sentence more concise and direct.", "To emphasize the committee as the agent of the action.", "To shift focus from the agent (the committee) to the action or its recipient (the decision)."], "answer": "To shift focus from the agent (the committee) to the action or its recipient (the decision).", "explanation": "The primary purpose of passive voice is to emphasize the action or the recipient of the action, rather than the agent. In this example, \"the decision\" becomes the subject, highlighting its importance over \"the committee\" which is the agent. Option A is incorrect as it would be achieved by active voice, and options B and D are generally not true for passive constructions."}, {"id": 66, "section": "English Grammar", "question": "Transform the following active sentence into its correct passive voice: \"They should have informed us about the change in schedule.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["We should be informed about the change in schedule.", "We should have been informed about the change in schedule by them.", "The change in schedule should have been informed to us by them.", "We should have informed about the change in schedule."], "answer": "We should have been informed about the change in schedule by them.", "explanation": "To transform an active sentence with a perfect modal into passive voice, the object of the active sentence (\"us\") becomes the subject (\"We\"). The structure becomes \"modal + have + been + past participle\" (\"should have been informed\"). The original subject (\"they\") can be included as an agent (\"by them\"). Option B incorrectly makes \"the change in schedule\" the subject, and options C and D use incorrect verb forms or omit necessary parts of the passive structure."}, {"id": 67, "section": "English Grammar", "question": "Choose the correct passive voice transformation for the sentence: \"They should have completed the project by now.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["The project should have completed by them by now.", "The project should be completed by them by now.", "The project should have been completed by them by now.", "The project must have been completed by them by now."], "answer": "The project should have been completed by them by now.", "explanation": "The original sentence uses a modal perfect verb ('should have completed'). To transform this into the passive voice, the structure 'modal + have + been + past participle' is required. 'The project' becomes the subject, and 'completed' is the past participle. Therefore, 'The project should have been completed by them by now' is the correct passive form."}, {"id": 68, "section": "English Grammar", "question": "Select the most appropriate passive voice transformation for the imperative sentence: \"Do not touch the exhibits.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["Let the exhibits not be touched.", "The exhibits must not be touched.", "The exhibits should not be touched.", "You are ordered not to touch the exhibits."], "answer": "Let the exhibits not be touched.", "explanation": "For imperative sentences, especially negative ones, the passive voice is typically formed using \"Let + object + not + be + past participle.\" While options A, C, and D convey a similar meaning, option B directly transforms the imperative structure into its standard passive form. \"Let the exhibits not be touched\" is the most direct and grammatically correct passive imperative."}, {"id": 69, "section": "English Grammar", "question": "Consider the following statements regarding the passive voice with modal verbs: I. \"Must be done\" implies a stronger obligation than \"should be done.\" II. \"Might have been seen\" suggests a past possibility, while \"might be seen\" suggests a present or future possibility. III. \"Ought to be completed\" is grammatically incorrect; \"should be completed\" must be used instead. Which of the statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["I and III only", "I, II, and III", "I and II only", "II and III only"], "answer": "I and II only", "explanation": "Statement I is correct: \"must\" conveys a stronger obligation or necessity than \"should.\" Statement II is also correct: the perfect infinitive \"have been seen\" indicates a past possibility, whereas the simple infinitive \"be seen\" indicates present or future possibility. Statement III is incorrect; \"ought to be completed\" is grammatically correct and conveys a moral obligation or strong recommendation, similar to \"should be completed\" but with a slightly different nuance."}, {"id": 70, "section": "English Grammar", "question": "Consider the following statements regarding passive voice constructions: I. The sentence \"The report must be submitted by Friday\" is an example of a modal passive voice. II. The passive form of \"Someone might have stolen my wallet\" is \"My wallet might have been stolen.\" III. Imperative sentences like \"Open the window\" can be made passive as \"Let the window be opened.\" IV. The structure \"subject + modal + be + being + past participle\" is used for continuous modal passive. Which of the above statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["II, III, and IV only", "All of the above", "I, II, and III only", "I, II, and IV only"], "answer": "All of the above", "explanation": "I. Correct. \"The report must be submitted by Friday\" uses the modal \"must\" followed by \"be + past participle (submitted)\", which is the correct structure for modal passive voice. II. Correct. \"Someone might have stolen my wallet\" is an active modal perfect sentence. Its passive form correctly uses the structure: modal verb ('might') + 'have been' + past participle ('stolen'). III. Correct. Imperative sentences are typically made passive using the structure \"Let + object + be + past participle.\" \"Open the window\" becomes \"Let the window be opened.\" IV. Correct. The structure \"subject + modal + be + being + past participle\" is indeed the grammatical form for the continuous modal passive voice (e.g., \"The house might be being built\"). While this construction is often considered awkward and is less common in everyday speech, it is grammatically valid and therefore 'used' in the sense of being a possible and correct structure."}, {"id": 71, "section": "English Grammar", "question": "Assertion (A): The sentence \"The ancient manuscript might have been preserved in the monastery\" is an appropriate use of passive voice.\nReason (R):: The passive voice is used here because the agent of preservation is unknown or less important than the fact of the manuscript's preservation, and the modal perfect indicates a past possibility.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is not the correct explanation of A.", "A is true, but R is false.", "Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "The assertion is true; the sentence is a grammatically correct and contextually appropriate use of the passive voice with a perfect modal. The reason accurately explains why this passive construction is chosen: to de-emphasize an unknown or unimportant agent and to express a past possibility, which is precisely what the modal perfect passive achieves. Therefore, R correctly explains A."}, {"id": 72, "section": "English Grammar", "question": "Assertion (A): A passive voice construction with a perfect modal verb always indicates an action that was completed in the past and has a direct result in the present.\nReason (R):: The structure \"modal + have + been + past participle\" specifically conveys an action that was supposed to happen or might have happened in the past.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, but R is not the correct explanation of A.", "A is true, but R is false.", "Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true."], "answer": "A is false, but R is true.", "explanation": "Assertion (A) is false. While perfect modals often refer to past actions, they don't always indicate a direct result in the present. For example, \"It might have been lost\" refers to a past possibility without necessarily implying a present result. Reason (R) is true. The structure \"modal + have + been + past participle\" is indeed used to convey actions that were supposed to happen, might have happened, or could have happened in the past, often with implications of regret, possibility, or unfulfilled conditions."}, {"id": 73, "section": "English Grammar", "question": "From the following statements, identify ALL the grammatically correct and contextually appropriate passive voice transformations.\nJ: Active: \"The committee must approve the proposal.\" Passive: \"The proposal must be approved by the committee.\"\nK: Active: \"Someone should have informed us earlier.\" Passive: \"We should have been informed earlier.\"\nL: Active: \"Do not disturb the patient.\" Passive: \"Let the patient not be disturbed.\"\nM: Active: \"They could have completed the project last week.\" Passive: \"The project could have been completed last week.\"", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and L only", "J, L, and M only", "J, K, L, and M", "K, L, and M only"], "answer": "J, K, L, and M", "explanation": "J. Correct: \"The proposal must be approved by the committee\" is a correct transformation of an active sentence with a modal verb (\"must\") into the passive voice. The structure modal + be + past participle is correctly applied. K. Correct: \"We should have been informed earlier\" is a correct transformation of an active sentence with a perfect modal (\"should have informed\") into the passive voice. The structure modal + have + been + past participle is correctly applied, and the object of the active sentence (\"us\") becomes the subject of the passive sentence (\"We\"). L. Correct: \"Let the patient not be disturbed\" is a correct transformation of a negative active imperative (\"Do not disturb the patient\") into a negative passive imperative. The structure Let + object + not + be + past participle is used. M. Correct: \"The project could have been completed last week\" is a correct transformation of an active sentence with a perfect modal (\"could have completed\") into the passive voice. The structure modal + have + been + past participle is correctly applied. All four statements represent grammatically correct and contextually appropriate passive voice transformations."}, {"id": 74, "section": "English Grammar", "question": "Evaluate the following statements regarding complex passive voice structures and identify all that are grammatically correct and contextually sound.\nJ: The report ought to have been submitted before the deadline, but it wasn't.\nK: Let no stone be left unturned in the search for truth.\nL: It is believed that the treasure might have been hidden centuries ago.\nM: The children need not to be blamed for the accident.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and L only", "J, K, L, and M", "K, L, and M only", "J, L, and M only"], "answer": "J, K, and L only", "explanation": "J. \"The report ought to have been submitted before the deadline, but it wasn't\" is grammatically correct. \"Ought to have been submitted\" is a perfect modal passive expressing a past unfulfilled obligation. K. \"Let no stone be left unturned in the search for truth\" is a grammatically correct negative passive imperative. L. \"It is believed that the treasure might have been hidden centuries ago\" is grammatically correct. It uses an impersonal passive construction (\"It is believed\") followed by a perfect modal passive (\"might have been hidden\"). M. \"The children need not to be blamed for the accident\" is grammatically incorrect. When \"need\" functions as a modal auxiliary, it does not take \"to\" before the main verb. The correct form would be \"The children need not be blamed for the accident.\""}, {"id": 75, "section": "English Grammar", "question": "Identify all the statements below that correctly describe an exception or a tricky aspect of passive voice formation with modals, perfects, or imperatives.\nJ: Verbs followed by an object and an infinitive (e.g., \"They saw him leave\") can be made passive in two ways: \"He was seen to leave\" or \"He was seen leaving.\"\nK: When an imperative has an indirect object, it cannot be transformed into a passive imperative.\nL: Phrasal verbs (e.g., \"look after\") maintain their preposition in the passive voice (e.g., \"He was looked after\").\nM: The modal \"used to\" cannot be used in the passive voice.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, and M only", "J, K, and L only", "J, L, and M only", "K, L, and M only"], "answer": "J, L, and M only", "explanation": "J. This statement is correct. Verbs of perception (see, hear, feel, watch, etc.) followed by an object and a bare infinitive can be passivized with \"to\" before the infinitive or by using the present participle. K. This statement is incorrect. Imperatives with indirect objects can be passivized. For example, \"Give him the book\" can become \"Let him be given the book\" or \"Let the book be given to him.\" L. This statement is correct. Phrasal verbs are treated as a single unit, and the preposition is retained in the passive voice. M. This statement is correct. \"Used to\" is a semi-modal expressing past habit, and it does not have a passive form. We cannot say \"It used to be done.\""}, {"id": 76, "section": "English Grammar", "question": "Classify the following passive sentences into their respective types: I. \"Let the truth be told.\" II. \"The mistake could have been avoided.\" III. \"The report has been submitted.\" IV. \"The rules must be followed.\" Which of the following classifications is correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["I − Modal Perfect Passive; II − Imperative Passive; III − Modal Passive; IV − Perfect Passive", "I − Modal Passive; II − Imperative Passive; III − Perfect Passive; IV − Modal Perfect Passive", "I − Imperative Passive; II − Perfect Passive; III − Modal Passive; IV − Modal Perfect Passive", "I − Imperative Passive; II − Modal Perfect Passive; III − Perfect Passive; IV − Modal Passive"], "answer": "I − Imperative Passive; II − Modal Perfect Passive; III − Perfect Passive; IV − Modal Passive", "explanation": "I. \"Let the truth be told\" uses the \"Let + object + be + past participle\" structure, which is characteristic of an Imperative Passive. II. \"The mistake could have been avoided\" uses \"modal (could) + have + been + past participle (avoided)\", making it a Modal Perfect Passive. III. \"The report has been submitted\" uses \"has been + past participle (submitted)\", which is the structure for a Present Perfect Passive (a type of Perfect Passive). IV. \"The rules must be followed\" uses \"modal (must) + be + past participle (followed)\", making it a Modal Passive."}, {"id": 77, "section": "English Grammar", "question": "Match the active voice sentences in List I with their correct passive voice transformations in List II. List-I\n(J) You must complete this assignment.\n(K) They should have warned us about the danger.\n(L) Close the door.\n(M) Someone has stolen my wallet. List-II\n(1) My wallet has been stolen.\n(2) Let the door be closed.\n(3) This assignment must be completed by you.\n(4) We should have been warned about the danger by them.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-4, L-2, M-1", "J-4, K-3, L-1, M-2", "J-1, K-2, L-3, M-4", "J-3, K-2, L-4, M-1"], "answer": "J-3, K-4, L-2, M-1", "explanation": "P. \"You must complete this assignment.\" (Active Modal) transforms to \"This assignment must be completed by you.\" (Passive Modal) − Matches with 3. Q. \"They should have warned us about the danger.\" (Active Modal Perfect) transforms to \"We should have been warned about the danger by them.\" (Passive Modal Perfect) − Matches with 4. R. \"Close the door.\" (Active Imperative) transforms to \"Let the door be closed.\" (Passive Imperative) − Matches with 2. S. \"Someone has stolen my wallet.\" (Active Perfect) transforms to \"My wallet has been stolen.\" (Passive Perfect) − Matches with 1."}, {"id": 78, "section": "English Grammar", "question": "Arrange the following steps in the correct chronological order to transform an active sentence with a modal verb (e.g., \"They can solve the problem\") into its passive voice.\nJ: Place the original object at the beginning of the sentence to become the new subject.\nK: Add the auxiliary verb \"be\" after the modal verb.\nL: Change the main verb into its past participle form.\nM: Retain the modal verb from the active sentence.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, M, K, L", "M, K, J, L", "M, J, K, L", "J, K, M, L"], "answer": "J, M, K, L", "explanation": "The correct order for transforming an active sentence with a modal verb into passive voice is: J. First, the object of the active sentence (\"the problem\") becomes the subject of the passive sentence. M. Next, the modal verb (\"can\") is retained. K. Then, the auxiliary verb \"be\" is added after the modal. L. Finally, the main verb (\"solve\") is changed into its past participle form (\"solved\"). So, \"They can solve the problem\" becomes \"The problem can be solved.\""}, {"id": 79, "section": "English Grammar", "question": "Identify the sentence below that contains a subtle grammatical error in its passive voice construction.", "brand": "bilaspurtestseries.com 9669946966", "options": ["All confidential data must be protected from unauthorized access.", "The ancient artifact might have been laying undisturbed for centuries.", "The new software should have been installed by a qualified technician.", "Let the necessary precautions be taken immediately."], "answer": "The ancient artifact might have been laying undisturbed for centuries.", "explanation": "The subtle error is the use of \"laying\" instead of \"lying.\" \"Laying\" is the present participle of the transitive verb \"to lay\" (to place something down), which requires an object. \"Lying\" is the present participle of the intransitive verb \"to lie\" (to recline or be situated), which does not take an object. Since the artifact itself was undisturbed, the correct verb is \"lying.\" The sentence should be: \"The ancient artifact might have been lying undisturbed for centuries.\" Options A, B, and D are grammatically correct passive constructions."}, {"id": 80, "section": "English Grammar", "question": "Which of the following statements best defines the primary distinction between an 'article' and a 'determiner' in English grammar?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Articles always specify quantity, whereas determiners always indicate possession.", "Determiners are only used with plural nouns, while articles are used with both singular and plural nouns.", "Articles are a specific type of determiner, while determiners encompass a broader category of words that precede nouns.", "Articles modify verbs, while determiners modify adjectives."], "answer": "Articles are a specific type of determiner, while determiners encompass a broader category of words that precede nouns.", "explanation": "Articles (a, an, the) are indeed a subset of determiners. Determiners are words that come before a noun to clarify what the noun refers to, and this category includes articles, possessives, demonstratives, quantifiers, etc. The other options provide incorrect definitions or distinctions regarding their function or usage."}, {"id": 81, "section": "English Grammar", "question": "Consider the sentence: '______ sun rises in ______ east.' Which option correctly fills the blanks, demonstrating the appropriate use of articles for unique entities and directions?", "brand": "bilaspurtestseries.com 9669946966", "options": ["A, the", "The, the", "A, an", "An, a"], "answer": "The, the", "explanation": "The definite article 'the' is used before nouns that are unique or one of a kind, such as 'sun'. Similarly, 'the' is used before the names of directions when they are used as nouns (e.g., 'the east', 'the west'). Therefore, 'The sun rises in the east' is the correct construction."}, {"id": 82, "section": "English Grammar", "question": "Evaluate the following statement: 'The indefinite article 'an' is used before words beginning with a vowel sound, not necessarily a vowel letter.' Is this statement correct, and why?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Incorrect, 'an' is only used before words starting with a vowel letter (a, e, i, o, u).", "Correct, but only for words of French origin.", "Correct, because words like 'hour' take 'an' due to their vowel sound, despite starting with a consonant letter.", "Incorrect, 'an' is used before all words, regardless of their starting sound or letter."], "answer": "Correct, because words like 'hour' take 'an' due to their vowel sound, despite starting with a consonant letter.", "explanation": "The statement is correct. The choice between 'a' and 'an' depends on the initial sound of the word that follows, not the initial letter. If the word begins with a vowel sound (e.g., 'an hour', 'an honest man', 'an MBA'), 'an' is used. If it begins with a consonant sound (e.g., 'a university', 'a European trip'), 'a' is used."}, {"id": 83, "section": "English Grammar", "question": "Consider the following statements regarding the usage of articles and determiners in English grammar:\nJ: The definite article 'the' is used before a singular countable noun when it represents a whole class or species.\nK: The indefinite article 'a' or 'an' can be used before a plural countable noun to indicate an unspecified quantity.\nL: Possessive determiners (e.g., 'my', 'your', 'his') are generally used in place of articles when indicating ownership or close association.\nM: The zero article is typically used before abstract nouns when they are referred to in a general sense. Which of the above statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L and M only", "J, K, L and M", "K and M only", "J and K only"], "answer": "J, L and M only", "explanation": "Statement J is correct. For example, 'The dog is a loyal animal' refers to the entire species of dogs. Similarly, 'The whale is a mammal' refers to the species of whales. Statement K is incorrect. Indefinite articles 'a' and 'an' are exclusively used with singular countable nouns. For plural countable nouns, we might use 'some' or no article at all (e.g., 'I saw apples' or 'I saw some apples'). Statement L is correct. Possessive determiners function as determiners and precede nouns, indicating possession, thus replacing the need for an article (e.g., 'This is my car,' not 'This is the my car'). Statement M is correct. For instance, 'Love is a powerful emotion' uses the zero article before the abstract noun 'Love' when speaking generally. Another example is 'Wisdom is better than riches'."}, {"id": 84, "section": "English Grammar", "question": "Which category of determiners includes words like 'this', 'that', 'these', and 'those'?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Possessive determiners", "Demonstrative determiners", "Articles", "Quantifiers"], "answer": "Demonstrative determiners", "explanation": "Words like 'this', 'that', 'these', and 'those' are known as demonstrative determiners. They are used to point out specific nouns and indicate their proximity to the speaker. Possessive determiners show ownership (e.g., my, your), quantifiers indicate quantity (e.g., many, few), and articles are 'a', 'an', 'the'."}, {"id": 85, "section": "English Grammar", "question": "Why is the definite article 'the' typically used before names of rivers, oceans, and mountain ranges, but not before names of individual mountains or lakes?", "brand": "bilaspurtestseries.com 9669946966", "options": ["Because 'the' is used for all geographical features without exception.", "Because 'the' indicates a plural form, and these features are often plural in nature.", "Because it is a historical convention with no grammatical basis.", "Because rivers, oceans, and mountain ranges are considered unique and collective entities, while individual mountains and lakes are specific singular nouns."], "answer": "Because rivers, oceans, and mountain ranges are considered unique and collective entities, while individual mountains and lakes are specific singular nouns.", "explanation": "The definite article 'the' is used before names of geographical features that are considered unique, collective, or a chain, such as 'the Amazon River', 'the Pacific Ocean', 'the Himalayas'. However, it is generally omitted before names of individual mountains (e.g., Mount Everest) and lakes (e.g., Lake Superior) because these are treated as proper nouns referring to single, distinct entities."}, {"id": 86, "section": "English Grammar", "question": "Choose the most appropriate option to complete the sentence: 'Despite being ______ honest man, he faced ______ accusation of fraud, which was ______ unexpected turn of events.'", "brand": "bilaspurtestseries.com 9669946966", "options": ["an, a, an", "a, an, a", "a, a, a", "an, an, an"], "answer": "an, an, an", "explanation": "The word 'honest' starts with a silent 'h', so it has a vowel sound, requiring 'an'. 'Accusation' starts with a vowel sound, requiring 'an'. 'Unexpected' also starts with a vowel sound, requiring 'an'. Therefore, 'an, an, an' is the correct sequence of articles."}, {"id": 87, "section": "English Grammar", "question": "Fill in the blanks with the most suitable articles/determiners: '______ knowledge is ______ powerful tool, but ______ wisdom is ______ true guide.'", "brand": "bilaspurtestseries.com 9669946966", "options": ["_, a, _, a", "A, a, the, a", "The, a, a, the", "_, a, the, the"], "answer": "_, a, _, a", "explanation": "'Knowledge' and 'wisdom' are uncountable nouns used in a general sense here, so no article is needed before them (represented by '_'). 'Powerful tool' is a singular countable noun, so it requires the indefinite article 'a'. Similarly, 'true guide' is a singular countable noun, requiring 'a'. Thus, the correct sequence is no article, 'a', no article, 'a'."}, {"id": 88, "section": "English Grammar", "question": "Choose the sentence that correctly uses the determiner 'little' to convey a sense of insufficiency or scarcity, implying a negative outcome or feeling.", "brand": "bilaspurtestseries.com 9669946966", "options": ["She had a little patience left, which helped her finish the task.", "There was little hope for recovery after the accident.", "He added a little sugar to his coffee, making it perfect.", "We still have a little time to complete the project."], "answer": "There was little hope for recovery after the accident.", "explanation": "The determiner 'little' (without 'a') conveys a negative meaning, implying 'not much' or 'hardly any', often suggesting insufficiency or a negative outcome. In contrast, 'a little' conveys a positive meaning, implying 'some' or 'a small amount', usually with a positive or neutral connotation. Options A, C, and D use 'a little' to indicate a small but sufficient or helpful amount, leading to positive or neutral outcomes. Option B uses 'little hope', correctly conveying that there was almost no hope, which is a negative sentiment."}, {"id": 89, "section": "English Grammar", "question": "Which of the following statements about the use of articles is INCORRECT?", "brand": "bilaspurtestseries.com 9669946966", "options": ["No article is used before abstract nouns when they are used in a general sense (e.g., love, happiness).", "The indefinite article 'a' is used before plural countable nouns when referring to an unspecified quantity.", "The definite article 'the' is used before names of musical instruments (e.g., play the piano, the guitar).", "The definite article 'the' is used before superlatives (e.g., the best, the tallest)."], "answer": "The indefinite article 'a' is used before plural countable nouns when referring to an unspecified quantity.", "explanation": "The indefinite articles 'a' and 'an' are used only with singular countable nouns. They cannot be used with plural countable nouns. For plural countable nouns, either no article is used (e.g., 'I saw birds') or a quantifier like 'some' or 'many' is used (e.g., 'I saw some birds'). The other statements are correct rules for article usage."}, {"id": 90, "section": "English Grammar", "question": "Consider the following pairs of sentences. In which pair is the difference in meaning primarily due to the choice of determiner?", "brand": "bilaspurtestseries.com 9669946966", "options": ["They live in a big house. / They live in a house.", "I have a book. / I have the book.", "She likes music. / She likes the music.", "He has little money. / He has a little money."], "answer": "He has little money. / He has a little money.", "explanation": "The determiners 'little' and 'a little' have distinct meanings. 'Little' (without 'a') implies 'hardly any' or 'not enough', conveying a negative sense. 'A little' implies 'some' or 'a small amount', conveying a positive sense. This pair shows a significant difference in meaning based solely on the presence or absence of 'a'. In other options, the difference is about specificity (a vs. the) or emphasis (big house vs. house), but not a fundamental shift in quantity or sufficiency."}, {"id": 91, "section": "English Grammar", "question": "Assertion (A): The phrase 'go to hospital' implies visiting for medical treatment, while 'go to the hospital' implies visiting the building for another purpose, such as seeing a friend.\nReason (R):: The omission of the definite article 'the' before certain institutions (like hospital, school, church) indicates their primary purpose, whereas its inclusion refers to the physical building.", "brand": "bilaspurtestseries.com 9669946966", "options": ["A is true, but R is false.", "Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true.", "Both A and R are true, but R is not the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Both the assertion and the reason are true and directly related. When 'hospital', 'school', 'church', 'prison', 'college', 'bed', 'work', 'home' are used without 'the', it implies attending them for their primary purpose (e.g., 'go to school' to study). When 'the' is used, it refers to the physical place or building, often for a secondary purpose (e.g., 'go to the school' to pick up a child). Thus, R correctly explains A."}, {"id": 92, "section": "English Grammar", "question": "Assertion (A): Possessive adjectives (e.g., my, your, his) function as determiners.\nReason (R):: Determiners are words that introduce noun phrases and provide information about the noun's quantity, possession, or specificity.", "brand": "bilaspurtestseries.com 9669946966", "options": ["Both A and R are true, and R is the correct explanation of A.", "A is false, but R is true.", "A is true, but R is false.", "Both A and R are true, but R is not the correct explanation of A."], "answer": "Both A and R are true, and R is the correct explanation of A.", "explanation": "Both the assertion and the reason are true. Possessive adjectives like 'my', 'your', 'his', 'her', 'its', 'our', 'their' precede nouns and indicate possession, thus fulfilling the role of determiners. The reason (R) accurately defines the broader function of determiners, which includes indicating possession, thereby explaining why possessive adjectives are classified as determiners."}, {"id": 93, "section": "English Grammar", "question": "Which of the following sentences demonstrate correct and idiomatic usage of articles and determiners?\nJ: He is one of the few people who understand the complexity of quantum physics.\nK: The more you learn, the more you realize how much you don't know.\nL: She has a good many friends in the city, so she is never lonely.\nM: I have a little patience left, but I'm about to lose it.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, and M only", "J, K, and M only", "J, K, and L only", "J, K, L, and M"], "answer": "J, K, and L only", "explanation": "Statement J is correct: 'one of the few' is a standard idiom, and 'the complexity' is correct for a specific concept. Statement K is correct: 'the more... the more...' is a common comparative construction. Statement L is correct: 'a good many' is an idiomatic quantifier meaning 'a large number'. Statement M is incorrect: 'a little patience' means 'some patience', which implies a positive amount. However, the phrase 'but I'm about to lose it' suggests a negative or insufficient amount, which would require 'little patience' (without 'a'). Therefore, M is grammatically inconsistent in its meaning."}, {"id": 94, "section": "English Grammar", "question": "Evaluate the grammatical correctness of the following sentences concerning articles and determiners:\nJ: The United States is a powerful nation.\nK: He went to the bed early last night.\nL: Many a student has failed this difficult exam.\nM: She is the most unique person I have ever met.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L, and M only", "J and L only", "J, K, and L only", "All of the above"], "answer": "J and L only", "explanation": "Statement J is correct: 'The United States' requires 'the' because it's a plural name of a country. Statement K is incorrect: 'go to bed' (without 'the') is the idiomatic expression for going to sleep. 'Go to the bed' would imply going to the physical furniture for a different purpose. Statement L is correct: 'Many a' is a valid construction used with a singular countable noun and a singular verb to mean 'a large number of'. Statement M is incorrect: 'Unique' means 'one of a kind' and is an absolute adjective, so it cannot be modified by 'most'. It should be 'a unique person' or 'the unique person' if context specifies."}, {"id": 95, "section": "English Grammar", "question": "Identify the sentences that contain an error in article or determiner usage, specifically involving common exceptions or tricky cases:\nJ: He is an European, but he speaks English fluently.\nK: The French are known for their exquisite cuisine.\nL: I have a one-dollar bill in my pocket.\nM: She has gone to the office to finish some urgent work.", "brand": "bilaspurtestseries.com 9669946966", "options": ["K and L only", "J and M only", "M only", "J only"], "answer": "J only", "explanation": "Statement J is incorrect: 'European' starts with a consonant sound /juː/, so it should be 'a European', not 'an European'. This is a common exception based on sound, not letter. Statement K is correct: 'The French' refers to the people of France. Statement L is correct: 'one-dollar' starts with a /w/ sound, so 'a' is correct. Statement M is correct: 'go to the office' is correct when referring to a specific workplace, implying a specific building or location, which is appropriate for 'urgent work'."}, {"id": 96, "section": "English Grammar", "question": "Which of the following statements correctly classify the underlined words in terms of determiners?\nJ: '<u>Many</u>' students attended the seminar. (Quantifier)\nK: '<u>Her</u>' decision was final. (Possessive Determiner)\nL: '<u>The</u>' book on the table is mine. (Definite Article)\nM: '<u>That</u>' is a beautiful painting. (Demonstrative Determiner)", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, and M only", "J, K, L, and M", "J, K, and L only", "J, K, and M only"], "answer": "J, K, and L only", "explanation": "Statement J correctly identifies 'Many' as a quantifier. Statement K correctly identifies 'Her' as a possessive determiner. Statement L correctly identifies 'The' as a definite article. Statement M incorrectly classifies 'That'. In 'That is a beautiful painting', 'That' functions as a demonstrative pronoun, acting as the subject of the sentence, not as a determiner modifying a noun. If it were 'That painting is beautiful', then 'That' would be a demonstrative determiner."}, {"id": 97, "section": "English Grammar", "question": "Match the phrase in List I with the most appropriate article/determiner usage rule in List II: List-I\n(J) ______ honest mistake\n(K) ______ United Kingdom\n(L) ______ few opportunities\n(M) ______ best solution List-II\n(1) Used for unique geographical names that are plural or federated states.\n(2) Used before superlatives.\n(3) Used when the initial sound is a vowel, despite the spelling.\n(4) Used to convey a negative meaning, implying 'not many'.", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-1, L-4, M-2", "J-3, K-2, L-4, M-1", "J-4, K-1, L-3, M-2", "J-1, K-3, L-2, M-4"], "answer": "J-3, K-1, L-4, M-2", "explanation": "A. 'An honest mistake' uses 'an' because 'honest' starts with a vowel sound, matching rule 3. B. 'The United Kingdom' uses 'the' because it's a unique geographical name of a federated state, matching rule 1. C. 'Few opportunities' (without 'a') conveys a negative meaning, implying 'not many', matching rule 4. D. 'The best solution' uses 'the' because 'best' is a superlative adjective, matching rule 2. Therefore, the correct match is J-3, K-1, L-4, M-2."}, {"id": 98, "section": "English Grammar", "question": "Match the type of determiner in List I with its defining characteristic or example in List II: List-I\n(J) Possessive Determiner\n(K) Quantifier\n(L) Demonstrative Determiner\n(M) Indefinite Article List-II\n(1) Indicates 'some' or 'any' amount, often used with uncountable nouns.\n(2) Points out specific nouns based on proximity (e.g., this, those).\n(3) Shows ownership or relationship (e.g., my, their).\n(4) Refers to a non-specific singular countable noun (e.g., a, an).", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-1, L-3, M-4", "J-3, K-4, L-1, M-2", "J-1, K-3, L-4, M-2", "J-3, K-1, L-2, M-4"], "answer": "J-3, K-1, L-2, M-4", "explanation": "A. Possessive Determiner: Shows ownership or relationship (e.g., my, their). This matches characteristic 3. B. Quantifier: Indicates 'some' or 'any' amount, often used with uncountable nouns (e.g., much, many, some). This matches characteristic 1. C. Demonstrative Determiner: Points out specific nouns based on proximity (e.g., this, those). This matches characteristic 2. D. Indefinite Article: Refers to a non-specific singular countable noun (e.g., a, an). This matches characteristic 4. Therefore, the correct match is J-3, K-1, L-2, M-4."}, {"id": 99, "section": "English Grammar", "question": "Evaluate the following statements concerning the advanced usage of articles and determiners:\nJ: The definite article 'the' is consistently used before geographical features such as oceans, seas, rivers, and mountain ranges, but generally omitted before individual mountains or lakes.\nK: When a unique position or title (e.g., 'President', 'Queen') is followed immediately by the person's name, the definite article 'the' is always required.\nL: The indefinite article 'a' or 'an' can be correctly used before a proper noun in specific contexts, such as when referring to an unknown individual or drawing a comparison to a famous personality.\nM: Distributive determiners like 'each' and 'every' invariably precede a singular countable noun and necessitate a singular verb, irrespective of the collective implication. Which of the above statements are accurate?", "brand": "bilaspurtestseries.com 9669946966", "options": ["J and K only", "J, L and M only", "K and M only", "J, K, L and M"], "answer": "J, L and M only", "explanation": "Statement J is accurate. We say 'the Atlantic Ocean,' 'the Nile River,' and 'the Alps,' but 'Mount Fuji' and 'Lake Victoria.' This rule distinguishes between ranges/bodies of water and individual peaks/lakes. Statement K is inaccurate. While 'the' is used with unique titles when no name is given (e.g., 'The President addressed the nation'), it is typically omitted when the title is immediately followed by a proper name (e.g., 'President Biden,' not 'the President Biden'). The word 'always' makes this statement false. Statement L is accurate. For example, 'A Mr. Johnson called earlier' implies the speaker doesn't know which Mr. Johnson. Similarly, 'He wants to be a Picasso' uses 'a' to compare someone's artistic talent to that of Picasso. Statement M is accurate. 'Each' and 'every' are distributive determiners that emphasize individual members of a group. They are always followed by a singular countable noun and require a singular verb (e.g., 'Each participant receives a certificate,' 'Every student has submitted their assignment')."}, {"id": 100, "section": "English Grammar", "question": "Consider the following statements regarding the usage of articles and determiners in English grammar:\nJ: The definite article 'the' is correctly used before names of countries that are plural or include words like 'Republic', 'Kingdom', or 'States'.\nK: The indefinite article 'an' is used before words beginning with a vowel sound, not necessarily a vowel letter, such as in 'an hour' or 'an honest man'.\nL: The determiner 'few' implies a negative sense of 'not many', while 'a few' implies a positive sense of 'some', both used with plural countable nouns.\nM: The zero article is typically employed before abstract nouns used in a general sense, such as 'knowledge is power' or 'freedom is essential'.\nWhich of the above statements are correct?", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, and M", "J, K, and L only", "K, L, and M only", "J and M only"], "answer": "J, K, L, and M", "explanation": "Statement J is correct: The definite article 'the' is used with country names that are plural (e.g., The Netherlands) or contain words like 'Republic', 'Kingdom', or 'States' (e.g., The United States, The United Kingdom). It is not used with most singular country names (e.g., France, India).\nStatement K is correct: The choice between 'a' and 'an' is determined by the initial sound of the word that follows, not its spelling. For instance, 'an hour' (silent 'h', vowel sound) and 'a university' (consonant 'yoo' sound).\nStatement L is correct: 'Few' conveys a negative meaning, suggesting 'not many' or 'hardly any' (e.g., 'Few people attended the event'). In contrast, 'a few' has a positive connotation, meaning 'some' or 'a small number' (e.g., 'A few friends came to visit'). Both are used with plural countable nouns.\nStatement M is correct: The zero article (no article) is used before abstract nouns when they are used in a general sense, referring to the concept itself rather than a specific instance (e.g., 'Love is blind', 'Justice must prevail').\nSince all statements J, K, L, and M are correct, the option including all of them is the correct answer."}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="VARG_1_ENGLISH_GRAMMAR_TENSE_ENGLISH_GRAMMAR_ACTIVE_PASSIVE_VOI_2A093C6A";const TEST_TITLE="Varg_1_English_Grammar_Tenses_Voice_Articles_Determiners_Week_1_Day_01_07_ENGLISH_GRAMMAR_TENSES_PRESENT_PAST_";const CONTACT_WHATSAPP="9669946966";const PRINT_QR_TEXT="";const PRINT_QR_MESSAGE="";const LOGO_SRC="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDABsSFBcUERsXFhceHBsgKEIrKCUlKFE6PTBCYFVlZF9VXVtqeJmBanGQc1tdhbWGkJ6jq62rZ4C8ybqmx5moq6T/2wBDARweHigjKE4rK06kbl1upKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKT/wAARCANtA20DASIAAhEBAxEB/8QAGwABAQADAQEBAAAAAAAAAAAAAAEDBAUCBgf/xABLEAACAQIDBwEEBwUGBQMDBAMAAQIDEQQhMQUSQVFhcYGREyKh8BQyQlKxwdEVI2Jy4QYzU4KS8SQ0Q1STRFWDZHOiFiU1Y6Oy0v/EABkBAQADAQEAAAAAAAAAAAAAAAABAgMEBf/EACcRAQEBAAIDAAIDAAIDAQEAAAABAgMREiExIkETMlEEYSMzQnGB/9oADAMBAAIRAxEAPwD5wAF0A7AMIPQAuvACAFAnkoHcAAPAAAAABboABc+hHoAsBYvjMB6ACwDiOIHCwD4gDxmAIerdCW7gQvnMZgB5QGfEdQAzC6LMvwAmnD1HzkLdA1bW6YD5zA9RbhqAzL5Ix6+AF32BddBZkiAW6AgBmXImXEB+HUeRlqAAHQtvXqSJ85jXoX5yJlYCpdCacS214jtkQIM+ZchlfgBPPxDLbj8Q+YEBVcZcCRPnUqD5aktnZkCi7Fh3JDyLEL4AZ9GT5sLC2RAeR8BkAC7XALdWAl2Bl0HkB6AZAAAAHQeQLABmPI8gAC8AIQrXD8BbMCF9BwHd
